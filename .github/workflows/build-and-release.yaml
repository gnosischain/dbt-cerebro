name: Build & Release DBT Cerebro

on:
  push:
    branches:
      - main

concurrency:
  group: gnosis-dbt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full-tier validation gates image publication: every policy gate, the
  # agent-context checks, pytest, AND the catalog-dependent semantic gates
  # (registry/graph/entities — these need a credentialed `dbt docs generate`,
  # which is why this tier runs here with secrets and not on PRs; PRs run the
  # parse tier via pr-checks.yaml). Nothing is pushed until this passes.
  validate:
    name: Validate (full tier, before any image publish)
    runs-on: ubuntu-latest

    env:
      CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
      CLICKHOUSE_SCHEMA: ${{ secrets.CLICKHOUSE_SCHEMA }}
      CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
      CLICKHOUSE_SECURE: ${{ secrets.CLICKHOUSE_SECURE }}
      # Dummy salt — parse/docs-generate only, no hashes are materialized here.
      CEREBRO_PII_SALT: "00"

    steps:
      - name: Checkout (with history for the change-aware gate)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dbt (ClickHouse adapter) + test deps
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.9.4 dbt-clickhouse==1.9.1 pytest

      - name: Install dbt package dependencies
        run: |
          dbt deps

      - name: Resolve base SHA (previous main state)
        # github.event.before is the push event's prior SHA; it can be all
        # zeros (branch creation) or unreachable (force push) — fall back to
        # HEAD~1 so the change-aware gate always has a real base.
        id: base
        run: |
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          echo "sha=$BASE" >> "$GITHUB_OUTPUT"

      - name: Run all gates (full tier)
        # run_all.py --full --docs-generate: static policy gates, agent-context
        # build + determinism + change-aware contract gate, pytest, then
        # dbt docs generate + semantic registry/graph/entity gates.
        run: |
          dbt parse
          python scripts/checks/run_all.py --ci --full --docs-generate --base-ref "${{ steps.base.outputs.sha }}"

  build:
    name: Build & Push Docker Images
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Organization Name
        id: org_name
        run: |
          org_name=$(echo "${{ github.repository_owner }}")
          echo "org_name=$org_name" >> $GITHUB_OUTPUT

      - name: Extract commit
        id: commit
        uses: prompt/actions-commit-hash@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ steps.org_name.outputs.org_name }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Latest
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            --tag ghcr.io/${{ steps.org_name.outputs.org_name }}/gc-gnosis-dbt:latest \
            --push .

      - name: Push Versioned
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            --tag ghcr.io/${{ steps.org_name.outputs.org_name }}/gc-gnosis-dbt:${{ steps.commit.outputs.short }} \
            --push .

  deploy-docs:
    name: Generate & Deploy dbt Docs
    needs: build
    runs-on: ubuntu-latest

    # Provide the ClickHouse connection details as environment variables
    env:
      CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
      CLICKHOUSE_SCHEMA: ${{ secrets.CLICKHOUSE_SCHEMA }}
      CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
      CLICKHOUSE_SECURE: ${{ secrets.CLICKHOUSE_SECURE }}
      # Dummy salt for docs-generate parse only — no hashes are materialized here.
      # Real runs must set this to a committed secret; see README § pseudonymization.
      CEREBRO_PII_SALT: "00"

    steps:
      - name: Checkout (with full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # Required so that gh-pages can be updated correctly

      - name: Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dbt (ClickHouse adapter)
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.9.4 dbt-clickhouse==1.9.1

      - name: Install dbt package dependencies
        run: |
          dbt deps

      # Every policy/contract GATE already ran (and passed) in the `validate`
      # job before the image was even built — this job only PRODUCES the
      # gh-pages artifacts: dbt docs, agent context, semantic registry/docs/
      # graph data.

      - name: Build agent context
        # Resolves agent_context/profiles.yml + docs/lessons/*.md + meta.agent
        # against the fresh manifest into target/agent_context{,.public}.json.
        # The public variant excludes privacy-tagged / non-MCP models and never
        # contains raw SQL. Determinism + reference gates ran in `validate`;
        # this build is what gh-pages publishes (after the scrub step below).
        run: |
          dbt parse
          python scripts/agent_context/build_agent_context.py

      - name: Generate dbt docs
        # Exclude dev-tagged models: prod builds only `tag:production`, so
        # dev/WIP models (e.g. *_v2 staging variants) are never materialised
        # and their tables don't exist — a bare `docs generate` aborts on the
        # first missing dev table. Excluding them keeps the catalog to the
        # published (prod) surface. (generate_entities.py also skips tag:dev,
        # so the entity overlay matches this catalog.)
        run: |
          dbt docs generate --exclude tag:dev

      - name: Assert docs artifacts
        run: |
          test -f target/manifest.json
          test -f target/catalog.json
          test -f target/semantic_manifest.json

      - name: Build semantic registry
        # --validate enforces invariants: globally-unique measure names,
        # no metric pointing at a missing root_model, every relationship
        # referencing materialised models, no measure binding ambiguity,
        # etc. Without it the build would silently produce a registry
        # that passes JSON-schema checks but breaks at query time.
        #
        # STRICT — the validation backlog was zeroed (0 errors / 0 warnings);
        # any new validation error OR warning fails the build. Triage via
        # `python scripts/semantic/build_registry.py --target-dir target
        # --validate` + target/semantic_validation_report.json.
        run: |
          python scripts/semantic/build_registry.py --target-dir target --validate --max-warnings 0

      - name: Surface validation report in build summary
        # Print the validation summary into the GitHub Actions step log so
        # reviewers see the error/warning counts at a glance (validation is
        # strict now, so failures also block the build on their own).
        if: always()
        run: |
          if [ -f target/semantic_validation_report.json ]; then
            python -c "
          import json
          r = json.load(open('target/semantic_validation_report.json'))
          errs = r.get('errors', [])
          warns = r.get('warnings', [])
          print(f'Semantic validation: {len(errs)} errors, {len(warns)} warnings')
          for e in errs[:20]:
              print(f'  [{e.get(\"code\")}] {e.get(\"message\")}')
          if len(errs) > 20:
              print(f'  ... and {len(errs)-20} more (see target/semantic_validation_report.json)')
          "
          else
            echo "no validation report produced"
          fi

      - name: Build semantic docs
        run: |
          python scripts/semantic/build_semantic_docs.py --target-dir target

      - name: Generate graph diagram data
        # Exercise generate_graph_diagram.py in CI (previously a manual-only doc
        # step) so its model-lineage extraction can't silently rot. Emits the
        # graph_data.json the cerebro-docs explorer consumes.
        run: |
          python scripts/semantic/generate_graph_diagram.py \
            --target-dir target --json-output target/graph_data.json

      - name: Assert semantic outputs
        run: |
          test -f target/semantic_registry.json
          test -f target/semantic_validation_report.json
          test -f target/semantic_graph_catalog.json
          test -f target/semantic_docs_index.json
          test -f target/graph_data.json
          test -f target/semantic_build_summary.json
          test -f target/semantic_build_metrics.prom

      - name: Scrub non-public artifacts before publish
        # gh-pages is world-readable. Only the privacy-filtered agent-context
        # variant ships; the full artifact (includes privacy-tagged models) is
        # local/CI-only. Verify the public one exists, then drop the full one.
        run: |
          test -f target/agent_context.public.json
          rm -f target/agent_context.json

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target        # Path where dbt puts generated docs
          publish_branch: gh-pages     # Branch to push the static site to
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
