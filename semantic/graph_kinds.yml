# Node-kind taxonomy registry — the governed vocabulary for the knowledge graph.
#
# Every `config.meta.cerebro.graph.source_kind` / `target_kind` MUST be a key
# under `node_kinds` here, and every relationship `via_entity` SHOULD be too.
# `build_registry.py --validate` rejects unknown kinds (code
# `graph_meta_unknown_kind`), so a typo is a build error rather than a silent
# miss. Adding a new kind is a deliberate edit here + a `schema_version` bump.
#
# Fields per kind:
#   description          one-line definition (surfaced by the MCP ontology tools)
#   synonyms             alternate phrasings for catalog search
#   parent_type          optional taxonomic parent (OM-style hierarchy)
#   is_relationship_axis optional; true for kinds that only appear as a join
#                        `via_entity` (a node type without its own graph profile)

version: 1
schema_version: 1

node_kinds:
  address:
    description: A raw on-chain account (EOA or contract) identified by a 20-byte address.
    synonyms: [account, wallet, eoa, contract address]

  circles_avatar:
    description: A Circles v2 avatar — a human, group, or organisation identity in the Circles trust graph.
    synonyms: [circles identity, avatar, circles account]
    parent_type: address

  safe:
    description: A Safe (multisig) smart-contract account.
    synonyms: [gnosis safe, multisig, safe account]
    parent_type: address

  gpay_wallet:
    description: A Gnosis Pay wallet (relayer-owned Safe backing a Gnosis Pay card).
    synonyms: [gnosis pay wallet, gp wallet, pay wallet]
    parent_type: address

  pool:
    description: A DEX liquidity pool contract.
    synonyms: [liquidity pool, dex pool, amm pool]
    parent_type: address

  bridge:
    description: A bridge contract moving value between Gnosis Chain and other networks.
    synonyms: [bridge contract, bridge]
    parent_type: address

  token:
    description: An ERC-20 / token contract address.
    synonyms: [erc20, asset, coin, token contract]
    parent_type: address

  validator:
    description: A consensus-layer validator, keyed by validator index / withdrawal credentials.
    synonyms: [validator index, beacon validator]

  project_label:
    description: A Dune/crawler project or protocol label attached to an address.
    synonyms: [dune label, project, protocol label]

  # --- relationship axes (node types without their own graph profile, D7) ---
  user_pseudonym:
    description: Cross-sector pseudonymous user identifier (pseudonymize_address hash space).
    synonyms: [user, pseudonym, user id hash]
    is_relationship_axis: true

  day:
    description: Daily time-spine grain.
    synonyms: [date, daily]
    is_relationship_axis: true

  week:
    description: Weekly (Monday-anchored) time-spine grain.
    synonyms: [weekly]
    is_relationship_axis: true

  month:
    description: Monthly time-spine grain.
    synonyms: [monthly]
    is_relationship_axis: true

  sector_day:
    description: Sector-by-day composite grain used by cross-sector daily rollups.
    synonyms: [sector day, module day]
    is_relationship_axis: true
