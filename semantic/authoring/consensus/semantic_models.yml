- name: validator_operators_distinct
  label: Validator Operators (Distinct Withdrawal Addresses)
  description: "Distinct count of EVM withdrawal addresses controlling 0x01-credential validators. The `user_pseudonym` join\
    \ key is in the same hash space as revenue / gpay / gnosis_app / Circles \u2014 use cross-sector joins on `user_pseudonym`\
    \ to compute overlaps (e.g. \"validator operators who are also gpay users\", \"revenue-active users who run validators\"\
    ).\nExcludes 0x00-credential validators (BLS-only, no EVM withdrawal address to hash).\n"
  type: simple
  type_params:
    measure: consensus_validators_withdrawal_addresses_distinct_count
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: user
