    expr: pool_address
  - name: token
    type: foreign
    expr: token_address
  dimensions:
  - name: pool_address
    type: categorical
    expr: pool_address
  - name: token_address
    type: categorical
    expr: token_address
  - name: protocol
    type: categorical
    expr: protocol
  - name: block_timestamp
    type: time
    expr: block_timestamp
    type_params:
      time_granularity: day
  config:
    meta:
      cerebro:
        owner: defi_team
        quality_tier: approved
        role: dimension
        grain: day
        question_synonyms:
        - tokens in pools
        - which tokens does a pool contain
