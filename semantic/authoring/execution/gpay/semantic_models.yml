- name: gpay_distinct_users
  label: Gnosis Pay Distinct Users
  description: "Distinct user_pseudonym count from int_execution_gpay_safe_identities \u2014 i.e. unique humans who own /\
    \ delegate / control at least one Gnosis Pay Safe. Join with revenue per-user metrics on `user_pseudonym` to compute overlaps\
    \ (e.g. \"revenue-active users who are also gpay users\"). Cardinality is per-pseudonym, not per-Safe; one user can manage\
    \ many Safes (initial_owner / delegate / safe_self roles).\n"
  type: simple
  type_params:
    measure: execution_gpay_users_distinct
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions: []
        supported_time_grains: []
        question_synonyms:
        - gpay distinct users
        - gnosis pay distinct users
        - how many gpay users
        - unique gnosis pay user count
        - gpay users
        - gnosis pay user identities
        - gpay safe owners
        - gpay user pseudonyms
        - users with a gnosis pay safe
