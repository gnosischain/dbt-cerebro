- name: execution_gpay_users_distinct
  model: ref('fct_execution_gpay_users_distinct')
  entities:
  - name: user_pseudonym
    type: primary
    expr: toString(user_pseudonym)
  dimensions:
  - name: has_initial_owner
    type: categorical
    expr: has_initial_owner
  - name: has_delegate
    type: categorical
    expr: has_delegate
  - name: has_safe_self
    type: categorical
    expr: has_safe_self
  measures:
  - name: execution_gpay_users_distinct
    agg: count
    expr: user_pseudonym
