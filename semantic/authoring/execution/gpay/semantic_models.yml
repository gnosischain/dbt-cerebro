    agg: sum
    expr: n_safes
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: user
        question_synonyms:
        - gpay users
        - gnosis pay user identities
        - gpay safe owners
        - gpay user pseudonyms
        - users with a gnosis pay safe
