  label: Gnosis Pay Total Safes (sum across users)
  description: "Sum of distinct Safes per user across all users. This is the total user-Safe edge count (not distinct Safes\
    \ \u2014 see fct_bridges_kpis_* for distinct Safe counts at the address grain).\n"
  type: simple
  type_params:
