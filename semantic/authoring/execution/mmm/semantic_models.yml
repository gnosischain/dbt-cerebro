semantic_models:
- name: execution_mmm_baseline_latest
  model: ref('fct_execution_mmm_baseline_latest')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution mmm baseline latest
  defaults:
    agg_time_dimension: computed_at
  dimensions:
  - name: kpi_name
    type: categorical
    expr: kpi_name
  - name: media_name
    type: categorical
    expr: media_name
  - name: computed_at
    type: time
    expr: computed_at
    type_params:
      time_granularity: day
  measures:
  - name: baseline_kpi_median_value
    agg: sum
    expr: baseline_kpi_median
  - name: baseline_kpi_q05_value
    agg: sum
    expr: baseline_kpi_q05
  - name: baseline_kpi_q95_value
    agg: sum
    expr: baseline_kpi_q95
  - name: bottom_decile_threshold_value
    agg: sum
    expr: bottom_decile_threshold
  - name: n_low_spend_weeks_value
    agg: sum
    expr: n_low_spend_weeks
- name: execution_mmm_collinearity_latest
  model: ref('fct_execution_mmm_collinearity_latest')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution mmm collinearity latest
  defaults:
    agg_time_dimension: computed_at
  dimensions:
  - name: col_a
    type: categorical
    expr: col_a
  - name: col_b
    type: categorical
    expr: col_b
  - name: computed_at
    type: time
    expr: computed_at
    type_params:
      time_granularity: day
  measures:
  - name: n_weeks_value
    agg: sum
    expr: n_weeks
- name: execution_mmm_controls_weekly
  model: ref('int_execution_mmm_controls_weekly')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - marketing mix control variables
        - mmm control regressors weekly
        - media mix model controls
  defaults:
    agg_time_dimension: week
  dimensions:
  - name: week
    type: time
    expr: week
    type_params:
      time_granularity: week
  - name: control_name
    type: categorical
    expr: control_name
  - name: control_value_method
    type: categorical
    expr: control_value_method
  - name: provenance_model
    type: categorical
    expr: provenance_model
  measures:
  - name: control_value
    agg: sum
    expr: control_value
- name: execution_mmm_kpis_weekly
  model: ref('int_execution_mmm_kpis_weekly')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - marketing mix kpi outcomes weekly
        - mmm conversion targets
        - media mix model kpis
  defaults:
    agg_time_dimension: week
  dimensions:
  - name: week
    type: time
    expr: week
    type_params:
      time_granularity: week
  - name: kpi_name
    type: categorical
    expr: kpi_name
  - name: kpi_value_method
    type: categorical
    expr: kpi_value_method
  - name: provenance_model
    type: categorical
    expr: provenance_model
  measures:
  - name: kpi_value
    agg: sum
    expr: kpi_value
- name: execution_mmm_media_weekly
  model: ref('int_execution_mmm_media_weekly')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - marketing mix media spend weekly
        - mmm channel outlays
        - media mix model spend inputs
  defaults:
    agg_time_dimension: week
  dimensions:
  - name: week
    type: time
    expr: week
