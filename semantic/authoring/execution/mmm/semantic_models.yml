  - name: media_ga_token_offer_emissions_usd_value
    agg: sum
    expr: media_ga_token_offer_emissions_usd
  - name: media_gpay_cashback_outlay_usd_value
    agg: sum
    expr: media_gpay_cashback_outlay_usd
  - name: media_pools_lp_fee_apr_avg_value
