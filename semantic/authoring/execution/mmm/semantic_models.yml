  - name: kpi_gpay_payment_volume_usd_value
    agg: sum
    expr: kpi_gpay_payment_volume_usd
  - name: kpi_ga_active_users_value
    agg: sum
    expr: kpi_ga_active_users
  - name: kpi_ga_new_users_value
    agg: sum
    expr: kpi_ga_new_users
  - name: kpi_chain_tx_count_value
    agg: sum
    expr: kpi_chain_tx_count
  - name: kpi_gpay_topups_count_value
    agg: sum
    expr: kpi_gpay_topups_count
  - name: kpi_gpay_topups_volume_usd_value
    agg: sum
    expr: kpi_gpay_topups_volume_usd
  - name: kpi_gno_staked_value
    agg: sum
    expr: kpi_gno_staked
  - name: kpi_bridge_inflow_usd_value
    agg: sum
    expr: kpi_bridge_inflow_usd
  - name: kpi_bridge_outflow_usd_value
    agg: sum
    expr: kpi_bridge_outflow_usd
  - name: media_validator_proposer_rewards_gno_value
    agg: sum
    expr: media_validator_proposer_rewards_gno
  - name: media_validator_income_gno_value
    agg: sum
