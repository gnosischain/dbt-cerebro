semantic_models:
- name: execution_rwa_backedfi_prices
  model: ref('int_execution_rwa_backedfi_prices')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: bticker
    type: categorical
    expr: bticker
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  measures:
  - name: price_value
    agg: average
    expr: price
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution rwa backedfi prices
        grain: day
