semantic_models:
- name: GBCDeposit_deposists_daily
  model: ref('int_GBCDeposit_deposists_daily')
  defaults:
    agg_time_dimension: date
  entities:
  - name: address
    type: primary
    expr: concat('0x', substring(withdrawal_credentials, 27, 40))
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: withdrawal_credentials
    type: categorical
    expr: withdrawal_credentials
  - name: withdrawal_address
    type: categorical
    expr: concat('0x', substring(withdrawal_credentials, 27, 40))
  measures:
  - name: GBCDeposit_deposists_daily__amount_value
    agg: sum
    expr: amount
  config:
    meta:
      cerebro:
        owner: consensus_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - GBCDeposit deposists daily
        - validator deposits
        - who deposited to which validator
        graph:
          enabled: true
          profile: deposit_to_validator
          source_column: concat('0x', substring(withdrawal_credentials, 27, 40))
          target_column: withdrawal_credentials
          source_kind: address
          target_kind: validator
          directed: true
          time_column: date
          weight_column: amount
metrics:
- name: GBCDeposit_deposists_daily__amount_value
  label: Gbcdeposit Deposists Daily - Amount
  description: GBCDeposit deposists daily - amount (sum). Auto-generated candidate metric; review and promote before relying
    on it.
  type: simple
  type_params:
    measure: GBCDeposit_deposists_daily__amount_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: consensus_team
        grain: day
        allowed_dimensions:
        - date
        - withdrawal_credentials
        - withdrawal_address
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - GBCDeposit deposists daily amount
        - amount
