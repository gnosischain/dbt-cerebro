semantic_models:
- name: GBCDeposit_deposists_daily
  model: ref('int_GBCDeposit_deposists_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: withdrawal_credentials
    type: categorical
    expr: withdrawal_credentials
  measures:
  - name: amount_value
    agg: sum
    expr: amount
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - GBCDeposit deposists daily
        grain: day
metrics: []
