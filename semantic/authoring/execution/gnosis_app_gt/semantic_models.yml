  - name: has_lifetime_cashback
    type: categorical
    expr: has_lifetime_cashback
  - name: is_engaged
    type: categorical
    expr: is_engaged
  - name: is_heuristic_active
    type: categorical
    expr: is_heuristic_active
  - name: has_ga_signal
