  - name: execution_gnosis_app_gt_user_identities_public__has_circles_avatar_value
    agg: sum
    expr: has_circles_avatar
  - name: execution_gnosis_app_gt_user_identities_public__has_profile_value
    agg: sum
    expr: has_profile
  - name: execution_gnosis_app_gt_user_identities_public__has_lifetime_cashback_value
    agg: sum
    expr: has_lifetime_cashback
  - name: execution_gnosis_app_gt_user_identities_public__is_engaged_value
    agg: sum
    expr: is_engaged
  - name: execution_gnosis_app_gt_user_identities_public__is_heuristic_active_value
    agg: sum
    expr: is_heuristic_active
  - name: execution_gnosis_app_gt_user_identities_public__has_ga_signal_value
    agg: sum
    expr: has_ga_signal
  - name: execution_gnosis_app_gt_user_identities_public__has_metri_signal_value
    agg: sum
    expr: has_metri_signal
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: user
        question_synonyms:
        - gnosis app gt users
        - gnosis app ground truth users
        - gnosis app registered identities
        - gt distinct users

# ---------- Registry-vs-active reconciliation scorecard (single snapshot row) ----------
