# Gnosis App — Ground-Truth (envio_ga) semantic layer.
#
# Scope: ONLY the privacy-safe exposed marts. The raw-address / identity-bridge
# layer (stg_envio_ga__*, int_*_user_identity_bridge, int_*_user_dim,
# int_*_user_activity, int_*_pay_wallets) is tagged internal_only /
# privacy:tier_internal + meta.expose_to_mcp=false and is dropped from the
# registry at the source by build_registry.py — it is intentionally NOT authored
# here. The only user-grain model exposed is the pseudonym-only
# fct_execution_gnosis_app_gt_user_identities_public (no raw address).
#
# Tier: approved. Columns are the full documented + warehouse-catalogued set.
semantic_models:

# ---------- Cashback NFT program (daily time-series) ----------
- name: execution_gnosis_app_gt_cashback_nft
  model: ref('fct_execution_gnosis_app_gt_cashback_nft')
  defaults:
    agg_time_dimension: mint_date
  entities:
  - name: cashback_day_status
    type: primary
    expr: concat(toString(mint_date), '|', toString(status))
  dimensions:
  - name: mint_date
    type: time
    expr: mint_date
    type_params:
      time_granularity: day
  - name: status
    type: categorical
    expr: status
  measures:
  - name: execution_gnosis_app_gt_cashback_nft__mints_value
    agg: sum
    expr: n_mints
  - name: execution_gnosis_app_gt_cashback_nft__owners_value
    agg: sum
    expr: n_owners
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - gnosis app gt cashback nft mints
        - gnosis pay cashback mints
        - cashback nft mints by status
        - gnosis app ground truth cashback

# ---------- Swaps by token pair ----------
- name: execution_gnosis_app_gt_swaps_by_pair
  model: ref('fct_execution_gnosis_app_gt_swaps_by_pair')
  entities:
  - name: swap_pair
    type: primary
    expr: concat(app_scope, '|', sell_token, '|', buy_token)
  dimensions:
  - name: app_scope
    type: categorical
    expr: app_scope
  - name: sell_token
    type: categorical
    expr: sell_token
  - name: buy_token
    type: categorical
    expr: buy_token
  measures:
  - name: execution_gnosis_app_gt_swaps_by_pair__filled_swaps_value
    agg: sum
    expr: n_filled_swaps
  - name: execution_gnosis_app_gt_swaps_by_pair__sell_volume_atoms_value
    agg: sum
    expr: sell_volume_atoms
  - name: execution_gnosis_app_gt_swaps_by_pair__swappers_value
    agg: sum
    expr: n_swappers
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: token_pair
        question_synonyms:
        - gnosis app gt swaps by pair
        - gnosis app filled swaps by token pair
        - gnosis app swap volume by pair

# ---------- Swaps summary by scope x CoW status ----------
- name: execution_gnosis_app_gt_swaps_summary
  model: ref('fct_execution_gnosis_app_gt_swaps_summary')
  entities:
  - name: swap_scope_status
    type: primary
    expr: concat(app_scope, '|', status)
  dimensions:
  - name: app_scope
    type: categorical
    expr: app_scope
  - name: status
    type: categorical
    expr: status
  measures:
  - name: execution_gnosis_app_gt_swaps_summary__swaps_value
    agg: sum
    expr: n_swaps
  - name: execution_gnosis_app_gt_swaps_summary__swappers_value
    agg: sum
    expr: n_swappers
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: swap_status
        question_synonyms:
        - gnosis app gt swaps summary
        - gnosis app swap counts by status
        - gnosis app swap orders by scope

# ---------- Referrals (earned ledger vs full invite graph) ----------
- name: execution_gnosis_app_gt_referrals
  model: ref('fct_execution_gnosis_app_gt_referrals')
  entities:
  - name: referral_scope
    type: primary
    expr: metric_scope
  dimensions:
  - name: metric_scope
    type: categorical
    expr: metric_scope
  measures:
  - name: execution_gnosis_app_gt_referrals__inviters_value
    agg: sum
    expr: n_inviters
  - name: execution_gnosis_app_gt_referrals__invitees_value
    agg: sum
    expr: n_invitees
  - name: execution_gnosis_app_gt_referrals__edges_value
    agg: sum
    expr: n_edges
  - name: execution_gnosis_app_gt_referrals__reward_crc_value
    agg: sum
    expr: total_reward_crc
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: referral_scope
        question_synonyms:
        - gnosis app gt referrals
        - gnosis app invite graph
        - gnosis app referral rewards

# ---------- Auto-invest accounts (Metri legacy) ----------
- name: execution_gnosis_app_gt_investments
  model: ref('fct_execution_gnosis_app_gt_investments')
  entities:
  - name: investment_active_flag
    type: primary
    expr: concat(toString(is_active), '|', product)
  dimensions:
  - name: is_active
    type: categorical
    expr: is_active
  - name: product
    type: categorical
    expr: product
  measures:
