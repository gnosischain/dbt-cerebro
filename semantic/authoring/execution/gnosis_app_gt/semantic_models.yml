  - name: execution_gnosis_app_gt_investments__owners_value
    agg: sum
    expr: n_owners
  - name: execution_gnosis_app_gt_investments__tokens_value
    agg: sum
    expr: n_tokens
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: account_active_flag
        question_synonyms:
        - gnosis app gt investments
        - gnosis app auto-invest accounts
        - metri investment accounts

# ---------- Public user identity registry (pseudonym-only user spine) ----------
