semantic_models:
- name: execution_transfers_whitelisted_daily
  model: ref('int_execution_transfers_whitelisted_daily')
  defaults:
    agg_time_dimension: date
  entities:
  - name: address
    type: primary
    expr: concat(ifNull(`from`,''),':',ifNull(`to`,''),':',token_address,':',toString(date))
  dimensions:
  - name: token_address
    type: categorical
    expr: token_address
  - name: symbol
    type: categorical
    expr: symbol
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: from_address
    type: categorical
    expr: '`from`'
  - name: to_address
    type: categorical
    expr: '`to`'
  measures:
  - name: execution_transfers_whitelisted_daily__transfer_count_value
    agg: sum
    expr: transfer_count
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - whitelisted token transfers
        - who sent tokens to whom
        - execution transfers whitelisted daily
        grain: day
        graph:
          enabled: true
          profile: token_transfers
          source_column: '`from`'
          target_column: '`to`'
          source_kind: address
          target_kind: address
          directed: true
          time_column: date
          weight_column: transfer_count
          default_filters:
            limit: 500
metrics:
- name: execution_transfers_whitelisted_daily__transfer_count_value
  label: Execution Transfers Whitelisted Daily - Transfer Count
  description: execution transfers whitelisted daily - transfer count (sum). Auto-generated candidate metric; review and promote
    before relying on it.
  type: simple
  type_params:
    measure: execution_transfers_whitelisted_daily__transfer_count_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - token_address
        - symbol
        - date
        - from_address
        - to_address
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - execution transfers whitelisted daily transfer count
        - transfer count
