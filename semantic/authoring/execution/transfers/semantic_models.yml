  - name: token_address_raw
    type: categorical
    expr: token_address_raw
  - name: symbol
    type: categorical
    expr: symbol
  - name: symbol_upper
    type: categorical
    expr: symbol_upper
  - name: date_start
    type: time
    expr: date_start
    type_params:
      time_granularity: day
  - name: date_end
    type: time
    expr: date_end
    type_params:
      time_granularity: day
  - name: block_number
    type: categorical
    expr: block_number
  - name: block_timestamp
    type: time
    expr: block_timestamp
    type_params:
      time_granularity: day
  - name: transaction_hash
    type: categorical
    expr: transaction_hash
  - name: from
    type: categorical
    expr: from
  - name: to
    type: categorical
    expr: to
  - name: value_raw
    type: categorical
    expr: value_raw
  measures:
  - name: decimals_value
    agg: sum
    expr: decimals
  - name: transaction_index_value
    agg: sum
    expr: transaction_index
  - name: log_index_value
    agg: sum
    expr: log_index
  - name: execution_transfers_whitelisted_raw__amount_value
    agg: sum
    expr: amount
  - name: execution_transfers_whitelisted_raw__price_value
    agg: average
    expr: price
  - name: execution_transfers_whitelisted_raw__amount_usd_value
    agg: sum
    expr: amount_usd
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution transfers whitelisted raw
