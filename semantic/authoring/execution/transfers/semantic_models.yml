semantic_models:
- name: execution_transfers_whitelisted_daily
  model: ref('int_execution_transfers_whitelisted_daily')
  defaults:
    agg_time_dimension: date
  entities:
  - name: address
    type: primary
    expr: "concat(ifNull(`from`,''),':',ifNull(`to`,''),':',token_address,':',toString(date))"
  dimensions:
  - name: token_address
    type: categorical
    expr: token_address
  - name: symbol
    type: categorical
    expr: symbol
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: from_address
    type: categorical
    expr: "`from`"
  - name: to_address
    type: categorical
    expr: "`to`"
  measures:
  - name: transfer_count_value
    agg: sum
    expr: transfer_count
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - whitelisted token transfers
        - who sent tokens to whom
        - execution transfers whitelisted daily
        grain: day
        graph:
          enabled: true
          profile: token_transfers
          source_column: "`from`"
          target_column: "`to`"
          source_kind: address
          target_kind: address
          directed: true
          time_column: date
          weight_column: transfer_count
          default_filters:
            limit: 500
- name: execution_transfers_whitelisted_raw
  model: ref('int_execution_transfers_whitelisted_raw')
  defaults:
    agg_time_dimension: date_start
  dimensions:
  - name: token_address
    type: categorical
    expr: token_address
  - name: token_address_raw
    type: categorical
    expr: token_address_raw
  - name: symbol
    type: categorical
    expr: symbol
  - name: symbol_upper
    type: categorical
    expr: symbol_upper
  - name: date_start
    type: time
    expr: date_start
    type_params:
      time_granularity: day
  - name: date_end
    type: time
    expr: date_end
    type_params:
      time_granularity: day
  - name: block_number
    type: categorical
    expr: block_number
  - name: block_timestamp
    type: time
    expr: block_timestamp
    type_params:
      time_granularity: day
  - name: transaction_hash
    type: categorical
    expr: transaction_hash
  - name: from
    type: categorical
    expr: from
  - name: to
    type: categorical
    expr: to
  - name: value_raw
    type: categorical
    expr: value_raw
  measures:
  - name: decimals_value
    agg: sum
    expr: decimals
  - name: transaction_index_value
    agg: sum
    expr: transaction_index
  - name: log_index_value
    agg: sum
    expr: log_index
  - name: amount_value
    agg: sum
    expr: amount
  - name: price_value
    agg: average
    expr: price
  - name: amount_usd_value
    agg: sum
    expr: amount_usd
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution transfers whitelisted raw
metrics: []
