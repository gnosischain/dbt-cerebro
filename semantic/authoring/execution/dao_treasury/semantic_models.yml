semantic_models:
- name: dao_treasury_allocation_latest
  model: ref('api_dao_treasury_allocation_latest')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury allocation latest
- name: dao_treasury_holdings_by_class_ts
  model: ref('api_dao_treasury_holdings_by_class_ts')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury holdings by class ts
        grain: day
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: label
    type: categorical
    expr: label
- name: dao_treasury_holdings_daily
  model: ref('int_dao_treasury_holdings_daily')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury holdings daily
        grain: day
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: wallet_address
    type: categorical
    expr: wallet_address
  - name: wallet_label
    type: categorical
    expr: wallet_label
  - name: symbol
    type: categorical
    expr: symbol
  - name: token_class
    type: categorical
    expr: token_class
  - name: position_type
    type: categorical
    expr: position_type
  - name: protocol
    type: categorical
    expr: protocol
  measures:
  - name: dao_treasury_holdings_daily__balance_value
    agg: sum
    expr: balance
  - name: dao_treasury_holdings_daily__balance_usd_value
    agg: sum
    expr: balance_usd
- name: dao_treasury_holdings_detail_latest
