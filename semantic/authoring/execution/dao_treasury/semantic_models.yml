semantic_models:
- name: dao_treasury_allocation_latest
  model: ref('api_dao_treasury_allocation_latest')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury allocation latest
- name: dao_treasury_holdings_by_class_ts
  model: ref('api_dao_treasury_holdings_by_class_ts')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury holdings by class ts
        grain: day
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: label
    type: categorical
    expr: label
- name: dao_treasury_holdings_daily
  model: ref('int_dao_treasury_holdings_daily')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - dao treasury holdings
        - treasury token balances
        - dao holdings by wallet
        grain: day
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: wallet_address
    type: categorical
    expr: wallet_address
  - name: wallet_label
    type: categorical
    expr: wallet_label
  - name: symbol
    type: categorical
    expr: symbol
  - name: token_class
    type: categorical
    expr: token_class
  - name: position_type
    type: categorical
    expr: position_type
  - name: protocol
    type: categorical
    expr: protocol
  measures:
  - name: dao_treasury_holdings_daily__balance_value
    agg: sum
    expr: balance
  - name: dao_treasury_holdings_daily__balance_usd_value
    agg: sum
    expr: balance_usd
- name: dao_treasury_holdings_detail_latest
  model: ref('api_dao_treasury_holdings_detail_latest')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury holdings detail latest
  dimensions:
  - name: wallet_address
    type: categorical
    expr: wallet_address
- name: dao_treasury_kpi_gno_held
  model: ref('api_dao_treasury_kpi_gno_held')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury kpi gno held
- name: dao_treasury_kpi_lending_total
  model: ref('api_dao_treasury_kpi_lending_total')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury kpi lending total
- name: dao_treasury_kpi_non_gno_holdings
  model: ref('api_dao_treasury_kpi_non_gno_holdings')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury kpi non gno holdings
- name: dao_treasury_kpi_total_holdings
  model: ref('api_dao_treasury_kpi_total_holdings')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - dao treasury kpi total holdings
metrics:
- name: dao_treasury_holdings_daily__balance_value
  label: DAO Treasury Holdings - Token Balance
  description: dao treasury holdings daily - token balance held (sum).
  type: simple
  type_params:
    measure: dao_treasury_holdings_daily__balance_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        - wallet_address
        - wallet_label
        - symbol
        - token_class
        - position_type
        - protocol
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - dao treasury token balance
        - treasury holdings amount
        - dao holdings by token
- name: dao_treasury_holdings_daily__balance_usd_value
  label: DAO Treasury Holdings - Balance (USD)
  description: dao treasury holdings daily - USD value of holdings (sum).
  type: simple
  type_params:
    measure: dao_treasury_holdings_daily__balance_usd_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        - wallet_address
        - wallet_label
        - symbol
        - token_class
        - position_type
        - protocol
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - dao treasury usd value
        - treasury holdings in dollars
        - dao holdings value usd
