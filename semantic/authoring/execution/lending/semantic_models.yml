semantic_models:
- name: execution_lending_apy_daily
  model: ref('api_execution_lending_daily')
  defaults:
    agg_time_dimension: date
  entities:
  - name: lending_apy_row
    type: primary
    expr: concat(toString(date), '|', label, '|', token, '|', apy_type)
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: token
    type: categorical
    expr: token
  - name: token_class
    type: categorical
    expr: token_class
  - name: protocol
    type: categorical
    expr: label
  - name: apy_type
    type: categorical
    expr: apy_type
  measures:
  - name: execution_lending_apy_value
    agg: avg
    expr: coalesce(value, 0)
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - lending apy daily
        - lending interest rate daily
        - aave apy
        - spark apy
        - borrow rate daily
- name: execution_lending_weekly
  model: ref('fct_execution_lending_weekly')
  defaults:
    agg_time_dimension: week
  entities:
  - name: lending_weekly_row
    type: primary
    expr: concat(toString(week), '|', protocol, '|', symbol)
  dimensions:
  - name: week
    type: time
    expr: week
    type_params:
      time_granularity: week
  - name: symbol
    type: categorical
    expr: symbol
  - name: token_class
    type: categorical
    expr: token_class
  - name: protocol
    type: categorical
    expr: protocol
  measures:
  - name: execution_lending_deposits_volume_value
    agg: sum
    expr: deposits_volume_weekly
  - name: execution_lending_borrows_volume_value
    agg: sum
    expr: borrows_volume_weekly
  - name: execution_lending_apy_weekly_value
    agg: avg
    expr: coalesce(apy_weekly, 0)
  - name: execution_lending_borrow_apy_weekly_value
    agg: avg
    expr: coalesce(borrow_apy_weekly, 0)
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - lending weekly
        - lending deposits volume
        - lending borrows volume
        - aave weekly
        - sparklend weekly
- name: execution_lending_tvl_by_token_latest
  model: ref('api_execution_lending_tvl_by_token_latest')
  defaults:
    agg_time_dimension: as_of_date
  entities:
  - name: lending_tvl_row
    type: primary
    expr: concat(protocol, '|', token)
  dimensions:
  - name: as_of_date
    type: time
    expr: as_of_date
    type_params:
      time_granularity: day
  - name: protocol
    type: categorical
    expr: protocol
  - name: token
    type: categorical
    expr: token
  measures:
  - name: execution_lending_tvl_value
    agg: sum
    expr: value
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        grain: day
        question_synonyms:
        - lending tvl
        - aave tvl
        - sparklend tvl
        - lending tvl by token
        - total value locked lending
- name: execution_lending_lenders_count
