semantic_models:
- name: execution_lending_apy_daily
  model: ref('api_execution_lending_daily')
  defaults:
    agg_time_dimension: date
  entities:
  - name: lending_apy_row
    type: primary
    expr: concat(toString(date), '|', label, '|', token, '|', apy_type)
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: token
    type: categorical
    expr: token
  - name: token_class
    type: categorical
    expr: token_class
  - name: protocol
    type: categorical
    expr: label
  - name: apy_type
    type: categorical
    expr: apy_type
  measures:
  - name: execution_lending_apy_value
    agg: avg
    expr: coalesce(value, 0)
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - lending apy daily
        - lending interest rate daily
        - aave apy
        - spark apy
        - borrow rate daily
- name: execution_lending_weekly
  model: ref('fct_execution_lending_weekly')
  defaults:
    agg_time_dimension: week
  entities:
  - name: lending_weekly_row
    type: primary
    expr: concat(toString(week), '|', protocol, '|', symbol)
  dimensions:
  - name: week
    type: time
    expr: week
    type_params:
      time_granularity: week
  - name: symbol
    type: categorical
    expr: symbol
  - name: token_class
    type: categorical
    expr: token_class
  - name: protocol
    type: categorical
    expr: protocol
  measures:
  - name: execution_lending_deposits_volume_value
    agg: sum
    expr: deposits_volume_weekly
  - name: execution_lending_borrows_volume_value
    agg: sum
    expr: borrows_volume_weekly
  - name: execution_lending_apy_weekly_value
    agg: avg
    expr: coalesce(apy_weekly, 0)
  - name: execution_lending_borrow_apy_weekly_value
    agg: avg
    expr: coalesce(borrow_apy_weekly, 0)
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - lending weekly
        - lending deposits volume
        - lending borrows volume
        - aave weekly
        - sparklend weekly
- name: execution_lending_top_lenders_latest
  model: ref('api_execution_lending_top_lenders_latest')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - top lenders by protocol
        - largest lending suppliers
        - lending whale concentration
  defaults:
    agg_time_dimension: as_of_date
  dimensions:
  - name: protocol
    type: categorical
    expr: protocol
  - name: symbol
    type: categorical
    expr: symbol
  - name: user_address
    type: categorical
    expr: user_address
  - name: label
    type: categorical
    expr: label
  - name: as_of_date
    type: time
    expr: as_of_date
    type_params:
      time_granularity: day
  measures:
  - name: execution_lending_top_lenders_latest__rank_value
    agg: sum
    expr: rank
  - name: execution_lending_top_lenders_latest__balance_value
    agg: sum
    expr: balance
  - name: execution_lending_top_lenders_latest__balance_usd_value
    agg: sum
    expr: balance_usd
  - name: execution_lending_top_lenders_latest__pct_of_total_value
    agg: average
    expr: pct_of_total
  - name: execution_lending_top_lenders_latest__cumulative_pct_value
    agg: average
    expr: cumulative_pct
  - name: execution_lending_top_lenders_latest__change_usd_7d_value
    agg: sum
    expr: change_usd_7d
- name: execution_lending_top_lenders_ranked
  model: ref('fct_execution_lending_top_lenders_ranked')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution lending top lenders ranked
  dimensions:
  - name: protocol
    type: categorical
    expr: protocol
  - name: reserve_address
    type: categorical
    expr: reserve_address
  - name: symbol
    type: categorical
    expr: symbol
  - name: user_address
    type: categorical
    expr: user_address
  measures:
  - name: execution_lending_top_lenders_ranked__balance_value
    agg: sum
    expr: balance
  - name: execution_lending_top_lenders_ranked__balance_usd_value
    agg: sum
    expr: balance_usd
  - name: execution_lending_top_lenders_ranked__pct_of_total_value
    agg: average
    expr: pct_of_total
  - name: execution_lending_top_lenders_ranked__rank_value
    agg: sum
    expr: rank
- name: fct_execution_lending_top_lenders_latest
  model: ref('fct_execution_lending_top_lenders_latest')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution lending top lenders latest
  dimensions:
  - name: protocol
    type: categorical
    expr: protocol
  - name: reserve_address
    type: categorical
    expr: reserve_address
  - name: symbol
    type: categorical
    expr: symbol
  - name: user_address
    type: categorical
    expr: user_address
  - name: label
    type: categorical
    expr: label
  measures:
  - name: fct_execution_lending_top_lenders_latest__rank_value
    agg: sum
    expr: rank
  - name: fct_execution_lending_top_lenders_latest__balance_value
    agg: sum
    expr: balance
  - name: fct_execution_lending_top_lenders_latest__balance_usd_value
    agg: sum
    expr: balance_usd
  - name: fct_execution_lending_top_lenders_latest__pct_of_total_value
    agg: average
    expr: pct_of_total
  - name: fct_execution_lending_top_lenders_latest__cumulative_pct_value
    agg: average
    expr: cumulative_pct
  - name: fct_execution_lending_top_lenders_latest__change_usd_7d_value
    agg: sum
    expr: change_usd_7d
metrics:
- name: lending_apy_daily
  label: Lending APY (Daily)
  description: 'Daily supply/borrow APY per (protocol, token, apy_type). Use `apy_type` filter to pick supply vs borrow side,
    `protocol` / `token` to slice. Average across rows for headline numbers.

    '
  type: simple
  type_params:
    measure: execution_lending_apy_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        - token
        - token_class
        - protocol
        - apy_type
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - lending apy
        - aave apy
        - spark apy
        - lending interest rate
        - borrow apy
        - supply apy
- name: lending_deposits_volume_weekly
  label: Lending Deposits Volume (Weekly, native units)
  description: "Sum of weekly deposit volume per (protocol, token). Volumes are in native token units \u2014 combine with\
    \ price ts if you need USD normalisation across tokens.\n"
  type: simple
  type_params:
    measure: execution_lending_deposits_volume_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: week
        owner: analytics_team
        allowed_dimensions:
        - week
        - symbol
        - token_class
        - protocol
        supported_time_grains:
        - week
        - month
        question_synonyms:
        - lending deposits weekly
        - aave deposits weekly
        - sparklend deposits weekly
        - lending supply weekly
        - weekly lending volume
- name: lending_borrows_volume_weekly
  label: Lending Borrows Volume (Weekly, native units)
  description: 'Sum of weekly borrow volume per (protocol, token).

    '
  type: simple
  type_params:
    measure: execution_lending_borrows_volume_value
  config:
    meta:
