metrics:
- name: lending_apy_daily
  label: Lending APY (Daily)
  description: 'Daily supply/borrow APY per (protocol, token, apy_type). Use `apy_type` filter to pick supply vs borrow side,
    `protocol` / `token` to slice. Average across rows for headline numbers.

    '
  type: simple
  type_params:
    measure: execution_lending_apy_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        - token
        - token_class
        - protocol
        - apy_type
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - lending apy
        - aave apy
        - spark apy
        - lending interest rate
        - borrow apy
        - supply apy
- name: lending_deposits_volume_weekly
  label: Lending Deposits Volume (Weekly, native units)
  description: "Sum of weekly deposit volume per (protocol, token). Volumes are in native token units \u2014 combine with\
    \ price ts if you need USD normalisation across tokens.\n"
  type: simple
  type_params:
    measure: execution_lending_deposits_volume_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: week
        owner: analytics_team
        allowed_dimensions:
        - week
        - symbol
        - token_class
        - protocol
        supported_time_grains:
        - week
        - month
        question_synonyms:
        - lending deposits weekly
        - aave deposits weekly
        - sparklend deposits weekly
        - lending supply weekly
        - weekly lending volume
- name: lending_borrows_volume_weekly
  label: Lending Borrows Volume (Weekly, native units)
  description: 'Sum of weekly borrow volume per (protocol, token).

    '
  type: simple
  type_params:
    measure: execution_lending_borrows_volume_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: week
        owner: analytics_team
        allowed_dimensions:
        - week
        - symbol
        - token_class
        - protocol
        supported_time_grains:
        - week
        - month
        question_synonyms:
        - lending borrows weekly
        - aave borrows weekly
        - sparklend borrows weekly
        - weekly borrow volume
- name: execution_lending_apy_weekly_value
  label: Execution Lending Weekly - Execution Lending Apy Weekly
  description: execution lending weekly - execution lending apy weekly (avg). Read this as an average over the grain; do NOT
    sum it across rows or periods. Auto-generated candidate metric; review and promote before relying on it.
  type: simple
  type_params:
    measure: execution_lending_apy_weekly_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: week
        allowed_dimensions:
        - week
        - symbol
        - token_class
        - protocol
        supported_time_grains:
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - execution lending weekly execution lending apy weekly
        - execution lending apy weekly
- name: execution_lending_borrow_apy_weekly_value
  label: Execution Lending Weekly - Execution Lending Borrow Apy Weekly
  description: execution lending weekly - execution lending borrow apy weekly (avg). Read this as an average over the grain;
    do NOT sum it across rows or periods. Auto-generated candidate metric; review and promote before relying on it.
  type: simple
  type_params:
    measure: execution_lending_borrow_apy_weekly_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: week
        allowed_dimensions:
        - week
        - symbol
        - token_class
        - protocol
        supported_time_grains:
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - execution lending weekly execution lending borrow apy weekly
        - execution lending borrow apy weekly
- name: lending_tvl_by_token
  label: Lending TVL by Token (USD, latest)
  description: |
    Latest-snapshot TVL (sum of supplied balance_usd) per (protocol, token) across Aave V3
    and SparkLend. One row per protocol/token (no 'ALL' aggregate), so summing across the
    token/protocol dimensions is safe. USD understates on price-feed gap days (see the
    balance_usd price-gap detector on the source model).
  type: simple
  type_params:
    measure: execution_lending_tvl_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - as_of_date
        - protocol
        - token
        supported_time_grains:
        - day
        question_synonyms:
        - lending tvl
        - aave tvl
        - sparklend tvl
        - tvl by token
- name: lending_lenders_count
  label: Lending Active Lenders (STOCK, latest)
  description: |
    Distinct wallets with a positive supply balance on the latest date (point-in-time STOCK).
    IMPORTANT: the source carries per-protocol rows PLUS a protocol='ALL' cross-protocol
    aggregate row, so do NOT sum across the protocol dimension — either group BY protocol or
    filter protocol='ALL' for the total. NOT comparable to lending_borrowers_count (a 7-day flow).
  type: simple
  type_params:
    measure: execution_lending_lenders_count_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - as_of_date
        - protocol
        supported_time_grains:
        - day
        question_synonyms:
        - active lenders
        - lenders count
        - number of lenders
- name: lending_borrowers_count
  label: Lending Active Borrowers (7-day FLOW)
  description: |
    Distinct wallets that borrowed within the trailing 7 days (FLOW, not a debt-balance stock).
    IMPORTANT: the source carries per-protocol rows PLUS a protocol='ALL' aggregate row, so do
    NOT sum across protocol — group BY protocol or filter protocol='ALL'. NOT directly comparable
    to lending_lenders_count, which is a point-in-time balance STOCK.
  type: simple
  type_params:
    measure: execution_lending_borrowers_count_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - as_of_date
        - protocol
        supported_time_grains:
        - day
        question_synonyms:
        - active borrowers
        - borrowers count
        - number of borrowers
- name: lending_balance_cohorts_value_usd
  label: Lending Balance Cohorts - Value (USD)
  description: |
    USD value held per balance bucket per (protocol, token), daily. Use `label` for the bucket
    and `cohort_unit` to pick the USD vs native bucketing basis. One row per
    (date, protocol, token, cohort_unit, bucket); safe to sum across buckets.
  type: simple
  type_params:
    measure: execution_lending_cohort_value_usd_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        - protocol
        - token
        - cohort_unit
        - label
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - lending value by balance bucket
        - lending tvl distribution
- name: lending_balance_cohorts_holders
  label: Lending Balance Cohorts - Holders
  description: |
    Distinct holder count per balance bucket per (protocol, token), daily. Use `label` for the
    bucket and `cohort_unit` for the bucketing basis. One row per
    (date, protocol, token, cohort_unit, bucket).
  type: simple
  type_params:
    measure: execution_lending_cohort_holders_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        - protocol
        - token
        - cohort_unit
        - label
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - lending holders by balance bucket
        - lending holder distribution
