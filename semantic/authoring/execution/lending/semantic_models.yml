  description: Weekly average supply APY per protocol and token. Read as an average over the grain; do NOT sum it across rows
    or periods.
  type: simple
  type_params:
    measure: execution_lending_apy_weekly_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: week
        allowed_dimensions:
        - week
        - symbol
        - token_class
        - protocol
        supported_time_grains:
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - weekly supply apy
