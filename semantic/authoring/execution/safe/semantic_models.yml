semantic_models:
- name: execution_safes_current_owners
  model: ref('int_execution_safes_current_owners')
  defaults:
    agg_time_dimension: became_owner_at
  entities:
  - name: safe
    type: primary
    expr: safe_address
  dimensions:
  - name: safe_address
    type: categorical
    expr: safe_address
  - name: owner
    type: categorical
    expr: owner
  - name: became_owner_at
    type: time
    expr: became_owner_at
    type_params:
      time_granularity: day
  measures:
  - name: current_threshold_value
    agg: average
    expr: current_threshold
  - name: owner_count_value
    agg: count
    expr: owner
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        grain: day
        question_synonyms:
        - safe owners
        - who owns what safe
        - gnosis safe ownership
        graph:
          enabled: true
          profile: safe_ownership
          source_column: owner
          target_column: safe_address
          source_kind: address
          target_kind: safe
          directed: true
          time_column: became_owner_at
- name: execution_safe_owner_pseudonyms
  model: ref('fct_execution_safe_owner_pseudonyms')
  description: "Chain-wide Safe \u2192 owner pseudonym bridge. The cross-sector route\nthat lets any Safe-keyed sector mart\
    \ (gpay pay_wallets, validator\nSafes, gnosis_app AA wallets, Circles avatar Safes, ...) fan out\nto the underlying human\
    \ owner(s) and re-enter the user_pseudonym\ngraph. See `models/execution/safe/marts/fct_execution_safe_owner_\npseudonyms.sql`\
    \ for the long-form rationale.\n"
  defaults:
    agg_time_dimension: became_owner_at
  entities:
  - name: safe_user_pseudonym
    type: primary
    expr: safe_user_pseudonym
  - name: owner_user_pseudonym
    type: foreign
    expr: owner_user_pseudonym
  dimensions:
  - name: became_owner_at
    type: time
    expr: became_owner_at
    type_params:
      time_granularity: day
  - name: current_threshold
    type: categorical
    expr: current_threshold
  - name: n_owners_for_safe
    type: categorical
    expr: n_owners_for_safe
  measures:
  - name: safe_owner_links_value
    agg: count
    expr: safe_user_pseudonym
    description: 'Count of (safe, owner) link rows. Use with the `safe_user_pseudonym`

      or `owner_user_pseudonym` dimension to get distinct safes / owners

      respectively via `count_distinct`.

      '
  - name: safe_owner_links_distinct_safes_value
    agg: count_distinct
    expr: safe_user_pseudonym
  - name: safe_owner_links_distinct_owners_value
    agg: count_distinct
    expr: owner_user_pseudonym
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: pair
        question_synonyms:
        - safe owner pseudonym bridge
        - safe to owner cross-sector fanout
        - how many EOAs own this safe
        - how many safes does this user own
metrics:
- name: safe_owner_links_total
  label: "Safe \u2194 Owner Links (Total)"
  type: simple
  type_params:
    measure: safe_owner_links_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        question_synonyms:
        - safe owner link count
        - total safe-owner pairs
- name: safe_owner_distinct_safes
  label: Distinct Safes With at Least One Owner
  type: simple
  type_params:
    measure: safe_owner_links_distinct_safes_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        question_synonyms:
        - distinct safes
        - how many safes have owners
        - safe wallet count
- name: safe_owner_distinct_owners
  label: Distinct Owners Across All Safes
  type: simple
  type_params:
    measure: safe_owner_links_distinct_owners_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        question_synonyms:
        - distinct safe owners
        - unique EOAs owning safes
        - safe ownership unique humans
- name: current_threshold_value
  label: Execution Safes Current Owners - Current Threshold
  description: execution safes current owners - current threshold (average). Read this as an average over the grain; do NOT
    sum it across rows or periods. Auto-generated candidate metric; review and promote before relying on it.
  type: simple
  type_params:
    measure: current_threshold_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - safe_address
        - owner
        - became_owner_at
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - execution safes current owners current threshold
        - current threshold
- name: owner_count_value
  label: Execution Safes Current Owners - Owner Count
  description: execution safes current owners - owner count (count). Auto-generated candidate metric; review and promote before
    relying on it.
  type: simple
  type_params:
    measure: owner_count_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - safe_address
        - owner
        - became_owner_at
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - execution safes current owners owner count
        - owner count
