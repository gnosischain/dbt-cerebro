# ═════════════════════════════════════════════════════════════════════
# METRICS — Circles human-avatar user-overlap entry
# ═════════════════════════════════════════════════════════════════════
metrics:

- name: circles_distinct_human_users
  label: Circles Distinct Human Users
  description: >
    Total distinct human avatar count (Groups / Orgs excluded). The
    `user_pseudonym` join key here is in the same hash space as
    revenue / gpay / gnosis_app / Mixpanel — use semantic-layer joins
    on `user_pseudonym` for cross-sector overlap questions.
  type: simple
  type_params:
    measure: execution_circles_human_avatars_distinct_count
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: user
        owner: analytics_team
        allowed_dimensions: [user_pseudonym, was_invited, has_ipfs_profile, has_display_name]
        supported_time_grains: []
        question_synonyms:
        - circles humans
        - circles distinct users
        - circles user count
        - how many circles humans
        - circles human avatars count
        - circles

- name: circles_humans_with_ipfs_profile
  label: Circles Humans With Published IPFS Profile
  description: >
    Subset of human avatars who have published an IPFS metadata
    payload (stronger engagement signal than mere registration).
  type: simple
  type_params:
    measure: execution_circles_human_avatars_with_profile
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: user
        owner: analytics_team
        allowed_dimensions: [user_pseudonym, was_invited, has_display_name]
        supported_time_grains: []
        question_synonyms:
        - circles humans with profile
        - circles engaged users
        - circles profile completion
        - circles humans who published metadata
