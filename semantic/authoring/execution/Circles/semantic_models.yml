- name: execution_circles_v2_trust_relations_current
  model: ref('api_execution_circles_v2_trust_relations_current')
  defaults:
    agg_time_dimension: valid_from
  entities:
  - name: circles_avatar
    type: primary
    expr: truster
  dimensions:
  - name: truster
    type: categorical
    expr: truster
  - name: trustee
    type: categorical
    expr: trustee
  - name: valid_from
    type: time
    expr: valid_from
    type_params:
      time_granularity: day
  measures:
  - name: active_trusts_value
    agg: count
    expr: truster
  config:
    meta:
      cerebro:
        owner: circles_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - circles trust graph
        - circles trust relationships
        - who trusts whom
        graph:
          enabled: true
          profile: circles_trust
          source_column: truster
          target_column: trustee
          source_kind: circles_avatar
          target_kind: circles_avatar
          directed: true
          time_column: valid_from
          node_enrichment_model: api_execution_circles_v2_avatar_metadata
          node_enrichment_key: avatar
          evidence_model: api_execution_circles_v2_trust_relations_current
          evidence_source_column: truster
          evidence_target_column: trustee
- name: execution_circles_v2_avatar_metadata
  model: ref('api_execution_circles_v2_avatar_metadata')
  defaults:
    agg_time_dimension: registered_at
  entities:
  - name: circles_avatar
    type: primary
    expr: avatar
  dimensions:
  - name: avatar
    type: categorical
    expr: avatar
  - name: avatar_type
    type: categorical
    expr: avatar_type
  - name: invited_by
    type: categorical
    expr: invited_by
  - name: metadata_name
    type: categorical
    expr: metadata_name
  - name: registered_at
    type: time
    expr: registered_at
    type_params:
      time_granularity: day
  config:
    meta:
      cerebro:
        owner: circles_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - circles avatar profile
        - circles avatar identity
        - circles invitation graph
        - who invited whom
        - circles invite tree
        graph:
          enabled: true
          profile: circles_invitation
          source_column: invited_by
          target_column: avatar
          source_kind: circles_avatar
          target_kind: circles_avatar
          directed: true
          time_column: registered_at
          node_enrichment_model: api_execution_circles_v2_avatar_metadata
          node_enrichment_key: avatar
          evidence_model: api_execution_circles_v2_avatar_metadata
          evidence_source_column: invited_by
          evidence_target_column: avatar
          # invited_by is NULL/empty for Groups & Orgs (self-registered, no
          # inviter) and 0x0000…0000 for genesis/migration avatars. Without a
          # guard the neighbors query emits a bogus empty node and a giant
          # zero-address hub. `valid_address` drops NULL/empty AND the zero
          # address. Honored by build_neighbors_sql / build_sample_sql via
          # _default_filter_clauses.
          default_filters:
            invited_by: valid_address
- name: execution_circles_v2_avatar_balances_latest
  model: ref('fct_execution_circles_v2_avatar_balances_latest')
  entities:
  - name: circles_avatar
    type: primary
    expr: avatar
  dimensions:
  - name: avatar
    type: categorical
    expr: avatar
  - name: token_address
    type: categorical
    expr: token_address
  - name: is_wrapped
    type: categorical
    expr: toString(is_wrapped)
  measures:
  - name: execution_circles_v2_avatar_balances_latest__balance_value
    agg: sum
    expr: balance
  config:
    meta:
      cerebro:
        owner: circles_team
        quality_tier: approved
        question_synonyms:
        - circles avatar balances
        - who holds which crc token
        graph:
          enabled: true
          profile: circles_avatar_balances
          source_column: avatar
          target_column: token_address
          source_kind: circles_avatar
          target_kind: token
          directed: true
          weight_column: balance
          node_enrichment_model: api_execution_circles_v2_avatar_metadata
          node_enrichment_key: avatar
metrics:
- name: circles_distinct_human_users
  label: Circles Distinct Human Users
  description: "Total distinct human avatar count (Groups / Orgs excluded). The `user_pseudonym` join key here is in the same\
    \ hash space as revenue / gpay / gnosis_app / Mixpanel \u2014 use semantic-layer joins on `user_pseudonym` for cross-sector\
    \ overlap questions.\n"
  type: simple
  type_params:
    measure: execution_circles_human_avatars_distinct_count
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: user
        owner: analytics_team
        allowed_dimensions:
        - was_invited
        - has_ipfs_profile
        - has_display_name
        supported_time_grains: []
        question_synonyms:
        - circles humans
        - circles distinct users
        - circles user count
        - how many circles humans
        - circles human avatars count
        - circles
- name: circles_humans_with_ipfs_profile
  label: Circles Humans With Published IPFS Profile
  description: 'Subset of human avatars who have published an IPFS metadata payload (stronger engagement signal than mere
    registration).

    '
  type: simple
  type_params:
    measure: execution_circles_human_avatars_with_profile
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: user
        owner: analytics_team
        allowed_dimensions:
        - was_invited
        - has_display_name
        supported_time_grains: []
        question_synonyms:
        - circles humans with profile
        - circles engaged users
        - circles profile completion
        - circles humans who published metadata
