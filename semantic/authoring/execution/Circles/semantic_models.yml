semantic_models:
- name: execution_circles_human_avatars_distinct
  model: ref('fct_execution_circles_human_avatars_distinct')
  entities:
  - name: user_pseudonym
    type: primary
    expr: toString(user_pseudonym)
  dimensions:
  - name: was_invited
    type: categorical
    expr: was_invited
  - name: has_ipfs_profile
    type: categorical
    expr: has_ipfs_profile
  - name: has_display_name
    type: categorical
    expr: has_display_name
  - name: first_seen_at
    type: time
    expr: toDate(first_seen_at)
    type_params:
      time_granularity: day
  measures:
  - name: execution_circles_human_avatars_distinct_count
    agg: count
    expr: user_pseudonym
  - name: execution_circles_human_avatars_with_profile
    agg: sum
    expr: has_ipfs_profile
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: user
        question_synonyms:
        - circles humans
        - circles users
        - circles human avatars
        - distinct circles users
        - how many circles humans
        - circles registered users
        - circles user identities
        - circles
