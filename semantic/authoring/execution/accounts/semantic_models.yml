metrics:
- name: retained_30d_value
  label: Accounts Retained 30 Days
  description: number of cohort accounts still active 30 days after onboarding (sum).
  type: simple
  type_params:
    measure: retained_30d_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: month
        allowed_dimensions:
        - cohort_month
        supported_time_grains:
        - month
        - quarter
        - year
        question_synonyms:
        - accounts retained 30 days
        - 30 day retained addresses
        - active after one month
- name: retained_90d_value
  label: Accounts Retained 90 Days
  description: number of cohort accounts still active 90 days after onboarding (sum).
  type: simple
  type_params:
