semantic_models:
- name: execution_state_full_size_daily
  model: ref('api_execution_state_full_size_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution state full size daily
        grain: day
- name: fct_execution_state_full_size_daily
  model: ref('fct_execution_state_full_size_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  measures:
  - name: bytes_value
    agg: sum
    expr: bytes
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - chain state size
        - execution state full size
        - state db bytes
        grain: day
- name: execution_state_size_full_diff_daily
  model: ref('int_execution_state_size_full_diff_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  measures:
  - name: bytes_diff_value
    agg: sum
    expr: bytes_diff
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - chain state growth
        - state size daily change
        - execution state diff
        grain: day
metrics:
- name: bytes_value
  label: Chain State Size (Bytes)
  description: full execution state size in bytes (sum).
  type: simple
  type_params:
    measure: bytes_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - chain state size bytes
        - full state byte count
        - state db size value
- name: bytes_diff_value
  label: Chain State Growth (Bytes/Day)
  description: daily change in execution state size in bytes (sum).
  type: simple
  type_params:
    measure: bytes_diff_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - chain state growth bytes
        - daily state size delta
        - execution state diff value
