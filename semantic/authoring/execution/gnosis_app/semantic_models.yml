metrics:
- name: gnosis_app_activity_events_daily
  label: Gnosis App On-Chain Activity Events (Daily)
  description: 'Daily count of on-chain Gnosis App actions broken down by `activity_kind` (onboard / swap_filled / topup /
    marketplace_buy / token_offer_claim / ...). With cerebro-mcp PR 5''s time-spine upcasts in place, this metric composes
    with weekly revenue / bridges metrics through `dim_time_spine_weekly` automatically.

    '
  type: simple
  type_params:
    measure: execution_gnosis_app_activity_events
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        - activity_kind
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app activity events
        - gnosis app daily actions
        - gnosis app actions by kind
        - gnosis app onboard swap topup count
        - gnosis app
        - gnosis app activity
        - gnosis app on-chain activity
        - gnosis app actions
        - gnosis app daily activity
        - app activity onboard swap topup
        - app gnosis io activity
- name: gnosis_app_activity_users_daily
  label: Gnosis App Active Users By Action (Daily)
  description: "Daily distinct-user count per `activity_kind`. Use to size feature-specific engagement (e.g. \"how many users\
    \ swapped on the app last week\" vs \"how many topped up\"). NB: summing across activity_kinds DOUBLE-COUNTS users who\
    \ did multiple actions \u2014 aggregate at the action level if you need a true daily-active-user figure.\n"
  type: simple
  type_params:
    measure: execution_gnosis_app_activity_users
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        - activity_kind
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app users by action
        - gnosis app active users by feature
        - daily gnosis app users per action
        - gnosis app feature usage
        - gnosis app activity
        - gnosis app on-chain activity
        - gnosis app actions
        - gnosis app daily activity
        - app activity onboard swap topup
        - gnosis app
        - app gnosis io activity
