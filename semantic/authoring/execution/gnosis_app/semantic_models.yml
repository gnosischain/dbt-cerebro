semantic_models:
- name: execution_gnosis_app_activity_by_action_daily
  model: ref('api_execution_gnosis_app_activity_by_action_daily')
  defaults:
    agg_time_dimension: date
  entities:
  - name: action_day
    type: primary
    expr: concat(toString(date), '|', activity_kind)
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: activity_kind
    type: categorical
    expr: activity_kind
  measures:
  - name: execution_gnosis_app_activity_events
    agg: sum
    expr: n_events
  - name: execution_gnosis_app_activity_users
    agg: sum
    expr: n_users
  - name: execution_gnosis_app_activity_amount_usd
    agg: sum
    expr: coalesce(amount_usd, 0)
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - gnosis app activity
        - gnosis app on-chain activity
        - gnosis app actions
        - gnosis app daily activity
        - app activity onboard swap topup
        - gnosis app
        - app gnosis io activity
- name: execution_gnosis_app_users_distinct
  model: ref('fct_execution_gnosis_app_users_distinct')
  entities:
  - name: user_pseudonym
    type: primary
    expr: toString(user_pseudonym)
  dimensions:
  - name: is_high_confidence
    type: categorical
    expr: is_high_confidence
  - name: via_circles_trust
    type: categorical
    expr: via_circles_trust
  - name: via_circles_fee
    type: categorical
    expr: via_circles_fee
  - name: via_circles_profile_update
    type: categorical
    expr: via_circles_profile_update
  - name: via_circles_invite_human
    type: categorical
    expr: via_circles_invite_human
  - name: via_circles_register_human
    type: categorical
    expr: via_circles_register_human
  - name: via_circles_personal_mint
    type: categorical
    expr: via_circles_personal_mint
  - name: via_safe_invitation_module
    type: categorical
    expr: via_safe_invitation_module
  - name: first_seen_at
    type: time
    expr: toDate(first_seen_at)
    type_params:
      time_granularity: day
  measures:
  - name: execution_gnosis_app_users_distinct_count
    agg: count
    expr: user_pseudonym
  - name: execution_gnosis_app_high_confidence_count
    agg: sum
    expr: is_high_confidence
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: user
        question_synonyms:
        - gnosis app users
        - gnosis app on-chain users
        - gnosis app identified users
        - app users on-chain
        - users in the gnosis app
        - how many gnosis app users
        - distinct gnosis app users
        - gnosis app reach
        - gnosis app
        - app gnosis io users
        - users identified via circles
        - circles app users
