semantic_models:
- name: execution_gnosis_app_activity_by_action_daily
  model: ref('api_execution_gnosis_app_activity_by_action_daily')
  defaults:
    agg_time_dimension: date
  entities:
  - name: action_day
    type: primary
    expr: concat(toString(date), '|', activity_kind)
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: activity_kind
    type: categorical
    expr: activity_kind
  measures:
  - name: execution_gnosis_app_activity_events
    agg: sum
    expr: n_events
  - name: execution_gnosis_app_activity_users
    agg: sum
    expr: n_users
  - name: execution_gnosis_app_activity_amount_usd
    agg: sum
    expr: coalesce(amount_usd, 0)
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - gnosis app activity
        - gnosis app on-chain activity
        - gnosis app actions
        - gnosis app daily activity
        - app activity onboard swap topup
        - gnosis app
        - app gnosis io activity
- name: execution_gnosis_app_users_distinct
  model: ref('fct_execution_gnosis_app_users_distinct')
  entities:
  - name: user_pseudonym
    type: primary
    expr: toString(user_pseudonym)
  dimensions:
  - name: is_high_confidence
    type: categorical
    expr: is_high_confidence
  - name: via_circles_trust
    type: categorical
    expr: via_circles_trust
  - name: via_circles_fee
    type: categorical
    expr: via_circles_fee
  - name: via_circles_profile_update
    type: categorical
    expr: via_circles_profile_update
  - name: via_circles_invite_human
    type: categorical
    expr: via_circles_invite_human
  - name: via_circles_register_human
    type: categorical
    expr: via_circles_register_human
  - name: via_circles_personal_mint
    type: categorical
    expr: via_circles_personal_mint
  - name: via_safe_invitation_module
    type: categorical
    expr: via_safe_invitation_module
  - name: first_seen_at
    type: time
    expr: toDate(first_seen_at)
    type_params:
      time_granularity: day
  measures:
  - name: execution_gnosis_app_users_distinct_count
    agg: count
    expr: user_pseudonym
  - name: execution_gnosis_app_high_confidence_count
    agg: sum
    expr: is_high_confidence
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: user
        question_synonyms:
        - gnosis app users
        - gnosis app on-chain users
        - gnosis app identified users
        - app users on-chain
        - users in the gnosis app
        - how many gnosis app users
        - distinct gnosis app users
        - gnosis app reach
        - gnosis app
        - app gnosis io users
        - users identified via circles
        - circles app users
metrics:
- name: gnosis_app_activity_events_daily
  label: Gnosis App On-Chain Activity Events (Daily)
  description: 'Daily count of on-chain Gnosis App actions broken down by `activity_kind` (onboard / swap_filled / topup /
    marketplace_buy / token_offer_claim / ...). With cerebro-mcp PR 5''s time-spine upcasts in place, this metric composes
    with weekly revenue / bridges metrics through `dim_time_spine_weekly` automatically.

    '
  type: simple
  type_params:
    measure: execution_gnosis_app_activity_events
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        - activity_kind
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app activity events
        - gnosis app daily actions
        - gnosis app actions by kind
        - gnosis app onboard swap topup count
        - gnosis app
- name: gnosis_app_activity_users_daily
  label: Gnosis App Active Users By Action (Daily)
  description: "Daily distinct-user count per `activity_kind`. Use to size feature-specific engagement (e.g. \"how many users\
    \ swapped on the app last week\" vs \"how many topped up\"). NB: summing across activity_kinds DOUBLE-COUNTS users who\
    \ did multiple actions \u2014 aggregate at the action level if you need a true daily-active-user figure.\n"
  type: simple
  type_params:
    measure: execution_gnosis_app_activity_users
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        - activity_kind
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app users by action
        - gnosis app active users by feature
        - daily gnosis app users per action
        - gnosis app feature usage
- name: gnosis_app_activity_amount_usd
  label: Gnosis App On-Chain Activity Volume (USD)
  description: "Daily USD value associated with on-chain Gnosis App actions (where the action has a value \u2014 swaps, topups,\
    \ marketplace purchases). NULL amounts are summed as 0.\n"
  type: simple
  type_params:
    measure: execution_gnosis_app_activity_amount_usd
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        - activity_kind
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app volume
        - gnosis app activity usd
        - gnosis app on-chain volume
        - gnosis app swap volume topup volume
        - gnosis app
- name: gnosis_app_distinct_users
  label: Gnosis App Distinct Users (On-Chain)
  description: "Distinct user_pseudonym count identified on-chain as Gnosis App users (via Circles activity, Safe invitation\
    \ module, etc.). Pairs with the Mixpanel-side `mixpanel_ga_overview_daily.dau_value` measure for the web/mobile usage\
    \ view of the same app \u2014 join on `user_pseudonym` for cross-domain overlap.\n"
  type: simple
  type_params:
    measure: execution_gnosis_app_users_distinct_count
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: user
        owner: analytics_team
        allowed_dimensions:
        - is_high_confidence
        - via_circles_trust
        - via_circles_fee
        - via_circles_profile_update
        - via_circles_invite_human
        - via_circles_register_human
        - via_circles_personal_mint
        - via_safe_invitation_module
        supported_time_grains: []
        question_synonyms:
        - gnosis app users
        - gnosis app distinct users
        - gnosis app on-chain users
        - how many gnosis app users
        - app users on-chain
        - distinct app users
        - gnosis app reach
        - gnosis app
        - app gnosis io users
- name: gnosis_app_high_confidence_users
  label: Gnosis App High-Confidence Users
  description: "Subset of on-chain Gnosis App users with `n_distinct_heuristics >= 2` \u2014 multiple independent signals\
    \ confirm their participation. Use as a stricter denominator when measuring true Gnosis App reach (the weaker single-heuristic\
    \ users may include incidental Circles interactions).\n"
  type: simple
  type_params:
    measure: execution_gnosis_app_high_confidence_count
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: user
        owner: analytics_team
        allowed_dimensions:
        - via_circles_trust
        - via_circles_fee
        - via_circles_profile_update
        - via_circles_invite_human
        - via_circles_register_human
        - via_circles_personal_mint
        - via_safe_invitation_module
        supported_time_grains: []
        question_synonyms:
        - gnosis app high confidence users
        - gnosis app strict users
        - gnosis app reach strict
        - confirmed gnosis app users
