- name: execution_transactions_by_sector_daily
  model: ref('api_execution_transactions_by_sector_daily')
  defaults:
    agg_time_dimension: day
  entities:
  - name: sector_day
    type: primary
    expr: concat(toString(date), ':', label)
  dimensions:
  - name: day
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: sector
    type: categorical
    expr: label
  measures:
  - name: transaction_count_value
    agg: sum
    expr: value
  config:
    meta:
      cerebro:
        grain: day
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - transactions by sector
