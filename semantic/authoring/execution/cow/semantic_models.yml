metrics:
- name: cow_volume_usd
  label: CoW Protocol Volume (USD, Daily)
  description: "Daily traded USD volume on CoW Protocol \u2014 Gnosis Chain's batch-auction DEX. Composable with bridges /\
    \ revenue / consensus weekly metrics via the dim_time_spine_weekly upcast (PR 5).\n"
  type: simple
  type_params:
    measure: execution_cow_volume_usd_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - cow volume
        - cowswap volume
        - cow protocol volume
        - dex volume cow
        - daily cow volume
- name: cow_fees_usd
  label: CoW Protocol Fees (USD, Daily)
  description: 'Daily protocol fees collected on CoW Protocol settlements.

    '
  type: simple
  type_params:
    measure: execution_cow_fees_usd_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - cow fees
        - cowswap fees
        - cow protocol fees
        - cow daily fees
- name: cow_trades
  label: CoW Protocol Trade Count (Daily)
  description: 'Daily count of individual trades (orders matched) on CoW Protocol.

    '
  type: simple
  type_params:
    measure: execution_cow_trades_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - cow trades
        - cowswap trades
        - cow trade count
        - how many cow trades
- name: cow_unique_traders
  label: CoW Protocol Unique Traders (Daily)
  description: "Daily distinct trader (signer EOA) count on CoW Protocol. Real-EOA data \u2014 no UBO indirection required\
    \ (orders are signed directly by the trader; protocol-address aliasing doesn't apply here, unlike in lending / LP analytics).\n"
  type: simple
  type_params:
    measure: execution_cow_unique_traders_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - cow traders
        - cow unique traders
        - daily cow traders
        - cowswap unique users
        - how many cow users
- name: cow_ratio
  label: CoW Ratio (Peer-to-Peer Matching Share)
  description: "Share of batches settled via pure Coincidence of Wants (peer-to-peer matching, no AMM interactions). The defining\
    \ characteristic of CoW Protocol \u2014 higher cow_ratio = more direct peer matching.\n"
  type: simple
  type_params:
    measure: execution_cow_cow_ratio_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - cow ratio
        - peer to peer matching share
        - cow direct matching rate
        - cowswap p2p rate
- name: cow_active_solvers
  label: CoW Active Solvers (Daily)
  description: 'Distinct solvers that settled batches on this day. Solvers compete in the batch-auction to win settlement
    rights; this measures the competitive intensity of the solver ecosystem.

