        - cowswap fees
        - cow protocol fees
        - cow daily fees
- name: cow_trades
  label: CoW Protocol Trade Count (Daily)
  description: 'Daily count of individual trades (orders matched) on CoW Protocol.

    '
  type: simple
  type_params:
    measure: execution_cow_trades_value
  config:
