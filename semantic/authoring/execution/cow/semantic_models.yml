- name: cow_unique_traders
  label: CoW Protocol Unique Traders (Daily)
  description: "Daily distinct trader (signer EOA) count on CoW Protocol. Real-EOA data \u2014 no UBO indirection required\
    \ (orders are signed directly by the trader; protocol-address aliasing doesn't apply here, unlike in lending / LP analytics).\n"
  type: simple
  type_params:
    measure: execution_cow_unique_traders_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - cow traders
        - cow unique traders
        - daily cow traders
        - cowswap unique users
        - how many cow users
- name: cow_ratio
  label: CoW Ratio (Peer-to-Peer Matching Share)
  description: "Share of batches settled via pure Coincidence of Wants (peer-to-peer matching, no AMM interactions). The defining\
    \ characteristic of CoW Protocol \u2014 higher cow_ratio = more direct peer matching.\n"
  type: simple
  type_params:
    measure: execution_cow_cow_ratio_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - cow ratio
        - peer to peer matching share
        - cow direct matching rate
        - cowswap p2p rate
- name: cow_active_solvers
  label: CoW Active Solvers
  description: 'Count of distinct solvers that settled at least one batch in the selected period. Computed as a period
    count-distinct over the solver-day grain (not a daily average), so week/month totals reflect the true number of
    unique solvers, matching api_execution_cow_kpi_active_solvers. Solvers compete in the batch auction to win
    settlement rights; this measures the competitive intensity of the solver ecosystem.

    '
  type: simple
  type_params:
    measure: execution_cow_active_solvers_distinct
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - cow solvers
        - cow active solvers
        - cowswap solver competition
        - solver count cow
- name: cow_top_pairs_volume
  label: CoW Volume by Trading Pair (Weekly)
