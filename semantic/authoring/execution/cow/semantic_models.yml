semantic_models:
- name: execution_cow_daily
  model: ref('fct_execution_cow_daily')
  defaults:
    agg_time_dimension: date
  entities:
  - name: cow_day
    type: primary
    expr: toString(date)
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  measures:
  - name: execution_cow_volume_usd_value
    agg: sum
    expr: coalesce(volume_usd, 0)
  - name: execution_cow_fees_usd_value
    agg: sum
    expr: coalesce(fees_usd, 0)
  - name: execution_cow_trades_value
    agg: sum
    expr: num_trades
  - name: execution_cow_unique_traders_value
    agg: sum
    expr: unique_traders
  - name: execution_cow_batches_value
    agg: sum
    expr: num_batches
  - name: execution_cow_cow_batches_value
    agg: sum
    expr: num_cow_batches
  - name: execution_cow_cow_ratio_value
    agg: avg
    expr: cow_ratio
  - name: execution_cow_active_solvers_value
    agg: avg
    expr: active_solvers
  - name: execution_cow_gas_native_value
    agg: sum
    expr: coalesce(total_tx_cost_native, 0)
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - cow protocol daily
        - cowswap daily metrics
        - cow trading daily
        - cow batch auction daily
        - dex activity cow
- name: execution_cow_top_pairs_weekly
  model: ref('api_execution_cow_top_pairs_weekly')
  defaults:
    agg_time_dimension: week
  entities:
  - name: cow_pair_week
    type: primary
    expr: concat(toString(week), '|', pair)
  dimensions:
  - name: week
    type: time
    expr: week
    type_params:
      time_granularity: week
  - name: pair
    type: categorical
    expr: pair
  measures:
  - name: execution_cow_pair_volume_value
    agg: sum
    expr: volume_usd
  - name: execution_cow_pair_trades_value
    agg: sum
    expr: num_trades
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - cow top trading pairs dataset
        - cow pair volume endpoint
        - top dex pairs cow source
        - most traded cow pairs
