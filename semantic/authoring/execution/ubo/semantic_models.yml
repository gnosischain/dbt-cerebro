- name: ubo_address_classification__is_terminal_ubo_value
  label: Ubo Address Classification - Is Terminal Ubo
  description: ubo address classification - is terminal ubo (sum). Auto-generated candidate metric; review and promote before
    relying on it.
  type: simple
  type_params:
    measure: ubo_address_classification__is_terminal_ubo_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        allowed_dimensions:
