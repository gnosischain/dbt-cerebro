semantic_models:
- name: execution_token_prices_daily
  model: ref('int_execution_token_prices_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: symbol
    type: categorical
    expr: symbol
  measures:
  - name: execution_token_prices_daily__price_value
    agg: average
    expr: price
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - token price
        - usd price of token
        - daily token prices
        grain: day
