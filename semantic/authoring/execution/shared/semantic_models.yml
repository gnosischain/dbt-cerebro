semantic_models:
- name: execution_address_roles_current
  model: ref('int_execution_address_roles_current')
  entities:
  - name: address
    type: primary
    expr: address
  dimensions:
  - name: address
    type: categorical
    expr: address
  - name: dune_project
    type: categorical
    expr: dune_project
  - name: circles_avatar_type
    type: categorical
    expr: circles_avatar_type
  - name: pool_protocol
    type: categorical
    expr: pool_protocol
  measures:
  - name: is_safe_value
    agg: sum
    expr: is_safe
  - name: is_gpay_wallet_value
    agg: sum
    expr: is_gpay_wallet
  - name: is_circles_avatar_value
    agg: sum
    expr: is_circles_avatar
  config:
    meta:
      cerebro:
        owner: data_quality_team
        quality_tier: approved
        question_synonyms:
        - what is this address
        - address roles
        - does this address play multiple roles
        - identity multiplex
metrics: []
