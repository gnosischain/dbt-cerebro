semantic_models:
- name: execution_live_trades
  model: ref('api_execution_live_trades')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution live trades
  dimensions:
  - name: block_number
    type: categorical
    expr: block_number
  - name: transaction_hash
    type: categorical
    expr: transaction_hash
- name: execution_live_trades_freshness
  model: ref('api_execution_live_trades_freshness')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution live trades freshness
- name: execution_live_trades_hourly_48h
  model: ref('api_execution_live_trades_hourly_48h')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution live trades hourly 48h
        grain: hour
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: hour
  - name: label
    type: categorical
    expr: label
- name: execution_live_trades_stats
  model: ref('api_execution_live_trades_stats')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution live trades stats
- name: live__dex_trades_raw
  model: ref('int_live__dex_trades_raw')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - live  dex trades raw
  dimensions:
  - name: block_number
    type: categorical
    expr: block_number
  - name: transaction_hash
    type: categorical
    expr: transaction_hash
  - name: pool_address
    type: categorical
    expr: pool_address
  - name: token_bought_address
    type: categorical
    expr: token_bought_address
  - name: token_sold_address
    type: categorical
    expr: token_sold_address
metrics: []
