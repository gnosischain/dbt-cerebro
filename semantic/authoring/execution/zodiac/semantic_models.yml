semantic_models:
- name: execution_zodiac_modifier_module_events
  model: ref('int_execution_zodiac_modifier_module_events')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution zodiac modifier module events
  defaults:
    agg_time_dimension: block_timestamp
  dimensions:
  - name: modifier_address
    type: categorical
    expr: modifier_address
  - name: event_kind
    type: categorical
    expr: event_kind
  - name: submodule_address
    type: categorical
    expr: submodule_address
  - name: block_timestamp
    type: time
    expr: block_timestamp
    type_params:
      time_granularity: day
  - name: block_number
    type: categorical
    expr: block_number
  - name: transaction_hash
    type: categorical
    expr: transaction_hash
- name: execution_zodiac_modifier_submodules_latest
  model: ref('int_execution_zodiac_modifier_submodules_latest')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - zodiac modifier submodules
        - roles and delay modules
        - zodiac module wiring
        grain: day
  defaults:
    agg_time_dimension: last_event_at
  dimensions:
  - name: modifier_address
    type: categorical
    expr: modifier_address
  - name: submodule_address
    type: categorical
    expr: submodule_address
  - name: module_type
    type: categorical
    expr: module_type
  - name: master_copy
    type: categorical
    expr: master_copy
  - name: avatar_address
    type: categorical
    expr: avatar_address
  - name: last_event_at
    type: time
    expr: last_event_at
    type_params:
      time_granularity: day
  measures:
  - name: submodule_is_safe_value
    agg: sum
    expr: submodule_is_safe
  - name: is_erc1271_exploitable_value
    agg: sum
    expr: is_erc1271_exploitable
  - name: is_gp_value
    agg: sum
    expr: is_gp
- name: execution_zodiac_module_proxies
  model: ref('int_execution_zodiac_module_proxies')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - execution zodiac module proxies
  defaults:
    agg_time_dimension: block_timestamp
  dimensions:
  - name: proxy_address
    type: categorical
    expr: proxy_address
  - name: master_copy
    type: categorical
    expr: master_copy
  - name: block_timestamp
    type: time
    expr: block_timestamp
    type_params:
      time_granularity: day
  - name: block_number
    type: categorical
    expr: block_number
  - name: tx_hash
    type: categorical
    expr: tx_hash
  measures:
  - name: execution_zodiac_module_proxies__log_index_value
    agg: sum
    expr: log_index
metrics:
- name: submodule_is_safe_value
  label: Zodiac Submodules That Are Safes
  description: count of Zodiac modifier submodules that are themselves Safes (sum).
  type: simple
  type_params:
    measure: submodule_is_safe_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - modifier_address
        - submodule_address
        - module_type
        - master_copy
        - avatar_address
        - last_event_at
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - zodiac submodules that are safes
        - safe backed zodiac modules
        - roles delay modules on safes
- name: is_erc1271_exploitable_value
  label: ERC-1271 Exploitable Zodiac Modules
  description: count of Zodiac modifier submodules flagged ERC-1271 exploitable (sum).
  type: simple
  type_params:
    measure: is_erc1271_exploitable_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - modifier_address
        - submodule_address
        - module_type
        - master_copy
        - avatar_address
        - last_event_at
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - erc1271 exploitable modules
        - vulnerable zodiac modules
        - exploitable signature modules
- name: is_gp_value
  label: Gnosis Pay Zodiac Modules
  description: count of Zodiac modifier submodules attributed to Gnosis Pay (sum).
  type: simple
  type_params:
    measure: is_gp_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - modifier_address
        - submodule_address
        - module_type
        - master_copy
        - avatar_address
        - last_event_at
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - gnosis pay zodiac modules
        - gp attributed modules
        - gp roles delay modules
