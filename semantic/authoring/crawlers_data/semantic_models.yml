semantic_models:
- name: crawlers_data_distinct_projects_sectors
  model: ref('fct_crawlers_data_distinct_projects_sectors')
  dimensions:
  - name: project
    type: categorical
    expr: project
  - name: sector
    type: categorical
    expr: sector
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - crawlers data distinct projects sectors
- name: crawlers_data_distinct_projects_sectors_totals
  model: ref('api_crawlers_data_distinct_projects_sectors_totals')
  measures:
  - name: value1_value
    agg: sum
    expr: value1
  - name: value2_value
    agg: sum
    expr: value2
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - distinct projects and sectors tracked
        - project and sector coverage totals
        - how many projects and sectors
- name: crawlers_data_gno_supply_daily
  model: ref('api_crawlers_data_gno_supply_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: label
    type: categorical
    expr: label
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  measures:
  - name: crawlers_data_gno_supply_daily__supply_value
    agg: sum
    expr: supply
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - gno token supply by label
        - daily gno supply breakdown
        - gnosis token supply over time
        grain: day
- name: crawlers_data_labels
  model: ref('int_crawlers_data_labels')
  defaults:
    agg_time_dimension: introduced_at
  entities:
  - name: address
    type: primary
    expr: address
  - name: project_label
    type: foreign
    expr: project
  dimensions:
  - name: address
    type: categorical
    expr: address
  - name: project
    type: categorical
    expr: project
  - name: introduced_at
    type: time
    expr: introduced_at
    type_params:
      time_granularity: day
  - name: sector
    type: categorical
    expr: sector
  config:
    meta:
      cerebro:
        owner: data_quality_team
        quality_tier: approved
        role: dimension
        grain: day
        question_synonyms:
        - crawlers data labels
        - address project labels
        - which project is this address
        graph:
          enabled: true
          profile: address_labeled_as
          source_column: address
          target_column: project
          source_kind: address
          target_kind: project_label
          directed: true
          time_column: introduced_at
metrics:
- name: crawlers_distinct_project_count
  label: Distinct Projects Tracked
  description: Total number of distinct projects identified across the crawlers_data project/sector catalogue (countDistinct(project)). Point-in-time total as of today; use for data-coverage overviews.
  type: simple
  type_params:
    measure: value1_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - number of projects tracked
        - distinct projects crawled
        - how many projects do we cover
- name: crawlers_distinct_sector_count
  label: Distinct Sectors Tracked
  description: Total number of distinct sectors identified across the crawlers_data project/sector catalogue (countDistinct(sector)). Point-in-time total as of today; use for data-coverage overviews.
  type: simple
  type_params:
    measure: value2_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - number of sectors tracked
        - distinct sectors crawled
        - how many sectors do we cover
- name: gno_supply_daily
  label: GNO Supply (daily, by label)
  description: Daily GNO token supply sourced from the Dune GNO-supply query, broken down by supply-category label. Summed over labels gives the total; filter by label for a specific category. Units are GNO token quantities.
  type: simple
  type_params:
    measure: crawlers_data_gno_supply_daily__supply_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - label
        - date
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - gno token supply
        - gno supply by category
        - gnosis daily token supply
