semantic_models:
- name: crawlers_data_distinct_projects_sectors
  model: ref('fct_crawlers_data_distinct_projects_sectors')
  dimensions:
  - name: project
    type: categorical
    expr: project
  - name: sector
    type: categorical
    expr: sector
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - crawlers data distinct projects sectors
- name: crawlers_data_distinct_projects_sectors_totals
  model: ref('api_crawlers_data_distinct_projects_sectors_totals')
  measures:
  - name: value1_value
    agg: sum
    expr: value1
  - name: value2_value
    agg: sum
    expr: value2
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - crawlers data distinct projects sectors totals
- name: crawlers_data_gno_supply_daily
  model: ref('api_crawlers_data_gno_supply_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: label
    type: categorical
    expr: label
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  measures:
  - name: supply_value
    agg: sum
    expr: supply
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - crawlers data gno supply daily
        grain: day
- name: crawlers_data_labels
  model: ref('int_crawlers_data_labels')
  defaults:
    agg_time_dimension: introduced_at
  dimensions:
  - name: address
    type: categorical
    expr: address
  - name: project
    type: categorical
    expr: project
  - name: introduced_at
    type: time
    expr: introduced_at
    type_params:
      time_granularity: day
  - name: sector
    type: categorical
    expr: sector
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - crawlers data labels
metrics: []
