semantic_models:
- name: crawlers_data_distinct_projects_sectors
  model: ref('fct_crawlers_data_distinct_projects_sectors')
  dimensions:
  - name: project
    type: categorical
    expr: project
  - name: sector
    type: categorical
    expr: sector
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - crawlers data distinct projects sectors
- name: crawlers_data_distinct_projects_sectors_totals
  model: ref('api_crawlers_data_distinct_projects_sectors_totals')
  measures:
  - name: value1_value
    agg: sum
    expr: value1
  - name: value2_value
    agg: sum
    expr: value2
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - crawlers data distinct projects sectors totals
- name: crawlers_data_gno_supply_daily
  model: ref('api_crawlers_data_gno_supply_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: label
    type: categorical
    expr: label
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  measures:
  - name: crawlers_data_gno_supply_daily__supply_value
    agg: sum
    expr: supply
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - crawlers data gno supply daily
        grain: day
- name: crawlers_data_labels
  model: ref('int_crawlers_data_labels')
  defaults:
    agg_time_dimension: introduced_at
  entities:
  - name: address
    type: primary
    expr: address
  - name: project_label
    type: foreign
    expr: project
  dimensions:
  - name: address
    type: categorical
    expr: address
  - name: project
    type: categorical
    expr: project
  - name: introduced_at
    type: time
    expr: introduced_at
    type_params:
      time_granularity: day
  - name: sector
    type: categorical
    expr: sector
  config:
    meta:
      cerebro:
        owner: data_quality_team
        quality_tier: approved
        role: dimension
        grain: day
        question_synonyms:
        - crawlers data labels
        - address project labels
        - which project is this address
        graph:
          enabled: true
          profile: address_labeled_as
          source_column: address
          target_column: project
          source_kind: address
          target_kind: project_label
          directed: true
          time_column: introduced_at
