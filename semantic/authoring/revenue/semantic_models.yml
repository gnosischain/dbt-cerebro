semantic_models:
- name: revenue_per_user_weekly
  model: ref('api_revenue_per_user_weekly')
  defaults:
    agg_time_dimension: week
  entities:
  - name: user_pseudonym
    type: primary
    expr: toString(user_pseudonym)
  dimensions:
  - name: week
    type: time
    expr: week
    type_params:
      time_granularity: week
  - name: has_holdings
    type: categorical
    expr: has_holdings
  - name: has_sdai
    type: categorical
    expr: has_sdai
  - name: has_gpay
    type: categorical
    expr: has_gpay
  - name: is_revenue_active
    type: categorical
    expr: is_revenue_active
  measures:
  - name: revenue_per_user_weekly_users
    agg: count
    expr: user_pseudonym
  - name: revenue_per_user_weekly_fees
    agg: sum
    expr: rolling_fees_total
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - revenue per user weekly
        - revenue user list
        - revenue active users with addresses
        - revenue users by sector
        - per-user revenue table
- name: revenue_per_user_monthly
  model: ref('api_revenue_per_user_monthly')
