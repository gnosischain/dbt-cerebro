  measures:
  - name: revenue_active_users_monthly_count
    agg: sum
    expr: users_cnt
  - name: revenue_potential_total_monthly_value
    agg: sum
    expr: fees_total
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: month
        question_synonyms:
        - monthly active users
        - revenue mau
        - economic mau
        - dao monthly active users
        - users above $0.50 monthly

