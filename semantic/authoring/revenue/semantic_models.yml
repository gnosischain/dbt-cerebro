# ═════════════════════════════════════════════════════════════════════
# REVENUE — semantic layer
# ═════════════════════════════════════════════════════════════════════
#
# Source-of-truth framing is in models/revenue/marts/schema.yml. Read
# that file's header first if you haven't seen the revenue model before
# — the headline points are:
#
#   * Figures here are POTENTIAL DAO-accruable value, not realised
#     treasury revenue. The primary deliverable is an estimate of
#     economically meaningful ACTIVE USERS, not a P&L.
#   * Three streams currently implemented: holdings (EURe / USDC.e /
#     BRLA / ZCHF), sdai, gpay. Lending and Circles-mint are in the
#     Dune spec but not yet wired in dbt.
#   * "Active" = a user whose CROSS-STREAM SUMMED fees in a 52-week
#     window reach $6 (annual) or $0.50 (monthly). Dedup is intrinsic
#     because aggregation happens before thresholding.
#
# Quality tiers:
#   approved   The cross-stream active-user totals — the headline
#              metric the DAO uses to size economic activity. Analyst-
#              reviewed and stable.
#   candidate  Per-stream cohort breakdowns. Stable structure but
#              the underlying "potential" caveat means analysts must
#              be careful when reporting these as revenue.
# ═════════════════════════════════════════════════════════════════════

semantic_models:

# ---------- Per-user revenue (cross-sector USER overlap entry) ----------
#
# These two semantic_models expose `user_pseudonym` as a PRIMARY entity
# so the planner can join revenue to ANY other user-keyed semantic_model
# on equality (gpay user identities, gnosis_app users, mixpanel
# cross-domain). Without these, the only cross-sector composition
# possible is the time-axis overlay (see the weekly/monthly totals
# below).

- name: revenue_per_user_weekly
  model: ref('api_revenue_per_user_weekly')
  defaults:
    agg_time_dimension: week
  entities:
  - name: user_pseudonym
    type: primary
    expr: toString(user_pseudonym)
  dimensions:
  - name: week
    type: time
    expr: week
    type_params:
      time_granularity: week
  - name: has_holdings
    type: categorical
    expr: has_holdings
  - name: has_sdai
    type: categorical
    expr: has_sdai
  - name: has_gpay
    type: categorical
    expr: has_gpay
  - name: is_revenue_active
    type: categorical
    expr: is_revenue_active
  measures:
  # fct_revenue_per_user_weekly is already 1 row per (week, user_pseudonym),
  # so a simple count() on user_pseudonym equals distinct-user count without
  # needing a count_distinct aggregator (which ClickHouse doesn't expose
  # under that name — it's uniqExact). Same trick used on the gpay side
  # via a deduped projection.
  - name: revenue_per_user_weekly_users
    agg: count
    expr: user_pseudonym
  - name: revenue_per_user_weekly_fees
    agg: sum
    expr: rolling_fees_total
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - revenue per user weekly
        - revenue user list
        - revenue active users with addresses
        - revenue users by sector
        - per-user revenue table

- name: revenue_per_user_monthly
  model: ref('api_revenue_per_user_monthly')
  defaults:
    agg_time_dimension: month
  entities:
  - name: user_pseudonym
    type: primary
    expr: toString(user_pseudonym)
  dimensions:
  - name: month
    type: time
    expr: month
    type_params:
      time_granularity: month
  - name: has_holdings
    type: categorical
    expr: has_holdings
  - name: has_sdai
    type: categorical
    expr: has_sdai
  - name: has_gpay
    type: categorical
    expr: has_gpay
  - name: is_revenue_active
    type: categorical
    expr: is_revenue_active
  measures:
  - name: revenue_per_user_monthly_users
    agg: count
    expr: user_pseudonym
  - name: revenue_per_user_monthly_fees
    agg: sum
    expr: month_fees_total
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: month
        question_synonyms:
        - revenue per user monthly
        - revenue user list monthly
        - monthly per-user revenue table

# ---------- Headline: cross-stream active users ----------

- name: revenue_active_users_totals_weekly
  model: ref('api_revenue_active_users_totals_weekly')
  defaults:
    agg_time_dimension: week
  entities:
  - name: revenue_week
    type: primary
    expr: toString(week)
  dimensions:
  - name: week
    type: time
    expr: week
    type_params:
      time_granularity: week
  measures:
  - name: revenue_active_users_weekly_count
    agg: sum
    expr: users_cnt
  - name: revenue_potential_total_weekly_value
    agg: sum
    expr: annual_rolling_fees_total
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - active users
        - dao active users
        - revenue active users
        - active revenue users
        - economically active users
        - users above $6 annual

- name: revenue_active_users_totals_monthly
  model: ref('api_revenue_active_users_totals_monthly')
