- name: revenue_per_user_weekly_users
  label: Revenue Per-User Distinct Users (Weekly)
  description: 'Annualized ROLLING fee total per user-week (52x rolling window). Sum across users within ONE week only — summing across weeks double-counts the rolling window.'
  type: simple
  type_params:
    measure: revenue_per_user_weekly_users
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions:
        - week
        - has_holdings
        - has_sdai
        - has_gpay
        - is_revenue_active
        supported_time_grains:
        - week
        - month
