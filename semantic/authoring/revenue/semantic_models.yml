metrics:
- name: revenue_per_user_weekly_users
  label: Revenue Per-User Distinct Users (Weekly)
  description: "Distinct user_pseudonym count from fct_revenue_per_user_weekly. The weekly per-user revenue mart is the cross-sector\
    \ USER join key for the semantic layer \u2014 combine with gpay / gnosis_app / mixpanel user-keyed metrics on `user_pseudonym`\
    \ to compute overlaps.\n"
  type: simple
  type_params:
    measure: revenue_per_user_weekly_users
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions:
        - week
        - has_holdings
        - has_sdai
        - has_gpay
        - is_revenue_active
        supported_time_grains:
        - week
        - month
        question_synonyms:
        - revenue users count
        - distinct revenue users
        - per-user revenue count
        - revenue user list size
- name: revenue_per_user_weekly_fees
  label: Revenue Per-User Total Fees (Weekly)
  description: 'Sum of rolling-52w potential revenue across the per-user mart. Same figure as `revenue_potential_total_weekly`
    aggregated from the per-user grain (useful when you also want a user-level breakdown in the same query).

    '
  type: simple
  type_params:
    measure: revenue_per_user_weekly_fees
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions:
        - week
        - has_holdings
        - has_sdai
        - has_gpay
        - is_revenue_active
        supported_time_grains:
        - week
        - month
        question_synonyms:
        - per-user revenue fees
        - revenue fees from per-user table
- name: revenue_per_user_monthly_users
  label: Revenue Per-User Distinct Users (Monthly)
  description: 'Distinct user_pseudonym count from fct_revenue_per_user_monthly. Monthly cross-sector user-overlap entry point.

    '
  type: simple
  type_params:
    measure: revenue_per_user_monthly_users
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions:
        - month
        - has_holdings
        - has_sdai
        - has_gpay
        - is_revenue_active
        supported_time_grains:
        - month
        question_synonyms:
        - monthly per-user revenue count
        - distinct revenue users monthly
- name: revenue_per_user_monthly_fees
  label: Revenue Per-User Total Fees (Monthly)
  description: 'Sum of monthly potential revenue across the per-user mart.

    '
  type: simple
  type_params:
    measure: revenue_per_user_monthly_fees
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions:
        - month
        - has_holdings
        - has_sdai
        - has_gpay
        - is_revenue_active
        supported_time_grains:
        - month
        question_synonyms:
        - monthly per-user fees
        - monthly per-user potential revenue
- name: revenue_active_users_weekly
  label: Revenue Active Users (Weekly)
  description: "Unique users with cross-stream summed potential revenue >= $6 over the trailing 52 weeks. Dedup is intrinsic\
    \ \u2014 aggregation across streams happens before thresholding, so a user is counted once regardless of how many sectors\
    \ they accrue fees in.\n"
  type: simple
  type_params:
    measure: revenue_active_users_weekly_count
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions:
        - week
        supported_time_grains:
        - week
        - month
        question_synonyms:
        - active users weekly
        - revenue active users
        - economic wau
        - active users 52w
        - users above $6 annual
- name: revenue_active_users_monthly
  label: Revenue Active Users (Monthly)
  description: 'Unique users whose cross-stream summed potential revenue in the calendar month reaches $0.50 (month-scaled
    equivalent of the $6 annual threshold).

    '
  type: simple
  type_params:
    measure: revenue_active_users_monthly_count
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions:
        - month
        supported_time_grains:
        - month
        question_synonyms:
        - active users monthly
        - revenue mau
        - economic mau
        - users above $0.50 monthly
- name: revenue_potential_total_weekly
  label: Potential Revenue (Rolling 52w)
  description: "Total cross-stream potential revenue accruable to the DAO over the trailing 52 weeks. POTENTIAL \u2014 actual\
    \ DAO capture depends on program terms per stream. Useful as an upper bound on economic activity, NOT a treasury report.\n"
  type: simple
  type_params:
    measure: revenue_potential_total_weekly_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions:
        - week
        supported_time_grains:
        - week
        - month
        question_synonyms:
        - potential revenue
        - rolling annual fees
        - cross-stream rolling fees
        - potential dao revenue
- name: revenue_potential_total_monthly
  label: Potential Revenue (Monthly)
  description: "Total cross-stream potential revenue accruable to the DAO in the calendar month. POTENTIAL \u2014 see weekly\
    \ metric.\n"
  type: simple
  type_params:
    measure: revenue_potential_total_monthly_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        allowed_dimensions:
        - month
        supported_time_grains:
        - month
        question_synonyms:
        - monthly potential revenue
        - monthly cross-stream fees
