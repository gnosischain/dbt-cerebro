    expr: week
    type_params:
      time_granularity: week
  - name: cohort
    type: categorical
    expr: cohort
  measures:
  - name: users_cnt_value
    agg: sum
    expr: users_cnt
  - name: annual_rolling_fees_total_value
    agg: sum
    expr: annual_rolling_fees_total
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        grain: week
        question_synonyms:
        - active users by cohort
        - active users by dollar bucket
        - revenue cohorts weekly
