semantic_models:
- name: governance_proposals_latest
  model: ref('api_governance_proposals_latest')
  defaults:
    agg_time_dimension: created_at
  entities:
  - name: proposal
    type: primary
    expr: id
  dimensions:
  - name: created_at
    type: time
    expr: created_at
    type_params:
      time_granularity: day
  - name: gip_number
    type: categorical
    expr: gip_number
  - name: is_gip
    type: categorical
    expr: is_gip
  - name: outcome
    type: categorical
    expr: outcome
  - name: category
    type: categorical
    expr: category
  measures:
  - name: governance_proposals_latest__unique_voters_value
    agg: sum
    expr: unique_voters
  - name: governance_proposals_latest__total_vp_value
    agg: sum
    expr: total_vp
  - name: governance_proposals_latest__proposal_count
    agg: count
    expr: id
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - governance proposals
        - gnosisdao proposals
        - gip proposals list

- name: governance_kpis_latest
  model: ref('api_governance_kpis_latest')
  measures:
  - name: governance_kpis_latest__total_proposals_value
    agg: sum
    expr: total_proposals
  - name: governance_kpis_latest__total_gips_value
    agg: sum
    expr: total_gips
  - name: governance_kpis_latest__unique_voters_value
    agg: sum
    expr: unique_voters
  - name: governance_kpis_latest__total_votes_cast_value
    agg: sum
    expr: total_votes_cast
  - name: governance_kpis_latest__followers_value
    agg: sum
    expr: followers
  - name: governance_kpis_latest__gip_proposals_passed_value
    agg: sum
    expr: gip_proposals_passed
  - name: governance_kpis_latest__gip_pass_rate_value
    agg: sum
    expr: gip_pass_rate
  - name: governance_kpis_latest__avg_voters_per_gip_proposal_value
    agg: sum
    expr: avg_voters_per_gip_proposal
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - governance headline kpis
        - total gnosisdao proposals and voters
        - governance summary numbers

- name: governance_activity_monthly
  model: ref('api_governance_activity_monthly')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: month
  - name: metric
    type: categorical
    expr: metric
  measures:
  - name: governance_activity_monthly__value
    agg: sum
    expr: value
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: month
        question_synonyms:
        - governance activity over time
        - proposals and votes per month
        - monthly governance trend

- name: governance_forum_activity_weekly
  model: ref('api_governance_forum_activity_weekly')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: week
  - name: metric
    type: categorical
    expr: metric
  measures:
  - name: governance_forum_activity_weekly__value
    agg: sum
    expr: value
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: week
        question_synonyms:
        - forum activity over time
        - weekly forum posts and topics
        - governance forum engagement trend

- name: governance_power_source_monthly
  model: ref('api_governance_power_source_monthly')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: month
  - name: label
    type: categorical
    expr: label
  measures:
  - name: governance_power_source_monthly__value
    agg: sum
    expr: value
  - name: governance_power_source_monthly__voters
    agg: sum
    expr: voters
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: month
        question_synonyms:
        - voting power by source
        - staked gno vs delegated voting power
        - governance voting power breakdown

- name: governance_gip_funnel
  model: ref('api_governance_gip_funnel')
  dimensions:
  - name: stage
    type: categorical
    expr: stage
  measures:
  - name: governance_gip_funnel__gip_count_value
    agg: sum
    expr: gip_count
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - gip conversion funnel
        - governance proposal funnel
        - how many gips passed

- name: governance_proposal_choices
  model: ref('api_governance_proposal_choices')
  entities:
  - name: proposal
    type: foreign
    expr: proposal_id
  dimensions:
  - name: choice
    type: categorical
    expr: choice
  - name: outcome
    type: categorical
    expr: outcome
  measures:
  - name: governance_proposal_choices__score_value
    agg: sum
    expr: score
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - vote breakdown by choice
        - for against abstain votes
        - per-proposal vote results

- name: governance_forum_proposal_links
  model: ref('api_governance_forum_topic_proposal_links')
  entities:
  - name: topic
    type: foreign
    expr: topic_id
  - name: proposal
    type: foreign
    expr: proposal_id
  dimensions:
  - name: topic_gip_number
    type: categorical
    expr: topic_gip_number
  - name: recovered_via_link
    type: categorical
    expr: recovered_via_link
  - name: via_forum_post
    type: categorical
    expr: via_forum_post
  - name: via_discussion
    type: categorical
    expr: via_discussion
  - name: corroborated_by_discussion
    type: categorical
    expr: corroborated_by_discussion
  measures:
  - name: governance_forum_proposal_links__linking_posts_value
    agg: sum
    expr: linking_posts
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - forum discussion linked to snapshot vote
        - which forum topics link to which proposals

- name: governance_whale_concentration
  model: ref('api_governance_whale_concentration')
  defaults:
    agg_time_dimension: created_at
  entities:
  - name: proposal
    type: primary
    expr: proposal_id
  dimensions:
  - name: created_at
    type: time
    expr: created_at
    type_params:
      time_granularity: day
  - name: gip_number
    type: categorical
    expr: gip_number
  - name: outcome
    type: categorical
    expr: outcome
  measures:
  - name: governance_whale_concentration__top1_share_value
    agg: average
    expr: top1_share
  - name: governance_whale_concentration__top10_share_value
    agg: average
    expr: top10_share
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - whale concentration
        - voting power concentration
        - top voter share per proposal

- name: governance_turnout_latest
  model: ref('api_governance_turnout_latest')
  defaults:
    agg_time_dimension: created_at
  entities:
  - name: proposal
    type: primary
    expr: proposal_id
  dimensions:
  - name: created_at
    type: time
    expr: created_at
    type_params:
      time_granularity: day
  - name: gip_number
    type: categorical
    expr: gip_number
  - name: outcome
    type: categorical
    expr: outcome
  - name: category
    type: categorical
    expr: category
  - name: includes_staked_gno
    type: categorical
    expr: includes_staked_gno
  measures:
  - name: governance_turnout_latest__turnout_value
    agg: average
    expr: turnout
  - name: governance_turnout_latest__eligible_supply_value
    agg: average
    expr: eligible_supply
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - governance turnout
        - voter turnout per proposal
        - what share of gno voted

- name: governance_turnout_monthly
  model: ref('api_governance_turnout_monthly')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: month
  measures:
  - name: governance_turnout_monthly__avg_turnout_value
    agg: average
    expr: avg_turnout
  - name: governance_turnout_monthly__proposals
    agg: sum
    expr: proposals
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: month
        question_synonyms:
        - governance turnout trend
        - turnout over time
        - monthly voter turnout

- name: governance_delegates_latest
  model: ref('api_governance_delegates_latest')
  defaults:
    agg_time_dimension: last_delegation_at
  entities:
  - name: delegate
    type: primary
    expr: delegate
  dimensions:
  - name: last_delegation_at
    type: time
    expr: last_delegation_at
    type_params:
      time_granularity: day
  measures:
  - name: governance_delegates_latest__delegator_count_value
    agg: sum
    expr: delegator_count
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - top governance delegates
        - who has the most delegators
        - delegate leaderboard

- name: governance_delegation_graph
  model: ref('api_governance_delegation_graph')
  defaults:
    agg_time_dimension: delegated_at
  entities:
  - name: delegator
    type: primary
    expr: delegator
  - name: delegate
    type: foreign
    expr: delegate
  dimensions:
  - name: delegated_at
    type: time
    expr: delegated_at
    type_params:
      time_granularity: day
  measures:
  - name: governance_delegation_graph__delegation_count
    agg: count
    expr: delegator
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        grain: day
        question_synonyms:
        - who delegates to whom
        - delegation graph
        - current governance delegations

- name: governance_top_voters
  model: ref('api_governance_top_voters')
  entities:
  - name: voter
    type: primary
    expr: voter
  measures:
  - name: governance_top_voters__proposals_voted_value
    agg: sum
    expr: proposals_voted
  - name: governance_top_voters__total_vp_cast_value
    agg: sum
    expr: total_vp_cast
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        role: dimension
        question_synonyms:
        - top governance voters
        - most active voters
        - voter leaderboard

- name: governance_top_proposers
  model: ref('api_governance_top_proposers')
  entities:
  - name: author
    type: primary
    expr: author
  measures:
  - name: governance_top_proposers__proposals_authored_value
    agg: sum
    expr: proposals_authored
  - name: governance_top_proposers__enacted_value
    agg: sum
    expr: enacted
  - name: governance_top_proposers__enactment_rate_value
    agg: average
    expr: enactment_rate
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        role: dimension
        question_synonyms:
        - top gip proposers
        - most active governance proposal authors
        - proposer leaderboard

metrics:
- name: governance_proposal_count
  label: Governance Proposals
  description: Count of Snapshot governance proposals for GnosisDAO (gnosis.eth), including non-GIP announcement votes. Filter by is_gip or category for a narrower view.
  type: simple
  type_params:
    measure: governance_proposals_latest__proposal_count
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - number of governance proposals
        - how many gips
        - gnosisdao proposal count

- name: governance_unique_voters_per_proposal
  label: Governance Unique Voters (per proposal)
  description: Sum of unique voters across governance proposals. Group by gip_number/category/outcome for per-proposal or per-category breakdowns; this is a per-proposal count, not a distinct-across-all-history voter count (use governance_total_unique_voters for that).
  type: simple
  type_params:
    measure: governance_proposals_latest__unique_voters_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - voters per governance proposal
        - proposal turnout

- name: governance_total_proposals
  label: Total Proposals (headline)
  description: Headline total count of all Snapshot proposals for GnosisDAO, from the single-row KPI snapshot. Point-in-time total as of today.
  type: simple
  type_params:
    measure: governance_kpis_latest__total_proposals_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - total governance proposals
        - how many proposals has gnosisdao had

- name: governance_total_unique_voters
  label: Total Unique Voters (headline)
  description: Headline count of distinct addresses that have ever voted on a GnosisDAO Snapshot proposal. Point-in-time total as of today.
  type: simple
  type_params:
    measure: governance_kpis_latest__unique_voters_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - total unique governance voters
        - how many addresses have voted

- name: governance_gip_pass_rate
  label: GIP Pass Rate
  description: Share of finalized (non-open) GIP proposals that passed -- passed / (passed + rejected + no_consensus + below_quorum). Excludes non-GIP announcement proposals and selection-ballot ('decided') outcomes.
  type: simple
  type_params:
    measure: governance_kpis_latest__gip_pass_rate_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - gip pass rate
        - governance proposal success rate
        - how many gips pass

- name: governance_activity_monthly
  label: Governance Activity (monthly)
  description: Monthly time series of governance activity. Group/filter by the `metric` dimension to select proposals_created, votes_cast, or unique_voters.
  type: simple
  type_params:
    measure: governance_activity_monthly__value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: month
        allowed_dimensions:
        - metric
        - date
        supported_time_grains:
        - month
        - quarter
        - year
        question_synonyms:
        - governance activity trend
        - proposals and votes over time

- name: governance_forum_activity_weekly
  label: Forum Activity (weekly)
  description: Weekly time series of Gnosis forum activity. Group/filter by the `metric` dimension to select topics_created, posts_created, or active_users.
  type: simple
  type_params:
    measure: governance_forum_activity_weekly__value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: week
        allowed_dimensions:
        - metric
        - date
        supported_time_grains:
        - week
        - month
        - quarter
        question_synonyms:
        - forum activity trend
        - community engagement over time

- name: governance_power_source_monthly
  label: Voting Power by Source (monthly)
  description: Monthly voting power cast on GnosisDAO Snapshot proposals, broken down by source (Staked GNO via the Gnosis Beacon Chain, direct GNO holdings, or delegated voting power). Group/filter by the `label` dimension.
  type: simple
  type_params:
    measure: governance_power_source_monthly__value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: month
        allowed_dimensions:
        - label
        - date
        supported_time_grains:
        - month
        - quarter
        - year
        question_synonyms:
        - voting power by source
        - staked gno vs delegated voting power
        - gnosisdao voting power breakdown

- name: governance_gip_funnel
  label: GIP Conversion Funnel
  description: Count of GIPs reaching each stage of the governance lifecycle -- discussed on the forum, reached a Snapshot vote, passed or enacted. A monotonic funnel (each stage <= the prior one).
  type: simple
  type_params:
    measure: governance_gip_funnel__gip_count_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        allowed_dimensions:
        - stage
        question_synonyms:
        - gip funnel
        - governance conversion funnel
        - how many gips get discussed vs voted vs passed

- name: governance_proposal_choice_votes
  label: Votes by Choice
  description: Voting power received per ballot choice (e.g. For/Against/Abstain, or ranked-choice options) across GnosisDAO Snapshot proposals. Group by choice, gip_number, or outcome.
  type: simple
  type_params:
    measure: governance_proposal_choices__score_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - votes by choice
        - for against abstain breakdown
        - per-choice voting power

- name: governance_forum_proposal_linking_posts
  label: Forum Posts Linking to a Snapshot Vote
  description: Count of forum posts that paste a Snapshot proposal URL, by topic. Use recovered_via_link to find discussions with no GIP number in the title that still link to a real vote.
  type: simple
  type_params:
    measure: governance_forum_proposal_links__linking_posts_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - forum posts linking to snapshot votes
        - discussions recovered via proposal link

- name: governance_whale_top1_share
  label: Whale Concentration (top 1 voter)
  description: Average, across proposals, of the share of total voting power cast by the single largest voter. High values indicate whale-decided votes even on proposals with many voters.
  type: simple
  type_params:
    measure: governance_whale_concentration__top1_share_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - whale concentration
        - top voter share
        - largest voter voting power share

- name: governance_whale_top10_share
  label: Whale Concentration (top 10 voters)
  description: Average, across proposals, of the share of total voting power cast by the top 10 voters by vp.
  type: simple
  type_params:
    measure: governance_whale_concentration__top10_share_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - top 10 voter concentration
        - voting power concentration

- name: governance_turnout
  label: Governance Turnout (per proposal)
  description: Per-GIP voting-power turnout (is_gip=1 only -- excludes spam/announcement Snapshot activity, which is ~47% of all proposals but averages near-0% turnout and would otherwise dilute the signal) -- total_vp cast / eligible GNO supply (circulating on both chains, plus staked GNO when the proposal's own strategies include it as an eligible pool). Group by gip_number/category/outcome. Pre-2022 ('gno'-strategy era) figures are directional -- only the current getGnoVotingPower contract was independently audited to confirm it's a simple balance passthrough.
  type: simple
  type_params:
    measure: governance_turnout_latest__turnout_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - governance turnout
        - voter turnout percentage
        - what share of gno supply voted

- name: governance_turnout_monthly
  label: Governance Turnout (monthly trend)
  description: Monthly average of per-GIP turnout ratios (is_gip=1 only, not population-weighted by eligible supply) -- a directional trend of how GnosisDAO voter turnout has moved over time. Months with no real GIP have no row.
  type: simple
  type_params:
    measure: governance_turnout_monthly__avg_turnout_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: month
        supported_time_grains:
        - month
        - quarter
        - year
        question_synonyms:
        - turnout trend over time
        - monthly governance turnout

- name: governance_delegate_delegator_count
  label: Delegators per Delegate
  description: Count of gnosis.eth holders currently delegating their voting power to each delegate address (DelegateRegistry on Ethereum mainnet, not Gnosis Chain). Group by delegate for a leaderboard. Separate from vote-level power-source classification -- this is the underlying who-delegates-to-whom relationship.
  type: simple
  type_params:
    measure: governance_delegates_latest__delegator_count_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - most delegators
        - delegate leaderboard
        - who do people delegate to

- name: governance_delegation_count
  label: Active Delegations
  description: Count of currently-active delegator -> delegate relationships for gnosis.eth (DelegateRegistry on Ethereum mainnet). A delegator appears at most once, reflecting only their latest on-chain action.
  type: simple
  type_params:
    measure: governance_delegation_graph__delegation_count
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        question_synonyms:
        - total active delegations
        - how many people delegate their votes
