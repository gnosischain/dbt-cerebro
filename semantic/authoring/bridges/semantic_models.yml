        - who bridged which tokens
        - address bridge activity
        graph:
          enabled: true
          profile: bridge_user_flows
          source_column: user_address
          target_column: bridge_contract
          source_kind: address
          target_kind: bridge
          directed: true
          time_column: date
          weight_column: volume_usd
metrics:
- name: bridge_volume_7d
  label: Bridge Volume (Last 7 Days)
  description: 'Total USD volume bridged across all tracked bridges and chains in the trailing 7 days. Sourced from api_bridges_kpi_volume_7d.

    '
  type: simple
  type_params:
    measure: bridge_volume_7d_kpi
  config:
    meta:
      cerebro:
        quality_tier: candidate
        grain: snapshot
        owner: bridges_team
        allowed_dimensions: []
        supported_time_grains:
        - day
        - week
        question_synonyms:
        - bridge volume 7 day
        - last 7 days bridge volume
        - weekly bridge volume
        - how much was bridged last week
- name: bridge_netflow_7d
  label: Bridge Netflow (Last 7 Days)
  description: "Net USD flow into Gnosis Chain via tracked bridges over the last 7 days (inbound \u2212 outbound). Positive\
    \ = net inflow.\n"
  type: simple
  type_params:
    measure: bridge_netflow_7d_kpi
  config:
    meta:
      cerebro:
        quality_tier: candidate
        grain: snapshot
        owner: bridges_team
        allowed_dimensions: []
        supported_time_grains:
        - day
        - week
        question_synonyms:
        - bridge netflow 7 day
        - net inflow gnosis last week
        - net bridge flow week
- name: bridge_volume_total
  label: Bridge Volume (All Time)
  description: 'Cumulative USD volume bridged into and out of Gnosis Chain across all tracked bridges since coverage began.

    '
  type: simple
  type_params:
    measure: bridge_volume_total_kpi
  config:
    meta:
      cerebro:
        quality_tier: candidate
        grain: snapshot
        owner: bridges_team
        allowed_dimensions: []
        supported_time_grains:
        - day
        question_synonyms:
        - total bridge volume
        - all time bridge volume
        - lifetime bridge volume
        - cumulative bridged usd
- name: bridge_netflow_total
  label: Bridge Netflow (All Time)
  description: 'Cumulative net USD flow into Gnosis Chain across all tracked bridges since coverage began. Positive = net
    inflow.

    '
  type: simple
  type_params:
    measure: bridge_netflow_total_kpi
  config:
    meta:
      cerebro:
        quality_tier: candidate
        grain: snapshot
        owner: bridges_team
        allowed_dimensions: []
        supported_time_grains:
        - day
        question_synonyms:
        - total bridge netflow
        - all time net inflow
        - cumulative net bridge flow
        - lifetime gnosis net inflow
- name: bridge_distinct_chains
  label: Distinct Bridge Chains
  description: 'Number of distinct source/destination chains observed in bridged transfers (cardinality of the bridge graph).

    '
  type: simple
  type_params:
    measure: bridge_distinct_chains_kpi
  config:
