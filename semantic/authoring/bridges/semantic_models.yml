        - source_chain
        - dest_chain
        - token
        - direction
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - bridge volume daily
        - bridge volume by token
        - bridge volume by chain
        - bridge volume by direction
        - daily bridged usd
- name: bridge_flow_netflow_daily
  label: "Bridge Netflow (Daily by Bridge \xD7 Token \xD7 Direction)"
