- name: bridges_address_flows_daily
  model: ref('int_execution_bridges_address_flows_daily')
  defaults:
    agg_time_dimension: date
  entities:
  - name: address
    type: primary
    expr: user_address
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: user_address
    type: categorical
    expr: user_address
  - name: bridge_contract
    type: categorical
    expr: bridge_contract
  - name: bridge_name
    type: categorical
    expr: bridge_name
  - name: token_address
    type: categorical
    expr: token_address
  - name: symbol
    type: categorical
    expr: symbol
  - name: direction
    type: categorical
    expr: direction
  measures:
  - name: volume_usd_value
    agg: sum
    expr: volume_usd
  - name: transfer_count_value
    agg: sum
    expr: transfer_count
  config:
    meta:
      cerebro:
        owner: bridges_team
        quality_tier: candidate
        grain: day
        question_synonyms:
        - bridge user flows
        - who bridged which tokens
        - address bridge activity
        graph:
          enabled: true
          profile: bridge_user_flows
          source_column: user_address
          target_column: bridge_contract
          source_kind: address
          target_kind: bridge
          directed: true
          time_column: date
          weight_column: volume_usd
metrics: []
