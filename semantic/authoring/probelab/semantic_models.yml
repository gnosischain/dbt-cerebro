metrics:
- name: probelab_nodes_by_cloud_daily
  label: ProbeLab Nodes by Cloud Provider (daily)
  description: Daily count of Gnosis P2P network peers observed by the ProbeLab crawler, broken down by client software and cloud/hosting provider. Sourced from the crawler's 1-day average peer count (__count) per (client, cloud_provider). Use for infrastructure-concentration and decentralization analysis.
  type: simple
  type_params:
    measure: probelab_clients_cloud_daily__value_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        - client
        - cloud
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - nodes by cloud provider
        - peers by hosting provider
        - client hosting concentration
        - gnosis nodes per cloud
- name: probelab_nodes_by_country_daily
  label: ProbeLab Nodes by Country (daily)
  description: Daily count of Gnosis P2P network peers observed by the ProbeLab crawler, broken down by client software and geographic country. Sourced from the crawler's 1-day average peer count (__count) per (client, country). Use for geographic-distribution and decentralization analysis.
  type: simple
  type_params:
    measure: probelab_clients_country_daily__value_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        - client
        - country
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - nodes by country
        - peers by geography
        - geographic node distribution
        - gnosis nodes per country
- name: probelab_nodes_by_client_daily
  label: ProbeLab Nodes by Client (daily)
  description: Daily count of Gnosis P2P network peers observed by the ProbeLab crawler, broken down by client software. Sourced from the crawler's 1-day average peer count (__count) per client. This is the headline client-diversity series across the Gnosis peer-to-peer network.
  type: simple
  type_params:
    measure: probelab_clients_daily__value_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        - client
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - nodes by client software
        - client diversity
        - peer count per client
        - gnosis client share
- name: probelab_nodes_by_quic_daily
  label: ProbeLab Nodes by QUIC Support (daily)
  description: Daily count of Gnosis P2P network peers observed by the ProbeLab crawler, broken down by client software and QUIC transport support. Sourced from the crawler's 7-day-window peer count (__count) per (client, quic_support). Use for tracking QUIC transport adoption across the network.
  type: simple
  type_params:
    measure: probelab_clients_quic_daily__value_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        - client
        - quic
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - nodes by quic support
        - quic transport adoption
        - peers with quic enabled
        - gnosis quic support share
- name: probelab_nodes_by_version_daily
  label: ProbeLab Nodes by Client Version (daily)
  description: Daily count of Gnosis P2P network peers observed by the ProbeLab crawler, broken down by client software and semantic version string. Sourced from the crawler's 1-day average peer count (__count) per (client, agent_version_semver). Use for tracking client upgrade/version-adoption over time.
  type: simple
  type_params:
    measure: probelab_clients_version_daily__value_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        - client
        - version
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - nodes by client version
        - client version adoption
        - peers by semver
        - gnosis version distribution
