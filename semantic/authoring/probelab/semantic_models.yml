semantic_models:
- name: probelab_clients_cloud_daily
  model: ref('api_probelab_clients_cloud_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  - name: client
    type: categorical
    expr: client
  - name: cloud
    type: categorical
    expr: cloud
  measures:
  - name: value_value
    agg: sum
    expr: value
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
