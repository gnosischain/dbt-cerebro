- name: quarterly_data_carbon_emissions
  model: ref('api_quarterly_data_carbon_emissions')
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - quarterly report carbon emissions
        - board metrics co2
        - quarter over quarter emissions
        grain: day
  defaults:
    agg_time_dimension: quarter
  dimensions:
