metrics:
- name: co2_tonnes_yr_value
  label: Annual CO2 Emissions (Tonnes)
  description: estimated annualized network CO2 emissions in tonnes, reported quarterly (sum).
  type: simple
  type_params:
    measure: co2_tonnes_yr_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - quarter
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - quarterly co2 emissions
        - network carbon tonnes
        - board metrics co2 emissions
