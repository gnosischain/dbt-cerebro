# ═════════════════════════════════════════════════════════════════════
# SHARED — semantic-layer time spines
# ═════════════════════════════════════════════════════════════════════
#
# These spines are the canonical cross-sector join bridges for the
# planner. Every module that publishes a metric at day / week / month
# grain should declare a relationship to the matching spine (see
# semantic/relationships/time_spines.yml). Once that's in place the
# planner can compose metrics from different modules over a shared
# time axis — e.g. revenue weekly active users vs consensus weekly
# attestation count vs bridges weekly netflow.
#
# Quality tier: `approved` — these are reference dimensions, no
# business semantics to review.
# ═════════════════════════════════════════════════════════════════════

semantic_models:

- name: dim_time_spine_daily
  model: ref('dim_time_spine_daily')
  defaults:
    agg_time_dimension: day
  entities:
  - name: day
    type: primary
    expr: day
  dimensions:
  - name: day
    type: time
    expr: day
    type_params:
      time_granularity: day
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        role: dimension
        grain: day
        question_synonyms:
        - calendar day
        - time spine daily
        - daily reference dates

- name: dim_time_spine_weekly
  model: ref('dim_time_spine_weekly')
  defaults:
    agg_time_dimension: week
  entities:
  - name: week
    type: primary
    expr: week
  dimensions:
  - name: week
    type: time
    expr: week
    type_params:
      time_granularity: week
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        role: dimension
        grain: week
        question_synonyms:
        - calendar week
        - time spine weekly
        - weekly reference dates

- name: dim_time_spine_monthly
  model: ref('dim_time_spine_monthly')
  defaults:
    agg_time_dimension: month
  entities:
  - name: month
    type: primary
    expr: month
  dimensions:
  - name: month
    type: time
    expr: month
    type_params:
      time_granularity: month
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        role: dimension
        grain: month
        question_synonyms:
        - calendar month
        - time spine monthly
        - monthly reference dates

metrics: []
