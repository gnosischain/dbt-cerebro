  - name: unique_devices_value
    agg: sum
    expr: unique_devices
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: candidate
        question_synonyms:
        - mixpanel events by type
        - event type breakdown
        - gnosis app event distribution
        - passkey login events
        - circles mint events
        - marketplace purchase events
        - autocapture vs custom events
        - gnosis app button clicks
        - pageview counts gnosis app
        grain: day

