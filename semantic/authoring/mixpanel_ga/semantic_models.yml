semantic_models:
- name: mixpanel_ga_overview_daily
  model: ref('api_mixpanel_ga_overview_daily')
  defaults:
    agg_time_dimension: date
  dimensions:
  - name: date
    type: time
    expr: date
    type_params:
      time_granularity: day
  measures:
  - name: mixpanel_gnosis_app_total_events_value
    agg: sum
    expr: total_events
  - name: mixpanel_gnosis_app_dau_value
    agg: sum
    expr: dau
  - name: mixpanel_ga_overview_daily__unique_devices_value
    agg: sum
    expr: unique_devices
  - name: mixpanel_ga_overview_daily__new_users_value
    agg: sum
    expr: new_users
  - name: distinct_countries_value
    agg: sum
    expr: distinct_countries
  - name: avg_events_per_user_value
    agg: avg
    expr: avg_events_per_user
  config:
    meta:
      cerebro:
        owner: analytics_team
        quality_tier: approved
        question_synonyms:
        - mixpanel daily overview
        - website daily active users
        - gnosis app DAU
        - mixpanel KPIs
        - gnosis app daily active users
        - how many users on gnosis app today
        - gnosis app new users
        - gnosis app cumulative users
        grain: day
- name: mixpanel_ga_events_daily
  model: ref('api_mixpanel_ga_events_daily')
  defaults:
