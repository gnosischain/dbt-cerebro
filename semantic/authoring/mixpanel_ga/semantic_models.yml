metrics:
- name: gnosis_app_mixpanel_dau
  label: Gnosis App DAU (Mixpanel / Web)
  description: "Daily active users on app.gnosis.io as measured by Mixpanel. Headline web/mobile-side companion to the on-chain\
    \ `gnosis_app_distinct_users` metric \u2014 same app, different domains. Source: api_mixpanel_ga_overview_daily.dau column.\n"
  type: simple
  type_params:
    measure: mixpanel_gnosis_app_dau_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app DAU
        - gnosis app daily active users
        - gnosis app users today
        - app gnosis io DAU
        - how many users on gnosis app
        - gnosis app users
        - gnosis app
        - mixpanel DAU
        - web DAU
        - website daily active users
- name: gnosis_app_mixpanel_total_events
  label: Gnosis App Events (Mixpanel / Web)
  description: "Total Mixpanel events fired on app.gnosis.io per day. Headline web-side engagement signal \u2014 pageviews,\
    \ clicks, custom events, modal opens all included.\n"
  type: simple
  type_params:
    measure: mixpanel_gnosis_app_total_events_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app events
        - gnosis app daily events
        - mixpanel events
        - app gnosis io events
        - gnosis app
        - gnosis app activity web
- name: gnosis_app_mixpanel_modal_opens
  label: Gnosis App Modal Opens (Mixpanel / Web)
  description: 'Daily count of modal / bottom-sheet opens per component. Groupable by `bottom_sheet` to see which onboarding
    / feature entry points users engage with (PasskeyStepsModal, ModalJoin, SelectSwapAsset, ModalReceive, ModalSend, CardActivationStepsModal).

    '
  type: simple
  type_params:
    measure: mixpanel_gnosis_app_modal_opens_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        - bottom_sheet
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app modal opens
        - gnosis app bottom sheet opens
        - passkey modal opens
        - circles join modal
        - swap modal opens
        - gnosis app
        - gnosis app feature engagement
- name: gnosis_app_mixpanel_passkey_logins
  label: Gnosis App Passkey Logins (Mixpanel / Web)
  description: 'Daily count of distinct users who completed a passkey login on app.gnosis.io. Identification signal that pairs
    with the on-chain `gnosis_app_distinct_users` view: passkey-authenticated Mixpanel sessions are the most-likely-to-be-identified
    visitors.

    '
  type: simple
  type_params:
    measure: mixpanel_gnosis_app_passkey_logins_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app passkey logins
        - gnosis app authenticated users
        - passkey signins
        - gnosis app sign in
        - gnosis app
- name: gnosis_app_mixpanel_identified_users
  label: Gnosis App Identified Users (Mixpanel / Web)
  description: 'Daily count of distinct Mixpanel users who reached a wallet-identified state on app.gnosis.io (Mixpanel `distinct_id`
    set to a wallet address, not the anonymous `$device:uuid`). The closest Mixpanel proxy for the on-chain `gnosis_app_distinct_users`
    metric.

    '
  type: simple
  type_params:
    measure: mixpanel_gnosis_app_identified_users_value
  config:
    meta:
      cerebro:
        quality_tier: approved
        grain: day
        owner: analytics_team
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        question_synonyms:
        - gnosis app identified users
        - gnosis app wallet-identified users
        - gnosis app signed in users
        - gnosis app
