  type: simple
  type_params:
    measure: discv4_count_value
  config:
    meta:
      cerebro:
        quality_tier: candidate
        owner: analytics_team
        grain: day
        allowed_dimensions:
        - date
        supported_time_grains:
        - day
        - week
        - month
        - quarter
        - year
        question_synonyms:
        - p2p clients latest discv4 count
        - discv4 count
- name: change_discv4_pct_value
  label: P2P Clients Latest - Change Discv4 Pct
  description: p2p clients latest - change discv4 pct (average). Read this as an average over the grain; do NOT sum it across
    rows or periods. Auto-generated candidate metric; review and promote before relying on it.
  type: simple
  type_params:
    measure: change_discv4_pct_value
  config:
