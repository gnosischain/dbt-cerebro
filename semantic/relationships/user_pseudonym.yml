# ── Mixpanel (web) × on-chain identities ──────────────────────────
# Bridges the WEB/Mixpanel side of gpay and gnosis_app into the
# user-pseudonym graph. user_pseudonym = user_id_hash (same sipHash64
# salt space), so these are true equi-joins on the pseudonym. The
# gpay web mart is grained per (user, safe) so it's many_to_many to
# the on-chain identity set; the gnosis_app web mart is one row per
# pseudonym (one_to_one). Once bound, the planner reaches revenue,
# circles, validators, etc. transitively via the on-chain marts.

- name: mixpanel_gpay_users_to_gpay_identity
  left_model: fct_mixpanel_ga_gpay_users
  right_model: fct_execution_gpay_users_distinct
  # The Mixpanel-side column is user_id_hash — same sipHash64 hash space as
  # user_pseudonym (see header). The previous left_keys [user_pseudonym]
  # referenced a column this model does not have, so the join was dead.
  left_keys: [user_id_hash]
  right_keys: [user_pseudonym]
  cardinality: one_to_one
  join_semantics: inner
  via_entity: user_pseudonym
  preferred_bridge: false
  safe_for_dimension_enrichment: true
  aggregate_then_join_only: false
  allow_any_join: false
  quality_tier: approved

- name: mixpanel_gnosis_app_users_to_gnosis_app_identity
  left_model: fct_mixpanel_ga_gnosis_app_users
  right_model: fct_execution_gnosis_app_users_distinct
  left_keys: [user_pseudonym]
  right_keys: [user_pseudonym]
  cardinality: one_to_one
  join_semantics: inner
  via_entity: user_pseudonym
  preferred_bridge: false
  safe_for_dimension_enrichment: true
  aggregate_then_join_only: false
  allow_any_join: false
  quality_tier: approved

