# ── Safe → Owner pseudonym bridge ─────────────────────────────────
# A Safe is a smart-contract wallet; analytically activity from a Safe
# address belongs to its human owner(s). The bridge mart
# `fct_execution_safe_owner_pseudonyms` exposes BOTH sides in the
# project-wide user_pseudonym hash space:
#
#   - safe_user_pseudonym  = pseudonymize_address(safe_address)
#   - owner_user_pseudonym = pseudonymize_address(owner)
#
# Relationships below bind EVERY existing user-keyed mart to ONE of the
# bridge's two pseudonym columns. The planner can then compose any
# Safe-keyed sector with any owner-keyed sector via two equi-joins
# (sector → bridge.safe_user_pseudonym, bridge.owner_user_pseudonym →
# other sector). This closes the dead-end where Safe-wallet activity
# couldn't be reattributed to the human EOAs behind the Safe.
#
# Why BOTH sides for every mart? The user-keyed marts are NOT single-
# population pseudonym sets — most are UNIONs across multiple identity
# layers. For example, `fct_execution_gpay_users_distinct` (64,418 rows)
# is the union of:
#   * 32,209 `safe_self` pseudonyms (the GP Safe contract)
#   * 32,208 `initial_owner` pseudonyms (the EOA that set up the Safe)
#   * 1 `delegate` pseudonym (shared signer)
# So a single GP user_pseudonym may be either a Safe address OR an
# owner EOA. To reach all GP users via the bridge, the planner needs
# TWO relationships per mart: one to `safe_user_pseudonym`, one to
# `owner_user_pseudonym`. We declare both below for every user-keyed
# mart. The planner picks the side that resolves and aggregates the
# rest. This mirrors the bridge's own dual-entity declaration
# (safe_user_pseudonym primary, owner_user_pseudonym foreign).

- name: gpay_identity_to_safe_owner_bridge
  left_model: fct_execution_gpay_users_distinct
  right_model: fct_execution_safe_owner_pseudonyms
  left_keys: [user_pseudonym]
  right_keys: [safe_user_pseudonym]
  cardinality: one_to_many
  join_semantics: left
  via_entity: user_pseudonym
  preferred_bridge: false
  safe_for_dimension_enrichment: true
  aggregate_then_join_only: false
  allow_any_join: false
  quality_tier: approved

- name: gnosis_app_to_safe_owner_bridge
