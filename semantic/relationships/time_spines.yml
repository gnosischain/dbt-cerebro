version: 1

# ═════════════════════════════════════════════════════════════════════
# CROSS-SECTOR TIME-SPINE BRIDGES
# ═════════════════════════════════════════════════════════════════════
#
# Each entry binds a metric's source table to a shared time spine so the
# semantic planner can route a cross-sector query over a common time
# axis. Without these the planner sees disjoint metrics living on
# bespoke `revenue_week`, `bridges_d`, `consensus_day` entities and can't
# compose them.
#
# Convention: `dim_time_spine_<grain>` is always the LEFT model, the
# metric source is the RIGHT model. `via_entity` matches the time
# column on the spine. Cardinality is `one_to_many` (one spine date can
# back many metric rows — e.g. many cohorts/symbols/bridges per week).
# `aggregate_then_join_only: true` tells the planner this bridge is
# strictly for time-axis enrichment, not row-level joins.
#
# Adding a new module: pick the right spine for the grain, copy a
# matching block, set `right_model` to your metric's root table and
# `right_keys` to the time column on it.
# ═════════════════════════════════════════════════════════════════════

relationships:

# ---------- Daily spine ----------

- name: daily_spine_to_consensus_validators_active
  left_model: dim_time_spine_daily
  right_model: api_consensus_validators_active_daily
  left_keys: [day]
  right_keys: [date]
  cardinality: one_to_many
  join_semantics: left
  via_entity: day
  preferred_bridge: true
  safe_for_dimension_enrichment: true
  aggregate_then_join_only: true
  allow_any_join: false
  quality_tier: approved

# (execution/transactions daily-spine bridge already lives in
