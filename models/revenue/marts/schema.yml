    Gnosis Pay stream — rolling-52-week per-payment fee "potential" revenue
    by payment token and user $-cohort bucket. Each user's cumulative
    per-payment fees (EURe / GBPe / USDC.e card transactions) over the
    trailing 52 weeks is bucketed into an annualised $-band. "Potential"
    — DAO accruable share depends on fee-split agreements.
  columns:
  - name: week
    description: Week start.
    data_type: Date
    tests:
    - not_null
  - name: symbol
    description: Payment token (EURe, GBPe, USDC.e).
    data_type: String
    tests:
    - not_null
  - name: cohort
    description: Annualised $-bucket.
    data_type: String
    tests:
    - not_null
  - {name: annual_rolling_fees_total, description: Sum of rolling-52w fees for users in this cohort., data_type: Float64}
  - {name: users_cnt,                 description: Users with >$0 rolling fees., data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - week
      - symbol
      - cohort

- name: fct_revenue_gpay_cohorts_monthly
  description: |
    Gnosis Pay stream — monthly per-payment fee "potential" revenue by
    symbol and user $-cohort bucket. Same source as the weekly table;
    monthly grain with month-scaled thresholds.
  columns:
  - name: month
    description: First day of the month.
    data_type: Date
    tests:
    - not_null
  - name: symbol
    description: Payment token.
    data_type: String
    tests:
    - not_null
  - name: cohort
    description: Monthly $-bucket.
    data_type: String
    tests:
    - not_null
  - {name: fees_total, description: Sum of monthly fees., data_type: Float64}
  - {name: users_cnt,  description: Users with >$0 monthly fees., data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - month
      - symbol
      - cohort

# ---------- Gnosis App ----------

- name: fct_revenue_gnosis_app_cohorts_weekly
  description: |
    Gnosis App stream — rolling-52-week Metri CRC fee "potential" revenue
    by user $-cohort bucket. Each user's cumulative Metri fees (CRC ERC-1155
    transfers to the Gnosis App fee receiver) over the trailing 52 weeks is
    bucketed into an annualised $-band. CRC fees are priced per avatar token
    using on-chain DEX data with a daily-median fallback. "Potential" — the
    DAO may accrue this stream depending on program terms.
  columns:
  - name: week
    description: Week start.
    data_type: Date
    tests:
    - not_null
  - name: cohort
    description: Annualised $-bucket.
    data_type: String
    tests:
    - not_null
  - {name: annual_rolling_fees_total, description: Sum of rolling-52w fees for users in this cohort., data_type: Float64}
  - {name: users_cnt,                 description: Users with >$0 rolling fees., data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - week
      - cohort

- name: fct_revenue_gnosis_app_cohorts_monthly
  description: |
    Gnosis App stream — monthly Metri CRC fee "potential" revenue by user
    $-cohort bucket. Same source as the weekly table; monthly grain with
    month-scaled thresholds.
  columns:
  - name: month
    description: First day of the month.
    data_type: Date
    tests:
    - not_null
  - name: cohort
    description: Monthly $-bucket.
    data_type: String
    tests:
    - not_null
  - {name: fees_total, description: Sum of monthly fees., data_type: Float64}
  - {name: users_cnt,  description: Users with >$0 monthly fees., data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - month
      - cohort

# ---------- Active users (cross-stream) ----------

- name: fct_revenue_active_users_cohorts_weekly
  description: |
    HEADLINE — cross-stream unique-active-user cohort (rolling 52-week).
    For each user, fees across ALL streams (holdings + sDAI + GPay) and
    ALL symbols are SUMMED FIRST, then the total is bucketed into a
    $-cohort. Because aggregation happens before bucketing, a user
    cannot appear in multiple cohorts even if they accrue fees in
    several sectors. This is the canonical cross-sector "active user"
    breakdown by economic size; the `$1+`/`$6+`/... buckets are
    annualised. See file header for the active-user definition.
  columns:
  - name: week
    description: Week start.
    data_type: Date
    tests:
    - not_null
  - name: cohort
    description: Annualised $-bucket (includes `<1`).
    data_type: String
    tests:
    - not_null
  - {name: annual_rolling_fees_total, description: Sum of rolling-52w fees across all streams for users in this cohort., data_type: Float64}
  - {name: users_cnt,                 description: Unique users in this cohort., data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - week
      - cohort

- name: fct_revenue_active_users_cohorts_monthly
  description: |
    HEADLINE — cross-stream unique-active-user cohort (monthly grain).
    Same logic as the weekly variant: per-user fees summed across all
    streams/symbols for the calendar month, then bucketed into
    month-scaled $-bands. Cross-sector dedup is automatic. See file
    header.
  columns:
  - name: month
    description: First day of the month.
    data_type: Date
    tests:
    - not_null
  - name: cohort
    description: Monthly $-bucket.
    data_type: String
    tests:
    - not_null
  - {name: fees_total, description: Sum of monthly fees across all streams., data_type: Float64}
  - {name: users_cnt,  description: Unique users in this cohort., data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - month
      - cohort

# ---------- Per-user revenue (cross-sector USER-OVERLAP entry point) ----------
#
# These marts expose the revenue per-user grain — same data as the cohort
# tables above, but keyed on the canonical `user_pseudonym` so analysts
# can compute USER OVERLAPS across sectors via the semantic layer (e.g.
# "revenue-active users who are also gpay users this week"). Raw addresses
# never appear here: the pseudonymize_address macro is applied at the
# mart boundary and the original `user` column is dropped.
#
# Threshold convention matches fct_revenue_active_users_totals_*: $6 over
# the trailing 52 weeks (weekly variant) or $0.50 in the calendar month
# (monthly variant). The `is_revenue_active` flag pre-computes that test.

- name: fct_revenue_per_user_weekly
  description: |
    One row per (week, user_pseudonym). Sums `annual_rolling_fees` across
    all streams (holdings + sDAI + gpay) for each user, exposes the total
    plus sector-presence flags (`has_holdings`, `has_sdai`, `has_gpay`)
    and a count of distinct streams contributing. `is_revenue_active = 1`
    iff the rolling total >= $6 — the Dune "meaningfully active" cutoff.

    Cross-sector join key: `user_pseudonym` (UInt64, sipHash64 of
    lowercased wallet address with the project-wide PII salt). Compatible
    with gpay safe identities, gnosis_app user identities, and Mixpanel
    `user_id_hash` (same hash space).
  columns:
  - name: week
    description: ISO week start (Monday).
    data_type: Date
    tests:
    - not_null
  - name: user_pseudonym
    description: Cross-sector pseudonym (sipHash64 of lowercased address).
    data_type: UInt64
    tests:
    - not_null
  - {name: rolling_fees_total, description: Sum of 52w-rolling potential revenue across all streams (USD)., data_type: Float64}
  - {name: has_holdings,       description: 1 if user has any rolling fees from the holdings stream.,       data_type: UInt8}
  - {name: has_sdai,           description: 1 if user has any rolling fees from the sDAI stream.,           data_type: UInt8}
  - {name: has_gpay,           description: 1 if user has any rolling fees from the Gnosis Pay stream.,     data_type: UInt8}
  - {name: has_gnosis_app,     description: 1 if user has any rolling fees from the Gnosis App stream.,     data_type: UInt8}
  - {name: n_streams,          description: Number of distinct streams the user accrued fees in.,           data_type: UInt8}
  - {name: is_revenue_active,  description: 1 iff rolling_fees_total >= $6 (Dune active-user threshold).,   data_type: UInt8}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - week
      - user_pseudonym
      config:
        severity: warn

- name: fct_revenue_per_user_monthly
  description: |
    Monthly per-user revenue. Same shape as the weekly variant but at
    calendar-month grain with `month_fees_total` (no rolling) and the
    month-scaled $0.50 active threshold.
  columns:
  - name: month
    description: First day of the calendar month.
    data_type: Date
    tests:
    - not_null
  - name: user_pseudonym
    description: Cross-sector pseudonym (sipHash64).
    data_type: UInt64
    tests:
    - not_null
  - {name: month_fees_total,   description: Sum of monthly potential revenue across all streams (USD).,data_type: Float64}
  - {name: has_holdings,       description: 1 if user had holdings-stream fees this month.,            data_type: UInt8}
  - {name: has_sdai,           description: 1 if user had sDAI-stream fees this month.,                data_type: UInt8}
  - {name: has_gpay,           description: 1 if user had Gnosis Pay-stream fees this month.,          data_type: UInt8}
  - {name: has_gnosis_app,     description: 1 if user had Gnosis App-stream fees this month.,          data_type: UInt8}
  - {name: n_streams,          description: Number of distinct streams contributing in the month.,     data_type: UInt8}
  - {name: is_revenue_active,  description: 1 iff month_fees_total >= $0.50 (month-scaled $6 threshold).,data_type: UInt8}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - month
      - user_pseudonym
      config:
        severity: warn

- name: api_revenue_per_user_weekly
  description: |
    API view over fct_revenue_per_user_weekly. Per-user weekly revenue
    keyed on `user_pseudonym` — the canonical join key for cross-sector
    user-overlap queries. Filterable by week range and `is_revenue_active`.
- name: api_revenue_per_user_monthly
  description: |
    API view over fct_revenue_per_user_monthly. Per-user monthly revenue
    keyed on `user_pseudonym`. Filterable by month range and
    `is_revenue_active`.

