version: 2

# ═════════════════════════════════════════════════════════════════════
# REVENUE — POTENTIAL-VALUE & ACTIVE-USER ESTIMATION MODEL
# ═════════════════════════════════════════════════════════════════════
#
# Goal
# ----
# Track on-chain revenue streams that COULD accrue value to the Gnosis
# DAO. All fees here are computed PER USER PER DAY and then aggregated
# weekly / monthly. The headline output is a sector-deduplicated count
# of "active" users — analysts use this to size economically meaningful
# user activity on Gnosis Chain.
#
# IMPORTANT — what this is NOT
# ----------------------------
# These figures are POTENTIAL revenue, not realised DAO revenue. Each
# stream represents a value flow the DAO MAY capture in part, depending
# on program settings, fee schedules, or external agreements. The
# primary purpose of these marts is to ESTIMATE ACTIVE USERS by
# summing a meaningful economic signal across streams — not to report
# what the treasury actually receives. Where actual DAO revenue is
# needed, refer to the treasury-fees marts (separate module).
#
# Sectors covered (each computed independently at the user level)
# ---------------------------------------------------------------
#   holdings    Imputed interest on user balances of stablecoins
#               held on Gnosis Chain (EURe / USDC.e / BRLA / ZCHF).
#               Displayed as the full user-level imputed yield; the
#               DAO-accruable share depends on program terms.
#   sdai        Imputed yield on user sDAI / Savings xDAI balances.
#               Same caveat as above.
#   gpay        Per-payment fees applied to each Gnosis Pay transaction,
#               summed per user (EURe / GBPe / USDC.e payment tokens).
#   gnosis_app  Metri CRC ERC-1155 fees paid to the Gnosis App fee receiver
#               when users transact via Gnosis App (Cometh ERC-4337). Priced
#               per avatar token using on-chain DEX data with median fallback.
#
# Sectors in the Dune spec NOT yet implemented in dbt
# ---------------------------------------------------
#   lending     Lending-fee attribution per user.
# When/if these land, add the source as a new stream_type in
# int_revenue_fees_weekly_per_user.sql / _monthly_per_user.sql; the
# downstream cohort+totals marts pick up new streams automatically.
#
# Active-user definition (cross-stream, no double counting)
# ---------------------------------------------------------
# A user is counted as ACTIVE once if their fees aggregated across ALL
# streams in a 52-week (or month-scaled) window reach the threshold:
#   - Annual / rolling-52w threshold : $6
#   - Monthly threshold              : $0.50  (= $6 / 12)
# If a user exceeds the threshold in only one sector, they are still
# active. If no single sector reaches the threshold but the combined
# total does, they are still active. The threshold is applied AFTER
# summing across streams per user, so cross-sector double-counting is
# impossible. See `fct_revenue_active_users_totals_*` for the headline
# totals and `fct_revenue_active_users_cohorts_*` for the same logic
# split by $-bucket.
#
# Caveats
# -------
# 1. Coverage is bounded by identifiable on-chain events and address
#    labels — anonymous / unlabelled wallets that don't surface in
#    `int_revenue_*_fees_daily` are excluded.
# 2. The dollar values are POTENTIAL accruable streams; realised DAO
#    revenue may be a fraction (or zero) depending on policy.
# 3. The $6 threshold is the Dune team's calibration of "meaningfully
#    active revenue-generating user." It's a heuristic, not a contract.
# ═════════════════════════════════════════════════════════════════════

models:

# ---------- Holdings (EURe / USDC.e / BRLA / ZCHF) ----------

- name: fct_revenue_holdings_cohorts_weekly
  description: |
    Holdings stream — rolling-52-week imputed-interest "potential" revenue
    by token symbol and user $-cohort bucket. Each user's imputed
    yield on EURe / USDC.e / BRLA / ZCHF balances over the trailing 52
    weeks is bucketed into an annualised $-band. Users with annual
    rolling fees < $1 are excluded from this cohort table (still counted
    in the cross-stream active-users marts). "Potential" — the DAO may
    capture a portion of this stream depending on program terms.
  columns:
  - name: week
    description: Week start.
    data_type: Date
    tests:
    - not_null
  - name: symbol
    description: Canonical token symbol.
    data_type: String
    tests:
    - not_null
  - name: cohort
    description: Annualised $-bucket for user's rolling fees.
    data_type: String
    tests:
    - not_null
  - {name: annual_rolling_fees_total, description: Sum of rolling-52w fees for users in this cohort.,  data_type: Float64}
  - {name: users_cnt,                 description: Number of users with >$0 rolling fees in cohort.,   data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - week
      - symbol
      - cohort

- name: fct_revenue_holdings_cohorts_monthly
  description: |
    Holdings stream — monthly imputed-interest "potential" revenue by
    symbol and user $-cohort bucket. Same source streams as the weekly
    table (EURe / USDC.e / BRLA / ZCHF), aggregated per calendar month
    and bucketed with month-scaled thresholds (1/12 of the annual
    bands). "Potential" — see header.
  columns:
  - name: month
    description: First day of the month.
    data_type: Date
    tests:
    - not_null
  - name: symbol
    description: Canonical token symbol.
    data_type: String
    tests:
    - not_null
  - name: cohort
    description: Monthly $-bucket for user's monthly fees.
    data_type: String
    tests:
    - not_null
  - {name: fees_total, description: Sum of monthly fees for users in this cohort., data_type: Float64}
  - {name: users_cnt,  description: Number of users with >$0 monthly fees in cohort., data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - month
      - symbol
      - cohort

