# ---------- Cross-stream totals ----------

- name: fct_revenue_active_users_totals_weekly
  description: |
    Weekly cross-stream active-user totals (no cohort split).
    A user is counted once per week if their trailing-52w fees summed across
    all streams (holdings + sDAI + GPay) is >= $6 — the "meaningfully active
    revenue-generating user" threshold from the Dune methodology.
  columns:
  - name: week
    description: Week start.
    data_type: Date
    tests:
    - not_null
    - unique
  - {name: users_cnt,                 description: Unique users above the $6/year threshold.,             data_type: UInt64}
  - {name: annual_rolling_fees_total, description: Sum of rolling-52w fees from qualifying users.,       data_type: Float64}

- name: fct_revenue_active_users_totals_monthly
  description: |
    Monthly cross-stream active-user totals (no cohort split).
    Threshold is $0.50/month — the month-scaled equivalent of the yearly $6
    threshold (6 ÷ 12 ≈ 0.5).
  columns:
  - name: month
    description: First day of the month.
    data_type: Date
    tests:
    - not_null
    - unique
  - {name: users_cnt,  description: Unique users above the $0.50/month threshold., data_type: UInt64}
  - {name: fees_total, description: Sum of monthly fees from qualifying users., data_type: Float64}

- name: api_revenue_active_users_totals_weekly
  description: API view over fct_revenue_active_users_totals_weekly.
- name: api_revenue_active_users_totals_monthly
  description: API view over fct_revenue_active_users_totals_monthly.

