    sDAI / Savings xDAI stream — rolling-52-week imputed-yield "potential"
    revenue by user $-cohort bucket. Each user's imputed yield on their
    sDAI balance over the trailing 52 weeks is bucketed into an
    annualised $-band. "Potential" — DAO accruable share depends on
    savings-rate program settings.
  columns:
  - name: week
    description: Week start.
    data_type: Date
    tests:
    - not_null
  - name: cohort
    description: Annualised $-bucket.
    data_type: String
    tests:
    - not_null
  - {name: annual_rolling_fees_total, description: Sum of rolling-52w fees for users in this cohort., data_type: Float64}
  - {name: users_cnt,                 description: Users with >$0 rolling fees., data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - week
      - cohort

- name: fct_revenue_sdai_cohorts_monthly
  description: |
    sDAI / Savings xDAI stream — monthly imputed-yield "potential" revenue
    by user $-cohort bucket. Same source as the weekly table; monthly
    grain with month-scaled thresholds.
  columns:
  - name: month
    description: First day of the month.
    data_type: Date
    tests:
    - not_null
  - name: cohort
    description: Monthly $-bucket.
    data_type: String
    tests:
