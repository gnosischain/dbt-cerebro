- name: contracts_CowProtocol_GPv2AllowListAuthentication_events
  description: |
    Proxy contract — implementation ABI (GPv2AllowListAuthentication) was
    fetched and stored under the proxy address by fetch_and_insert_abi.
    Emits Solver allow-list management events (e.g. solver added/removed).
  columns: *event_columns
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
