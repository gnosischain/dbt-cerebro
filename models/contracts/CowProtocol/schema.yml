version: 2
models:

- name: contracts_CowProtocol_GPv2Settlement_events
  description: |
    Decoded event log stream from the CoW Protocol GPv2Settlement contract
    on Gnosis Chain (the main settlement contract — Trade, Settlement,
    OrderInvalidated, Interaction events). One row per emitted log.
    Backfilled from 2021-04-01 in 1-month batches.
  columns: &event_columns
  - name: block_number
    description: Block number containing the event.
    data_type: UInt64
  - name: block_timestamp
    description: Timestamp of the block in UTC.
    data_type: DateTime
  - name: transaction_hash
    description: Hash of the transaction that emitted the event.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the transaction.
    data_type: UInt64
  - name: contract_address
    description: Address of the contract emitting the event.
    data_type: String
  - name: event_name
    description: Name of the emitted event (from the ABI).
    data_type: String
  - name: decoded_params
    description: Map of decoded event parameter name to value (values are stringified; arrays are JSON strings).
    data_type: Map(String, String)
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2021-04-01"
      batch_months: 1

      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
