version: 2
models:

  - name: contracts_circles_registry
    description: |
      Registry of all Circles protocol contracts. Unions the static
      contracts_circles_registry_static seed (lower-cased addresses, ABI
      source, dynamic flag, start_blocktime, discovery source) with
      dynamically discovered factory children resolved via the
      resolve_factory_children('circles_v2') macro over the
      contracts_factory_registry plus the BaseGroupFactory, CMGroupDeployer,
      ERC20Lift, PaymentGatewayFactory, ERC20TokenOfferFactory and
      CirclesBackingFactory event tables.
    columns:
      - name: address
        description: Contract address (lowercased with 0x prefix)
        data_type: String
        tests: [not_null]
      - name: contract_type
        description: Logical contract type (e.g., HubV2, BaseGroupRuntime, PaymentGatewayRuntime)
        data_type: String
        tests: [not_null]
      - name: abi_source_address
        description: Address used to resolve the ABI for this contract
        data_type: String
      - name: is_dynamic
        description: Whether this contract was dynamically discovered from a factory (1) or statically defined (0)
        data_type: UInt8
      - name: start_blocktime
        description: Earliest block timestamp to consider for this contract
        data_type: String
      - name: discovery_source
        description: How this contract was discovered (static or factory event name)
        data_type: String
    meta:
      owner: analytics_team
      authoritative: false
    tests: [{elementary.schema_changes: {severity: warn, tags: [elementary]}}]

  # ──────────────────────────────────────────────
  # Events models
  # ──────────────────────────────────────────────

  - name: contracts_circles_v1_Hub_events
    description: Decoded event logs for the Circles v1 Hub contract.
    columns: &event_columns
      - name: block_number
        description: Block number containing the event
        data_type: UInt64
      - name: block_timestamp
        description: Timestamp of the block in UTC
        data_type: DateTime
      - name: transaction_hash
        description: Hash of the transaction that emitted the event
        data_type: String
      - name: transaction_index
        description: Index of the transaction within the block
        data_type: UInt64
      - name: log_index
        description: Index of the log within the block
        data_type: UInt64
      - name: contract_address
        description: Address of the contract emitting the event
        data_type: String
      - name: event_name
        description: Name of the emitted event
        data_type: String
      - name: decoded_params
        description: Map of decoded event parameters (name to value)
        data_type: Map(String, String)
    meta: &meta_events_v1
      owner: analytics_team
      authoritative: false
      full_refresh:
        start_date: "2020-10-01"
        batch_months: 6
    tests: [{elementary.schema_changes: {severity: warn, tags: [elementary]}}]

  - name: contracts_circles_v2_Hub_events
    description: Decoded event logs for the Circles v2 Hub contract.
