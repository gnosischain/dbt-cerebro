version: 2
models:

- name: contracts_UniswapV3_Factory_events
  description: |
    Decoded event log stream from the Uniswap V3 Factory contract on Gnosis.
    The factory emits PoolCreated events when a new pool is deployed; this
    stream is the source of truth for which Uniswap V3 pools exist on
    Gnosis. Produced via the standard decode_logs macro. Backfilled from
    2022-04-22 in 6-month batches.
  columns: &event_columns
  - name: block_number
    description: Block number containing the event.
    data_type: UInt64
  - name: block_timestamp
    description: Timestamp of the block in UTC.
    data_type: DateTime
  - name: transaction_hash
    description: Hash of the transaction that emitted the event.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the transaction.
    data_type: UInt64
  - name: contract_address
    description: Address of the contract emitting the event.
    data_type: String
  - name: event_name
    description: Name of the emitted event (from the ABI).
    data_type: String
  - name: decoded_params
    description: Map of decoded event parameter name to value (values are stringified; arrays are JSON strings).
    data_type: Map(String, String)
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2022-04-22"
      batch_months: 6

- name: contracts_UniswapV3_Pool_events
  description: |
    Decoded event log stream from Uniswap V3 Pool contracts on Gnosis. Pool
    addresses are dynamically selected from the contracts_whitelist seed
    (both token0 and token1 must be whitelisted to be included). Emits
    Swap, Mint, Burn, Collect, Initialize events. Produced via the standard
    decode_logs macro.
  columns: *event_columns
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2022-04-22"
      batch_months: 6

- name: contracts_UniswapV3_NonfungiblePositionManager_events
  description: |
    Decoded events from the Uniswap V3 NonfungiblePositionManager contract
    (0xae8fbe656a77519a7490054274910129c9244fa3) on Gnosis Chain. Decodes
    IncreaseLiquidity, DecreaseLiquidity, Transfer (ERC-721), and Collect
    events. Used by the UBO pipeline to attribute pool liquidity positions
    to individual LPs via tokenId ownership tracking.
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2022-04-22"
      batch_months: 1

- name: contracts_UniswapV3_Pool_events_live
  description: >
    Plain view over `execution_live.logs` that decodes Uniswap V3 Pool events
    in near-real-time. Materialized as a view (not a materialized_view) because
    the cryo-live indexer populates logs via bulk part attaches that do not fire
    MV triggers. The source is pre-filtered to the last 4h (relative to the
    source HWM, not wall-clock) so the decode_logs scan stays fast instead of
    covering the full 48h TTL. The filter lands inside the macro's FROM clause
    — before the dedup window function and ABI join — which is the only position
    where ClickHouse can use it for partition/granule skipping.
  columns: *event_columns
