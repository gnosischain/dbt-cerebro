version: 2
models:

- name: contracts_BalancerV2_Vault_events
  description: |
    Decoded event log stream from the Balancer V2 Vault contract on Gnosis
    Chain. One row per emitted log; decoded_params is a Map(String, String)
    with the event-specific payload (PoolBalanceChanged, PoolBalanceManaged,
    Swap, TokensRegistered, etc.). Produced via the standard decode_logs
    macro against the Vault ABI. Backfilled from 2021-01-01 in 6-month
    batches.
  columns: &event_columns
  - name: block_number
    description: Block number containing the event.
    data_type: UInt64
  - name: block_timestamp
    description: Timestamp of the block in UTC.
    data_type: DateTime
  - name: transaction_hash
    description: Hash of the transaction that emitted the event.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the transaction.
    data_type: UInt64
  - name: contract_address
    description: Address of the contract emitting the event.
    data_type: String
  - name: event_name
    description: Name of the emitted event (from the ABI).
    data_type: String
  - name: decoded_params
    description: Map of decoded event parameter name to value (values are stringified; arrays are JSON strings).
    data_type: Map(String, String)
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2021-01-01"
      batch_months: 1

      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: contracts_BalancerV2_Vault_events_live
  description: >
    Plain view over `execution_live.logs` that decodes Balancer V2 Vault events
    in near-real-time. Same approach as `contracts_UniswapV3_Pool_events_live`:
    plain view (not MV) because cryo-live bulk attaches don't fire MV triggers,
    source pre-filtered to last 4h from source HWM for decode performance.
  columns: *event_columns
  meta:
    full_refresh:
      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_number
      - transaction_index
      - log_index

- name: contracts_BalancerV2_pool_registry
  description: |
    Registry of all Balancer V2 pools (from the Vault PoolRegistered event),
    used by contracts_BalancerV2_Pool_events to decode pool-level events. Every
    pool maps to a single reference ABI (abi_source_address) because all V2 pool
    types share the BasePool SwapFeePercentageChanged / ProtocolFeePercentageCacheUpdated
    events; the reference pool's two events are registered once in the
    event_signatures seed.
  columns:
  - name: address
    description: Balancer V2 pool contract address (lowercase, 0x-prefixed).
    data_type: String
  - name: contract_type
    description: Always 'BalancerV2Pool'; the decode_logs contract_type_filter.
    data_type: String
  - name: abi_source_address
    description: Reference pool whose ABI (event signatures) is shared by all V2 pools.
    data_type: String

- name: contracts_BalancerV2_Pool_events
  description: |
    Pool-level Balancer V2 events decoded from execution.logs across all pools in
    contracts_BalancerV2_pool_registry. Carries the swap-fee rate
    (SwapFeePercentageChanged) and protocol-fee cut (ProtocolFeePercentageCacheUpdated)
    that the Vault Swap event does not expose. Used to compute true Balancer V2
    LP fees in int_execution_pools_fees_daily. Backfilled from 2021-01-01 in
    1-month batches; the event_name_filter keeps the raw-log scan to these rare
    config events.
  columns: *event_columns
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2021-01-01"
      batch_months: 1

      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
