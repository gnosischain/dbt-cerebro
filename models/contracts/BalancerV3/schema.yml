version: 2
models:

- name: contracts_BalancerV3_Vault_events
  description: |
    Decoded event log stream from the Balancer V3 Vault contract on Gnosis
    Chain. One row per emitted log; decoded_params is a Map(String, String)
    with event-specific payload (includes pool address, amounts arrays,
    swap-fee amount arrays, and wrap/unwrap fields). Produced via the
    standard decode_logs macro. Backfilled from 2024-01-01 in 6-month batches.
  columns: &event_columns
  - name: block_number
    description: Block number containing the event.
    data_type: UInt64
  - name: block_timestamp
    description: Timestamp of the block in UTC.
    data_type: DateTime
  - name: transaction_hash
    description: Hash of the transaction that emitted the event.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the transaction.
    data_type: UInt64
  - name: contract_address
    description: Address of the contract emitting the event.
    data_type: String
  - name: event_name
    description: Name of the emitted event (from the ABI).
    data_type: String
  - name: decoded_params
    description: Map of decoded event parameter name to value (values are stringified; arrays are JSON strings).
    data_type: Map(String, String)
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2024-01-01"
      batch_months: 1

- name: contracts_BalancerV3_Vault_events_live
  description: >
    Plain view over `execution_live.logs` that decodes Balancer V3 Vault events
    in near-real-time. Same approach as `contracts_UniswapV3_Pool_events_live`:
    plain view (not MV) because cryo-live bulk attaches don't fire MV triggers,
    source pre-filtered to last 4h from source HWM for decode performance.
  columns: *event_columns
