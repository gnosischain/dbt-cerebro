version: 2
models:

- name: contracts_sdai_events
  description: Decoded event logs from the sDAI (Savings xDAI) ERC-4626 vault contract on Gnosis. Thin wrapper around the decode_logs macro; one row per emitted log.
  columns:
  - name: block_number
    description: Number of the block containing the event.
    data_type: Nullable(UInt32)
  - name: block_timestamp
    description: Timestamp of the block when the event was emitted, in UTC.
    data_type: DateTime64(0, 'UTC')
  - name: transaction_hash
    description: Hash of the transaction that emitted the event.
    data_type: Nullable(String)
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: Nullable(UInt32)
  - name: log_index
    description: Index of the log within the block, used to order events.
    data_type: Nullable(UInt32)
  - name: contract_address
    description: Address of the contract that emitted the event.
    data_type: Nullable(String)
  - name: event_name
    description: Decoded event name; empty string when the event signature is not registered in event_signatures.
    data_type: String
  - name: decoded_params
    description: Map of decoded event parameters (parameter name to string value); keys vary by event type.
    data_type: Map(String, Nullable(String))
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2023-09-01"
      batch_months: 6
      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: contracts_ocsdai_events
  description: |
    Decoded event logs for the OpenCover OC-sDAI vault ("Covered Savings xDAI",
    CoveredMetavault, 0x0ac34fe133bde3a2ef589a18a4e10b6a7d253829). ERC-4626 /
    async ERC-7540 vault whose asset() is sDAI. Standard ERC-4626
    Deposit(sender,owner,assets,shares) and Withdraw(...,assets,shares) events
    are decoded here and consumed by int_yields_ocsdai_share_price_daily to
    reconstruct the vault share price for the revenue sDAI look-through.
  columns:

  - name: block_timestamp
    description: The timestamp when the block was mined, in UTC.
    data_type: DateTime

  - name: log_index
    description: The index of the log within the block, used to order logs.
    data_type: UInt64

  - name: transaction_hash
    description: The hash of the transaction associated with the event.
    data_type: String

  - name: contract_address
    description: The address of the contract emitting the event.
    data_type: String

  - name: event_name
    description: The name of the event emitted.
    data_type: String

  - name: decoded_params
    description: Map of decoded event parameters (names to string values).
    data_type: JSON

  - name: block_number
    description: The number of the block containing the event.
    data_type: UInt64

  - name: transaction_index
    description: The index of the transaction within the block.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2026-03-01"
      batch_months: 6
      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: contracts_wxdai_calls
  description: Decoded transaction-level calls to the WXDAI contract on Gnosis. Thin wrapper around the decode_calls macro; one row per transaction calling the contract.
  columns:
  - name: block_number
    description: Number of the block containing the transaction.
    data_type: Nullable(UInt32)
  - name: block_timestamp
    description: Timestamp when the block was mined, in UTC.
    data_type: DateTime64(0, 'UTC')
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: Nullable(String)
  - name: contract_address
    description: Address of the contract that was called.
    data_type: Nullable(String)
  - name: nonce
    description: Nonce of the sending account for this transaction.
    data_type: Nullable(UInt64)
  - name: gas_price
    description: Gas price of the transaction, in wei.
    data_type: Nullable(UInt64)
  - name: value
    description: Native value sent with the call, in wei.
    data_type: Nullable(String)
  - name: function_name
    description: Decoded function name; empty string when the function signature is not registered in function_signatures.
    data_type: String
  - name: decoded_input
    description: Map of decoded function input arguments (argument name to string value); keys vary by function.
    data_type: Map(String, Nullable(String))
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2020-07-01"
      batch_months: 6
      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
