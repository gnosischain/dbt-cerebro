version: 2
models:

- name: contracts_GBCDeposit_calls
  description: Decoded transaction-level calls to the Gnosis Beacon Chain Deposit contract. Thin wrapper around the decode_calls macro; one row per transaction calling the contract.
  columns:
  - name: block_number
    description: Number of the block containing the transaction.
    data_type: Nullable(UInt32)
  - name: block_timestamp
    description: Timestamp when the block was mined, in UTC.
    data_type: DateTime64(0, 'UTC')
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: Nullable(String)
  - name: contract_address
    description: Address of the contract that was called.
    data_type: Nullable(String)
  - name: nonce
    description: Nonce of the sending account for this transaction.
    data_type: Nullable(UInt64)
  - name: gas_price
    description: Gas price of the transaction, in wei.
    data_type: Nullable(UInt64)
  - name: value
    description: Native value sent with the call, in wei.
    data_type: Nullable(String)
  - name: function_name
    description: Decoded function name; empty string when the function signature is not registered in function_signatures.
    data_type: String
  - name: decoded_input
    description: Map of decoded function input arguments (argument name to string value); keys vary by function.
    data_type: Map(String, Nullable(String))
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2021-12-01"
      batch_months: 2
      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: contracts_GBCDeposit_events
  description: Decoded event logs from the Gnosis Beacon Chain Deposit contract (DepositEvent). Thin wrapper around the decode_logs macro; one row per emitted log.
  columns:
  - name: block_number
    description: Number of the block containing the event.
    data_type: Nullable(UInt32)
  - name: block_timestamp
    description: Timestamp of the block when the event was emitted, in UTC.
    data_type: DateTime64(0, 'UTC')
  - name: transaction_hash
    description: Hash of the transaction that emitted the event.
    data_type: Nullable(String)
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: Nullable(UInt32)
  - name: log_index
    description: Index of the log within the block, used to order events.
    data_type: Nullable(UInt32)
  - name: contract_address
    description: Address of the contract that emitted the event.
    data_type: Nullable(String)
  - name: event_name
    description: Decoded event name; empty string when the event signature is not registered in event_signatures.
    data_type: String
  - name: decoded_params
    description: Map of decoded event parameters (parameter name to string value); keys vary by event type (e.g. pubkey, withdrawal_credentials, amount, signature, index for DepositEvent).
    data_type: Map(String, Nullable(String))
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2021-12-01"
      batch_months: 2
      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
