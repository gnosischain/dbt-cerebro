version: 2
models:

- name: contracts_aaveV3_PoolInstance_events
  description: Decoded event logs from the Aave V3 Pool (PoolInstance) contract on Gnosis. Thin wrapper around the decode_logs macro; one row per emitted log.
  columns:
  - name: block_number
    description: Number of the block containing the event.
    data_type: Nullable(UInt32)
  - name: block_timestamp
    description: Timestamp of the block when the event was emitted, in UTC.
    data_type: DateTime64(0, 'UTC')
  - name: transaction_hash
    description: Hash of the transaction that emitted the event.
    data_type: Nullable(String)
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: Nullable(UInt32)
  - name: log_index
    description: Index of the log within the block, used to order events.
    data_type: Nullable(UInt32)
  - name: contract_address
    description: Address of the contract that emitted the event.
    data_type: Nullable(String)
  - name: event_name
    description: Decoded event name; empty string when the event signature is not registered in event_signatures.
    data_type: String
  - name: decoded_params
    description: Map of decoded event parameters (parameter name to string value); keys vary by event type.
    data_type: Map(String, Nullable(String))
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2023-10-04"
      batch_months: 6
      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: contracts_aaveV3_AToken_events
  description: Decoded event logs from Aave V3 aToken contracts on Gnosis (aGnoGNO, aGnoWXDAI, aGnosDAI, aGnoUSDC, aGnoEURe, aGnoUSDCe). Key events include BalanceTransfer (scaled balance movements between users), Transfer (ERC20), Mint, Burn, and Initialized.
  columns:
  - name: block_number
    description: Number of the block containing the event.
    data_type: Nullable(UInt32)
  - name: block_timestamp
    description: Timestamp of the block when the event was emitted, in UTC.
    data_type: DateTime64(0, 'UTC')
  - name: transaction_hash
    description: Hash of the transaction that emitted the event.
    data_type: Nullable(String)
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: Nullable(UInt32)
  - name: log_index
    description: Index of the log within the block, used to order events.
    data_type: Nullable(UInt32)
  - name: contract_address
    description: Address of the aToken contract that emitted the event.
    data_type: Nullable(String)
  - name: event_name
    description: Name of the event emitted, e.g. BalanceTransfer, Transfer, Mint, Burn.
    data_type: String
  - name: decoded_params
    description: Map of decoded event parameters (keys and values vary by event type).
    data_type: Map(String, Nullable(String))
  meta:
    owner: analytics-team
    authoritative: false
    full_refresh:
      start_date: "2023-10-04"
      batch_months: 6
      incremental:
        enabled: true
        date_column: block_timestamp
        batch_days: 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
