version: 2
models:

- name: api_probelab_clients_cloud_daily
  description: The `api_probelab_clients_cloud_daily` view aggregates daily counts of crawler instances by client type and cloud provider, supporting operational monitoring and capacity planning for Probelab
    clients.
  columns:

  - name: date
    description: The date representing the start of the day for the aggregated data, in UTC.
    data_type: DateTime64
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: client
    description: The version type of the client agent, indicating different client categories or versions.
    data_type: String

  - name: cloud
    description: The cloud provider where the crawler instances are hosted, such as AWS, GCP, or Azure.
    data_type: String

  - name: value
    description: The integer count of crawler instances for the given date, client, and cloud, representing daily activity.
    data_type: Int32
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
