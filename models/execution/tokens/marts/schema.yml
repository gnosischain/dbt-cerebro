- name: fct_execution_tokens_top_holders_ranked
  description: >
    Latest-day snapshot of top-500 token holders per token ranked by USD balance.
    Combines int_execution_tokens_balances_daily (direct holders, with known containers
    excluded via LEFT ANTI JOIN on fct_ubo_known_containers_daily) and
    fct_ubo_supply_claims_daily (UBO-unwound holders) for the single latest date.
    Uses scalar subqueries in WHERE for partition pruning rather than CROSS JOIN,
    keeping the scan to one date partition. Materialized as a table so
    fct_execution_tokens_top_holders_latest can drive its 7d-ago lookup from
    this small result set instead of re-scanning all holders.
  meta:
    owner: analytics_team
    authoritative: false
  columns:
  - name: token_address
    description: Contract address of the token.
    data_type: String
  - name: symbol
    description: Token symbol.
    data_type: String
  - name: token_class
    description: Token classification.
    data_type: String
  - name: address
    description: Holder wallet or contract address. For Aave/Spark unwound rows this is the individual lender, not the aToken contract.
    data_type: String
  - name: balance
    description: Token balance in native units.
    data_type: Float64
  - name: balance_usd
    description: Token balance in USD.
    data_type: Float64
  - name: unwound_from
    description: Array of container addresses this row was unwound from. Empty for direct holders.
    data_type: Array(String)
  - name: pct_of_total
    description: Holder's balance as percentage of total token supply by USD.
    data_type: Float64
  - name: rank
    description: Holder rank within token, ordered by balance_usd descending (1 = largest).
    data_type: UInt64

- name: fct_execution_tokens_top_holders_latest
  description: >
    Latest-day snapshot of token holders ranked by USD balance, with concentration
    metrics (pct_of_total, cumulative_pct), 7-day balance change, and address labels
    from the crawlers pipeline. One row per (token_address, address). Top-N
    reflects ultimate beneficial owners — pool contracts are replaced with
    individual end-holders via the upstream UBO pipeline; all implemented phases
    (Aave, Balancer, Uniswap V3, Swapr V3) plug in with no change here.

    The 7-day delta is computed by driving the lookup FROM fct_execution_tokens_top_holders_ranked
    (small — top 500 per token) into 1-day slices of int_execution_tokens_balances_daily and
    fct_ubo_supply_claims_daily. ClickHouse builds a hash map from the ranked addresses and
    probes the 7d-ago partition, so only the matching rows are ever aggregated — avoiding
    the full-holder scan that previously caused OOM at 10.8 GiB.
  meta:
    owner: analytics_team
    authoritative: false
  columns:
  - name: rank
    description: Holder rank within token, ordered by balance_usd descending.
    data_type: UInt64
  - name: token_address
    description: Contract address of the token (lowercase).
    data_type: String
  - name: symbol
    description: Token symbol (e.g. sDAI, WETH, GNO).
    data_type: String
  - name: token_class
    description: Token classification (STABLECOIN, OTHERS).
    data_type: String
  - name: address
    description: Holder wallet or contract address.
    data_type: String
  - name: label
    description: Project label from crawlers_data_labels (e.g. Safe, Balancer, EOA). NULL if unlabeled.
    data_type: String
  - name: label_sector
    description: Sector from crawlers_data_labels (e.g. Wallets & AA, DEX, EOAs). NULL if unlabeled.
    data_type: String
  - name: balance
    description: Token balance in native units.
    data_type: Float64
  - name: balance_usd
    description: Token balance in USD.
    data_type: Float64
  - name: pct_of_total
    description: Holder's balance as a percentage of total token supply (by USD), rounded to 4 decimals.
    data_type: Float64
  - name: cumulative_pct
    description: Running sum of pct_of_total from rank 1 downward — shows what share the top N holders control.
    data_type: Float64
  - name: change_usd_7d
    description: USD balance change vs 7 days ago. Positive = accumulating, negative = exiting. For unwound rows the comparison is against the same UBO's lent balance 7 days ago.
    data_type: Float64
  - name: unwound_from
    description: Array of container addresses this row was unwound from (e.g. ['agnoSDAI']). Empty array means the holder is direct, not unwound from any container.
    data_type: Array(String)
  - name: is_terminal_ubo
    description: 1 = label-confirmed end-holder (EOA, Safe/AA, bridge, gpay). 0 = labeled but undecomposed container — Phase 2+ target. NULL = unclassified.
    data_type: Nullable(UInt8)

- name: api_execution_tokens_top_holders_latest
  description: >
    Thin API view over fct_execution_tokens_top_holders_latest. Returns all holders
    ranked by balance, with concentration and label columns. Dashboard applies
    WHERE symbol = {filter} and LIMIT as needed.
  meta:
    owner: analytics_team
    authoritative: false
  columns:
  - name: rank
    description: Holder rank within token, ordered by balance_usd descending.
    data_type: UInt64
  - name: token_address
    description: Contract address of the token (lowercase).
    data_type: String
  - name: symbol
    description: Token symbol.
    data_type: String
  - name: token_class
    description: Token classification.
    data_type: String
  - name: address
    description: Holder wallet or contract address.
    data_type: String
  - name: label
    description: Project label from crawlers_data_labels. NULL if unlabeled.
    data_type: String
  - name: label_sector
    description: Sector from crawlers_data_labels. NULL if unlabeled.
    data_type: String
  - name: balance
    description: Token balance in native units.
    data_type: Float64
  - name: balance_usd
    description: Token balance in USD.
    data_type: Float64
  - name: pct_of_total
    description: Holder's share of total token supply as percentage.
    data_type: Float64
  - name: cumulative_pct
    description: Running cumulative share of supply from rank 1 downward.
    data_type: Float64
  - name: change_usd_7d
    description: USD balance change vs 7 days ago.
    data_type: Float64
  - name: unwound_from
    description: Array of container addresses this row was unwound from. Empty for direct holders.
    data_type: Array(String)
  - name: is_terminal_ubo
    description: 1 = label-confirmed end-holder, 0 = undecomposed labeled container, NULL = unclassified.
    data_type: Nullable(UInt8)
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  tests:
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary

- name: fct_execution_tokens_ubo_coverage_latest
  description: >
    Per-token diagnostic of how much of the supply has been resolved to a
    real end-holder (UBO) versus still sitting in a labeled-but-undecomposed
    container. Materialized as a table — the underlying composition
    (balances_daily LEFT ANTI JOIN containers UNION ALL supply_claims, then
    LEFT JOIN labels over millions of rows) is too heavy for a view.
    After Phase 1 only Aave V3 + SparkLend reserves are decomposed;
    DEX vaults / Curve pools / Uni V3 NPM remain in pct_known_container until
    later phases.
  meta:
    owner: analytics_team
    authoritative: false
  columns:
  - name: token_address
    description: Contract address of the token (lowercase).
    data_type: String
  - name: symbol
    description: Token symbol.
    data_type: String
  - name: token_class
    description: Token classification.
    data_type: String
  - name: total_usd
    description: Total USD value of all positive-balance holders for this token on the latest snapshot date.
    data_type: Float64
  - name: pct_direct_terminal
    description: Share of supply held by direct holders that are label-confirmed terminals (EOAs, Safes, bridges, gpay).
    data_type: Float64
  - name: pct_unwound_terminal
    description: Share of supply unwound out of a container (Aave/Spark in Phase 1) into label-confirmed terminal addresses.
    data_type: Float64
  - name: pct_unwound_other
    description: Share of supply unwound but landing on an unclassified or still-container address (e.g. an aave depositor that is itself another protocol).
    data_type: Float64
  - name: pct_known_container
    description: Share of supply still held by labeled containers we have NOT yet decomposed. Phase 2+ work.
    data_type: Float64
  - name: pct_unclassified
    description: Share of supply held by addresses with no label.
    data_type: Float64
  - name: pct_unwound_total
    description: Total share of supply that flowed through any unwind path (sum of pct_unwound_terminal + pct_unwound_other).
    data_type: Float64

- name: api_execution_tokens_ubo_coverage_latest
  description: >
    Thin API view over fct_execution_tokens_ubo_coverage_latest.
  meta:
    owner: analytics_team
    authoritative: false
  columns:
  - name: token_address
    description: Contract address of the token (lowercase).
    data_type: String
  - name: symbol
    description: Token symbol.
    data_type: String
  - name: token_class
    description: Token classification.
    data_type: String
  - name: total_usd
    description: Total USD value of all positive-balance holders for this token on the latest snapshot date.
    data_type: Float64
  - name: pct_direct_terminal
    description: Share of supply held by direct holders that are label-confirmed terminals.
    data_type: Float64
  - name: pct_unwound_terminal
    description: Share of supply unwound into label-confirmed terminal addresses.
    data_type: Float64
  - name: pct_unwound_other
    description: Share of supply unwound but landing on unclassified or container addresses.
    data_type: Float64
  - name: pct_known_container
    description: Share of supply still held by labeled containers not yet decomposed.
    data_type: Float64
  - name: pct_unclassified
    description: Share of supply held by addresses with no label.
    data_type: Float64
  - name: pct_unwound_total
    description: Total share of supply that flowed through any unwind path.
    data_type: Float64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
