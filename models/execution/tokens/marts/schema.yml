version: 2
models:

- name: api_execution_tokens_active_senders_daily
  description: This view provides daily counts of active senders per API token, enabling analysis of token engagement over time.
  meta:
    owner: analytics_team
    authoritative: false
  columns:

  - name: date
    description: The calendar date for which the active sender count is recorded.
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: token
    description: The identifier of the API token being analyzed.
    data_type: String

  - name: token_class
    description: The classification or category of the token, indicating its type or purpose.
    data_type: String

  - name: value
    description: The number of unique active senders associated with the token on the given date.
    data_type: UInt64

    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
