        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: token
    description: The identifier of the token for which the volume is reported.
    data_type: String

  - name: token_class
    description: The classification category of the token, such as utility or security token.
    data_type: String

  - name: value_native
    description: The total trading volume for the token on the given date in native token units.
