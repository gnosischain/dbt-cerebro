version: 2
models:

- name: int_execution_tokens_address_diffs_daily
  description: Calculates daily net token transfer deltas per address, aggregating inflows and outflows from int_execution_transfers_whitelisted_daily. Used by int_execution_tokens_balances_daily to compute running balances.
  columns:
  - name: date
    description: The calendar date for the recorded token transfer net delta.
    data_type: Date
    tests:
    - not_null
  - name: token_address
    description: The lowercase hexadecimal address of the token contract.
    data_type: String
  - name: symbol
    description: The token's trading symbol (e.g., GNO, WETH, USDC).
    data_type: String
  - name: token_class
    description: Classification of the token (e.g., NATIVE, STABLECOIN, GOVERNANCE).
    data_type: String
  - name: address
    description: The account address whose balance changed on this date.
    data_type: String
  - name: net_delta_raw
    description: Net change in token balance for the address in raw units (before decimal scaling).
    data_type: Int256
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      batch_months: 1
      stages:
        - name: all
          start_date: "2020-07-01"
          batch_months: 1000
          vars:
            symbol_exclude: "{{ var('symbol_exclude') }}"
    generated_by: dbt-schema-gen
    _generated_at: '2026-03-16T00:00:00.000000'
    _generated_fields:
    - description
    - columns.date.description
    - columns.token_address.description
    - columns.symbol.description
    - columns.token_class.description
    - columns.address.description
    - columns.net_delta_raw.description
    - columns.net_delta_raw.data_type

- name: int_execution_tokens_balances_daily
  description: Tracks daily token balances per address by applying cumulative net deltas from int_execution_tokens_address_diffs_daily. Joins with token prices to compute USD values. Used by downstream cohort, sector, and supply models.
  columns:
  - name: date
    description: The calendar date of the balance snapshot.
    data_type: Date
    tests:
    - not_null
  - name: token_address
    description: The lowercase hexadecimal address of the token contract.
    data_type: String
  - name: symbol
    description: The token's trading symbol (e.g., GNO, WETH, USDC).
    data_type: String
  - name: token_class
    description: Classification of the token (e.g., NATIVE, STABLECOIN, GOVERNANCE).
    data_type: String
  - name: address
    description: The account address holding the token balance.
    data_type: String
  - name: balance_raw
    description: Token balance in raw units (before decimal scaling).
    data_type: Int256
  - name: balance
    description: Token balance in native units (after applying token decimals).
    data_type: Float64
  - name: balance_usd
    description: Token balance converted to USD using daily price from int_execution_token_prices_daily.
    data_type: Nullable(Float64)
  meta:
    owner: analytics-team
    authoritative: false
    full_refresh:
      batch_months: 1
      stages:
        # WxDAI - very high volume, monthly
        - name: wxdai
          start_date: "2020-07-01"
          batch_months: 2
          vars:
            symbol: "WxDAI"
        # Major tokens - high volume, monthly
        - name: major_tokens1
          start_date: "2020-07-01"
          batch_months: 6
          vars:
            symbol: "GNO"
        - name: major_tokens2
          start_date: "2020-07-01"
          batch_months: 3
          vars:
            symbol: "WETH,WBTC"
        - name: major_tokens3
          start_date: "2020-07-01"
          batch_months: 3
          vars:
            symbol: "USDC"
        - name: major_tokens4
          start_date: "2020-07-01"
          batch_months: 6
          vars:
            symbol: "USDT"
        # Newer tokens - medium volume, monthly
        - name: newer_tokens
          start_date: "2022-01-01"
          batch_months: 1
          vars:
            symbol: "COW,sGNO,EURe,GBPe,sDAI"
        # smaller tokens - low volume, monthly
        - name: small_tokens
          start_date: "2023-01-01"
          batch_months: 12
          vars:
            symbol: "bCSPX,bNIU,bCOIN,bIB01,bIBTA,bHIGH,bC3M,SAFE,USDC.e,BRLA,BRZ,bTSLA,bMSTR,bNVDA,bGME,bGOOGL,bMSFT,bERNA"
        - name: tokens_2025
          start_date: "2025-01-01"
          batch_months: 12
          vars:
            symbol: "ZCHF,svZCHF"
    generated_by: dbt-schema-gen
    _generated_at: '2026-03-16T00:00:00.000000'
    _generated_fields:
    - description
    - columns.date.description
    - columns.token_address.description
    - columns.symbol.description
    - columns.token_class.description
    - columns.address.description
    - columns.balance_raw.description
    - columns.balance_raw.data_type
    - columns.balance.description
    - columns.balance.data_type
    - columns.balance_usd.description
    - columns.balance_usd.data_type

        # smaller tokens - low volume, monthly
      - name: small_tokens
        start_date: "2023-01-01"
        batch_months: 12
        vars:
          symbol: "bCSPX,bNIU,bCOIN,bIB01,bIBTA,bHIGH,bC3M,SAFE,USDC.e,BRLA,BRZ,bTSLA,bMSTR,bNVDA,bGME,bGOOGL,bMSFT,bERNA"
      - name: tokens_2025
        start_date: "2025-01-01"
        batch_months: 12
        vars:
          symbol: "ZCHF,svZCHF"
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_tokens_transfers_daily
  description: Aggregates daily transfer metrics per token from int_execution_transfers_whitelisted_daily, including volume, transfer counts, and unique sender/receiver counts. Supports dashboard analytics.
  columns:
  - name: date
    description: The calendar date for the aggregated transfer metrics.
    data_type: Date
    tests:
    - not_null
  - name: token_address
    description: The lowercase hexadecimal address of the token contract.
    data_type: String
  - name: symbol
    description: The token's trading symbol (e.g., GNO, WETH, USDC).
    data_type: String
  - name: token_class
    description: Classification of the token (e.g., NATIVE, STABLECOIN, GOVERNANCE).
    data_type: String
  - name: volume_token
    description: Total volume of tokens transferred on this date in native units.
    data_type: Float64
  - name: transfer_count
    description: Total number of transfer events for this token on this date.
    data_type: UInt64
  - name: ua_bitmap_state
    description: ClickHouse bitmap state for distinct sender counting via groupBitmapState.
    data_type: AggregateFunction(groupBitmap, UInt64)
  - name: active_senders
    description: Count of unique sender addresses on this date.
    data_type: UInt64
  - name: unique_receivers
    description: Count of unique receiver addresses on this date.
    data_type: UInt64
  meta:
    owner: analytics-team
    authoritative: false
    full_refresh:
      start_date: "2020-07-01"
      batch_months: 6
      stages:
        - name: all
          vars:
            symbol_exclude: "{{ var('symbol_exclude') }}"
    generated_by: dbt-schema-gen
    _generated_at: '2026-03-16T00:00:00.000000'
    _generated_fields:
    - description
    - columns.date.description
    - columns.token_address.description
    - columns.symbol.description
    - columns.token_class.description
    - columns.volume_token.description
    - columns.transfer_count.description
    - columns.ua_bitmap_state.description
    - columns.ua_bitmap_state.data_type
    - columns.active_senders.description
    - columns.unique_receivers.description

- name: int_execution_tokens_supply_holders_daily
  description: Daily supply and holder counts aggregated by token.
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2020-07-01"
      batch_months: 3
  columns:
  - name: date
    description: The specific date for which the token data is recorded.
    data_type: Date
    tests:
    - not_null
  - name: token_address
    description: The unique blockchain address identifying the token.
    data_type: String
  - name: symbol
    description: The token's trading symbol or abbreviation.
    data_type: String
  - name: token_class
    description: The classification or category of the token.
    data_type: String
  - name: supply
    description: The total circulating supply of the token on the given date.
    data_type: Float64
  - name: holders
    description: The number of unique addresses holding a positive balance.
    data_type: UInt64

  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_tokens_balance_cohorts_daily
  description: Daily token balance cohort distributions, segmenting holders into balance buckets.
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2020-07-01"
      batch_months: 1
  columns:
  - name: date
    description: The specific date for which the token balance data is recorded.
    data_type: Date
    tests:
    - not_null
  - name: token_address
    description: The lowercase hexadecimal address of the token contract.
    data_type: String
  - name: symbol
    description: The uppercase symbol representing the token.
    data_type: String
  - name: token_class
    description: The classification category of the token.
    data_type: String
  - name: cohort_unit
    description: The unit used for cohort bucketing ('usd' for balance_usd, 'native' for balance).
    data_type: String
    tests:
    - not_null
    - accepted_values:
        values: ['usd', 'native']
  - name: balance_bucket
    description: The balance range bucket (e.g., '0-10', '10-100', '100-1k').
    data_type: String
  - name: holders_in_bucket
    description: Count of unique holders within the balance bucket.
    data_type: UInt64
  - name: value_native_in_bucket
    description: Total native token balance held within the balance bucket.
    data_type: Float64
  - name: value_usd_in_bucket
    description: Total USD value held within the balance bucket.
    data_type: Float64

  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_tokens_balances_by_sector_daily
  description: Daily balances aggregated by sector labels for each token.
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2020-07-01"
      batch_months: 6
  columns:
  - name: date
    description: The specific date for which the data is recorded.
    data_type: Date
    tests:
    - not_null
  - name: token_address
    description: The lowercase hexadecimal address of the token.
    data_type: String
  - name: symbol
    description: The uppercase symbol representing the token.
    data_type: String
  - name: token_class
    description: The classification category of the token.
    data_type: String
  - name: sector
    description: The sector label for the addresses (e.g., 'DeFi', 'CEX', 'Unknown').
    data_type: String
  - name: supply
    description: Total token supply held by addresses in this sector.
    data_type: Float64
  - name: supply_usd
    description: Total USD value held by addresses in this sector.
    data_type: Float64
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
