version: 2

models:
- name: api_dao_treasury_kpi_total_holdings
  description: >
    KPI: Total USD value of GnosisDAO holdings on Gnosis Chain
    (wallet + lending). Returns single row with value and 7-day change_pct.
  columns:
  - name: value
    description: Total holdings in USD.
  - name: change_pct
    description: Percentage change vs 7 days ago.

- name: api_dao_treasury_kpi_non_gno_holdings
  description: >
    KPI: Total USD value of non-GNO assets held by GnosisDAO on Gnosis Chain.
    Excludes GNO, sGNO, spGNO, aGnoGNO. Used as NAV numerator.
  columns:
  - name: value
    description: Non-GNO holdings in USD.
  - name: change_pct
    description: Percentage change vs 7 days ago.

- name: api_dao_treasury_kpi_gno_held
  description: >
    KPI: Total GNO (including derivatives) held by GnosisDAO wallets on
    Gnosis Chain, in native GNO units.
  columns:
  - name: value
    description: GNO balance (native units).
  - name: change_pct
    description: Percentage change vs 7 days ago.

- name: api_dao_treasury_kpi_lending_total
  description: >
    KPI: Total USD value of GnosisDAO lending supply positions on Gnosis Chain
    across Aave V3 and SparkLend.
  columns:
  - name: value
    description: Lending TVL in USD.
  - name: change_pct
    description: Percentage change vs 7 days ago.

- name: api_dao_treasury_holdings_by_class_ts
  description: >
    Daily time series of GnosisDAO holdings on Gnosis Chain, stacked by
    asset class (GNO, Stablecoins, RWA, ETH, BTC, Other).
  columns:
  - name: date
    description: Date.
  - name: label
    description: Asset class label.
  - name: value
    description: Total USD value for the class on that date.

- name: api_dao_treasury_allocation_latest
  description: >
    Latest treasury allocation breakdown by token, grouped by asset class.
    Used for the allocation pie chart.
  columns:
  - name: token_class
    description: Asset class grouping.
  - name: token
    description: Token symbol.
  - name: value_usd
    description: USD value of holdings.
  - name: percentage
    description: Share of total portfolio (%).

- name: api_dao_treasury_holdings_detail_latest
  description: >
    Detailed list of all GnosisDAO positions on Gnosis Chain at the latest
    available date, one row per wallet-token-position combination.
  columns:
  - name: wallet_label
    description: Human-readable wallet name.
  - name: wallet_address
    description: Wallet address.
  - name: symbol
    description: Token symbol.
  - name: position_type
    description: "'wallet' or 'lending'."
  - name: protocol
    description: Lending protocol or empty.
  - name: balance
    description: Token balance in native units.
  - name: balance_usd
    description: USD value.
