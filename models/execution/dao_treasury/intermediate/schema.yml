version: 2

models:
- name: int_dao_treasury_holdings_daily
  description: >
    Daily GnosisDAO holdings on Gnosis Chain. Unions ERC-20 token balances
    (from int_execution_tokens_balances_daily) with lending supply positions
    (from int_execution_lending_aave_user_balances_daily) for the wallets
    listed in the dao_treasury_wallets seed. Each row is a
    (date, wallet, token, position_type) combination with USD valuation.
  meta:
    owner: analytics_team
  columns:
  - name: date
    data_type: Date
    description: Daily snapshot date.
  - name: wallet_address
    data_type: Nullable(String)
    description: Gnosis Chain address of the DAO wallet.
  - name: wallet_label
    data_type: String
    description: Human-readable wallet label from dao_treasury_wallets seed.
  - name: symbol
    data_type: String
    description: Token symbol.
  - name: token_class
    data_type: String
    description: >
      Token classification. For wallet holdings this comes from
      tokens_whitelist; for lending positions it is set to 'LENDING'.
  - name: position_type
    data_type: String
    description: "'wallet' for token balances, 'lending' for Aave/SparkLend supply."
  - name: protocol
    data_type: String
    description: "Lending protocol name (Aave V3, SparkLend) or empty for wallet holdings."
  - name: balance
    data_type: Float64
    description: Token balance in native units.
  - name: balance_usd
    data_type: Nullable(Float64)
    description: Balance in USD using daily token price. Null when no price available.
