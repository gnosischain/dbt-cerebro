  - name: volume_usd_filled
    data_type: Nullable(Float64)
  - name: volume_usd_priced
    data_type: Nullable(Float64)
  - name: n_filled_unpriced
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]

- name: api_execution_gnosis_app_gpay_topups_by_token_daily
  description: |
    FastAPI endpoint view of fct_execution_gnosis_app_gpay_topups_by_token_daily.
    Supports query params: token_bought_symbol, start_date, end_date.
  columns:
  - name: date
    data_type: Date
  - name: token_bought_symbol
    data_type: Nullable(String)
  - name: n_topups
    data_type: UInt64
  - name: n_ga_users
    data_type: UInt64
  - name: n_gp_wallets
    data_type: UInt64
  - name: volume_token_bought
    data_type: Nullable(Float64)
  - name: volume_usd
    data_type: Nullable(Float64)
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]

# ---------- Marketplace fact tables ----------

- name: fct_execution_gnosis_app_marketplace_buys_daily
  description: |
    Daily marketplace buys per offer, derived from
    int_execution_gnosis_app_marketplace_payments. Grain (date, offer_name).
  columns:
  - name: date
    data_type: Date
  - name: offer_name
    data_type: String
  - name: n_buys
    description: PaymentReceived events for this (date, offer_name).
    data_type: UInt64
  - name: n_payers
    description: Distinct GA payer addresses on this (date, offer_name).
    data_type: UInt64
  - name: volume_token
    description: Sum of amount (CRC human units) across buys on this day.
    data_type: Nullable(Float64)
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]

- name: fct_execution_gnosis_app_marketplace_buys_cumulative_daily
  description: |
    Cumulative marketplace buys and distinct payers per offer, computed as
    running window sums over a dense (offer × date) spine so series are
    continuous. Mirrors Dune query_6679414's Cumulative Buys / Cumulative
    Users window aggregates.

    n_buys / n_new_payers on each row is the per-day delta; cumulative_buys
    / cumulative_payers is the running total for that offer.
  columns:
  - name: date
    data_type: Date
  - name: offer_name
    data_type: String
  - name: n_buys
    data_type: UInt64
  - name: n_new_payers
    description: Distinct payers whose FIRST buy on this offer was this day.
    data_type: UInt64
  - name: cumulative_buys
    data_type: UInt64
  - name: cumulative_payers
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]

- name: fct_execution_gnosis_app_marketplace_offers_latest
  description: |
    Latest per-offer totals — one row per curated offer with lifetime
    n_buys, distinct payers, and first/last buy timestamps. Includes
    offers with zero buys (LEFT JOIN) so the dashboard leaderboard shows
    new listings too.
  columns:
  - name: offer_name
    data_type: String
  - name: gateway_address
    data_type: String
  - name: created_at
    data_type: DateTime
  - name: total_buys
    data_type: UInt64
  - name: total_payers
    data_type: UInt64
  - name: first_buy_at
    data_type: Nullable(DateTime)
  - name: last_buy_at
    data_type: Nullable(DateTime)
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]

