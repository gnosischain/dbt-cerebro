# ---------- Users fact tables ----------

- name: fct_execution_gnosis_app_users_daily
  description: |
    Daily user counts. new_users = distinct addresses whose first-ever
    activity hit was on this date; active_users = distinct addresses with
    any non-onboard activity; returning_users = active today AND had any
    activity in the prior 7 days; reactivated_users = active today,
    inactive for prior 30 days, but active before that. Dense calendar
    spine so cumulative_users is always continuous.
  columns:
  - name: date
    description: Calendar date (UTC).
    data_type: Date
  - name: new_users
    description: Distinct addresses whose first-ever activity was in this period.
    data_type: UInt64
  - name: cumulative_users
    description: Running total of distinct users up to and including this period.
    data_type: UInt64
  - name: active_users
    description: Distinct addresses with any non-onboard activity in this period.
    data_type: UInt64
  - name: returning_users
    description: Active this period and also active in the immediately prior period.
    data_type: UInt64
  - name: reactivated_users
    description: Active this period after a dormancy gap, having been active earlier.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: fct_execution_gnosis_app_users_weekly
  description: Weekly cohort of users (ISO Mon-start). Returning = active this week AND previous week. Reactivated = active this week, inactive for prior 4 weeks.
  columns:
  - name: week
    description: Monday-aligned start of the week (UTC).
    data_type: Date
  - name: new_users
    description: Distinct addresses whose first-ever activity was in this period.
    data_type: UInt64
  - name: cumulative_users
    description: Running total of distinct users up to and including this period.
    data_type: UInt64
  - name: active_users
    description: Distinct addresses with any non-onboard activity in this period.
    data_type: UInt64
  - name: returning_users
    description: Active this period and also active in the immediately prior period.
    data_type: UInt64
  - name: reactivated_users
    description: Active this period after a dormancy gap, having been active earlier.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: fct_execution_gnosis_app_users_monthly
  description: Monthly cohort of users. Returning = active this month AND previous month. Reactivated = active this month, inactive for prior 2 months, active before that.
  columns:
  - name: month
    description: First day of the month (UTC).
    data_type: Date
  - name: new_users
    description: Distinct addresses whose first-ever activity was in this period.
    data_type: UInt64
  - name: cumulative_users
    description: Running total of distinct users up to and including this period.
    data_type: UInt64
  - name: active_users
    description: Distinct addresses with any non-onboard activity in this period.
    data_type: UInt64
  - name: returning_users
    description: Active this period and also active in the immediately prior period.
    data_type: UInt64
  - name: reactivated_users
    description: Active this period after a dormancy gap, having been active earlier.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

# ---------- Retention + churn ----------

- name: fct_execution_gnosis_app_retention_monthly
  description: |
    Cohort retention grid for the Gnosis App onboard cohort.

    Modeling assumptions:
      * cohort_month = month of the user's 'onboard' row (first-ever heuristic
        hit), NOT their first transactional activity.
      * activity_month = month of any subsequent non-onboard activity. Only the
        lower triangle is kept (activity_month >= cohort_month) so on-chain
        history predating the GA onboard does not create spurious cells.
      * initial_users (the retention denominator) = the onboard-cohort size,
        i.e. distinct users whose onboard month is cohort_month. It is
        deliberately NOT max(users) over activity months (peak-normalisation,
        which let retention exceed 100%) and NOT the month-0 actives: the
        numerator counts ANY cohort user active in activity_month (not a fixed
        followed sub-cohort), so only the full onboard cohort bounds it <= 100%.
      * retention_pct therefore reads as "% of the onboard cohort active in
        month N" (return/adoption), not the conditional stickiness of a followed
        sub-cohort.
      * amount_retention_pct anchors on the cohort's earliest activity-month
        amount (argMin over activity_month).
  columns:
  - name: cohort_month
    description: Onboard month (toStartOfMonth of the first 'onboard' row); the cohort anchor.
    data_type: Date
  - name: activity_month
    description: Month in which the cohort's subsequent activity is measured (>= cohort_month).
    data_type: Date
  - name: months_since
    description: Whole months between cohort_month and activity_month (0 = onboard month).
    data_type: Int32
  - name: users
    description: Distinct cohort users active in this cell (subset of initial_users).
    data_type: UInt64
  - name: initial_users
    description: Onboard-cohort size = distinct users onboarded in cohort_month (fixed retention denominator; numerator is a subset so retention_pct <= 100%).
    data_type: UInt64
  - name: retention_pct
    description: users / initial_users x 100 = share of the onboard cohort active in activity_month.
    data_type: Float64
  - name: amount_retention_pct
    description: Activity USD as a share of the cohort's earliest activity-month USD (argMin anchor) x100.
    data_type: Nullable(Float64)
  - name: amount_usd
    description: USD amount transacted by the cohort in activity_month.
    data_type: Nullable(Float64)
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: fct_execution_gnosis_app_retention_by_action_monthly
  description: |
    Cohort retention split by activity_kind (swap_filled / swap_signed / topup /
    marketplace_buy / token_offer_claim / circles_*). Same onboard-cohort anchor
    and denominator as fct_execution_gnosis_app_retention_monthly.

    Modeling assumptions:
      * cohort_month = the user's GLOBAL onboard month (first 'onboard' row) —
        the SAME anchor for every action, so denominators are comparable across
        action types.
      * users (numerator) = distinct cohort users who did THIS activity_kind in
        activity_month (lower triangle only, activity_month >= cohort_month).
      * initial_users (denominator) = onboard-cohort size = distinct users
        onboarded in cohort_month. NOT max(users) over months (peak-normalisation
        -> retention > 100%) and NOT the month-0 action adopters: because the
        numerator counts any cohort user doing the action each month (not a fixed
        followed sub-cohort), a later month can have more adopters than month 0,
        so only the full onboard cohort bounds the ratio at <= 100%.
      * retention_pct reads as "% of the onboard cohort doing this action in
        month N" (action adoption), not conditional stickiness. Small/rare
        actions therefore show low (correct) percentages, not ~100%.
  columns:
  - name: activity_kind
    description: Type of activity (swap_filled / swap_signed / topup / marketplace_buy / token_offer_claim / circles_* / ...).
    data_type: String
  - name: cohort_month
    description: Onboard month (first 'onboard' row); shared across all activity_kinds.
    data_type: Date
  - name: activity_month
    description: Month in which the cohort's activity for this kind is measured (>= cohort_month).
    data_type: Date
  - name: months_since
    description: Whole months between cohort_month and activity_month (0 = onboard month).
    data_type: Int32
  - name: users
    description: Distinct cohort users who did this activity_kind in activity_month.
    data_type: UInt64
  - name: initial_users
    description: Onboard-cohort size = distinct users onboarded in cohort_month (same across actions; fixed denominator).
    data_type: UInt64
  - name: retention_pct
    description: users / initial_users x 100 = share of the onboard cohort doing this action in activity_month.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: fct_execution_gnosis_app_churn_monthly
  description: |
    Monthly churn & retention segments. Two scopes — 'Any' (any non-onboard
    activity) and 'Swap' (swap_signed/swap_filled only). Segments: new,
    retained (active M-1 and M), returning (active M and earlier-not-M-1),
    churned (active M, not M+1). Port of fct_execution_gpay_churn_monthly.
  columns:
  - name: scope
    description: Metric scope label.
    data_type: String
  - name: month
    description: First day of the month (UTC).
    data_type: Date
  - name: new_users
    description: Distinct addresses whose first-ever activity was in this period.
    data_type: UInt64
  - name: retained_users
    description: Active in this month and the previous month.
    data_type: UInt64
  - name: returning_users
    description: Active this period and also active in the immediately prior period.
    data_type: UInt64
  - name: churned_users
    description: Active this month but not the next.
    data_type: UInt64
  - name: total_active
    description: Total distinct active users in the period.
    data_type: UInt64
  - name: churn_rate
    description: Share of users churned into the next period (percent).
    data_type: Float64
  - name: retention_rate
    description: Share of users retained into the next period (percent).
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
  - dbt_utils.expression_is_true:
      name: churn_retention_complementary
      expression: "churn_rate + retention_rate BETWEEN 80 AND 120"
      config:
        severity: warn
        where: "month > '2025-12-01' AND month < toStartOfMonth(today())"

