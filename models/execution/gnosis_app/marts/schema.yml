- name: fct_execution_gnosis_app_token_offer_claims_cohort_monthly
  description: |
    First-claim cohort × subsequent-claim activity retention. cohort_month
    = month of user's first token-offer claim. retention_pct = users still
    claiming in the given activity_month / cohort_initial × 100. Same shape
    as fct_execution_gnosis_app_gpay_topups_cohort_monthly.
  columns:
  - name: cohort_month
    description: Month of the user's first activity (cohort anchor).
    data_type: Date
  - name: activity_month
    description: Month in which the cohort's subsequent activity is measured.
    data_type: Date
  - name: months_since
    description: Whole months between cohort_month and activity_month.
    data_type: Int32
  - name: users
    description: Distinct users in this cell.
    data_type: UInt64
  - name: initial_users
    description: Size of the cohort at its anchor period (retention denominator).
    data_type: UInt64
  - name: retention_pct
    description: users / initial_users x 100.
    data_type: Float64
  - name: amount_retention_pct
    description: Retained USD amount as a share of the cohort's initial amount (x100).
    data_type: Nullable(Float64)
  - name: amount_usd
    description: USD amount.
    data_type: Nullable(Float64)
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: fct_execution_gnosis_app_gpay_topups_cohort_monthly
  description: |
    First-top-up cohort × subsequent-top-up retention.

    Top-up definition is owned by int_execution_gnosis_app_gpay_topups (a GP
    "Crypto Deposit" into a currently-GA-owned wallet; see that model's docs).

    Modeling assumptions:
      * cohort_month = month of the user's FIRST top-up (so the cohort is the
        first-top-up cohort, NOT the onboard cohort).
      * initial_users (denominator) = the month-0 cohort size. Here max(users)
        over activity months equals the month-0 count by construction (every
        member tops up in their first-top-up month and later months are subsets),
        so the max()-anchor is correct for this model — unlike the onboard-cohort
        retention marts, which require the explicit onboard-cohort denominator.
      * retention_pct = % of the first-top-up cohort still topping up in month N.
  columns:
  - name: cohort_month
    description: Month of the user's first top-up (cohort anchor).
    data_type: Date
  - name: activity_month
    description: Month in which the cohort's subsequent top-up activity is measured.
    data_type: Date
  - name: months_since
    description: Whole months between cohort_month and activity_month (0 = first-top-up month).
    data_type: Int32
  - name: users
    description: Distinct cohort users who topped up in this cell.
    data_type: UInt64
  - name: initial_users
    description: First-top-up cohort size (= month-0 users; retention denominator).
    data_type: UInt64
  - name: retention_pct
    description: users / initial_users x 100 = share of the first-top-up cohort still topping up.
    data_type: Float64
  - name: amount_retention_pct
    description: Retained USD amount as a share of the cohort's initial amount (x100).
    data_type: Nullable(Float64)
  - name: amount_usd
    description: USD amount.
    data_type: Nullable(Float64)
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

