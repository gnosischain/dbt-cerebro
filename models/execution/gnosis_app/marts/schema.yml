# ---------- Users fact tables ----------

- name: fct_execution_gnosis_app_users_daily
  description: |
    Daily user counts. new_users = distinct addresses whose first-ever
    activity hit was on this date; active_users = distinct addresses with
    any non-onboard activity; returning_users = active today AND had any
    activity in the prior 7 days; reactivated_users = active today,
    inactive for prior 30 days, but active before that. Dense calendar
    spine so cumulative_users is always continuous.
  columns:
  - name: date
    data_type: Date
  - name: new_users
    data_type: UInt64
  - name: cumulative_users
    data_type: UInt64
  - name: active_users
    data_type: UInt64
  - name: returning_users
    data_type: UInt64
  - name: reactivated_users
    data_type: UInt64
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}

- name: fct_execution_gnosis_app_users_weekly
  description: Weekly cohort of users (ISO Mon-start). Returning = active this week AND previous week. Reactivated = active this week, inactive for prior 4 weeks.
  columns:
  - {name: week, data_type: Date}
  - {name: new_users, data_type: UInt64}
  - {name: cumulative_users, data_type: UInt64}
  - {name: active_users, data_type: UInt64}
  - {name: returning_users, data_type: UInt64}
  - {name: reactivated_users, data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}

- name: fct_execution_gnosis_app_users_monthly
  description: Monthly cohort of users. Returning = active this month AND previous month. Reactivated = active this month, inactive for prior 2 months, active before that.
  columns:
  - {name: month, data_type: Date}
  - {name: new_users, data_type: UInt64}
  - {name: cumulative_users, data_type: UInt64}
  - {name: active_users, data_type: UInt64}
  - {name: returning_users, data_type: UInt64}
  - {name: reactivated_users, data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}

# ---------- Retention + churn ----------

- name: fct_execution_gnosis_app_retention_monthly
  description: |
    Cohort retention grid. cohort_month = month of user's 'onboard' row
    (first-ever heuristic hit). activity_month = month of any subsequent
    non-onboard activity. retention_pct = users_in_activity_month /
    cohort_initial_size × 100. Matches the fct_execution_gpay_retention_monthly
    shape; port for GA.
  columns:
  - {name: cohort_month, data_type: Date}
  - {name: activity_month, data_type: Date}
  - {name: months_since, data_type: Int32}
  - {name: users, data_type: UInt64}
  - {name: initial_users, data_type: UInt64}
  - {name: retention_pct, data_type: Float64}
  - {name: amount_retention_pct, data_type: Nullable(Float64)}
  - {name: amount_usd, data_type: Nullable(Float64)}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}

- name: fct_execution_gnosis_app_retention_by_action_monthly
  description: |
    Retention split by activity_kind (swap_filled / topup / marketplace_buy /
    circles_trust / etc.). Uses the GLOBAL onboard cohort_month as the
    anchor so the denominator is consistent across action types — the
    numerator counts users who did that specific action in activity_month.
  columns:
  - {name: activity_kind, data_type: String}
  - {name: cohort_month, data_type: Date}
  - {name: activity_month, data_type: Date}
  - {name: months_since, data_type: Int32}
  - {name: users, data_type: UInt64}
  - {name: initial_users, data_type: UInt64}
  - {name: retention_pct, data_type: Float64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}

- name: fct_execution_gnosis_app_churn_monthly
  description: |
    Monthly churn & retention segments. Two scopes — 'Any' (any non-onboard
    activity) and 'Swap' (swap_signed/swap_filled only). Segments: new,
    retained (active M-1 and M), returning (active M and earlier-not-M-1),
    churned (active M, not M+1). Port of fct_execution_gpay_churn_monthly.
  columns:
  - {name: scope, data_type: String}
  - {name: month, data_type: Date}
  - {name: new_users, data_type: UInt64}
  - {name: retained_users, data_type: UInt64}
  - {name: returning_users, data_type: UInt64}
  - {name: churned_users, data_type: UInt64}
  - {name: total_active, data_type: UInt64}
  - {name: churn_rate, data_type: Float64}
  - {name: retention_rate, data_type: Float64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}
  - dbt_utils.expression_is_true:
      name: churn_retention_complementary
      expression: "churn_rate + retention_rate BETWEEN 80 AND 120"
      config:
        severity: warn
        where: "month > '2025-12-01' AND month < toStartOfMonth(today())"

# ---------- Swaps extra grains ----------

- name: fct_execution_gnosis_app_swaps_weekly
  description: Weekly swap counts and filled USD volume (bucket = ISO Mon-start).
  columns:
  - {name: week, data_type: Date}
  - {name: n_swaps, data_type: UInt64}
  - {name: n_swaps_filled, data_type: UInt64}
  - {name: n_swaps_unfilled, data_type: UInt64}
  - {name: n_swappers, data_type: UInt64}
  - {name: n_orders, data_type: UInt64}
  - {name: volume_usd_filled, data_type: Nullable(Float64)}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

- name: fct_execution_gnosis_app_swaps_monthly
  description: Monthly swap counts and filled USD volume.
  columns:
  - {name: month, data_type: Date}
  - {name: n_swaps, data_type: UInt64}
  - {name: n_swaps_filled, data_type: UInt64}
  - {name: n_swaps_unfilled, data_type: UInt64}
  - {name: n_swappers, data_type: UInt64}
  - {name: n_orders, data_type: UInt64}
  - {name: volume_usd_filled, data_type: Nullable(Float64)}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

- name: fct_execution_gnosis_app_swaps_by_pair_daily
  description: |
    Daily swap activity sliced by token pair (sold_symbol → bought_symbol).
    pair is a pre-joined label for dashboard use; raw symbols are exposed
    separately for downstream joins.
  columns:
  - {name: date, data_type: Date}
  - {name: pair, data_type: String}
  - {name: token_sold_symbol, data_type: Nullable(String)}
  - {name: token_bought_symbol, data_type: Nullable(String)}
  - {name: n_swaps, data_type: UInt64}
  - {name: n_swaps_filled, data_type: UInt64}
  - {name: n_swappers, data_type: UInt64}
  - {name: volume_usd_filled, data_type: Nullable(Float64)}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

- name: fct_execution_gnosis_app_swaps_by_solver_daily
  description: Daily swap activity sliced by solver (filled trades only).
  columns:
  - {name: date, data_type: Date}
  - {name: solver, data_type: String}
  - {name: n_swaps_filled, data_type: UInt64}
  - {name: n_swappers, data_type: UInt64}
  - {name: volume_usd_filled, data_type: Nullable(Float64)}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

# ---------- TopUps extra grains ----------

- name: fct_execution_gnosis_app_gpay_topups_weekly
  description: Weekly topup counts and USD volume (aggregated across tokens).
  columns:
  - {name: week, data_type: Date}
  - {name: n_topups, data_type: UInt64}
  - {name: n_ga_users, data_type: UInt64}
  - {name: n_gp_wallets, data_type: UInt64}
  - {name: volume_usd, data_type: Nullable(Float64)}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

- name: fct_execution_gnosis_app_gpay_topups_monthly
  description: Monthly topup counts and USD volume (aggregated across tokens).
  columns:
  - {name: month, data_type: Date}
  - {name: n_topups, data_type: UInt64}
  - {name: n_ga_users, data_type: UInt64}
  - {name: n_gp_wallets, data_type: UInt64}
  - {name: volume_usd, data_type: Nullable(Float64)}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

- name: fct_execution_gnosis_app_token_offer_claims_daily
  description: |
    Daily Gnosis App token-offer claim activity, derived from
    int_execution_gnosis_app_token_offer_claims. One row per date.
    A claim = a GA user paying CRC to receive an offer_token (GNO today)
    via a Cometh-relayed tx to the ERC-4337 EntryPoint.
  columns:
  - {name: date, data_type: Date}
  - {name: n_claims, data_type: UInt64}
  - {name: n_claimers, data_type: UInt64}
  - {name: n_offers, data_type: UInt64}
  - {name: volume_received_token, data_type: Float64}
  - {name: volume_received_usd, data_type: Float64}
  - {name: volume_spent_crc, data_type: Float64}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

- name: fct_execution_gnosis_app_token_offer_claims_weekly
  description: Weekly token-offer claim activity.
  columns:
  - {name: week, data_type: Date}
  - {name: n_claims, data_type: UInt64}
  - {name: n_claimers, data_type: UInt64}
  - {name: n_offers, data_type: UInt64}
  - {name: volume_received_token, data_type: Float64}
  - {name: volume_received_usd, data_type: Float64}
  - {name: volume_spent_crc, data_type: Float64}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

- name: fct_execution_gnosis_app_token_offer_claims_monthly
  description: Monthly token-offer claim activity.
  columns:
  - {name: month, data_type: Date}
  - {name: n_claims, data_type: UInt64}
  - {name: n_claimers, data_type: UInt64}
  - {name: n_offers, data_type: UInt64}
  - {name: volume_received_token, data_type: Float64}
  - {name: volume_received_usd, data_type: Float64}
  - {name: volume_spent_crc, data_type: Float64}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

- name: fct_execution_gnosis_app_token_offer_claims_by_offer_daily
  description: |
    Daily token-offer claims sliced by specific offer (nextOffer address).
    offer_token_symbol surfaces which token was sold; offer_price_in_crc is
    the sticker price set when the offer was created (any() — stable per offer).
  columns:
  - {name: date, data_type: Date}
  - {name: offer_address, data_type: String}
  - {name: cycle_address, data_type: Nullable(String)}
  - {name: offer_token_symbol, data_type: Nullable(String)}
  - {name: n_claims, data_type: UInt64}
  - {name: n_claimers, data_type: UInt64}
  - {name: volume_received_token, data_type: Float64}
  - {name: volume_received_usd, data_type: Float64}
  - {name: volume_spent_crc, data_type: Float64}
  - {name: offer_price_in_crc, data_type: Nullable(Float64)}
  meta: {owner: analytics_team, authoritative: false}
  tests: [elementary.schema_changes: {severity: warn, tags: [elementary]}]

- name: fct_execution_gnosis_app_token_offer_claims_cohort_monthly
  description: |
    First-claim cohort × subsequent-claim activity retention. cohort_month
    = month of user's first token-offer claim. retention_pct = users still
    claiming in the given activity_month / cohort_initial × 100. Same shape
    as fct_execution_gnosis_app_gpay_topups_cohort_monthly.
