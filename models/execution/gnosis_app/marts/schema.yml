- name: api_execution_gnosis_app_time_to_first_conversion_cohort_monthly
  description: |
    Time from onboard to a user's FIRST event of each conversion kind, bucketed
    by onboard-month cohort. Long format: one row per (cohort_month,
    conversion_kind) over topup / swap_filled / marketplace_buy /
    token_offer_claim. Built on int_execution_gnosis_app_first_conversion.

    Modeling assumptions:
      * cohort_month = toStartOfMonth(first_seen_at), the heuristic onboard
        month. The current (partial) month is excluded.
      * n_in_cohort = all users onboarded that month; n_converted = those with a
        non-NULL first_<kind>_at (a NULL first_*_at means the user never did that
        action). pct_converted = n_converted / n_in_cohort x 100.
      * median/p25/p75_days are over CONVERTERS ONLY, as
        dateDiff('day', first_seen_at, first_conversion_at), FLOORED AT 0: the
        heuristic onboard date can postdate a user's real first action (negative
        raw diff), and those users are reported as 0-day rather than negative.
  columns:
  - name: cohort_month
    description: Onboard month (toStartOfMonth of first_seen_at).
    data_type: Date
  - name: conversion_kind
    description: topup / swap_filled / marketplace_buy / token_offer_claim.
    data_type: String
  - name: n_in_cohort
    description: Users onboarded in cohort_month (denominator).
    data_type: UInt64
  - name: n_converted
    description: Users with a non-NULL first event of this kind.
    data_type: UInt64
  - name: pct_converted
    description: n_converted / n_in_cohort x 100.
    data_type: Float64
  - name: median_days
    description: Median days onboard->first conversion, converters only, floored at 0.
    data_type: Float64
  - name: p25_days
    description: 25th-pct days onboard->first conversion, converters only, floored at 0.
    data_type: Float64
  - name: p75_days
    description: 75th-pct days onboard->first conversion, converters only, floored at 0.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
