- name: fct_execution_gnosis_app_journeys_60d
  description: |
    Pre-joined GA-side journey spine with a 60-day lookback. One row per
    (conversion, prior-60d touchpoint) pair with the conversion's own
    event kind excluded from touches. Built via
    `build_journey_lookback(60, 'gnosis_app')` so the leakage guards
    (`event_ts < conversion_ts` and
    `event_kind != conversion_kind_to_event_kind(conversion_kind)`) are
    applied at materialisation, not at query time.

    The MTA persona reads this directly to score first/last/linear/
    time-decay credit per touch without re-running the conversions ×
    events self-join. The 7d / 14d / 60d sensitivity-sweep variants
    (deferred) reuse the same macro with a different `lookback_days`
    argument.

    Incremental, monthly partition on `conversion_date`. Uses
    `grace_hash` join algorithm to keep memory bounded across the
    explicit lookback window.
  config:
    contract:
      enforced: false
  columns:
  - name: user_pseudonym
    description: Keyed pseudonym of the converting user.
    data_type: UInt64
    tests: [not_null]
  - name: conversion_kind
    description: One of `topup` / `swap_filled` / `token_offer_claim` / `marketplace_buy`.
    data_type: LowCardinality(String)
    tests: [not_null]
  - name: conversion_ts
    description: UTC timestamp of the conversion.
    data_type: DateTime
    tests: [not_null]
  - name: conversion_date
    description: Calendar date of the conversion (partition key).
    data_type: Date
    tests: [not_null]
  - name: conversion_amount_usd
    description: USD amount of the conversion (carried from the conversions registry).
    data_type: Nullable(Float64)
  - name: conversion_token
    description: Token symbol or offer name associated with the conversion.
    data_type: Nullable(String)
  - name: touch_ts
    description: UTC timestamp of the touchpoint event (= upstream `event_ts`).
    data_type: DateTime
    tests: [not_null]
  - name: event_source
    description: '`chain` or `mixpanel` — provenance of the touchpoint.'
    data_type: LowCardinality(String)
  - name: event_kind
    description: Canonical event kind of the touchpoint. Guaranteed != the conversion's own mapped event_kind.
    data_type: LowCardinality(String)
  - name: event_subkind
    description: Provenance subtype of the touchpoint.
    data_type: LowCardinality(String)
  - name: event_dedup_key
    description: Carried from upstream events table for downstream dedup if needed.
    data_type: UInt64
  - name: lag_seconds
    description: Seconds between touchpoint and conversion. Strictly positive (leakage guard tested below).
    data_type: Int64
    tests:
    - dbt_utils.expression_is_true:
        expression: "lag_seconds > 0"
        config:
          severity: error
  - name: lag_days
    description: Day-resolution version of `lag_seconds`, used by the time-decay weight `exp(-lag_days/7)`.
    data_type: Int64
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - conversion_date
      - conversion_kind
      - user_pseudonym
      - conversion_ts
      - event_kind
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(conversion_date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  # Uniqueness is enforced by the ReplacingMergeTree unique_key; a
  # dbt_utils.unique_combination_of_columns test over the full 12M-row
  # journey set OOMs at the 10 GiB cluster cap.


