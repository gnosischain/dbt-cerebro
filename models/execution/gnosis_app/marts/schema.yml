    Pre-computed first / last / linear / time-decay (half-life = 7d)
    attribution per (`conversion_kind`, `event_kind`) over the last 180
    days of conversions. The MTA persona reads this as the
    attribution-comparison table; a single
    `WHERE conversion_kind = '<kind>'` filter swaps in the desired
    conversion target.

    Implementation: pre-aggregate per conversion → tie-counts → per-touch
    score → group by `event_kind`. Pure GROUP BY + LEFT JOIN; no
    `groupArray + ARRAY JOIN` and no window functions. The pattern
    survived three rewrites — v1 arrays and v2 windows both OOM'd at
    the cluster's 10 GiB per-query cap on the 12 M-row journey set; v3
    drops sort space from 12 M down to ~22 k per-conversion rows.

    Time-decay weight per touch: `td_raw = exp(-lag_days / 7)`,
    normalized so `Σ td_credit_per_conversion = 1.0`. First / last
    credit splits across ties so `Σ first_touch_credit_per_conv = 1.0`
    and `Σ last_touch_credit_per_conv = 1.0` exactly.
    Note: the time-decay half-life is fixed at 7 days regardless of
    the lookback window — this is a per-conversation customer-decay
    parameter, not a window-length parameter.
  config:
    contract:
      enforced: false
  columns:
  - name: conversion_kind
    description: One of `topup` / `swap_filled` / `token_offer_claim` / `marketplace_buy`.
    data_type: LowCardinality(String)
    tests: [not_null]
  - name: event_kind
    description: Touchpoint event kind. Guaranteed != the conversion's own mapped event_kind.
    data_type: LowCardinality(String)
    tests: [not_null]
  - name: conversions_with_touch
    description: Distinct (user, conversion_ts) pairs where this `event_kind` appeared in the journey.
    data_type: UInt64
  - name: first_touch
    description: Sum of first-touch credits across all conversions of this kind. Conversion-equivalent units (a value of 100 = "100 conversions' worth of first-touch credit accrued to this event kind").
    data_type: Float64
  - name: last_touch
    description: Sum of last-touch credits.
    data_type: Float64
  - name: linear
    description: Sum of linear (1/n_touches) credits.
    data_type: Float64
  - name: time_decay_hl_7d
    description: Sum of time-decay credits with 7-day half-life.
    data_type: Float64
  - name: total_conversions
    description: Total conversions of this `conversion_kind` in the 180-day window (denominator for share metrics).
    data_type: UInt64
  - name: computed_at
    description: '`now()` at materialisation time — surfaces freshness in the API view.'
    data_type: DateTime
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
