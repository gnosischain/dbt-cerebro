    description: Token symbol or offer name associated with the conversion.
    data_type: Nullable(String)
  - name: touch_ts
    description: UTC timestamp of the touchpoint event (= upstream `event_ts`).
    data_type: DateTime
    tests:
    - not_null
  - name: event_source
    description: '`chain` or `mixpanel` — provenance of the touchpoint.'
    data_type: LowCardinality(String)
  - name: event_kind
    description: Canonical event kind of the touchpoint. Guaranteed != the conversion's own mapped event_kind.
    data_type: LowCardinality(String)
  - name: event_subkind
    description: Provenance subtype of the touchpoint.
    data_type: LowCardinality(String)
  - name: event_dedup_key
    description: Carried from upstream events table for downstream dedup if needed.
    data_type: UInt64
  - name: lag_seconds
    description: Seconds between touchpoint and conversion. Strictly positive (leakage guard tested below).
    data_type: Int64
    tests:
    - dbt_utils.expression_is_true:
        expression: "lag_seconds > 0"
        config:
          severity: error
  - name: lag_days
    description: Day-resolution version of `lag_seconds`, used by the time-decay weight `exp(-lag_days/7)`.
    data_type: Int64
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - conversion_date
      - conversion_kind
      - user_pseudonym
      - conversion_ts
      - event_kind
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(conversion_date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  # Uniqueness is enforced by the ReplacingMergeTree unique_key; a
  # dbt_utils.unique_combination_of_columns test over the full 12M-row
  # journey set OOMs at the 10 GiB cluster cap.


- name: fct_execution_gnosis_app_attribution_60d
  description: |
    Pre-computed first / last / linear / time-decay (half-life = 7d)
    attribution per (`conversion_kind`, `event_kind`) over the last 180
    days of conversions. The MTA persona reads this as the
    attribution-comparison table; a single
    `WHERE conversion_kind = '<kind>'` filter swaps in the desired
    conversion target.

    Implementation: pre-aggregate per conversion → tie-counts → per-touch
    score → group by `event_kind`. Pure GROUP BY + LEFT JOIN; no
    `groupArray + ARRAY JOIN` and no window functions. The pattern
    survived three rewrites — v1 arrays and v2 windows both OOM'd at
    the cluster's 10 GiB per-query cap on the 12 M-row journey set; v3
    drops sort space from 12 M down to ~22 k per-conversion rows.

    Time-decay weight per touch: `td_raw = exp(-lag_days / 7)`,
    normalized so `Σ td_credit_per_conversion = 1.0`. First / last
    credit splits across ties so `Σ first_touch_credit_per_conv = 1.0`
    and `Σ last_touch_credit_per_conv = 1.0` exactly.
    Note: the time-decay half-life is fixed at 7 days regardless of
    the lookback window — this is a per-conversation customer-decay
    parameter, not a window-length parameter.
  config:
    contract:
      enforced: false
  columns:
  - name: conversion_kind
    description: One of `topup` / `swap_filled` / `token_offer_claim` / `marketplace_buy`.
    data_type: LowCardinality(String)
    tests:
    - not_null
  - name: event_kind
    description: Touchpoint event kind. Guaranteed != the conversion's own mapped event_kind.
    data_type: LowCardinality(String)
    tests:
    - not_null
  - name: conversions_with_touch
    description: Distinct (user, conversion_ts) pairs where this `event_kind` appeared in the journey.
    data_type: UInt64
  - name: first_touch
    description: Sum of first-touch credits across all conversions of this kind. Conversion-equivalent units (a value of 100 = "100 conversions' worth of first-touch credit accrued to this event kind").
    data_type: Float64
  - name: last_touch
    description: Sum of last-touch credits.
    data_type: Float64
  - name: linear
    description: Sum of linear (1/n_touches) credits.
    data_type: Float64
  - name: time_decay_hl_7d
    description: Sum of time-decay credits with 7-day half-life.
    data_type: Float64
  - name: total_conversions
    description: Total conversions of this `conversion_kind` in the 180-day window (denominator for share metrics).
    data_type: UInt64
  - name: computed_at
    description: '`now()` at materialisation time — surfaces freshness in the API view.'
    data_type: DateTime
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: api_execution_gnosis_app_attribution_60d
  description: |
    API view passthrough over `fct_execution_gnosis_app_attribution_60d`.
    Tier1 endpoint (`api:gnosis_app_attribution_60d`), requires
    `X-API-Key`. Granularity tag `granularity:rolling_180d` documents
    that the underlying mart aggregates over the trailing 180 days of
    conversions.
  config:
    contract:
      enforced: false
  columns:
  - name: conversion_kind
    description: Conversion target.
    data_type: LowCardinality(String)
  - name: event_kind
    description: Touchpoint kind being credited.
    data_type: LowCardinality(String)
  - name: conversions_with_touch
    description: Distinct conversions that saw this `event_kind` in their journey.
    data_type: UInt64
  - name: first_touch
    description: Sum of first-touch credits.
    data_type: Float64
  - name: last_touch
    description: Sum of last-touch credits.
    data_type: Float64
  - name: linear
    description: Sum of linear credits.
    data_type: Float64
  - name: time_decay_hl_7d
    description: Sum of time-decay credits (HL=7d).
    data_type: Float64
  - name: total_conversions
    description: Total conversions of this kind in the 180-day window.
    data_type: UInt64
  - name: computed_at
    description: Materialisation timestamp.
    data_type: DateTime
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta:
    owner: analytics_team

