version: 2

models:
# ---------- Fact tables (full-rebuild, backing data for api_ views) ----------

- name: fct_execution_gnosis_app_gpay_wallets_daily
  description: |
    Daily cumulative count of Gnosis Pay wallets controlled by a Gnosis App
    user, split by onboarding class. Backing fact table for
    api_execution_gnosis_app_gpay_wallets_daily.

      onboarded_via_ga : the very first owner of the GP Safe was a GA user.
                         User went from zero → Gnosis Pay via the Gnosis App.
      imported         : GA user appears in the owner set after creation.
                         User already had Gnosis Pay and later linked their GA.

    V1 tracks the date a GP wallet first gained a GA owner (first_ga_owner_at)
    and its cumulative count over time. Removals (GA user subsequently removed
    from the owner set) are NOT subtracted here — dashboards can read
    is_currently_ga_owned from int_execution_gpay_ga_wallets for a
    point-in-time currently-owned snapshot.
  columns:
  - name: date
    description: Calendar date (UTC).
    data_type: Date
  - name: onboarding_class
    description: "'onboarded_via_ga' or 'imported'."
    data_type: String
  - name: n_ga_wallets_new
    description: GP wallets that became GA-owned for the first time on this date.
    data_type: UInt64
  - name: n_ga_wallets_cumulative
    description: Running total of ever-GA-owned GP wallets up to and including this date.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: fct_execution_gnosis_app_gpay_volume_daily
  description: |
    Gnosis-App-scoped Gnosis Pay funding & spend volume, daily, split by
    onboarding class. Backing fact table for api_execution_gnosis_app_gpay_volume_daily.

    Counts only activity from int_execution_gpay_activity on GA-controlled
    Safes, gated to block_timestamp >= first_ga_owner_at (exact post-link
    attribution; matters for `imported` wallets). This is the real funding/spend
    picture the narrow int_execution_gnosis_app_gpay_topups model (in-app
    swap-to-card flow only) does not capture.

      funded_volume_usd — inflows (Fiat Top Up + Crypto Deposit). Loaded volume,
                          NOT current/remaining balance.
      spend_usd         — card payments (action='Payment').
  columns:
  - name: date
    description: Calendar date (UTC).
    data_type: Date
    tests:
    - not_null
  - name: onboarding_class
    description: "'onboarded_via_ga' or 'imported'."
    data_type: String
    tests:
    - not_null
    - accepted_values:
        values:
        - 'onboarded_via_ga'
        - 'imported'
  - name: funded_volume_usd
    description: USD inflows (Fiat Top Up + Crypto Deposit) on GA-controlled Safes on this date.
    data_type: Float64
  - name: spend_usd
    description: USD card payments (action='Payment') on GA-controlled Safes on this date.
    data_type: Float64
  - name: spend_count
    description: Number of card Payment transactions on this date.
    data_type: UInt64
  - name: spending_wallets
    description: Distinct GA-controlled Safes that made a card payment on this date.
    data_type: UInt64
  - name: funded_volume_cumulative_usd
    description: Running total of funded_volume_usd within onboarding_class up to and including this date.
    data_type: Float64
  - name: spend_cumulative_usd
    description: Running total of spend_usd within onboarding_class up to and including this date.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - date
      - onboarding_class

- name: fct_execution_gnosis_app_swaps_daily
  description: |
    Daily Gnosis App swap activity, derived from int_execution_gnosis_app_swaps.
    Backing fact for api_execution_gnosis_app_swaps_daily.

    Dune-parity semantic: one swap = one PreSignature event (= one signed
    order intent) via the Cometh bundler. Orders pre-signed but never filled
    are still counted as n_swaps; volume_usd reflects only filled orders.
  columns:
  - name: date
    description: Date of the PreSignature event (= when the user signed in-app).
    data_type: Date
  - name: n_swaps
    description: Count of PreSignature-signed orders (= Dune count).
    data_type: UInt64
  - name: n_swaps_filled
    description: Signed orders that subsequently had at least one Trade fill.
    data_type: UInt64
  - name: n_swaps_unfilled
    description: Signed orders with no matching Trade fill.
    data_type: UInt64
  - name: n_swappers
    description: Distinct GA user (taker) addresses with ≥1 signed order that day.
    data_type: UInt64
  - name: n_orders
    description: Distinct order_uid values (≈ n_swaps; lower if an order was re-signed).
    data_type: UInt64
  - name: volume_usd_filled
    description: Sum of amount_usd across filled orders.
    data_type: Nullable(Float64)
  - name: volume_usd_priced
    description: Sum of amount_usd restricted to orders with a non-null USD price.
    data_type: Nullable(Float64)
  - name: n_filled_unpriced
    description: Filled orders lacking a USD price (debug signal).
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: fct_execution_gnosis_app_gpay_topups_by_token_daily
  description: |
    Daily Gnosis App → Gnosis Pay top-up activity, derived from
    int_execution_gnosis_app_gpay_topups (top-up = a GP "Crypto Deposit" into a
    currently-GA-owned wallet; see that model's docs). Backing fact for
    api_execution_gnosis_app_gpay_topups_by_token_daily.

    Grain: (date, token_bought_symbol). token_bought_symbol is the DEPOSITED
    token (legacy column name from the old swap-based definition). The dashboard
    can aggregate across tokens or filter client-side (e.g. only EURe, only USDC).
    n_ga_users and n_gp_wallets are distinct counts within the slice.
  columns:
  - name: date
    description: Calendar date (UTC).
    data_type: Date
  - name: token_bought_symbol
    description: Symbol of the deposited (top-up) token; legacy column name.
    data_type: Nullable(String)
  - name: n_topups
    description: Number of in-app top-up events.
    data_type: UInt64
  - name: n_ga_users
    description: Distinct Gnosis App users.
    data_type: UInt64
  - name: n_gp_wallets
    description: Distinct Gnosis Pay wallets.
    data_type: UInt64
  - name: volume_token_bought
    description: Sum of bought-token amount (human units).
    data_type: Nullable(Float64)
  - name: volume_usd
    description: USD volume.
    data_type: Nullable(Float64)
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

