- name: int_execution_gnosis_app_user_purchase_freq_30d
  description: >
    Rolling 30-day per-user purchase-event count (swap_filled + marketplace_buy).
    Full rebuild on every run; size bounded by ~last-30d active GA buyers.
  columns:
  - {name: address, data_type: String}
  - {name: n_purchases, data_type: UInt64}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}
- name: int_execution_gnosis_app_first_conversion
  description: |
    One row per Gnosis App user (the onboard cohort) with the date of their
    first event in each conversion kind. Feeds the time-to-first-conversion view.

    Modeling assumptions:
      * first_seen_at = the heuristic onboard date, carried from
        int_execution_gnosis_app_user_activity_daily ('onboard' rows).
      * Each first_<kind>_at is NULL when the user never did that action.
        This is enforced via nullIf(minIf(...), toDate('1970-01-01')) plus a
        join_use_nulls hook, so the ClickHouse Date default (1970-01-01) from an
        empty minIf or an unmatched LEFT JOIN cannot masquerade as a real
        conversion. Consumers MUST treat 1970-01-01 as impossible and rely on
        IS NULL (a prior bug let the epoch sentinel inflate pct_converted to
        100% and produce negative time-to-conversion).
      * Conversion kinds: topup, swap_filled, marketplace_buy, token_offer_claim.
  columns:
  - {name: address, description: "Gnosis App user address.", data_type: String}
  - {name: first_seen_at, description: "Heuristic onboard date (min onboard activity).", data_type: Date}
  - {name: first_topup_at, description: "First top-up date; NULL if never.", data_type: Nullable(Date)}
  - {name: first_swap_filled_at, description: "First filled-swap date; NULL if never.", data_type: Nullable(Date)}
  - {name: first_marketplace_buy_at, description: "First marketplace-buy date; NULL if never.", data_type: Nullable(Date)}
  - {name: first_token_offer_claim_at, description: "First token-offer-claim date; NULL if never.", data_type: Nullable(Date)}
  meta: {owner: analytics_team, authoritative: false}
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}
- name: int_execution_gnosis_app_token_offer_claim_funnel_daily
  description: >
    Daily per-offer token-offer claim conversion. Eligible-pool denominator
    is the rolling 30-day active GA users (proxy — a strict eligibility set
    would need to know who holds the source token at each moment).
  columns:
  - {name: date, data_type: Date}
  - {name: offer_address, data_type: String}
  - {name: n_claims, data_type: UInt64}
  - {name: n_claimers, data_type: UInt64}
  - {name: amount_received_usd, data_type: Float64}
  - {name: n_active_pool_30d, description: "Rolling 30d active GA users (proxy eligible pool).", data_type: UInt64}
  - {name: claim_rate_pct, data_type: Nullable(Float64)}
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}
