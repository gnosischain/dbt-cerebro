version: 2

models:
- name: int_execution_gnosis_app_bundlers
  description: |
    Dynamic Cometh ERC-4337 bundler allowlist for Gnosis App attribution.
    Supersedes the hand-maintained seeds/gnosis_app_relayers.csv, which listed
    only 3 of ~61 real bundlers (so ~10% of GA users were missed; miss-rate hit
    16-22% for Mar-2026+ cohorts when the 0x4337... fleet launched).

    A bundler qualifies if it sends UserOps to the EntryPoint and either
    (a) matches the Cometh vanity prefix 0x4337..., or (b) relayed a
    GA-specific, relayer-agnostic anchor: a CRC fee transfer (ERC-1155 Hub or
    gCRC ERC-20) to the fee receiver, or a GA InvitationModule RegisterHuman.
    The curated seed is unioned in (belt-and-suspenders). Self-maintains as the
    fleet rotates. Schema mirrors gnosis_app_relayers so consumers swap only the
    ref().
  columns:
  - name: address
    description: Bundler EOA, lowercase 0x-prefixed (matches the seed format).
    data_type: String
    tests:
    - unique
    - not_null
  - name: is_active
    description: Always 1 (the model holds only the active set); kept for seed parity.
    data_type: UInt8
  - name: source
    description: "Signal(s) that flagged the bundler: seed / vanity_4337 / anchor (joined with '+')."
    data_type: String
  meta:
    owner: analytics_team

- name: int_execution_gnosis_app_user_events
  description: |
    Long-form heuristic event log for Gnosis App user identification.

    Seven rules, all keyed off the same chokepoint: a Cometh ERC-4337
    bundler (the dynamic allowlist int_execution_gnosis_app_bundlers, which
    supersedes the static seeds/gnosis_app_relayers.csv) sent the outer
    transaction to the canonical EntryPoint v0.7. Any account that appears as
    a parameter inside such a transaction is, by construction, acting through
    Gnosis App for that action.

    Rules:
      safe_invitation_module  — Safe created in the same Cometh tx that
                                enabled the Circles InvitationModule
                                (0x00738aca…). The Safe address is the
                                user.
      circles_fee             — CRC fee transfer to the Gnosis App fee
                                receiver (0x97FD8f78…) inside a Cometh tx,
                                matched as either an ERC-1155 Hub transfer
                                (rule_app_fee) or, since June 2026, a gCRC
                                ERC-20 Transfer (rule_app_fee_erc20). The
                                receiver was branded "Metri" pre-rebrand;
                                the address is unchanged.
      circles_register_human  — Hub.RegisterHuman event inside a Cometh
                                tx. decoded_params['avatar'] is the user.
      circles_invite_human    — Same RegisterHuman event; the inviter is
                                the user, canonicalized via
                                int_execution_circles_v2_inviter_canonical
                                (invitation-at-scale proxy remapped to the
                                real origin inviter).
      circles_trust           — Hub.Trust event inside a Cometh tx.
                                decoded_params['truster'] is the user.
      circles_profile_update  — NameRegistry.UpdateMetadataDigest event
                                inside a Cometh tx.
                                decoded_params['avatar'] is the user.
      circles_personal_mint   — Personal CRC mint (Human avatar minting
                                its own Circles, via
                                int_execution_circles_v2_mint_events
                                mint_kind = 'personal') inside a Cometh
                                tx. The mint recipient is the user.

    Address columns are stored lowercase WITH the 0x prefix to match the
    rest of the dbt outputs and the format that decode_logs produces for
    decoded_params address values. Rule 1 reads from int_execution_safes
    (which is already 0x-prefixed) and rules 2-6 read from
    contracts_circles_v2_*_events.decoded_params (also 0x-prefixed).

    Privacy: this is the source-of-truth intermediate for sector
    membership. Raw addresses are kept here because they are required
    for the snapshot argMax and for the cross-reference with
    int_execution_safes. The pseudonymization boundary is in
    int_execution_gnosis_app_user_identities, one model downstream.
  columns:

  - name: address
    description: >
      The Gnosis App user address (avatar / inviter / truster / Safe,
      depending on the rule). Lowercase, 0x-prefixed — the same form
      that decode_logs writes for decoded_params address values and
      that stg_mixpanel_ga__events sees for wallet-identified users.
      Storing in this form means the cross-domain pseudonym join lines
      up exactly without any per-side normalization.
    data_type: String

  - name: heuristic_kind
    description: >
      Enum: safe_invitation_module, circles_fee,
      circles_register_human, circles_invite_human, circles_trust,
      circles_profile_update, circles_personal_mint.
    data_type: String

  - name: block_timestamp
    description: UTC timestamp of the block in which the action happened.
    data_type: DateTime64(0, 'UTC')
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"

  - name: transaction_hash
    description: The Cometh-relayed transaction hash (lowercase, no 0x prefix).
    data_type: String

  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2025-11-12"
      batch_months: 3

  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - address
      - heuristic_kind
      - block_timestamp
      - transaction_hash
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_gnosis_app_users_current
  description: |
    Snapshot of the Gnosis App sector. One row per address that triggered
    any heuristic, with derived confidence proxy `n_distinct_heuristics`.
    An address that triggered 3+ independent rules is a high-confidence
    Gnosis App user.

    Cheap to fully rebuild every run; no incremental needed.
  columns:

  - name: address
    description: The Gnosis App user address (lowercase, 0x-prefixed).
    data_type: String

  - name: first_seen_at
    description: Earliest heuristic hit for this address.
    data_type: DateTime64(0, 'UTC')

  - name: last_seen_at
    description: Most recent heuristic hit for this address.
    data_type: DateTime64(0, 'UTC')

  - name: heuristic_hits
    description: Total number of heuristic events triggered by this address.
    data_type: UInt64

  - name: heuristic_kinds
    description: Distinct rule names triggered by this address.
    data_type: Array(String)

  - name: n_distinct_heuristics
    description: >
      Confidence proxy — number of distinct rules that fired. An address
      with n_distinct_heuristics >= 3 is a high-confidence Gnosis App user.
    data_type: UInt8

  meta:
    owner: analytics_team
    authoritative: false

  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: int_execution_gnosis_app_swaps
  description: |
    Gnosis App swaps — one row per CoW order pre-signed by a GA user through
    the Cometh ERC-4337 bundler. Matches the Dune semantic: the anchor is
    the PreSignature event, NOT the Trade fill. Orders that are pre-signed
    but never filled (cancelled, expired, solver mismatch) are still counted
    as app activity.

    Strict heuristic (all must hold for a row to appear):
      1. GPv2Settlement.PreSignature event with signed=true
      2. PreSignature tx.to  = ERC-4337 EntryPoint v0.7 (0x…7727de22…)
      3. PreSignature tx.from ∈ Cometh bundlers (dynamic int_execution_gnosis_app_bundlers)
      4. PreSignature owner   ∈ GA users
                                (int_execution_gnosis_app_users_current)

    Trade enrichment (tokens, amounts, USD, solver) is a LEFT JOIN — NULL
    for unfilled orders. `was_filled` surfaces this as a boolean. Partial
    fills produce multiple Trade rows for one PreSignature; for the LEFT
    JOIN we pick the first fill (argMin on block_timestamp) and aggregate
    amounts via sum so one PreSignature = one output row.

    Grain: (transaction_hash, log_index) of the PreSignature event. Row
    count on this model = count of GA-app signed orders.
  columns:
  - name: block_number
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the PreSignature event (= when the user signed in-app).
    data_type: DateTime
  - name: transaction_hash
    description: Bundler-relayed UserOp tx hash carrying the PreSignature (0x-prefixed, lowercase).
    data_type: String
  - name: log_index
    description: Log index of the PreSignature event within its tx.
    data_type: UInt64
  - name: taker
    description: Order owner — the GA user address (lowercase, 0x-prefixed).
    data_type: String
  - name: order_uid
    data_type: String
  - name: relayer_address
    description: Cometh bundler EOA that submitted the PreSignature tx (0x-prefixed, lowercase).
    data_type: String
  - name: was_filled
    description: True iff at least one Trade event matched this order_uid.
    data_type: Bool
  - name: first_fill_at
    description: Timestamp of the first Trade fill (NULL if unfilled).
    data_type: Nullable(DateTime)
  - name: first_fill_tx
    description: Settlement tx hash of the first Trade fill, 0x-prefixed (NULL if unfilled).
    data_type: Nullable(String)
  - name: n_fills
    description: Count of Trade events for this order (partial fills > 1; NULL/0 if unfilled).
    data_type: Nullable(UInt64)
  - name: token_bought_address
    data_type: Nullable(String)
  - name: token_bought_symbol
    data_type: Nullable(String)
  - name: amount_bought_raw
    description: Sum of buyAmount across partial fills.
    data_type: Nullable(UInt256)
  - name: amount_bought
    data_type: Nullable(Float64)
  - name: token_sold_address
    data_type: Nullable(String)
  - name: token_sold_symbol
    data_type: Nullable(String)
  - name: amount_sold_raw
    description: Sum of sellAmount across partial fills.
    data_type: Nullable(UInt256)
  - name: amount_sold
    data_type: Nullable(Float64)
  - name: fee_amount_raw
    data_type: Nullable(UInt256)
  - name: fee_amount
    data_type: Nullable(Float64)
  - name: amount_usd
    description: Sum of trade-level amount_usd across partial fills.
    data_type: Nullable(Float64)
  - name: solver
    description: Solver that filled the first partial fill (NULL if unfilled).
    data_type: Nullable(String)
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2025-11-12"
      batch_months: 3
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_gnosis_app_gpay_topups
  description: |
    Gnosis App → Gnosis Pay top-ups.

    A top-up = a Gnosis Pay "Crypto Deposit" into a GP wallet that is currently
    GA-owned, per the persistent int_execution_gnosis_app_gpay_wallets bridge
    (is_currently_ga_owned), from the GA launch (2025-11-12) on. ga_user is the
    wallet's first GA owner.

    This supersedes the original same-transaction CoW-trade + deposit rule,
    which captured only ~1.4% of GA-owned funding — most top-ups are direct
    EURe transfers, not atomic swaps. See
    docs/model_review/gpay_topup_capture_probe.md.

    Scope (broadest): all Crypto Deposits into currently-GA-owned wallets, all
    tokens. Two narrowing toggles are intentionally NOT applied and can be added
    as a one-line WHERE: self-funding exclusion (counterparty = the wallet's GA
    owner) and a temporal filter for deposits predating GA ownership of an
    imported wallet.
  columns:
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    description: Gnosis Pay deposit transaction hash (0x-prefixed).
    data_type: String
  - name: log_index
    description: Synthetic per-tx ordinal (gpay_activity has no log index); keeps the (tx, log_index) dedup key unique per deposit.
    data_type: UInt64
  - name: ga_user
    description: First GA owner of the receiving GP wallet — the attributed acquired user.
    data_type: String
  - name: gp_wallet
    description: GA-owned GP wallet that received the deposit.
    data_type: String
  - name: token_bought_address
    description: Deposited token contract address (legacy column name; now the funded token, not a swap output).
    data_type: String
  - name: token_bought_symbol
    data_type: Nullable(String)
  - name: amount_bought
    description: Deposited token amount (decimal-adjusted).
    data_type: Nullable(Float64)
  - name: amount_usd
    data_type: Nullable(Float64)
  - name: counterparty
    description: Sender of the deposit (the funding source address).
    data_type: Nullable(String)
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2025-11-12"
      batch_months: 3
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_gnosis_app_user_activity_daily
  description: |
    Foundation table for all Gnosis App user-activity analytics — one row
    per (date, address, activity_kind). Every downstream cohort, retention,
    churn, DAU/WAU/MAU, and activity-by-action mart derives from this table.

    activity_kind enum:
      onboard                 — first-ever heuristic hit for this address
                                 (from int_execution_gnosis_app_users_current.
                                 first_seen_at). Exactly one row per user.
                                 Anchors the cohort_month for retention.
      circles_register_human,
      circles_invite_human,
      circles_trust,
      circles_profile_update,
      circles_fee,
      circles_personal_mint,
      safe_invitation_module  — raw heuristic rows from
                                 int_execution_gnosis_app_user_events.
      swap_signed             — PreSignature events (all rows in
                                 int_execution_gnosis_app_swaps).
      swap_filled             — subset with was_filled = true.
      topup                   — GA→GP TopUps
                                 (int_execution_gnosis_app_gpay_topups).
      marketplace_buy         — GA marketplace purchases
                                 (int_execution_gnosis_app_marketplace_payments).
      token_offer_claim       — GA token-offer claims (e.g. CRC → GNO discount)
                                 (int_execution_gnosis_app_token_offer_claims).

    amount_usd populated for swap_filled, topup, and token_offer_claim
    (USD on the *received* side only). marketplace buys carry NULL until the
    Circles token price feed is wired.
  columns:
  - name: date
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}date >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: address
    description: GA user address (0x-prefixed, lowercase).
    data_type: String
  - name: activity_kind
    description: See enum above.
    data_type: String
  - name: n_events
    data_type: UInt64
  - name: amount_usd
    data_type: Nullable(Float64)
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket: {period: day, count: 1}
      training_period: {period: day, count: 56}
      seasonality: day_of_week
      detection_period: {period: day, count: 2}
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags: [elementary]
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket: {period: day, count: 1}
      severity: warn
      tags: [elementary]

- name: int_execution_gnosis_app_gpay_wallets
  description: |
    Gnosis Pay wallets (Safes) that have been or currently are controlled
    by a Gnosis App user, via the Safe's Zodiac **Delay Module**.

    Heuristic (Hugo's Dune query 6675111, Bernardo review April 2026):

      The Delay Module bound to each GP Safe has its OWN access control —
      Zodiac's enableModule(address)/disableModule(address) functions,
      which emit EnabledModule/DisabledModule events. Any address enabled
      as a module on the Delay can queue transactions on the GP Safe.

      A GP wallet is "on Gnosis App" iff a GA user address has been
      enabled (net +1) as a module on its Delay.

    Events scanned (from execution.logs):

      EnabledModule  topic0 = 0xecdf3a3e…f8440 (module addr in DATA field)
      DisabledModule topic0 = 0xaab4fa2b…54276 (module addr in DATA field)

    Mapping Delay Module → GP Safe comes from
    int_execution_gpay_safe_modules.contract_type = 'DelayModule'.

    Incremental: on each run, scans only delay modules that had an
    EnabledModule/DisabledModule event in the last 30 days (or since
    previous-run watermark), then recomputes the FULL event history for
    just those modules. delete+insert on unique_key=pay_wallet keeps
    unchanged rows from previous runs. Full-refresh scans everything back
    to 2023-06-01.

    Onboarding classes (per Daniel's dashboard request):

      onboarded_via_ga : the very first module ever enabled on this Delay
                         is a GA user — user went from zero → Gnosis Pay
                         via Gnosis App.
      imported         : a GA user was added as a module later — user
                         already had Gnosis Pay, then linked their GA Safe.

    One row per GP Safe. A Safe with multiple GA modules enabled is still
    counted once.
  columns:
  - name: pay_wallet
    description: GP Safe address (0x-prefixed, lowercase).
    data_type: String
  - name: first_ga_owner_at
    description: Earliest became-owner timestamp among GA-user modules.
    data_type: DateTime
  - name: first_ga_owner_address
    description: GA user address that first became a module on this Safe's Delay (0x-prefixed).
    data_type: String
  - name: initial_event_at
    description: Timestamp of the earliest EnabledModule event on this Safe's Delay.
    data_type: DateTime
  - name: initial_owner_address
    description: Address of the very first module enabled on this Safe's Delay.
    data_type: String
  - name: is_currently_ga_owned
    description: True iff at least one GA user is currently enabled as a module on the Delay.
    data_type: Bool
  - name: n_ga_owners_current
    description: Number of distinct GA-user addresses currently enabled as modules.
    data_type: UInt64
  - name: n_total_owners_current
    description: Number of distinct modules (GA or otherwise) currently enabled on the Delay.
    data_type: UInt64
  - name: onboarding_class
    description: "'onboarded_via_ga' or 'imported' — see model description."
    data_type: String
  - name: last_event_at
    description: |
      Max block_timestamp across all EnabledModule/DisabledModule events on
      this Safe's Delay. Drives the incremental watermark via
      apply_monthly_incremental_filter.
    data_type: DateTime
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2023-06-01"
      batch_months: 12
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
- name: int_execution_gnosis_app_marketplace_offers
  description: |
    Gnosis App marketplace offers — one row per non-excluded PaymentGateway
    created via Circles v2 PaymentGatewayFactory.

    Sources & join:
      1. createGateway calls from contracts_circles_v2_PaymentGatewayFactory_calls
         (carries the `name` string input as offer_name).
      2. GatewayCreated events from contracts_circles_v2_PaymentGatewayFactory_events
         (carries the resulting `gateway` address and `owner`).
      3. Joined on transaction_hash — createGateway emits GatewayCreated in
         the same tx — to pair (offer_name ↔ gateway_address).

    Exclusion: seeds/gnosis_app_marketplace_offers_excluded.csv. Rows match
    on offer_name OR gateway_address (empty string = "ignore this column for
    this row"). Dynamic-inclusion semantic: every new offer automatically
    appears in this model unless explicitly blocklisted — ops team curates
    the seed when a test gateway needs to be hidden.
  columns:
  - name: gateway_address
    description: Address of the PaymentGateway proxy (0x-prefixed, lowercase).
    data_type: String
  - name: offer_name
    description: Offer name as declared in createGateway's `name` input.
    data_type: String
  - name: created_at
    description: Block timestamp of the createGateway call.
    data_type: DateTime
  - name: creator
    description: Owner address emitted in GatewayCreated (0x-prefixed).
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]

- name: int_execution_gnosis_app_marketplace_payments
  description: |
    Gnosis App marketplace payments — one row per PaymentReceived event
    from Circles v2 PaymentGatewayFactory that satisfies ALL of:

      1. Event owner (`payer`) ∈ GA users (int_execution_gnosis_app_users_current)
      2. Outer tx.from ∈ Cometh bundlers (dynamic int_execution_gnosis_app_bundlers)
      3. Outer tx.to = ERC-4337 EntryPoint v0.7 (0x…7727de22…)
      4. Event `gateway` ∈ curated offer set (int_execution_gnosis_app_marketplace_offers)

    Mirrors Dune query_6679414. `amount` is the CRC-scaled (1e18) float
    form of `decoded_params['amount']` — no USD pricing yet (TBD once the
    Circles token price feed is wired).
  columns:
  - name: block_number
    data_type: UInt64
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    description: Outer tx hash (0x-prefixed, lowercase).
    data_type: String
  - name: log_index
    data_type: UInt64
  - name: payer
    description: GA user paying for the offer (0x-prefixed).
    data_type: String
  - name: payee
    description: PaymentGateway's configured payee (0x-prefixed).
    data_type: String
  - name: gateway_address
    data_type: String
  - name: offer_name
    data_type: String
  - name: token_id
    description: CRC v2 token_id paid with (raw uint256).
    data_type: Nullable(UInt256)
  - name: amount_raw
    description: Raw uint256 amount in CRC v2 base units.
    data_type: Nullable(UInt256)
  - name: amount
    description: amount_raw / 1e18 (CRC human units).
    data_type: Nullable(Float64)
  - name: relayer_address
    description: Cometh bundler EOA (0x-prefixed).
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2025-11-12"
      batch_months: 3
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"

- name: int_execution_gnosis_app_user_identities
  description: |
    Pseudonymization boundary for the Gnosis App sector.

    Every address from the snapshot is hashed via pseudonymize_address
    before flowing into any marts model. Upstream addresses are already
    0x-prefixed (the convention used everywhere in the dbt outputs and
    the same form stg_mixpanel_ga__events ingests for wallet-identified
    Mixpanel distinct_ids), so the hash on both sides of the cross-domain
    join is computed over identical inputs.

    Output: one row per Gnosis App user pseudonym, joinable to
    stg_mixpanel_ga__events.user_id_hash on equality.

    No raw_address column is exposed — for v1 we drop it entirely. If a
    later cross-product join (e.g. GP × Gnosis App) needs raw addresses
    for an internal-only intermediate, that join lives upstream of this
    model, not downstream.
  columns:

  - name: user_pseudonym
    description: >
      Keyed pseudonym (UInt64) of the Gnosis App user address. Joinable to
      stg_mixpanel_ga__events.user_id_hash on equality, since both sides
      use the same pseudonymize_address macro and the same salt.
    data_type: UInt64

  - name: first_seen_at
    description: Earliest heuristic hit for this user.
    data_type: DateTime64(0, 'UTC')

  - name: last_seen_at
    description: Most recent heuristic hit for this user.
    data_type: DateTime64(0, 'UTC')

  - name: heuristic_kinds
    description: Distinct rule names triggered by this user.
    data_type: Array(String)

  - name: heuristic_hits
    description: Total number of heuristic events triggered by this user.
    data_type: UInt64

  - name: n_distinct_heuristics
    description: Confidence proxy — number of distinct rules fired.
    data_type: UInt8

  meta:
    owner: analytics_team
    authoritative: false

  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: int_execution_gnosis_app_token_offers
  description: |
    Gnosis App token-offer registry — one row per `NextOffer` instance emitted
    by the Circles v2 ERC20TokenOfferCycle contracts. Each cycle (there are 3
    deployed — v1/v2/v3) periodically emits `NextOfferCreated` for a new sale
    instance with a fixed CRC price and per-user CRC cap; users then pay CRC
    to receive the cycle's `offerToken` (GNO today).

    Sources & join:
      1. CycleConfiguration event on the cycle address — carries offerToken,
         admin, offersStart, offerDuration.
      2. NextOfferCreated event on the same cycle address — carries the
         specific offer (nextOffer) address, tokenPriceInCRC, offerLimitInCRC.
      3. Joined on (contract_address = cycle_address) so each offer is
         enriched with its parent cycle's configuration.
      4. NextOfferTokensDeposited aggregated by offer for supply side.

    Token metadata (symbol, decimals) comes from tokens_whitelist, keyed on
    the lowercase offer_token_address.
  columns:
  - name: offer_address
    description: Address of the specific offer instance (the `nextOffer` field of NextOfferCreated, 0x-prefixed lowercase).
    data_type: String
  - name: cycle_address
    description: Address of the ERC20TokenOfferCycle contract that owns this offer (0x-prefixed lowercase).
    data_type: String
  - name: offer_token_address
    description: Address of the token sold by the offer (e.g. GNO). 0x-prefixed lowercase.
    data_type: String
  - name: offer_token_symbol
    description: Whitelist symbol of the offer token (NULL if not in tokens_whitelist).
    data_type: Nullable(String)
  - name: offer_token_decimals
    description: Whitelist decimals of the offer token (defaults to 18 if not in whitelist).
    data_type: UInt8
  - name: cycle_admin
    description: Admin address configured on the cycle (0x-prefixed lowercase).
    data_type: String
  - name: cycle_starts_at
    description: UTC timestamp of the cycle's first offer (from `offersStart` in CycleConfiguration).
    data_type: Nullable(DateTime)
  - name: offer_duration_seconds
    description: Duration of each offer within the cycle, in seconds.
    data_type: Nullable(UInt64)
  - name: offer_created_at
    description: Block timestamp of the NextOfferCreated event that defined this offer.
    data_type: DateTime
  - name: created_tx_hash
    description: Transaction hash of the NextOfferCreated event (0x-prefixed lowercase).
    data_type: String
  - name: token_price_in_crc_raw
    description: Raw uint256 CRC price per offer_token unit (before decimals scaling).
    data_type: Nullable(UInt256)
  - name: token_price_in_crc
    description: token_price_in_crc_raw / 1e18 (CRC human units per offer_token unit).
    data_type: Float64
  - name: offer_limit_in_crc_raw
    description: Raw uint256 per-user CRC cap for this offer.
    data_type: Nullable(UInt256)
  - name: offer_limit_in_crc
    description: offer_limit_in_crc_raw / 1e18 (CRC human units).
    data_type: Float64
  - name: supply_deposited
    description: |
      Sum of NextOfferTokensDeposited `amount` for this offer, scaled by 1e18.
      Represents the total amount of offer_token made available for claims.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: int_execution_gnosis_app_token_offer_claims
  description: |
    Gnosis App token-offer claims — one row per `OfferClaimed` event emitted
    by any ERC20TokenOfferCycle where the claim was:

      1. The caller (`account`) is a Gnosis App user
         (int_execution_gnosis_app_users_current).
      2. The outer tx was relayed by a Cometh V4 bundler
         (dynamic int_execution_gnosis_app_bundlers, is_active=1).
      3. The outer tx.to is the ERC-4337 EntryPoint v0.7
         (0x0000000071727de22e5e9d8baf0edac6f37da032).

    Mirrors the Dune reference query 6582075. Joined to
    int_execution_gnosis_app_token_offers for offer/cycle/token metadata, and
    to int_execution_token_prices_daily to price `received` (offer_token) in
    USD. `spent` is in CRC base units; no USD pricing yet (CRC price feed TBD).
  columns:
  - name: block_number
    data_type: UInt64
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    description: Outer tx hash (0x-prefixed lowercase).
    data_type: String
  - name: log_index
    data_type: UInt64
  - name: ga_user
    description: GA user who claimed the offer (= OfferClaimed.account). 0x-prefixed lowercase.
    data_type: String
  - name: offer_address
    description: Specific offer instance address (= OfferClaimed.offer). 0x-prefixed lowercase.
    data_type: String
  - name: cycle_address
    description: Parent ERC20TokenOfferCycle contract (NULL if offer not in registry). 0x-prefixed lowercase.
    data_type: Nullable(String)
  - name: offer_token_address
    description: Address of the token delivered to the claimer (e.g. GNO). 0x-prefixed lowercase.
    data_type: Nullable(String)
  - name: offer_token_symbol
    description: Whitelist symbol of the received token (e.g. 'GNO').
    data_type: Nullable(String)
  - name: amount_received_raw
    description: Raw uint256 amount of offer_token received by the claimer.
    data_type: Nullable(UInt256)
  - name: amount_received
    description: amount_received_raw scaled by offer_token_decimals (human units).
    data_type: Float64
  - name: amount_spent_crc_raw
    description: Raw uint256 CRC amount spent by the claimer.
    data_type: Nullable(UInt256)
  - name: amount_spent_crc
    description: amount_spent_crc_raw / 1e18 (CRC human units).
    data_type: Float64
  - name: amount_received_usd
    description: |
      USD value of `amount_received` priced via int_execution_token_prices_daily
      (joined on date + offer_token_symbol). 0.0 on days without a price.
    data_type: Float64
  - name: offer_price_in_crc
    description: Sticker CRC price per offer_token unit at the time of the claim (from the offer registry).
    data_type: Nullable(Float64)
  - name: relayer_address
    description: Cometh V4 bundler EOA that submitted the UserOp (0x-prefixed lowercase).
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2025-11-12"
      batch_months: 3
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_gnosis_app_user_identity_bridge
  description: |
    INTERNAL ONLY — holds raw `address` and `user_pseudonym` together for
    every known Gnosis App user. The only place in the warehouse where
    the (raw address, pseudonym) pairing exists. Other GA-side models
    that need to pseudonymize a raw address column at build time read
    from this bridge instead of recomputing the keyed hash.

    Privacy posture:
    - Tagged `internal_only` + `privacy:tier_internal`.
    - `meta.expose_to_mcp = false` so cerebro-mcp's discover_models filter
      hides the model entirely.
    - Has no `api:<resource>` tag, so cerebro-api's `_build_routes` never
      registers it as an endpoint.
    - cerebro-mcp also denies the bare table name from `execute_query` via
      the `INTERNAL_ONLY_TABLES` runtime guard.

    `pseudonymize_address` is deterministic with the same salt
    (`CEREBRO_PII_SALT`) used by `stg_mixpanel_ga__events`, so the
    `user_pseudonym` written here joins on equality to the
    `user_id_hash` column emitted at Mixpanel ingestion. One row per
    GA user (same row count as `int_execution_gnosis_app_users_current`).
  config:
    contract:
      enforced: false
  columns:
  - name: address
    description: Raw GA user address, lowercase, 0x-prefixed.
    data_type: String
    tests:
    - not_null:
        severity: error
    - unique:
        severity: error
  - name: user_pseudonym
    description: |
      Keyed pseudonym (sipHash64 of salted lowercased address) of the GA
      user. Joinable to `stg_mixpanel_ga__events.user_id_hash` and to GP
      `int_execution_gpay_user_identity_bridge.user_pseudonym` on equality
      because all three apply the same macro with the same salt.
    data_type: UInt64
    tests:
    - not_null:
        severity: error
    - unique:
        severity: error
  - name: first_seen_at
    description: Earliest heuristic hit for this user (carried from `int_execution_gnosis_app_users_current`).
    data_type: DateTime64(0, 'UTC')
  - name: last_seen_at
    description: Most recent heuristic hit for this user.
    data_type: DateTime64(0, 'UTC')
  - name: heuristic_kinds
    description: Distinct heuristic rule names triggered by this user.
    data_type: Array(String)
  - name: heuristic_hits
    description: Total number of heuristic events for this user.
    data_type: UInt64
  - name: n_distinct_heuristics
    description: Confidence proxy — number of distinct rules fired (≥3 = high-confidence GA user).
    data_type: UInt8
  meta:
    owner: analytics_team
    expose_to_mcp: false
    privacy_tier: internal
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_gnosis_app_events_chain_unified
  description: |
    Long-form on-chain GA event log at full timestamp grain, keyed by
    `user_pseudonym` (no raw address ever leaves the bridge). Single
    source of chain-side touchpoints for MTA.

    UNION ALL of seven CTEs, each tagged with a distinct `event_kind`
    starting with `chain.`:

      chain.onboard               — first-ever heuristic hit per user
                                    (from int_execution_gnosis_app_users_current)
      chain.<heuristic_kind>      — seven heuristic rules from
                                    int_execution_gnosis_app_user_events
                                    (circles_register_human, circles_invite_human,
                                    circles_trust, circles_profile_update,
                                    circles_fee, circles_personal_mint,
                                    safe_invitation_module)
      chain.swap_signed           — every PreSignature event in
                                    int_execution_gnosis_app_swaps
      chain.swap_filled           — was_filled subset, ts = first_fill_at
      chain.topup                 — int_execution_gnosis_app_gpay_topups
      chain.marketplace_buy       — int_execution_gnosis_app_marketplace_payments
      chain.token_offer_claim     — int_execution_gnosis_app_token_offer_claims

    Incremental (monthly partition on `event_date`); reads
    user_pseudonym from `int_execution_gnosis_app_user_identity_bridge`.
    Use `grace_hash` join algorithm (set in pre-hook) to keep memory
    bounded across the seven UNIONs.

    `event_kind` is LowCardinality and validated against seed
    `mta_event_kinds.csv` (relationship test, severity warn).
  config:
    contract:
      enforced: false
  columns:
  - name: event_ts
    description: UTC timestamp of the action.
    data_type: DateTime
    tests: [not_null]
  - name: event_date
    description: Calendar date partition key (`toDate(event_ts)`).
    data_type: Date
    tests: [not_null]
  - name: user_pseudonym
    description: Keyed pseudonym of the acting GA user. Joinable to GP and Mixpanel.
    data_type: UInt64
    tests: [not_null]
  - name: event_source
    description: Always `'chain'` in this model. Distinguishes from `'mixpanel'` rows in the unified UNION downstream.
    data_type: LowCardinality(String)
  - name: event_kind
    description: |
      Canonical event kind (e.g. `chain.swap_signed`, `chain.topup`).
      Validated against the seed registry at warn severity so new event
      kinds emitted by the SQL but not declared in the seed surface as
      Elementary warnings instead of breaking the build.
    data_type: LowCardinality(String)
    tests:
    - relationships:
        to: ref('mta_event_kinds')
        field: event_kind
        severity: warn
  - name: event_subkind
    description: |
      Provenance subtype (e.g. `swap_signed`, `topup`, `circles_trust`).
      Lets downstream code group across `chain.X` and `mp.X` versions of
      the same conceptual action.
    data_type: LowCardinality(String)
  - name: amount_usd
    description: USD value of the action where one applies (swap_filled, topup, token_offer_claim). NULL for events without a natural USD amount.
    data_type: Nullable(Float64)
  - name: event_dedup_key
    description: cityHash64 of (kind, transaction_hash, log_index | order_uid | user_pseudonym). Combined with (event_ts, event_kind, user_pseudonym) gives the unique key for the ReplacingMergeTree.
    data_type: UInt64
  - name: provenance_model
    description: Name of the upstream model that produced the row (e.g. `int_execution_gnosis_app_swaps`). Survives the UNION ALL so analysts can audit which feed contributed which event.
    data_type: LowCardinality(String)
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - event_date
      - user_pseudonym
      - event_ts
      - event_kind
      - event_dedup_key
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(event_date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_gnosis_app_user_events_unified
  description: |
    Thin UNION ALL of `int_execution_gnosis_app_events_chain_unified` +
    `int_execution_gnosis_app_events_mixpanel_unified`. The single
    touchpoint table the MTA persona's runtime mapping points at as
    `touchpoint_model`.

    Mixpanel rows are pseudonymized at ingestion using the same salt as
    the bridge — equality on `user_pseudonym` joins chain-side actions
    to in-app sessions for the same human without ever materializing a
    raw address.

    Chain rows have NULL for Mixpanel-only columns
    (`device_type`, `country_code`, `page_path`, `bottom_sheet`);
    Mixpanel rows have NULL for `amount_usd`. Otherwise the schemas
    match column-for-column.

    Incremental, partitioned by month on `event_date`. Low cost — the
    upstreams already enforce incremental boundaries.
  config:
    contract:
      enforced: false
  columns:
  - name: event_ts
    description: UTC timestamp of the action.
    data_type: DateTime
    tests: [not_null]
  - name: event_date
    description: Calendar date partition key.
    data_type: Date
    tests: [not_null]
  - name: user_pseudonym
    description: Keyed pseudonym of the acting GA user.
    data_type: UInt64
    tests: [not_null]
  - name: event_source
    description: '`chain` or `mixpanel` — distinguishes the two halves of the UNION.'
    data_type: LowCardinality(String)
  - name: event_kind
    description: Canonical event kind. `chain.*` for on-chain actions, `mp.*` for Mixpanel events.
    data_type: LowCardinality(String)
  - name: event_subkind
    description: Provenance subtype, lets downstream code group across `chain.X` and `mp.X`.
    data_type: LowCardinality(String)
  - name: amount_usd
    description: USD value where applicable (chain-side only). NULL for Mixpanel rows and chain rows without a natural amount.
    data_type: Nullable(Float64)
  - name: event_dedup_key
    description: Carried from the upstream (chain or mixpanel) for ReplacingMergeTree dedup.
    data_type: UInt64
  - name: provenance_model
    description: Upstream dbt model that produced the row.
    data_type: LowCardinality(String)
  - name: device_type
    description: Mixpanel device type (mobile / desktop / etc.). NULL on chain rows.
    data_type: Nullable(String)
  - name: country_code
    description: Mixpanel country code. NULL on chain rows.
    data_type: Nullable(String)
  - name: page_path
    description: Mixpanel page path / route. NULL on chain rows.
    data_type: Nullable(String)
  - name: bottom_sheet
    description: Mixpanel in-app bottom-sheet identifier. NULL on chain rows.
    data_type: Nullable(String)
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - event_date
      - event_kind
      - user_pseudonym
      - event_ts
      - event_dedup_key
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(event_date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"

- name: int_execution_gnosis_app_conversions
  description: |
    GA conversion registry — one row per observed conversion event,
    with `conversion_kind` carried as a column rather than a separate
    table per kind. The MTA persona filters with
    `WHERE conversion_kind = '<kind>'` to swap conversion targets
    without changing SQL shape.

    Sources (UNION ALL):
      topup              ← int_execution_gnosis_app_gpay_topups
      swap_filled        ← int_execution_gnosis_app_swaps WHERE was_filled
      token_offer_claim  ← int_execution_gnosis_app_token_offer_claims
      marketplace_buy    ← int_execution_gnosis_app_marketplace_payments

    Each source INNER JOINs the identity bridge on lower(raw address) →
    `user_pseudonym`, so this model never holds a raw address.

    Incremental on `conversion_date` (monthly partition). The dedup key
    `conversion_dedup_key` is a cityHash64 of the kind + the smallest
    natural unique key per source (transaction_hash + log_index for
    most; order_uid for swaps).
  config:
    contract:
      enforced: false
  columns:
  - name: conversion_ts
    description: UTC timestamp of the conversion event.
    data_type: DateTime
    tests: [not_null]
  - name: conversion_date
    description: Calendar date partition key.
    data_type: Date
    tests: [not_null]
  - name: user_pseudonym
    description: Keyed pseudonym of the converting user.
    data_type: UInt64
    tests: [not_null]
  - name: conversion_kind
    description: One of `topup`, `swap_filled`, `token_offer_claim`, `marketplace_buy`. Validated against the seed registry.
    data_type: LowCardinality(String)
    tests:
    - not_null
    - relationships:
        to: ref('mta_conversion_kinds')
        field: conversion_kind
        severity: error
  - name: conversion_amount_usd
    description: USD amount where the source carries one (topup / swap_filled / token_offer_claim). NULL for `marketplace_buy` until the CRC price feed lands.
    data_type: Nullable(Float64)
  - name: conversion_token
    description: Token symbol (or offer name for marketplace_buy). NULL where not applicable.
    data_type: Nullable(String)
  - name: conversion_dedup_key
    description: cityHash64 of the kind + natural unique key of the source row. Drives ReplacingMergeTree dedup.
    data_type: UInt64
  - name: provenance_model
    description: Upstream dbt model that produced the row.
    data_type: LowCardinality(String)
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - conversion_date
      - conversion_kind
      - user_pseudonym
      - conversion_ts
      - conversion_dedup_key
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(conversion_date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_gnosis_app_coverage_daily
  description: |
    Per-day, per-conversion-kind tracked-coverage stats. The MTA
    persona reads this to print the coverage block ("X% of topups on
    date D had ≥1 touchpoint in the prior 30 days") without re-running
    the conversion × events self-join.

    "Tracked" definition: a conversion has at least one row in
    `int_execution_gnosis_app_user_events_unified` whose `event_ts`
    falls in `[conversion_ts - 30d, conversion_ts)` AND whose
    `event_kind` is not the conversion's own mapped event_kind
    (leakage guard via the `conversion_kind_to_event_kind` macro — a
    `topup` conversion can't be tracked by its own `chain.topup` event).

    Incremental, partitioned by month on `conversion_date`. Uses
    `grace_hash` join algorithm in pre-hook because the events scan can
    span the full 30-day lookback per conversion-month batch.
  config:
    contract:
      enforced: false
  columns:
  - name: conversion_date
    description: Calendar date of the conversions being summarised.
    data_type: Date
    tests: [not_null]
  - name: conversion_kind
    description: One of the conversion kinds in `int_execution_gnosis_app_conversions`.
    data_type: LowCardinality(String)
    tests: [not_null]
  - name: total_conversions
    description: Number of conversions on this (date, kind).
    data_type: UInt64
  - name: tracked_conversions
    description: Subset with ≥1 prior-30d non-self touch in the unified events table.
    data_type: UInt64
  - name: total_users
    description: Distinct converting users on this (date, kind).
    data_type: UInt64
  - name: tracked_users
    description: Distinct converting users with ≥1 prior-30d non-self touch.
    data_type: UInt64
  - name: tracked_conversion_coverage
    description: '`tracked_conversions / total_conversions` (NULL if total = 0).'
    data_type: Nullable(Float64)
  - name: tracked_user_coverage
    description: '`tracked_users / total_users`.'
    data_type: Nullable(Float64)
  meta:
    owner: analytics_team
    full_refresh:
      start_date: "2025-11-01"
      batch_months: 3
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - conversion_date
      - conversion_kind
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(conversion_date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_gnosis_app_weekly_signals
  description: >
    Composite weekly activity for the Gnosis App WAU metric. UNION of
    Circles v2 active avatars (humans/trusts/mints), filled Cometh-routed
    CoW swaps, and Gnosis App user activity (topup / marketplace / token
    offer claim / swap). Floor date = `var('gnosis_app_wau_floor_date')`.
    Full-rebuild table.
  columns:
  - name: week
    description: Monday-aligned start of the week (UTC).
    data_type: Date
  - name: address
    description: Lowercase user address.
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
- name: int_execution_gnosis_app_weekly_earners
  description: >
    Weekly "economic earners" set for the WEAU metric, scoped to the Gnosis
    App: addresses that earned >= 1 gCRC cashback OR >= 1 CRC inviter fee in
    a given week, filtered to in-app users/actions. Consumes the circles-first
    ecosystem layer (int_execution_circles_v2_economically_active_avatars_weekly),
    keeping only Gnosis App users (int_execution_gnosis_app_users_current) and
    additionally requiring inviter fees to have come through a Gnosis App
    relayer tx (any_in_app_tx = 1). DEFINITION CHANGE vs the original global
    version: earnings via other apps / direct on-chain no longer count here —
    they remain visible in the circles-first layer. Full-rebuild table.
  columns:
  - name: week
    description: Monday-aligned start of the week (UTC).
    data_type: Date
  - name: address
    description: Lowercase earner address.
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
- name: int_execution_gnosis_app_weekly_signals_in_app
  description: >
    IN-APP-ONLY weekly activity signal — companion to
    int_execution_gnosis_app_weekly_signals (the ecosystem-wide WAU feed),
    minus the global Circles avatar leg. In-app Circles actions are already
    captured by the Cometh-relayer heuristics inside
    int_execution_gnosis_app_user_activity_daily, so dropping the global leg
    excludes exactly the out-of-app Circles activity. Full-rebuild table.
  columns:
  - name: week
    description: Monday-aligned start of the week (UTC).
    data_type: Date
  - name: address
    description: Lowercase user address.
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
- name: int_execution_gnosis_app_swap_fees_daily
  description: >
    Daily aggregated CoW protocol fee revenue from Gnosis App swaps.
    `fee_usd` is derived from `fee_amount` (sold-token native units)
    pro-rated against trade USD value:
       fee_usd = fee_amount / amount_sold * amount_usd
    Restricted to filled trades (was_filled = 1).
  columns:
  - {name: date, data_type: Date}
  - {name: n_filled_swaps, data_type: UInt64}
  - {name: n_distinct_takers, data_type: UInt64}
  - {name: volume_usd, data_type: Nullable(Float64)}
  - {name: fee_native_total, description: "Sum of fee_amount in sold-token native units.", data_type: Nullable(Float64)}
  - {name: fee_usd_total, description: "Pro-rated fee in USD.", data_type: Nullable(Float64)}
  - {name: fee_pct_of_volume, description: "fee_usd_total / volume_usd × 100.", data_type: Nullable(Float64)}
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2025-11-12"
      batch_months: 3
  tests:
  - elementary.schema_changes: {severity: warn, tags: [elementary]}
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - date
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"

