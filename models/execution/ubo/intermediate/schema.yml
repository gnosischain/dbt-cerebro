    Same two-track approach as Uniswap V3, but simpler because Swapr's
    IncreaseLiquidity event includes the pool address directly (no
    transaction_hash join needed). Each Swapr V3 pool is its own token
    custodian so container_address is the individual pool address.

    Track A (direct LPs): the pool Mint/Burn owner field is the real LP.
    Track B (via NPM): the owner is the NonfungiblePositionManager
    (0x91fd...). The real LP is resolved from NPM Transfer events.
