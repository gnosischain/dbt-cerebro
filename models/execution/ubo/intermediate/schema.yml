version: 2
models:

- name: int_ubo_second_level_daily
  description: >
    Rows from fct_ubo_supply_claims_daily where ubo_address is itself a known
    container for the bridge token (container_address). These are the "second-
    level" rows that fct_ubo_supply_claims_resolved_daily needs to redistribute.
    Materialized separately so the resolved model can join this tiny table on
    the right (hash-table) side while streaming the full claims dataset through
    on the left (probe) side, avoiding loading millions of rows into a hash
    table. Identical schema and unique key to fct_ubo_supply_claims_daily.
  meta:
    owner: analytics_team
    full_refresh:
      start_date: "2021-04-21"
      batch_months: 6
      stages:
      - name: all
  columns:
  - name: date
    description: Snapshot date.
    data_type: Date
  - name: protocol
    description: Protocol the claim is sourced from.
    data_type: String
  - name: container_address
    description: Lowercase address of the container contract holding the pooled token.
    data_type: String
  - name: token_address
    description: Lowercase address of the underlying token being claimed.
    data_type: String
  - name: ubo_address
    description: Lowercase address of the second-level container (is itself a known container for container_address).
    data_type: String
  - name: symbol
    description: Token symbol.
    data_type: String
  - name: token_class
    description: Token classification.
    data_type: String
  - name: balance_raw
    description: Raw atomic-unit balance (Int256).
    data_type: Int256
  - name: balance
    description: Decimal-normalized balance.
    data_type: Float64
  - name: balance_usd
    description: USD value of the claim.
    data_type: Float64

- name: int_ubo_claims_balancer_v2_daily
  description: >
    Per-protocol UBO supply claims for Balancer V2. Standardized shape: one
    row per (date, container_address, ubo_address, token_address) capturing
    each LP's net withdrawable token balance in the Balancer Vault.

    Balancer V2 uses a single Vault contract (0xba12...2c8) that custodies
    all pool tokens. LPs interact with individual pool contracts but the
    token custody sits in the Vault, so container_address is the Vault for
    every row.

    Balances are computed as a daily cumulative sum of PoolBalanceChanged
    event deltas from stg_pools__dex_liquidity_balancer_v2, keyed by
    (ubo_address, symbol) so that token migrations (e.g. EURe V1 → V2)
    collapse into a single series. token_address is the canonical contract
    per tokens_whitelist (symbol + date range) on each balance date.

    Only whitelisted tokens (tokens_whitelist) are tracked. Positions with
    balance_raw <= 0 are excluded from output.
  columns:
  - name: date
    description: Snapshot date.
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: protocol
    description: Always 'Balancer V2'.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: container_address
    description: Lowercase Vault address (0xba12222222228d8ba445958a75a0704d566bf2c8).
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: token_address
    description: >
      Canonical token address per tokens_whitelist (symbol + date range).
      Resolved at the balance date, so migrated tokens (e.g. EURe) follow
      the canonical successor contract from the migration date onward.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: symbol
    description: Token symbol from tokens_whitelist.
    data_type: String
  - name: token_class
    description: Token classification (STABLECOIN, OTHERS, etc.) from tokens_whitelist.
    data_type: String
  - name: ubo_address
    description: Lowercase address of the LP (liquidityProvider).
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: balance_raw
    description: Cumulative raw atomic-unit balance (Int256).
    data_type: Int256
  - name: balance
    description: Decimal-normalized balance.
    data_type: Float64
  - name: balance_usd
    description: USD value of the balance.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2021-04-21"
      batch_months: 6
      stages:
      - name: all
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns: [date, container_address, ubo_address, token_address]
      tags: [ubo]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - dbt_utils.expression_is_true:
      name: int_ubo_claims_balancer_v2_daily_addresses_lowercase
      expression: "container_address = lower(container_address) AND token_address = lower(token_address) AND ubo_address = lower(ubo_address)"
      tags: [ubo]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - dbt_utils.expression_is_true:
      name: int_ubo_claims_balancer_v2_daily_non_negative_balance
      expression: "balance >= 0 AND balance_raw >= 0"
      tags: [ubo]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"

- name: int_ubo_claims_uniswap_v3_daily
  description: >
    Per-user UBO supply claims for Uniswap V3. Standardized shape: one row
    per (date, container_address, ubo_address, token_address) capturing each
    LP's net withdrawable token balance in a Uniswap V3 pool.

    Unlike Balancer V2 (single Vault), each Uniswap V3 pool is its own token
    custodian so container_address is the individual pool address.

    Two tracks of LP attribution are merged:
      - Track A (direct LPs, ~45%): the pool Mint/Burn event's owner field
        is the real LP — used directly from stg_pools__dex_liquidity_uniswap_v3.
      - Track B (via NPM, ~55%): the pool event's owner is the
        NonfungiblePositionManager (0xae8fbe...). The real LP is resolved by
        decoding NPM Transfer events (ERC-721 ownership per tokenId) and
        joining NPM IncreaseLiquidity/DecreaseLiquidity to pool events via
        transaction_hash.

    Position transfers (LP A mints NFT → transfers to B → B burns) are handled
    by the Transfer event ownership chain. Balances are keyed by (ubo_address,
    symbol, container_address) through the cumsum so token migrations collapse
    into a single series.
  columns:
  - name: date
    description: Snapshot date.
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: protocol
    description: Always 'Uniswap V3'.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: container_address
    description: >
      Lowercase pool address. Each Uniswap V3 pool custodies its own tokens,
      so the container is the pool contract (not a shared vault).
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: token_address
    description: >
      Canonical token address per tokens_whitelist (symbol + date range).
      Resolved at the balance date, so migrated tokens follow the canonical
      successor contract from the migration date onward.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: symbol
    description: Token symbol from tokens_whitelist.
    data_type: String
  - name: token_class
    description: Token classification (STABLECOIN, OTHERS, etc.) from tokens_whitelist.
    data_type: String
  - name: ubo_address
    description: >
      Lowercase address of the LP. For Track A this is the pool event owner;
      for Track B it is the current NFT owner from NPM Transfer events.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: balance_raw
    description: Cumulative raw atomic-unit balance (Int256).
    data_type: Int256
  - name: balance
    description: Decimal-normalized balance.
    data_type: Float64
  - name: balance_usd
    description: USD value of the balance.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2022-04-22"
      batch_months: 6
      stages:
      - name: all
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns: [date, container_address, ubo_address, token_address]
      tags: [ubo]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - dbt_utils.expression_is_true:
      name: int_ubo_claims_uniswap_v3_daily_addresses_lowercase
      expression: "container_address = lower(container_address) AND token_address = lower(token_address) AND ubo_address = lower(ubo_address)"
      tags: [ubo]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - dbt_utils.expression_is_true:
      name: int_ubo_claims_uniswap_v3_daily_non_negative_balance
      expression: "balance >= 0 AND balance_raw >= 0"
      tags: [ubo]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"

- name: int_ubo_claims_swapr_v3_daily
