- name: int_ubo_claims_aave_daily
  description: >
    Per-protocol UBO supply claims for Aave V3 + SparkLend. Standardized
    shape: one row per (date, protocol, container_address, ubo_address)
    capturing the individual end-holder's withdrawable balance in the
    pool. Sourced from int_execution_lending_aave_user_balances_daily
    joined to lending_market_mapping for the container (aToken) address.
    Materialized daily so it can be re-used cheaply by any consumer.

    token_address is the canonical token contract per tokens_whitelist
    (symbol + date range), NOT the raw Aave reserve address. Aave pool
    contracts are immutable so they always reference the original reserve
    address even after token migrations (e.g. EURe V1 0xcb44 → V2 0x420c
    on 2024-08-25). The canonical lookup ensures UBO claims align with
    int_execution_tokens_balances_daily, which also normalises via
    tokens_whitelist.
  columns:
  - name: date
    description: Snapshot date.
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: protocol
    description: 'Aave V3 or SparkLend.'
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: container_address
    description: Lowercase address of the aToken contract that custodies the underlying.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: token_address
    description: >
      Canonical token address per tokens_whitelist (symbol + date range). For
      most tokens this equals the Aave reserve address. For migrated tokens
      (e.g. EURe) it is the canonical successor contract for the claim date,
      matching the address used by int_execution_tokens_balances_daily.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: symbol
    description: Reserve symbol from lending_market_mapping (e.g. 'sDAI', 'WxDAI').
    data_type: String
  - name: token_class
    description: Token classification (STABLECOIN or OTHERS) from the seed.
    data_type: String
  - name: ubo_address
    description: Lowercase address of the individual lender.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: balance_raw
    description: Raw atomic-unit balance (Int256), exact aToken claim converted to underlying units.
    data_type: Int256
  - name: balance
    description: Decimal-normalized balance.
    data_type: Float64
  - name: balance_usd
    description: USD value of the balance.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2022-12-01"
      batch_months: 6
      stages:
      - name: all
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns: [date, protocol, container_address, ubo_address]
      tags: [ubo]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - dbt_utils.expression_is_true:
      name: int_ubo_claims_aave_daily_addresses_lowercase
      expression: "container_address = lower(container_address) AND token_address = lower(token_address) AND ubo_address = lower(ubo_address)"
      tags: [ubo]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - dbt_utils.expression_is_true:
      name: int_ubo_claims_aave_daily_non_negative_balance
      expression: "balance >= 0 AND balance_raw >= 0"
      tags: [ubo]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
