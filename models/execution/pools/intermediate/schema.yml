version: 2
models:

- name: int_execution_pools_lps_daily
  description: Daily LP provider activity from Mint and Burn events on Uniswap V3 and Swapr V3 pools. Tracks event counts, daily unique LP addresses, and a bitmap state for rolling-window deduplication via groupBitmapMerge(). The `owner` field from Mint/Burn events is the actual LP position owner, not a router.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: mint_count
    description: Number of Mint (add liquidity) events on this pool on this day.
    data_type: UInt64
  - name: burn_count
    description: Number of Burn (remove liquidity) events on this pool on this day.
    data_type: UInt64
  - name: lps_minting_daily
    description: Unique LP addresses that minted (added liquidity) on this day.
    data_type: UInt64
  - name: lps_burning_daily
    description: Unique LP addresses that burned (removed liquidity) on this day.
    data_type: UInt64
  - name: lps_bitmap_state
    description: ClickHouse AggregateFunction bitmap state for unique LP addresses (cityHash64). Use groupBitmapMerge() to combine across dates/pools.
    data_type: AggregateFunction(groupBitmap, UInt64)

- name: int_execution_pools_uniswap_v3_daily
  description: Daily Uniswap V3 pool token balances with oracle price enrichment. Built from event deltas (Mint, Burn, Swap, Collect, Flash) with static fee rates from PoolCreated. Separates reserves from unclaimed fees. Includes oracle price, TVL in USD, and pool-implied token price.
  columns: &protocol_model_columns
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    description: Pool contract address (lowercase, with 0x prefix).
    data_type: String
  - name: pool_address_no0x
    description: Pool contract address without 0x prefix.
    data_type: String
  - name: token_address
    data_type: String
  - name: token
    description: Uppercase token symbol from tokens_whitelist (e.g. WETH, USDC.E). Nullable for unknown tokens.
    data_type: Nullable(String)
  - name: token_amount_raw
    description: Total token balance in raw units (Int256).
    data_type: Int256
  - name: token_amount
    description: Total token balance in token units.
    data_type: Float64
  - name: reserve_amount_raw
    description: TVL-contributing reserve balance in raw units (Int256).
    data_type: Int256
  - name: reserve_amount
    description: TVL-contributing reserve balance in token units.
    data_type: Float64
  - name: fee_amount_raw
    description: Unclaimed fee balance in raw units (Int256).
    data_type: Int256
  - name: fee_amount
    description: Unclaimed fee balance in token units.
    data_type: Float64
  - name: price_usd
    description: Oracle token price in USD (from Dune, ASOF join).
    data_type: Float64
  - name: tvl_component_usd
    description: TVL component in USD (reserve_amount * price_usd).
    data_type: Float64
  - name: pool_implied_price_usd
    description: Token price implied by pool reserves (other side TVL / this reserve). Informational only, not used for TVL calculation.
    data_type: Nullable(Float64)

- name: int_execution_pools_swapr_v3_daily
  description: Daily Swapr V3 pool token balances with oracle price enrichment. Built from event deltas with dynamic fee rates via Fee events (ASOF join). Separates reserves from unclaimed fees. Includes oracle price, TVL in USD, and pool-implied token price.
  columns: *protocol_model_columns

- name: int_execution_pools_balancer_v2_daily
  description: Daily Balancer V2 pool token balances with oracle price enrichment. Built from delta events (PoolBalanceChanged, Swap, PoolBalanceManaged). Fee separation not yet implemented. Excludes BPT tokens. Includes oracle price, TVL in USD, and pool-implied token price.
  columns: *protocol_model_columns

- name: int_execution_pools_balancer_v3_daily
  description: Daily Balancer V3 pool token balances with oracle price enrichment. Built from delta events with token config resolution for sentinel addresses. ERC4626 wrappers resolved to underlying for price lookup. Excludes BPT tokens. Includes oracle price, TVL in USD, and pool-implied token price.
  columns: *protocol_model_columns

- name: int_execution_pools_balances_daily
  description: Combined daily pool token balances across all DEX protocols. Thin UNION ALL view of the four protocol-level models (Uniswap V3, Swapr V3, Balancer V2, Balancer V3).
  columns: *protocol_model_columns

- name: int_execution_pools_metrics_daily
  description: Pool-level daily metrics for LP pools. Aggregates TVL from the enriched model, joins fees and swap counts, applies 7D rolling window functions, and computes fee APR. Materialized as a table to avoid ClickHouse 25.10 query analyzer issues with window-function CTEs.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: tvl_usd
    description: Total value locked in the pool in USD.
    data_type: Float64
  - name: fees_usd_daily
    description: Daily accrued fees in USD.
    data_type: Float64
  - name: volume_usd_daily
    description: Daily trading volume in USD.
    data_type: Float64
  - name: swap_count
    description: Number of Swap events on this pool on this day.
    data_type: UInt64
  - name: fee_apr_7d
    description: 7-day trailing fee APR annualized ((fees_7d / tvl_7d_avg) * 365/7 * 100). Null when data is insufficient (< 3 days) or TVL is zero.
    data_type: Nullable(Float64)

- name: int_execution_pools_dex_trades_raw
  description: Raw DEX swap events across all protocols on Gnosis Chain. One row per swap with token metadata but no USD prices. Unions per-protocol staging models (stg_pools__dex_trades_*) and enriches with token symbol/decimals. New protocols can be added by creating a staging model and adding it to the UNION ALL.
  meta:
    full_refresh:
      start_date: "2022-04-01"
      batch_months: 12
  columns:
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    data_type: String
  - name: log_index
    data_type: UInt32
  - name: protocol
    description: Protocol name (Uniswap V3, Swapr V3, Balancer V2, Balancer V3).
    data_type: String
  - name: pool_address
    description: Pool contract address (lowercase, with 0x prefix).
    data_type: String
  - name: token_bought_address
    description: Address of the token received by the taker (lowercase, with 0x prefix).
    data_type: String
  - name: token_bought_symbol
    description: Symbol of the bought token. Nullable for unknown tokens.
    data_type: Nullable(String)
  - name: amount_bought_raw
    description: Amount of token bought in raw units (UInt256). Always non-negative.
    data_type: Nullable(UInt256)
  - name: amount_bought
    description: Amount of token bought in token units (decimal-adjusted).
    data_type: Nullable(Float64)
  - name: token_sold_address
    description: Address of the token spent by the taker (lowercase, with 0x prefix).
    data_type: String
  - name: token_sold_symbol
    description: Symbol of the sold token. Nullable for unknown tokens.
    data_type: Nullable(String)
  - name: amount_sold_raw
    description: Amount of token sold in raw units (UInt256). Always non-negative.
    data_type: Nullable(UInt256)
  - name: amount_sold
    description: Amount of token sold in token units (decimal-adjusted).
    data_type: Nullable(Float64)
  - name: taker
    description: Address receiving the bought tokens. From Swap event recipient field for Uniswap V3 and Swapr V3; NULL for Balancer (event does not include recipient).
    data_type: Nullable(String)

- name: int_execution_pools_dex_trades
  description: DEX swap events enriched with USD prices. Reads from int_execution_pools_dex_trades_raw and adds daily USD prices via ASOF joins. Source of truth for trade-level analytics with USD values.
  meta:
    full_refresh:
      start_date: "2022-04-01"
      batch_months: 12
  columns:
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    data_type: String
  - name: log_index
    data_type: UInt32
  - name: protocol
    description: Protocol name (Uniswap V3, Swapr V3, Balancer V2, Balancer V3).
    data_type: String
  - name: pool_address
    description: Pool contract address (lowercase, with 0x prefix).
    data_type: String
  - name: token_bought_address
    description: Address of the token received by the taker (lowercase, with 0x prefix).
    data_type: String
  - name: token_bought_symbol
    description: Symbol of the bought token. Nullable for unknown tokens.
    data_type: Nullable(String)
  - name: amount_bought_raw
    description: Amount of token bought in raw units (UInt256). Always non-negative.
    data_type: Nullable(UInt256)
  - name: amount_bought
    description: Amount of token bought in token units (decimal-adjusted).
    data_type: Nullable(Float64)
  - name: token_sold_address
    description: Address of the token spent by the taker (lowercase, with 0x prefix).
    data_type: String
  - name: token_sold_symbol
    description: Symbol of the sold token. Nullable for unknown tokens.
    data_type: Nullable(String)
  - name: amount_sold_raw
    description: Amount of token sold in raw units (UInt256). Always non-negative.
    data_type: Nullable(UInt256)
  - name: amount_sold
    description: Amount of token sold in token units (decimal-adjusted).
    data_type: Nullable(Float64)
  - name: amount_usd
    description: Trade value in USD. Uses bought-side price where available, falls back to sold-side.
    data_type: Nullable(Float64)
  - name: taker
    description: Address receiving the bought tokens. From Swap event recipient field for Uniswap V3 and Swapr V3; NULL for Balancer (event does not include recipient).
    data_type: Nullable(String)

- name: int_execution_pools_dex_liquidity_events
  description: Individual LP add/remove events across all protocols on Gnosis Chain. One row per (event, token) — not pivoted to wide format because Balancer pools can hold 2–8 tokens. Unions per-protocol staging models (stg_pools__dex_liquidity_*) and enriches with token metadata and USD prices. New protocols can be added by creating a staging model and adding it to the UNION ALL.
  meta:
    full_refresh:
      start_date: "2022-04-01"
      batch_months: 12
  columns:
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    data_type: String
  - name: log_index
    data_type: UInt32
  - name: protocol
    description: Protocol name (Uniswap V3, Swapr V3, Balancer V2, Balancer V3).
    data_type: String
  - name: pool_address
    description: Pool contract address (lowercase, with 0x prefix).
    data_type: String
  - name: provider
    description: LP wallet address that added or removed liquidity.
    data_type: String
  - name: event_type
    description: Direction of the liquidity event — mint (add) or burn (remove).
    data_type: String
  - name: token_address
    description: Token address for this row (lowercase, with 0x prefix).
    data_type: String
  - name: token_symbol
    description: Token symbol. Nullable for unknown tokens.
    data_type: Nullable(String)
  - name: amount_raw
    description: Token amount in raw units (always positive; direction given by event_type).
    data_type: Nullable(UInt256)
  - name: amount
    description: Token amount in token units (decimal-adjusted).
    data_type: Nullable(Float64)
  - name: amount_usd
    description: Token amount in USD.
    data_type: Nullable(Float64)

- name: int_execution_pools_fees_daily
  description: Daily accrued pool fees and trading volume at pool×token grain for Uniswap V3 and Swapr V3 pools, computed from Swap + Flash events (gross fees; independent of Collect/claims). Swap amounts are treated as signed int256 (two's complement) and pool fee tiers are applied in ppm (1e6 denominator). Volume represents the gross incoming token amount per swap; flash loans contribute 0 volume.
  meta:
    full_refresh:
      start_date: "2023-10-01"
      batch_months: 6
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: token_address
    data_type: String
  - name: token
    data_type: String
  - name: fee_amount
    data_type: Float64
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  - name: fees_usd
    data_type: Float64
  - name: volume_amount
    description: Daily trading volume in token units (gross incoming amount from Swap events).
    data_type: Float64
  - name: volume_usd
    description: Daily trading volume in USD.
    data_type: Float64

- name: int_execution_pools_il_swap_flows_daily
  description: Daily pool-level base data for LVR computation. Combines swap flows (signed int256 token amounts), fees, TVL, and per-token prices/decimals for Uniswap V3 and Swapr V3 pools. Materialized to avoid deep CTE chains.
  columns:
  - name: day
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: tvl_usd
    data_type: Float64
  - name: swap_amount0_raw
    description: Daily sum of signed token0 swap amounts (raw, not decimal-adjusted).
    data_type: Float64
  - name: swap_amount1_raw
    description: Daily sum of signed token1 swap amounts (raw, not decimal-adjusted).
    data_type: Float64
  - name: fees_usd_daily
    data_type: Float64
  - name: decimals0
    data_type: UInt8
  - name: price0_usd
    data_type: Float64
  - name: decimals1
    data_type: UInt8
  - name: price1_usd
    data_type: Float64
