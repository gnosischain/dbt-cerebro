version: 2

models:
- name: stg_pools__v3_pool_registry
  description: >
    Complete registry of Uniswap V3 and Swapr V3 (Algebra) pools on Gnosis Chain.
    Combines factory creation events with pool Initialize events to produce a single
    source of truth for pool metadata. Includes fee tier (static for UniV3, NULL for
    Swapr with dynamic fees), tick spacing, initialization price/tick, and creation
    timestamp. Replaces the former int_execution_yields_v3_pool_meta view.
  columns:
  - name: protocol
    data_type: String
  - name: pool_address
    description: Pool contract address (lowercase, with 0x prefix).
    data_type: String
  - name: pool_address_no0x
    description: Pool contract address without 0x prefix (for join compatibility).
    data_type: String
  - name: token0_address
    data_type: String
  - name: token1_address
    data_type: String
  - name: fee_tier_ppm
    description: Static fee tier in parts per million. Set for UniV3 (100/500/3000/10000), NULL for Swapr (dynamic fees).
    data_type: Nullable(UInt32)
  - name: tick_spacing
    description: Tick spacing for the pool. For Swapr, reflects latest TickSpacing event if changed.
    data_type: Nullable(Int32)
  - name: init_tick
    description: Tick at pool initialization (from Initialize event). NULL if pool was never initialized.
    data_type: Nullable(Int32)
  - name: init_sqrt_price_x96
    description: sqrtPriceX96 at pool initialization. String to preserve full precision.
    data_type: Nullable(String)
  - name: created_at
    description: Block timestamp of the factory creation event.
    data_type: DateTime

- name: stg_pools__uniswap_v3_events
  description: >
    Normalized event deltas for Uniswap V3 pools.
    Parses Mint, Burn, Swap, Collect, Flash events into signed token deltas per token position.
  columns:
  - name: pool_address
    description: Pool contract address without 0x prefix.
    data_type: String
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    data_type: String
  - name: log_index
    data_type: UInt64
  - name: event_type
    description: Event name (Mint, Burn, Swap, Collect, Flash).
    data_type: String
  - name: token_position
    description: Which token in the pair (token0 or token1).
    data_type: String
  - name: delta_amount_raw
    description: Signed raw token delta (positive = tokens entering pool, negative = leaving).
    data_type: Int256
  - name: delta_category
    description: >
      Classification for fee separation logic.
      Values: liquidity (Mint/Burn), swap_in (positive swap side),
      swap_out (negative swap side), fee_collection (Collect), flash_fee (Flash).
    data_type: String

- name: stg_pools__swapr_v3_events
  description: >
    Normalized event deltas for Swapr V3 (Algebra) pools.
    Same structure as stg_pools__uniswap_v3_events.
  columns:
  - name: pool_address
    description: Pool contract address without 0x prefix.
    data_type: String
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    data_type: String
  - name: log_index
    data_type: UInt64
  - name: event_type
    data_type: String
  - name: token_position
    data_type: String
  - name: delta_amount_raw
    data_type: Int256
  - name: delta_category
    data_type: String

- name: stg_pools__tokens_meta
  description: >
    Normalized token metadata from the tokens_whitelist seed. Provides lowercase address,
    uppercase symbol (nullable via nullIf), decimals, and validity window
    (date_start/date_end). Single source of truth for token_address → symbol mapping
    across all pool models.
  columns:
  - name: token_address
    description: Lowercase token contract address.
    data_type: String
  - name: token
    description: Uppercase token symbol (e.g. WETH, USDC.E). Null for empty/whitespace-only symbols.
    data_type: Nullable(String)
  - name: decimals
    data_type: UInt8
  - name: date_start
    data_type: Date
  - name: date_end
    data_type: Nullable(Date)

- name: stg_pools__balancer_v3_pool_tokens
  description: >
    Ordered token list per Balancer V3 pool derived from Swap events. Balancer V3 stores
    tokens in ascending address order; ROW_NUMBER() over sorted unique token addresses
    reproduces the same 0-based index used in LiquidityAdded/LiquidityRemoved amountsRaw
    arrays. Tokens are the ERC4626 wrappers the pool actually holds (e.g. waGnoGNO,
    waGnoWETH) — resolve to underlying via stg_pools__balancer_v3_token_map for price
    lookups. Only pools with at least one Swap event appear; pools with deposited
    liquidity but zero swaps are excluded (negligible activity in practice).
  columns:
  - name: pool_address
    description: Pool contract address without 0x prefix.
    data_type: String
  - name: token_address
    description: Wrapper token address held by the pool (lowercase, with 0x prefix). Resolve to underlying via stg_pools__balancer_v3_token_map for price lookups.
    data_type: String
  - name: token_index
    description: 0-based position of this token in the pool, matching the index of amountsAddedRaw/amountsRemovedRaw in liquidity events.
    data_type: UInt64

- name: stg_pools__dex_trades_uniswap_v3
  description: Uniswap V3 swap events decoded from Pool Swap events. Determines bought/sold via amount0/amount1 sign convention. Ephemeral — inlined into int_execution_pools_dex_trades_raw.
  columns: &dex_trades_columns
  - name: block_number
    data_type: UInt32
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    data_type: String
  - name: log_index
    data_type: UInt32
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: token_bought_address
    data_type: String
  - name: amount_bought_raw
    data_type: Nullable(UInt256)
  - name: token_sold_address
    data_type: String
  - name: amount_sold_raw
    data_type: Nullable(UInt256)
  - name: taker
    data_type: Nullable(String)

- name: stg_pools__dex_trades_swapr_v3
  description: Swapr V3 (Algebra fork) swap events. Same sign logic as Uniswap V3. Ephemeral.
  columns: *dex_trades_columns

- name: stg_pools__dex_trades_balancer_v2
  description: Balancer V2 Vault Swap events with tokenIn/tokenOut fields. Pool ID resolved to pool address via PoolRegistered. Ephemeral.
  columns: *dex_trades_columns

- name: stg_pools__dex_trades_balancer_v3
  description: Balancer V3 Vault Swap events with wrapper-to-underlying token resolution via stg_pools__balancer_v3_token_map. Ephemeral.
  columns: *dex_trades_columns

- name: stg_pools__dex_liquidity_uniswap_v3
  description: >
    Uniswap V3 Mint, Burn, and Collect (fee claim) events unpacked into one row per
    token per event. Includes tick range and liquidity delta for position tracking.
    Ephemeral — inlined into int_execution_pools_dex_liquidity_events.
  columns: &dex_liquidity_columns
  - name: block_number
    data_type: UInt32
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    data_type: String
  - name: log_index
    data_type: UInt32
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: provider
    data_type: String
  - name: event_type
    description: "Direction/type of event: mint (add liquidity), burn (remove liquidity), or collect (claim fees; V3 only)."
    data_type: String
  - name: token_address
    data_type: String
  - name: amount_raw
    data_type: Nullable(UInt256)
  - name: tick_lower
    description: Lower tick bound of the position. Set for V3 Mint/Burn/Collect events, NULL for Balancer.
    data_type: Nullable(Int32)
  - name: tick_upper
    description: Upper tick bound of the position. Set for V3 Mint/Burn/Collect events, NULL for Balancer.
    data_type: Nullable(Int32)
  - name: liquidity_delta
    description: Signed change in liquidity units. Positive for Mint, negative for Burn, NULL for Collect and Balancer events. Same value on both token rows of the same event.
    data_type: Nullable(Int256)

- name: stg_pools__dex_liquidity_swapr_v3
  description: >
    Swapr V3 (Algebra) Mint, Burn, and Collect events. Same structure as Uniswap V3.
    Uses bottomTick/topTick (Algebra naming) mapped to tick_lower/tick_upper.
    Ephemeral.
  columns: *dex_liquidity_columns

- name: stg_pools__dex_liquidity_balancer_v2
  description: >
    Balancer V2 PoolBalanceChanged events with JSON array unpacking for multi-token
    pools. tick_lower, tick_upper, and liquidity_delta are NULL (full-range pools,
    no concentrated liquidity). Ephemeral.
  columns: *dex_liquidity_columns

- name: stg_pools__dex_liquidity_balancer_v3
  description: >
    Balancer V3 LiquidityAdded/LiquidityRemoved events with positional array
    unpacking and wrapper-to-underlying token resolution. tick_lower, tick_upper,
    and liquidity_delta are NULL (full-range pools). Ephemeral.
  columns: *dex_liquidity_columns

- name: stg_pools__token_prices_daily
  description: Normalized daily token prices keyed by uppercase symbol. Wraps int_execution_token_prices_daily with consistent types and column naming. Referenced by enriched, fees, TVL, and LVR models.
  columns:
  - name: date
    data_type: Date
  - name: token
    description: Uppercase token symbol matching stg_pools__tokens_meta.token.
    data_type: Nullable(String)
  - name: price_usd
    data_type: Float64

- name: stg_pools__balancer_v3_token_map
  description: >
    Balancer V3 ERC4626 wrapper → underlying token mapping. Used to resolve wrapped
    Aave tokens (waGno*) to their underlying for price lookups and token symbol
    resolution. Hardcoded for the 5 Aave wrappers on Gnosis Chain; wrapper tokens
    are ~1:1 with underlying (plus accrued yield).
  columns:
  - name: wrapper_address
    description: ERC4626 wrapper token address (lowercase).
    data_type: String
  - name: wrapper_symbol
    data_type: String
  - name: wrapper_decimals
    data_type: UInt8
  - name: underlying_address
    description: Underlying token address that the wrapper resolves to.
    data_type: String

- name: stg_pools__v3_current_tick
  description: >
    Latest tick per V3 pool derived from the most recent Swap event. Used
    to determine whether concentrated-liquidity LP positions are in-range.
    Covers Uniswap V3 and Swapr V3 pools; Balancer pools have no tick
    concept and are excluded.
  columns:
  - name: pool_address
    description: Pool contract address (lowercase, with 0x prefix).
    data_type: String
  - name: protocol
    data_type: String
  - name: current_tick
    description: Tick value from the most recent Swap event on this pool.
    data_type: Nullable(Int32)
