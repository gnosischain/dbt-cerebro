version: 2
models:

- name: fct_execution_pools_daily
  description: Daily pool-level metrics for top Uniswap V3 and Swapr V3 pools on Gnosis Chain, including TVL (USD), accrued fees, and 7D trailing fee APR. Filtered to top 5 pools per token by 30-day average TVL.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: pool
    data_type: String
  - name: token_address
    data_type: String
  - name: token
    data_type: String
  - name: tvl_usd
    data_type: Float64
  - name: fees_usd_daily
    data_type: Float64
  - name: volume_usd_daily
    description: Daily trading volume in USD (gross incoming amounts from Swap events).
    data_type: Float64
  - name: swap_count
    description: Number of Swap events on this pool on this day.
    data_type: UInt64
  - name: fee_apr_7d
    data_type: Float64
  - name: lvr_apr_7d
    description: Annualised 7-day Loss Versus Rebalancing (LVR) — the cost LPs pay to arbitrageurs from swap flows, as a percentage of TVL. Always <= 0 (negative = loss).
    data_type: Float64
  - name: net_apr_7d
    description: Net APR (fee_apr_7d + lvr_apr_7d). Represents the estimated real return after LVR cost.
    data_type: Float64
  tests:
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: fct_execution_pools_il_daily
  description: >
    Pool-level Loss Versus Rebalancing (LVR) from actual swap flows.
    LVR measures the cost LPs pay to arbitrageurs — the value extracted via swap
    rebalancing. Sign convention: negative = loss (arbitrage extracted value),
    positive = gain. Swap events already embed the concentrated-liquidity math
    executed by the pool contract, so this captures V3 amplification without
    per-position tracking. Each day's swap flows are valued at that day's token
    prices, then summed over the 7-day window.
    lvr_apr_7d = (swap_flow_usd_7d − fees_usd_7d) / avg_tvl_7d × (365/7) × 100.
    Fees are subtracted because swap event amounts include fees on the input side.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: lvr_apr_7d
    description: Annualised 7-day trailing LVR (%). Always <= 0 (negative = loss). Represents the cost of adverse selection from arbitrage swaps, with fee revenue stripped from raw swap flows.
    data_type: Nullable(Float64)

- name: api_execution_pools_net_apr_daily
  description: API view for net APR (fee APR plus LVR) time series by token and pool label, with fee APR and LVR components.
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: fee_apr_7d
    data_type: Float64
  - name: lvr_apr_7d
    data_type: Float64
  - name: net_apr_7d
    data_type: Float64

    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: api_execution_pools_tvl_daily
  description: API view for pool TVL (USD) time series by token and pool label.
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: tvl_type
    data_type: String
  - name: value
    data_type: Float64
  tests:
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: api_execution_pools_fee_apr_7d_daily
  description: API view for fee APR (7D trailing) time series by token and pool label (Uniswap V3/Swapr V3 only). Uses accrued fees from Swap + Flash (gross; independent of Collect/claims).
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: apy_type
    data_type: String
  - name: value
    data_type: Float64

- name: api_execution_pools_volume_7d
  description: API view for 7-day total trading volume per token (snapshot from fct_execution_pools_snapshots).
  columns:
  - name: token
    data_type: String
  - name: value
    description: Total trading volume (USD) over the last 7 days.
    data_type: Float64
  - name: change_pct
    description: Percentage change vs prior 7-day window.
    data_type: Float64

- name: api_execution_pools_volume_daily
  description: API view for daily trading volume (USD) by token and pool, sourced from fct_execution_pools_daily.
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: volume_type
    data_type: String
  - name: value
    description: Daily gross trading volume in USD.
    data_type: Float64

- name: api_execution_pools_fees_usd_daily
  description: API view for daily fee revenue (USD) by token and pool, sourced from fct_execution_pools_daily.
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: value
    description: Daily gross fee revenue in USD.
    data_type: Float64

- name: api_execution_pools_swap_count_daily
  description: API view for daily swap event count by token and pool, sourced from fct_execution_pools_daily.
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: value
    description: Number of Swap events on this pool on this day.
    data_type: UInt64

- name: fct_execution_pools_lps_latest
  description: >
    Unique LP provider counts per token over rolling time windows with change_pct vs
    prior window. Mirrors the lending pattern in fct_execution_lending_latest. Uses
    bitmap merge (groupBitmapMerge) to deduplicate LP addresses across pools and days
    within each window.
  columns:
  - name: window
    description: "Time window label: 7D."
    data_type: String
  - name: token
    data_type: String
  - name: value
    description: Unique LP addresses within the window across all pools containing this token.
    data_type: Float64
  - name: change_pct
    description: Percentage change vs prior window of the same length.
    data_type: Float64

- name: api_execution_pools_lps_count_7d
  description: API view for unique LP provider count over the last 7 days per token.
  columns:
  - name: token
    data_type: String
  - name: value
    data_type: Float64
  - name: change_pct
    data_type: Float64

- name: api_execution_pools_lp_activity_daily
  description: >
    API view for daily LP activity (Mint/Burn event counts) per pool per token,
    unpivoted into one row per event type for the BarChart seriesField. Reuses pool
    labels and top-pool filtering from fct_execution_pools_daily.
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: mints
    description: Total Mint events across all pools containing this token on this day.
    data_type: UInt64
  - name: burns
    description: Total Burn events across all pools containing this token on this day.
    data_type: UInt64

- name: fct_execution_pools_tvl_token_daily
  description: >
    Per-token TVL composition within pools with server-side denomination. Three TVL
    columns are pre-computed: tvl_usd (component TVL in USD), tvl_in_token0
    (denominated in pool's token0 via cross-rate), and tvl_in_token1 (denominated in
    pool's token1 via cross-rate).
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: token_address
    data_type: String
  - name: series
    description: Token symbol for this row (used as chart series key).
    data_type: Nullable(String)
  - name: token_amount
    description: Reserve balance in token units.
    data_type: Float64
  - name: tvl_usd
    description: Component TVL in USD.
    data_type: Float64
  - name: tvl_in_token0
    description: Component TVL denominated in pool's token0 (cross-rate).
    data_type: Nullable(Float64)
  - name: tvl_in_token1
    description: Component TVL denominated in pool's token1 (cross-rate).
    data_type: Nullable(Float64)
  - name: token0_symbol
    data_type: Nullable(String)
  - name: token1_symbol
    data_type: Nullable(String)
  - name: ref_token
    description: Reference token from fct_execution_pools_daily (the token this pool is grouped under).
    data_type: String
  - name: pool
    description: Pool label from fct_execution_pools_daily.
    data_type: String

- name: fct_execution_pools_snapshots
  description: Snapshot KPI table for pool yields. Each row is a (token, metric) pair with the latest value and 7-day percentage change. Metrics include TVL_Latest, Fees_7D, and Volume_7D.
  columns:
  - name: token
    data_type: String
  - name: metric
    description: "Metric name: TVL_Latest, Fees_7D, or Volume_7D."
    data_type: String
  - name: value
    data_type: Float64
  - name: change_pct
    description: Percentage change vs prior 7-day window (or vs 7 days ago for TVL).
    data_type: Float64

- name: api_execution_trades_stats_volume_ts
  description: >
    Daily USD volume of DEX trades across Gnosis Chain, stacked by protocol.
    Volume is summed per hop, so multi-hop trades contribute to every
    protocol they touch. Feeds the top chart on the Trades → Stats tab.
  columns:
  - name: date
    data_type: Date
  - name: label
    description: Protocol (Uniswap V3, Balancer V2/V3, Swapr V3).
    data_type: String
  - name: value
    description: Sum of per-hop `amount_usd` for that (day, protocol).
    data_type: Float64

- name: api_execution_trades_stats_aggregator_share_ts
  description: >
    Daily aggregator market share as percentage of trades (one trade = one
    transaction, aggregator = the labeled `tx_to` via int_crawlers_data_labels
    or "Direct" when unlabeled). Each date sums to 100.
  columns:
  - name: date
    data_type: Date
  - name: label
    description: Aggregator/router name or "Direct" for unlabeled `tx_to`.
    data_type: String
  - name: value
    description: Percentage share of trades for this aggregator on this date.
    data_type: Float64

- name: api_execution_trades_stats_top_tokens_weekly
  description: >
    Weekly token activity for the top-8 tokens by lifetime volume (sold +
    bought combined). All other tokens are rolled into "Other". Top-8 is
    computed globally so stack colors are stable across window changes.
    Each hop contributes to both its sold and bought token. Returns both
    volume and trade-count metrics so the dashboard can toggle between them.
  columns:
  - name: date
    description: Week start (Monday). Used as the x-axis for stacked bars.
    data_type: Date
  - name: label
    description: Token symbol (one of the top-8) or "Other".
    data_type: String
  - name: value_volume
    description: USD volume for that (week, token), summed across sold+bought sides.
    data_type: Float64
  - name: value_trades
    description: Count of unique transactions touching that token in the week.
    data_type: UInt64

- name: api_execution_trades_stats_hop_distribution
  description: >
    Static hop-count distribution over the last 30 days. One row per
    bucket (1, 2, 3, 4+ hops) with the share (%) of trades and raw count.
    Not affected by the dashboard time window.
  columns:
  - name: label
    description: Hop-count bucket label ("1 hop", "2 hops", "3 hops", "4+ hops").
    data_type: String
  - name: value
    description: Percentage of trades in this bucket over the last 30 days.
    data_type: Float64
  - name: trade_count
    description: Raw number of trades in this bucket.
    data_type: UInt64
  - name: bucket_order
    description: Sort order for the bucket (1..4). Used by the dashboard to render the x-axis.
    data_type: UInt8

- name: api_execution_trades_stats_size_distribution
  description: >
    Static trade-size distribution over the last 30 days. Trade USD is the
    max of per-hop amount_usd within a transaction. Buckets:
    &lt;$100, $100–$1K, $1K–$10K, $10K–$100K, $100K+. Not affected by the
    dashboard time window.
  columns:
  - name: label
    description: USD size bucket.
    data_type: String
  - name: value
    description: Percentage of trades in this bucket over the last 30 days.
    data_type: Float64
  - name: trade_count
    description: Raw number of trades in this bucket.
    data_type: UInt64
  - name: bucket_order
    description: Sort order for the bucket (1..5). Used by the dashboard to render the x-axis.
    data_type: UInt8

- name: api_execution_trades_stats_net_flow
  description: >
    Top 10 tokens by absolute net USD flow over the last 30 days. A token's
    net is bought-side USD minus sold-side USD. Positive = net accumulation,
    negative = net distribution. Rendered as a diverging bar on the Stats tab.
  columns:
  - name: label
    description: Token symbol.
    data_type: String
  - name: value
    description: Net USD flow (signed). Positive = net bought, negative = net sold.
    data_type: Float64
  - name: bought_usd
    description: Total USD value bought into this token over 30d.
    data_type: Float64
  - name: sold_usd
    description: Total USD value sold out of this token over 30d.
    data_type: Float64

- name: api_execution_trades_stats_lifetime
  description: >
    One-row lifetime summary of DEX trading on Gnosis Chain. Feeds the four
    fixed tiles at the bottom of the Trades → Stats tab — always all-time,
    never affected by the window selector.
  columns:
  - name: lifetime_volume_usd
    description: All-time sum of per-hop `amount_usd`.
    data_type: Float64
  - name: lifetime_trade_count
    description: All-time distinct transaction count.
    data_type: UInt64
  - name: lifetime_unique_traders
    description: All-time distinct `tx_from` count.
    data_type: UInt64
  - name: first_trade_date
    description: Date of the earliest indexed DEX trade.
    data_type: Date
