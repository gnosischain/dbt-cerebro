- name: fct_execution_gpay_balance_cohorts_daily
  description: Daily distribution of Gnosis Pay wallet balances segmented into cohort buckets by token, showing holder counts and values.
  columns:

  - name: date
    description: The calendar date of the balance snapshot.
    data_type: Date
    tests:
    - not_null

  - name: symbol
    description: The token symbol.
    data_type: String

  - name: cohort_unit
    description: The unit used for cohort bucketing (e.g., USD, native).
    data_type: String

  - name: balance_bucket
    description: The balance range bucket label.
    data_type: String

  - name: holders
    description: The number of wallets in this balance bucket.
    data_type: UInt64

  - name: value_native
    description: The total native token value held by wallets in this bucket.
    data_type: Float64

  - name: value_usd
    description: The total USD value held by wallets in this bucket.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_balances_by_token_daily
  description: Daily aggregate token balances across all Gnosis Pay wallets, in both native and USD values.
  columns:

  - name: date
    description: The calendar date of the balance snapshot.
    data_type: Date
    tests:
    - not_null

  - name: symbol
    description: The token symbol.
    data_type: String

  - name: balance
    description: The total balance in native token units.
    data_type: Float64

  - name: balance_usd
    description: The total balance in USD.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_cashback_cohort_retention_monthly
  description: Monthly cohort retention analysis for Gnosis Pay cashback recipients, tracking user counts and retention percentages over time.
  columns:

  - name: cohort_month
    description: The month when the cashback cohort was first active.
    data_type: Date
    tests:
    - not_null

  - name: activity_month
    description: The month of observed activity for the cohort.
    data_type: Date

  - name: months_since
    description: The number of months elapsed since the cohort month.
    data_type: UInt64

  - name: users
    description: The number of users from the cohort active in the activity month.
    data_type: UInt64

  - name: initial_users
    description: The total number of users in the original cohort.
    data_type: UInt64

  - name: retention_pct
    description: The user retention percentage (users / initial_users).
    data_type: Float64

  - name: amount_retention_pct
    description: The cashback amount retention percentage.
    data_type: Float64

  - name: amount_usd
    description: The total cashback amount in USD for the cohort in this month.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_cashback_dist_weekly
  description: Weekly distribution of Gnosis Pay cashback amounts using percentile statistics.
  columns:

  - name: week
    description: The first day of the ISO week.
    data_type: Date
    tests:
    - not_null

  - name: unit
    description: The currency unit for the distribution values (e.g., USD, GNO).
    data_type: String

  - name: q05
    description: The 5th percentile of cashback amounts.
    data_type: Float64

  - name: q10
    description: The 10th percentile of cashback amounts.
    data_type: Float64

  - name: q25
    description: The 25th percentile of cashback amounts.
    data_type: Float64

  - name: q50
    description: The median (50th percentile) of cashback amounts.
    data_type: Float64

  - name: q75
    description: The 75th percentile of cashback amounts.
    data_type: Float64

  - name: q90
    description: The 90th percentile of cashback amounts.
    data_type: Float64

  - name: q95
    description: The 95th percentile of cashback amounts.
    data_type: Float64

  - name: average
    description: The average cashback amount.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_cashback_impact_monthly
  description: Monthly analysis of cashback impact on Gnosis Pay user segments, comparing payment behavior between cashback and non-cashback users.
  columns:

  - name: month
    description: The first day of the month.
    data_type: Date
    tests:
    - not_null

  - name: segment
    description: The user segment (e.g., cashback recipient, non-cashback).
    data_type: String

  - name: users
    description: The number of users in this segment.
    data_type: UInt64

  - name: payment_volume_usd
    description: The total payment volume in USD for this segment.
    data_type: Float64

  - name: payment_count
    description: The total number of payments for this segment.
    data_type: UInt64

  - name: avg_volume_per_user
    description: The average payment volume per user in USD.
    data_type: Float64

  - name: avg_tx_per_user
    description: The average number of transactions per user.
    data_type: Float64

  - name: deposit_volume_usd
    description: The total deposit volume in USD for this segment.
    data_type: Float64

  - name: withdrawal_volume_usd
    description: The total withdrawal volume in USD for this segment.
    data_type: Float64

  - name: net_flow_usd
    description: The net flow (deposits minus withdrawals) in USD.
    data_type: Float64

  - name: pct_of_total_volume
    description: The percentage of total payment volume this segment represents.
    data_type: Float64

  - name: pct_of_total_users
    description: The percentage of total users this segment represents.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_cashback_recipients_weekly
  description: Weekly count of unique Gnosis Pay cashback recipients.
  columns:

  - name: week
    description: The first day of the ISO week.
    data_type: Date
    tests:
    - not_null

  - name: recipients
    description: The number of unique wallets that received cashback in this week.
    data_type: UInt64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_churn_monthly
  description: Monthly user churn and retention analysis for Gnosis Pay, breaking down users into new, retained, returning, and churned segments.
  columns:

  - name: scope
    description: The activity scope for churn calculation (e.g., all, payment).
    data_type: String

  - name: month
    description: The first day of the month.
    data_type: Date
    tests:
    - not_null

  - name: new_users
    description: Users active for the first time this month.
    data_type: UInt64

  - name: retained_users
    description: Users active in both this and the previous month.
    data_type: UInt64

  - name: returning_users
    description: Users returning after a period of inactivity.
    data_type: UInt64

  - name: churned_users
    description: Users active last month but not this month.
    data_type: UInt64

  - name: total_active
    description: Total active users this month.
    data_type: UInt64

  - name: churn_rate
    description: The percentage of last month's users who churned.
    data_type: Float64

  - name: retention_rate
    description: The percentage of last month's users who were retained.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_flows_snapshot
  description: Snapshot of token flow patterns between Gnosis Pay wallet labels across different time windows.
  columns:

  - name: window
    description: The time window for the flow snapshot (e.g., 7D, 30D, All).
    data_type: String

  - name: days
    description: The number of days in the time window.
    data_type: UInt64

  - name: symbol
    description: The token symbol involved in the flow.
    data_type: String

  - name: from_label
    description: The source label of the flow (e.g., External, GPay Wallet).
    data_type: String

  - name: to_label
    description: The destination label of the flow.
    data_type: String

  - name: amount_usd
    description: The total USD value of the flow.
    data_type: Float64

  - name: tf_cnt
    description: The number of individual transfers in the flow.
    data_type: UInt64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_kpi_monthly
  description: Monthly key performance indicators for Gnosis Pay including MAU, payment volume, deposits, withdrawals, cashback, and user engagement metrics.
  columns:

  - name: month
    description: The first day of the month.
    data_type: Date
    tests:
    - not_null

  - name: mau
    description: Monthly active users across all activity types.
    data_type: UInt64

  - name: payment_mau
    description: Monthly active users who made payments.
    data_type: UInt64

  - name: deposit_mau
    description: Monthly active users who made deposits.
    data_type: UInt64

  - name: withdrawal_mau
    description: Monthly active users who made withdrawals.
    data_type: UInt64

  - name: cashback_mau
    description: Monthly active users who received cashback.
    data_type: UInt64

  - name: total_payment_volume_usd
    description: Total payment volume in USD for the month.
    data_type: Float64

  - name: total_payment_count
    description: Total number of payments in the month.
    data_type: UInt64

  - name: total_deposit_volume_usd
    description: Total deposit volume in USD for the month.
    data_type: Float64

  - name: total_withdrawal_volume_usd
    description: Total withdrawal volume in USD for the month.
    data_type: Float64

  - name: net_flow_usd
    description: Net flow (deposits minus withdrawals) in USD for the month.
    data_type: Float64

  - name: cashback_total_usd
    description: Total cashback distributed in USD for the month.
    data_type: Float64

  - name: cashback_total_gno
    description: Total cashback distributed in GNO tokens for the month.
    data_type: Float64

  - name: refund_total_usd
    description: Total refund value in USD for the month.
    data_type: Float64

  - name: reversal_total_usd
    description: Total reversal value in USD for the month.
    data_type: Float64

  - name: arpu
    description: Average revenue per user in USD.
    data_type: Float64

  - name: avg_tx_per_user
    description: Average number of transactions per active user.
    data_type: Float64

  - name: repeat_purchase_rate
    description: Percentage of users who made more than one payment.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_owner_balances_by_token_daily
  description: Daily aggregate token balances across Gnosis Pay wallet owners (as opposed to wallet addresses), in both native and USD values.
  columns:

  - name: date
    description: The calendar date of the balance snapshot.
    data_type: Date
    tests:
    - not_null

  - name: symbol
    description: The token symbol.
    data_type: String

  - name: balance
    description: The total balance in native token units.
    data_type: Float64

  - name: balance_usd
    description: The total balance in USD.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_payments_hourly
  description: Hourly payment counts for Gnosis Pay broken down by token symbol.
  columns:

  - name: hour
    description: The hour timestamp of the payment activity.
    data_type: DateTime

  - name: symbol
    description: The token symbol used for payments.
    data_type: String

  - name: payment_count
    description: The number of payments made in this hour for this token.
    data_type: UInt64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_retention_by_action_monthly
  description: Monthly cohort retention analysis for Gnosis Pay users broken down by action type, tracking user counts and retention over time.
  columns:

  - name: action
    description: The activity type (e.g., Payment, Deposit, Withdrawal).
    data_type: String

  - name: cohort_month
    description: The month when the cohort was first active.
    data_type: Date
    tests:
    - not_null

  - name: activity_month
    description: The month of observed activity for the cohort.
    data_type: Date

  - name: months_since
    description: The number of months elapsed since the cohort month.
    data_type: UInt64

  - name: users
    description: The number of users from the cohort active in the activity month.
    data_type: UInt64

  - name: initial_users
    description: The total number of users in the original cohort.
    data_type: UInt64

  - name: retention_pct
    description: The user retention percentage (users / initial_users).
    data_type: Float64

  - name: amount_retention_pct
    description: The amount retention percentage.
    data_type: Float64

  - name: amount_usd
    description: The total USD amount for the cohort in this activity month.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_retention_monthly
  description: Monthly cohort retention analysis for all Gnosis Pay activity, tracking user counts and retention percentages over time.
  columns:

  - name: cohort_month
    description: The month when the cohort was first active.
    data_type: Date
    tests:
    - not_null

  - name: activity_month
    description: The month of observed activity for the cohort.
    data_type: Date

  - name: months_since
    description: The number of months elapsed since the cohort month.
    data_type: UInt64

  - name: users
    description: The number of users from the cohort active in the activity month.
    data_type: UInt64

  - name: initial_users
    description: The total number of users in the original cohort.
    data_type: UInt64

  - name: retention_pct
    description: The user retention percentage (users / initial_users).
    data_type: Float64

  - name: amount_retention_pct
    description: The amount retention percentage.
    data_type: Float64

  - name: amount_usd
    description: The total USD amount for the cohort in this activity month.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_snapshots
  description: Summary snapshot metrics for Gnosis Pay across different time windows (All, 7D), providing headline KPIs with percentage changes.
  columns:

  - name: label
    description: The metric label (e.g., ActiveUsers, PaymentVolume, PaymentCount).
    data_type: String

  - name: window
    description: The time window (e.g., All, 7D).
    data_type: String

  - name: value
    description: The metric value.
    data_type: Float64

  - name: change_pct
    description: The percentage change compared to the previous period.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_user_lifetime_metrics
  description: Lifetime metrics for each Gnosis Pay wallet, including tenure, activity counts, payment volumes, and cashback totals.
  columns:

  - name: wallet_address
    description: The Gnosis Pay wallet address.
    data_type: String

  - name: first_activity_date
    description: The date of the wallet's first recorded activity.
    data_type: Date

  - name: last_activity_date
    description: The date of the wallet's most recent activity.
    data_type: Date

  - name: tenure_days
    description: The number of days between first and last activity.
    data_type: UInt64

  - name: active_months
    description: The number of distinct months the wallet was active.
    data_type: UInt64

  - name: total_payment_volume_usd
    description: Lifetime total payment volume in USD.
    data_type: Float64

  - name: total_payment_count
    description: Lifetime total number of payments.
    data_type: UInt64

  - name: total_deposit_volume_usd
    description: Lifetime total deposit volume in USD.
    data_type: Float64

  - name: total_withdrawal_volume_usd
    description: Lifetime total withdrawal volume in USD.
    data_type: Float64

  - name: net_flow_usd
    description: Lifetime net flow (deposits minus withdrawals) in USD.
    data_type: Float64

  - name: total_cashback_usd
    description: Lifetime total cashback received in USD.
    data_type: Float64

  - name: total_cashback_gno
    description: Lifetime total cashback received in GNO tokens.
    data_type: Float64

  - name: total_refund_usd
    description: Lifetime total refund value in USD.
    data_type: Float64

  - name: total_refund_count
    description: Lifetime total number of refunds.
    data_type: UInt64

  - name: avg_monthly_payment_volume_usd
    description: Average monthly payment volume in USD across active months.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

# ──────────────────────────────────────────────
# API models
# ──────────────────────────────────────────────

- name: api_execution_gpay_active_users_7d
  description: 7-day active user count with period-over-period change percentage for Gnosis Pay.
  columns:

  - name: value
    description: The number of active users in the last 7 days.
    data_type: Float64

  - name: change_pct
    description: The percentage change compared to the previous 7-day period.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: api_execution_gpay_active_users_weekly
  description: Weekly time series of Gnosis Pay active user counts.
  columns:

  - name: date
    description: The first day of the ISO week.
    data_type: Date
    tests:
    - not_null

  - name: value
    description: The number of active users in this week.
    data_type: UInt64
  meta:
    owner: analytics-team
    authoritative: false

- name: api_execution_gpay_activity_by_action_daily
  description: Daily Gnosis Pay activity metrics broken down by action type, with counts and volumes.
  columns:

  - name: date
    description: The calendar date.
    data_type: Date
    tests:
    - not_null

  - name: action
    description: The activity type (e.g., Payment, Deposit, Withdrawal, Cashback).
    data_type: String

  - name: activity_count
    description: The number of transactions for this action on this date.
    data_type: UInt64

  - name: volume_usd
    description: The total USD volume for this action on this date.
    data_type: Float64

  - name: volume_native
    description: The total native token volume for this action on this date.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: api_execution_gpay_activity_by_action_monthly
  description: Monthly Gnosis Pay activity metrics broken down by action type, with counts and volumes.
  columns:

  - name: month
    description: The first day of the month.
    data_type: Date
    tests:
    - not_null

  - name: action
    description: The activity type (e.g., Payment, Deposit, Withdrawal, Cashback).
    data_type: String

  - name: activity_count
    description: The number of transactions for this action in this month.
    data_type: UInt64

  - name: volume_usd
    description: The total USD volume for this action in this month.
    data_type: Float64

  - name: volume_native
    description: The total native token volume for this action in this month.
    data_type: Float64
  meta:
    owner: analytics-team
    authoritative: false

- name: api_execution_gpay_activity_by_action_weekly
  description: Weekly Gnosis Pay activity metrics broken down by action type, with counts and volumes.
  columns:

  - name: week
    description: The first day of the ISO week.
    data_type: Date
    tests:
    - not_null

  - name: action
