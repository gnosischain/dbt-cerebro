- name: fct_execution_gpay_activity_daily
  description: Daily summary of Gnosis Pay ecosystem activity including active users, payments, volume, and funded wallet counts.
  columns:

  - name: date
    description: The calendar date.
    data_type: Date
    tests:
    - not_null

  - name: active_users
    description: The number of unique active wallets on this date.
    data_type: UInt64

  - name: total_payments
    description: The total number of payment transactions on this date.
    data_type: UInt64

  - name: total_volume_usd
    description: The total payment volume in USD on this date.
    data_type: Float64

  - name: newly_funded
    description: The number of wallets newly funded on this date.
    data_type: UInt64

  - name: cumulative_funded
    description: The cumulative number of funded wallets up to this date.
    data_type: UInt64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_activity_monthly
  description: Monthly summary of Gnosis Pay ecosystem activity including active users, payments, volume, and funded wallet counts.
  columns:

  - name: month
    description: The first day of the month.
    data_type: Date
    tests:
    - not_null

  - name: active_users
    description: The number of unique active wallets in this month.
    data_type: UInt64

  - name: total_payments
    description: The total number of payment transactions in this month.
    data_type: UInt64

  - name: total_volume_usd
    description: The total payment volume in USD in this month.
    data_type: Float64

  - name: newly_funded
    description: The number of wallets newly funded in this month.
    data_type: UInt64

  - name: cumulative_funded
    description: The cumulative number of funded wallets up to this month.
    data_type: UInt64
  meta:
    owner: analytics-team
    authoritative: false

