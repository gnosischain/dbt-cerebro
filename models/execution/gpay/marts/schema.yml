version: 2
models:

# ──────────────────────────────────────────────
# Fact models
# ──────────────────────────────────────────────

- name: fct_execution_gpay_actions_by_token_daily
  description: Daily aggregation of Gnosis Pay activity metrics broken down by action type and token, with cumulative totals.
  columns:

  - name: action
    description: The type of activity (e.g., Payment, Deposit, Withdrawal, Cashback).
    data_type: String

  - name: date
    description: The calendar date of the activity.
    data_type: Date
    tests:
    - not_null

  - name: token
    description: The token symbol involved in the activity.
    data_type: String

  - name: volume
    description: The total native token volume for the action on this date.
    data_type: Float64

  - name: volume_usd
    description: The total USD-equivalent volume for the action on this date.
    data_type: Float64

  - name: activity_count
    description: The number of transactions for the action on this date.
    data_type: UInt64

  - name: volume_cumulative
    description: The cumulative native token volume up to this date.
    data_type: Float64

  - name: volume_usd_cumulative
    description: The cumulative USD-equivalent volume up to this date.
    data_type: Float64

  - name: activity_count_cumulative
    description: The cumulative number of transactions up to this date.
    data_type: UInt64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_actions_by_token_monthly
  description: Monthly aggregation of Gnosis Pay activity metrics broken down by action type and token, with cumulative totals.
  columns:

  - name: action
    description: The type of activity (e.g., Payment, Deposit, Withdrawal, Cashback).
    data_type: String

  - name: month
    description: The first day of the month for the activity period.
    data_type: Date
    tests:
    - not_null

  - name: token
    description: The token symbol involved in the activity.
    data_type: String

  - name: volume
    description: The total native token volume for the action in this month.
    data_type: Float64

  - name: volume_usd
    description: The total USD-equivalent volume for the action in this month.
    data_type: Float64

  - name: activity_count
    description: The number of transactions for the action in this month.
    data_type: UInt64

  - name: volume_cumulative
    description: The cumulative native token volume up to this month.
    data_type: Float64

  - name: volume_usd_cumulative
    description: The cumulative USD-equivalent volume up to this month.
    data_type: Float64

  - name: activity_count_cumulative
    description: The cumulative number of transactions up to this month.
    data_type: UInt64
  meta:
    owner: analytics-team
    authoritative: false

- name: fct_execution_gpay_actions_by_token_weekly
  description: Weekly aggregation of Gnosis Pay activity metrics broken down by action type and token, with cumulative totals.
  columns:

  - name: action
    description: The type of activity (e.g., Payment, Deposit, Withdrawal, Cashback).
    data_type: String

  - name: week
    description: The first day of the ISO week for the activity period.
    data_type: Date
    tests:
    - not_null

  - name: token
    description: The token symbol involved in the activity.
    data_type: String

  - name: volume
    description: The total native token volume for the action in this week.
    data_type: Float64

  - name: volume_usd
    description: The total USD-equivalent volume for the action in this week.
    data_type: Float64

  - name: activity_count
    description: The number of transactions for the action in this week.
    data_type: UInt64

  - name: volume_cumulative
    description: The cumulative native token volume up to this week.
    data_type: Float64

  - name: volume_usd_cumulative
    description: The cumulative USD-equivalent volume up to this week.
    data_type: Float64

  - name: activity_count_cumulative
    description: The cumulative number of transactions up to this week.
    data_type: UInt64
  meta:
