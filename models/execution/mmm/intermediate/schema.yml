version: 2

models:
- name: int_execution_mmm_kpis_weekly
  description: |
    Long-form weekly KPI registry for the Marketing Mix Modeling (MMM)
    pipeline. One row per (`week`, `kpi_name`) on a continuous weekly
    spine generated by the `weekly_spine` macro over the trailing 730
    days. Every (week, kpi) pair within the registry's active range
    is materialised even when the underlying source has no data: weeks
    are filled with 0 for `kpi_value_method = 'sum'` and NULL for
    `kpi_value_method IN ('last', 'avg', 'weighted_avg')` so the
    downstream wide pivot in `fct_execution_mmm_spine_weekly` never
    sees a hole that would silently truncate a regression window.

    Source aggregators (one CTE each, weekly grain):
      pools_tvl_usd          ← argMax(tvl_usd, date) over fct_execution_pools_daily
                               (last-value snapshot — TVL is a stock,
                               summing over time is meaningless)
      pools_volume_usd       ← sum(volume_usd_daily) over fct_execution_pools_daily
      dex_volume_usd_dedup   ← sum(volume_usd) over fct_execution_trades_by_protocol_daily.
                               First-hop-only acknowledgement: per-tx
                               dedup on int_execution_pools_dex_trades
                               OOM'd at the 10 GiB cluster cap, so the
                               known multi-hop overcount is accepted and
                               flagged via `is_dedup_safe = false` in
                               the registry (and surfaced on the row).
      ga_active_users        ← argMax(active_users, date) over fct_execution_gnosis_app_users_daily
      ga_new_users           ← sum(new_users)
      gpay_topups_count      ← sum(n_topups) over fct_execution_gnosis_app_gpay_topups_weekly
      gpay_topups_volume_usd ← sum(volume_usd)

    Adding a new KPI: append to seed `mmm_kpi_registry.csv` (drives the
    spine fill) AND add an aggregator CTE here AND add a `sumIf` clause
    in the wide pivot at `fct_execution_mmm_spine_weekly`.

    Incremental on `week` (monthly partition).
  config:
    contract:
      enforced: false
  columns:
  - name: week
    description: ISO Monday-start week date.
    data_type: Date
    tests: [not_null]
  - name: kpi_name
    description: KPI identifier from `mmm_kpi_registry.csv`.
    data_type: LowCardinality(String)
    tests:
    - not_null
    - relationships:
        to: ref('mmm_kpi_registry')
        field: kpi_name
  - name: kpi_value
    description: Aggregated weekly KPI value (0 for missing-week sum methods, NULL for missing-week last/avg).
    data_type: Nullable(Float64)
  - name: kpi_value_method
    description: One of `sum`, `last`, `avg`, `weighted_avg` — controls the missing-week fill.
    data_type: LowCardinality(String)
  - name: is_dedup_safe
    description: From the registry. `false` for `dex_volume_usd_dedup` (multi-hop overcount accepted to fit the 10 GiB cap).
    data_type: UInt8
  - name: provenance_model
    description: Upstream dbt model that produced the row (or `_derived` for spine-only fills).
    data_type: LowCardinality(String)
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - week
      - kpi_name
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(week) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_mmm_media_weekly
  description: |
    Long-form weekly MMM media (incentive / reward / outlay) registry.
    One row per (`week`, `media_name`) on the same continuous weekly
    spine as the KPI registry. Missing weeks filled with 0 for
    sum-method outlays and NULL for `weighted_avg` / `avg` snapshots.

    Source aggregators (weekly grain):
      validator_proposer_rewards_gno
        ← sum(proposer_reward_total_gno) over int_consensus_validators_proposer_rewards_daily
      ga_token_offer_emissions_usd
        ← sum(amount_received_usd) over int_execution_gnosis_app_token_offer_claims
      pools_lp_fee_apr_avg
        ← TVL-weighted mean of fee_apr_7d (sum(fee_apr_7d * tvl_usd) / sum(tvl_usd))
          over int_execution_pools_metrics_daily

    Adding a new media: append to seed `mmm_media_registry.csv` AND add
    an aggregator CTE here AND add a `sumIf` clause in the wide pivot.

    Incremental on `week` (monthly partition).
  config:
    contract:
      enforced: false
  columns:
  - name: week
    description: ISO Monday-start week date.
    data_type: Date
    tests: [not_null]
  - name: media_name
    description: Media identifier from `mmm_media_registry.csv`.
    data_type: LowCardinality(String)
    tests:
    - not_null
    - relationships:
        to: ref('mmm_media_registry')
        field: media_name
  - name: media_value
    description: Aggregated weekly value of the media variable.
    data_type: Nullable(Float64)
  - name: media_value_method
    description: One of `sum`, `weighted_avg`, `last`, `avg`.
    data_type: LowCardinality(String)
  - name: media_units
    description: From the registry (e.g. `gno`, `usd`, `apr_pct`). Tells the analyst what scale the column is on.
    data_type: LowCardinality(String)
  - name: is_outlay
    description: '`1` if this media represents an actual outlay (cost) the platform paid; `0` for proxy / APR signals.'
    data_type: UInt8
  - name: provenance_model
    description: Upstream dbt model that produced the row.
    data_type: LowCardinality(String)
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
- name: int_execution_mmm_controls_weekly
  description: |
    Long-form weekly MMM control variables (macro / seasonality /
    operational signals the regression conditions on but does not
    attribute to). One row per (`week`, `control_name`) on the same
    continuous weekly spine as KPIs / media.

    Source aggregators (weekly grain):
      gno_usd_price_avg          ← avg(price) over int_execution_token_prices_daily
                                   filtered to symbol='GNO'
      eth_usd_price_avg          ← avg(price) where symbol IN ('WETH','ETH')
      wxdai_eur_proxy_avg        ← avg(price) where symbol IN ('WXDAI','EURE')
      chain_gas_price_gwei_avg   ← avg(gas_price_median) over int_execution_transactions_info_daily
      chain_block_count          ← sum(n_txs)
      week_of_year               ← toWeek(week) (computed)
      week_index                 ← weeks-since-spine-start (computed)
      is_holiday_week            ← LEFT JOIN to seed mmm_holiday_weeks
      hardfork_step              ← 1 from the fork-week onward via LEFT JOIN
                                   to seed mmm_hardfork_steps. Computed via
                                   LEFT JOIN to a `count of forks ≤ week`
                                   sub-CTE rather than a correlated subquery
                                   (ClickHouse plans correlated subqueries
                                   inefficiently and they OOM at scale).

    Incremental on `week` (monthly partition).
  config:
    contract:
      enforced: false
  columns:
  - name: week
    description: ISO Monday-start week date.
    data_type: Date
    tests: [not_null]
  - name: control_name
    description: Control identifier from `mmm_control_registry.csv`.
    data_type: LowCardinality(String)
    tests:
    - not_null
    - relationships:
        to: ref('mmm_control_registry')
        field: control_name
  - name: control_value
    description: Weekly value of the control variable.
    data_type: Nullable(Float64)
  - name: control_value_method
    description: One of `avg`, `sum`, `computed`.
    data_type: LowCardinality(String)
  - name: provenance_model
    description: Upstream dbt model or `_derived` for computed signals.
    data_type: LowCardinality(String)
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - week
      - control_name
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(week) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
