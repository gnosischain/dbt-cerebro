  - {name: n_senders, description: "Distinct sender addresses in this category on this day (zero address excluded).", data_type: UInt64}
  - {name: n_receivers, description: "Distinct recipient addresses in this category on this day (zero address excluded).", data_type: UInt64}
  - {name: amount, description: "Sum of native transfer amount in CRC (raw / 1e18).", data_type: Float64}
