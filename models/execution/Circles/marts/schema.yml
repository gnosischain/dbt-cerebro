    description: Monday-aligned start of the week (UTC).
    data_type: Date
  - name: earning_kind
    description: "'gcrc_cashback', 'inviter_fee' or 'any'."
    data_type: String
  - name: avatars
    description: Distinct economically active avatars (ecosystem-wide).
    data_type: UInt64
  - name: avatars_in_app_tx
    description: Subset whose earning events came via a Gnosis App relayer tx.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
