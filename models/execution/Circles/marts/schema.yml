- name: fct_execution_circles_v2_economically_active_avatars_weekly
  description: >
    Weekly counts of economically active Circles avatars, ecosystem-wide
    (circles-first layer; NOT app-filtered). Rows per earning_kind
    ('gcrc_cashback' / 'inviter_fee') plus an 'any' rollup of distinct
    avatars across kinds. avatars_in_app_tx counts the subset whose
    contributing events came through a Gnosis App relayer tx (inviter fees
    only — cashback carries no tx origin).
  columns:
  - name: week
