- name: fct_execution_circles_v2_avatar_token_distribution
  description: |
    Per-avatar distribution of holders of a Circles v2 personal CRC token
    (the ERC-1155 token whose token_address equals the avatar address).
    Classifies every current holder (balance above the 0.001 CRC dust
    threshold = 1e15 raw wei on the last completed day from
    int_execution_circles_v2_balances_daily) as one of: Self (the avatar
    itself holds its own CRC), Wrapped (ERC-20) (held by an ERC20Lift
    wrapper contract registered for this avatar via
    int_execution_circles_v2_wrappers), Other Circles avatars (any other
    registered Circles avatar), or Other contracts (DEX pools, custodians,
    …). One row per (avatar, holder_category) materialised daily; the
    matching api_ view is a thin passthrough consumed by the dashboard.
  columns:
  - name: avatar
    description: The avatar whose personal CRC token is being inspected.
    data_type: String
  - name: holder_category
    description: One of Self, Wrapped (ERC-20), Other Circles avatars, Other contracts.
    data_type: String
  - name: holder_count
    description: Number of distinct accounts in this category (above the 0.001 CRC dust threshold).
    data_type: UInt64
  - name: balance
    description: Sum of static CRC balances held by accounts in this category.
    data_type: Float64
  - name: balance_demurraged
    description: Sum of demurrage-adjusted CRC balances held by accounts in this category.
    data_type: Float64
  meta: *meta_fct
  tests: *elementary_warn
- name: fct_execution_circles_v2_avatar_balances_latest
  description: |
    Latest per-(avatar, token) CRC balance snapshot with an is_wrapped flag
    indicating whether the token_address is an ERC-20 wrapper. Materialised
    daily from fct_execution_circles_v2_avatar_balances_daily on the last
    completed day, joined to the distinct wrapper registry from
    int_execution_circles_v2_wrappers. The matching api_ view is a thin
    passthrough for dashboard consumption.
  columns:
  - name: avatar
    description: Address of the avatar holding the balance.
    data_type: String
  - name: token_address
    description: Address of the Circles token contract.
    data_type: String
  - name: is_wrapped
    description: True when token_address is an ERC-20 wrapper registered in int_execution_circles_v2_wrappers; false when it is a native ERC-1155 personal CRC token.
    data_type: UInt8
  - name: balance
    description: Static balance in CRC (human units, raw / 1e18).
    data_type: Float64
  - name: balance_demurraged
    description: Demurrage-adjusted balance in CRC (human units).
    data_type: Nullable(Float64)
  meta: *meta_fct
  tests: *elementary_warn
- name: fct_execution_circles_v2_avatar_tokens_held_count
  description: |
    Per-avatar count of distinct CRC tokens currently held with a balance
    above the 0.001 CRC dust threshold (1e15 raw wei). Materialised daily
    from int_execution_circles_v2_balances_daily on the last completed day;
    the matching api_ view is a thin passthrough.
  columns:
  - name: avatar
    description: Address of the avatar.
    data_type: String
  - name: tokens_held_count
    description: Number of distinct Circles v2 CRC tokens held above the dust threshold.
    data_type: UInt64
  meta: *meta_fct
  tests: *elementary_warn
- name: fct_execution_circles_v2_avatar_trusts_summary
  description: |
    Latest per-avatar trust summary: trusts given and trusts received as of
    the last complete day. Materialised daily from
    fct_execution_circles_v2_avatar_trusts_daily; the matching api_ is a
    thin passthrough.
  columns:
  - name: avatar
    description: Address of the avatar.
    data_type: String
  - name: trusts_given_count
    description: Cumulative count of outgoing trust relationships as of the snapshot day.
    data_type: Int64
  - name: trusts_received_count
    description: Cumulative count of incoming trust relationships as of the snapshot day.
    data_type: Int64
  meta: *meta_fct
  tests: *elementary_warn
- name: fct_execution_circles_v2_avatar_personal_token_supply_latest
  description: |
    One-row-per-avatar summary of a Circles v2 avatar's own personal CRC
    token: total circulating supply, how much is wrapped as ERC-20, and
    the wrapped share. Rolled up from
    fct_execution_circles_v2_avatar_token_distribution so the supply
    respects the same 0.001 CRC dust threshold used by the distribution
    fact. The matching api_ is a thin passthrough.
  columns:
  - name: avatar
    description: The avatar whose personal CRC token is being summarised.
    data_type: String
  - name: supply
    description: Circulating supply of this avatar's personal CRC (sum of balances across all holder categories).
    data_type: Float64
  - name: wrapped
    description: Portion of the supply currently held by the avatar's ERC-20 wrapper contracts.
    data_type: Float64
  - name: unwrapped
    description: Portion of the supply held as native ERC-1155 (supply − wrapped).
    data_type: Float64
  - name: wrapped_pct
    description: wrapped / supply × 100, rounded to 1 decimal. NULL when supply = 0.
    data_type: Nullable(Float64)
  - name: supply_demurraged
    description: Demurrage-adjusted equivalent of supply.
    data_type: Float64
  - name: wrapped_demurraged
    description: Demurrage-adjusted equivalent of wrapped.
    data_type: Float64
  meta: *meta_fct
  tests: *elementary_warn

- name: fct_execution_circles_v2_active_minters_daily
  description: >
    Per-day count of Circles v2 "Active Minters" — avatars that minted on
    each of the last 14 days AND whose 14-day mint sum is >= 80% of the
    336 CRC theoretical maximum. Canonical KPI from the Dune circles-v2-kpis
    dashboard. Blacklisted avatars are NOT excluded here; the cohort
    distribution mart does the exclusion.
  columns:
  - name: date
    description: Calendar day (UTC).
    data_type: Date
