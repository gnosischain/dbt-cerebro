version: 2
models:
- name: fct_execution_circles_v2_crc20_prices_daily
  description: >
    Daily aggregated executed prices for CRC20 wrapper tokens, one row per
    (date, crc20_token, backing_token, pool_address). Aggregates trade-level
    prices from int_execution_circles_v2_crc20_prices_raw and joins with
    int_execution_token_prices_daily to convert backing-token prices to USD.
  columns:
  - name: date
    description: Calendar date of the aggregated trades.
    data_type: Date
    tests:
    - not_null:
        config:
          where: '{% if var(''test_full_refresh'', false) %}1=1{% else %}date >= today() - {{ var(''test_lookback_days'', 7) }}{% endif %}'
  - name: crc20_token
    description: Address of the CRC20 wrapper token.
    data_type: String
  - name: backing_token
    description: Address of the counterpart token (e.g. WXDAI, WETH).
    data_type: String
  - name: backing_token_symbol
    description: Symbol of the backing token.
    data_type: String
  - name: pool_address
    description: Pool contract address.
    data_type: String
  - name: protocol
    description: DEX protocol (Uniswap V3 or Swapr V3).
    data_type: String
  - name: avatar
    description: Circles avatar address that owns this CRC20 wrapper.
    data_type: String
  - name: circles_type
    description: Wrapper type (0 = demurraged, 1 = inflationary).
    data_type: UInt8
  - name: crc20_symbol
    description: Display symbol for the CRC20 token.
    data_type: Nullable(String)
  - name: price_avg_in_backing
    description: Volume-unweighted average executed price in backing token units across all trades on this day.
    data_type: Float64
  - name: price_median_in_backing
    description: Median executed price in backing token units.
    data_type: Float64
  - name: price_p10_in_backing
    description: 10th-percentile executed price in backing token units (low-end filter signal).
    data_type: Float64
  - name: price_p90_in_backing
    description: 90th-percentile executed price in backing token units (high-end filter signal).
    data_type: Float64
  - name: crc_volume
    description: Total CRC20 tokens traded (sum of crc_amount across all swaps on this day).
    data_type: Float64
  - name: crc_bought_volume
    description: Total CRC20 tokens bought (CRC was the token_bought leg) on this day.
    data_type: Float64
  - name: crc_sold_volume
    description: Total CRC20 tokens sold (CRC was the token_sold leg) on this day.
    data_type: Float64
  - name: trade_count
    description: Number of swap transactions involving this CRC20 token in this pool on this day.
    data_type: UInt64
  - name: price_avg_usd
    description: Average executed price in USD (avg of amount_usd / crc_amount per swap). No extra price join needed — int_execution_pools_dex_trades already resolves the backing token price.
    data_type: Nullable(Float64)
  - name: price_median_usd
    description: Median executed price in USD (median of amount_usd / crc_amount per swap).
    data_type: Nullable(Float64)
  meta: &meta_crc_prices
    owner: analytics_team
    authoritative: false
  tests: &elementary_error_crc
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary

- name: api_execution_circles_v2_crc20_prices_daily
  description: >
    Public daily price view for CRC20 wrapper tokens, consolidated across all
    pools. One row per (date, crc20_token) with a volume-weighted average USD
    price (VWAP). Only tokens with at least one DEX trade on a given day appear;
    tokens without market liquidity have no rows.
  columns:
  - name: date
    description: Calendar date.
    data_type: Date
    tests:
    - not_null:
        config:
          where: '{% if var(''test_full_refresh'', false) %}1=1{% else %}date >= today() - {{ var(''test_lookback_days'', 7) }}{% endif %}'
  - name: crc20_token
    description: Address of the CRC20 wrapper token.
    data_type: String
  - name: avatar
    description: Circles avatar address that owns this CRC20 wrapper.
    data_type: String
  - name: symbol
    description: Display symbol for the CRC20 token.
    data_type: Nullable(String)
  - name: circles_type
    description: Wrapper type (0 = demurraged, 1 = inflationary).
    data_type: UInt8
  - name: price_vwap_usd
    description: Volume-weighted average price in USD across all pools on this day.
    data_type: Nullable(Float64)
  - name: price_median_usd
    description: Median of per-pool daily median prices in USD.
    data_type: Nullable(Float64)
  - name: total_crc_volume
    description: Total CRC20 tokens traded across all pools on this day.
    data_type: Float64
  - name: total_crc_bought_volume
    description: Total CRC20 tokens bought (CRC was the token_bought leg) across all pools on this day.
    data_type: Float64
  - name: total_crc_sold_volume
    description: Total CRC20 tokens sold (CRC was the token_sold leg) across all pools on this day.
    data_type: Float64
  - name: trade_count
    description: Total number of swap transactions across all pools on this day.
    data_type: UInt64
  - name: pool_count
    description: Number of distinct pools where this token was traded on this day.
    data_type: UInt64
  meta: *meta_crc_prices
  tests: *elementary_error_crc

- name: api_execution_circles_v2_avatars
  description: API view of daily avatar type counts and cumulative totals.
  columns:
  - name: date
    description: The specific date of the recorded avatar usage data.
    data_type: Date
    tests:
    - not_null:
        config:
          where: '{% if var(''test_full_refresh'', false) %}1=1{% else %}toDate(date) >= today() - {{ var(''test_lookback_days'', 7) }}{% endif %}'
  - name: avatar_type
    description: The category or type of avatar (Human, Group, Organization).
    data_type: String
  - name: cnt
    description: The number of new avatars registered on the given date.
    data_type: UInt64
  - name: total
    description: The cumulative total of avatars of this type up to the given date.
    data_type: UInt64
  meta: &meta_api
    owner: analytics_team
    authoritative: false
  tests: &elementary_error
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
- name: api_execution_circles_v2_groups_cnt_latest
  description: Latest count of group avatars and 7-day percentage change.
  columns:
  - name: total
    description: The total number of group avatars at the latest date.
    data_type: UInt64
  - name: change_pct
    description: Percentage change in group count compared to 7 days ago, rounded to 1 decimal.
    data_type: Float64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_humans_cnt_latest
  description: Latest count of human avatars and 7-day percentage change.
  columns:
  - name: total
    description: The total number of human avatars at the latest date.
    data_type: UInt64
  - name: change_pct
    description: Percentage change in human count compared to 7 days ago.
    data_type: Float64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_orgs_cnt_latest
  description: Latest count of organization avatars and 7-day percentage change.
  columns:
  - name: total
    description: The total number of organization avatars at the latest date.
    data_type: UInt64
  - name: change_pct
    description: Percentage change in organization count compared to 7 days ago.
    data_type: Float64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_active_trusts_cnt_latest
  description: Latest active trust count with 7-day change percentage.
  columns:
  - name: total
    description: Current active trust count.
    data_type: UInt64
  - name: change_pct
    description: 7-day percentage change.
    data_type: Float64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_metadata
  description: |
    Per-avatar identity for Circles v2: on-chain registration metadata
    (avatar type, on-chain name, inviter, token_id, registration timestamp)
    joined to the most recently fetched IPFS profile from
    int_execution_circles_v2_avatar_metadata (display name,
    preview/image URLs, description, current digest / CID / gateway URL,
    fetched_at). Backs the "Avatar Identity" panel on the Circles dashboard.
  columns:
  - name: avatar
    description: Address of the registered avatar.
    data_type: String
  - name: avatar_type
    description: Avatar category (Human, Group, Org).
    data_type: String
  - name: invited_by
    description: Address of the avatar that invited this avatar (NULL for Groups/Orgs).
    data_type: String
  - name: name
    description: On-chain name set at registration (NULL for Humans).
    data_type: String
  - name: token_id
    description: Personal token contract address (NULL for Orgs).
    data_type: String
  - name: registered_at
    description: UTC timestamp of the registration event.
    data_type: DateTime64
  - name: current_metadata_digest
    description: 0x-prefixed hex digest of the most recent metadata payload announced for this avatar by NameRegistry. NULL when the avatar has never published an IPFS profile.
    data_type: Nullable(String)
  - name: current_ipfs_cid_v0
    description: CIDv0 derived from `current_metadata_digest`.
    data_type: Nullable(String)
  - name: current_gateway_url
    description: Full IPFS gateway URL for the current digest using the configured `circles_ipfs_gateway` var.
    data_type: Nullable(String)
  - name: metadata_name
    description: Display `name` field extracted from the current IPFS profile JSON. Populated for ~99.9% of resolved avatars.
    data_type: String
  - name: metadata_symbol
    description: '`symbol` field extracted from the current profile JSON. Rarely populated (group/org tokens only).'
    data_type: String
  - name: metadata_description
    description: '`description` field extracted from the current profile JSON. Populated for ~20% of avatars.'
    data_type: String
  - name: metadata_image_url
    description: '`imageUrl` field from the current profile JSON. Rarely populated (~1.5%); prefer `metadata_preview_image_url` for thumbnails.'
    data_type: String
  - name: metadata_preview_image_url
    description: '`previewImageUrl` field from the current profile JSON. Populated for ~53% of avatars.'
    data_type: String
  - name: metadata_fetched_at
    description: Timestamp the current IPFS payload was fetched from the gateway.
    data_type: Nullable(DateTime)
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_search
  description: |
    Lightweight (avatar, display_name) lookup used by the dashboard global
    filter to support searching avatars by display name OR address. Two
    columns, one row per registered Circles v2 avatar (sourced from
    api_execution_circles_v2_avatar_metadata). display_name prefers the
    IPFS profile name and falls back to the on-chain name (Group/Org only)
    so every row has something usable to search against; the avatar
    address is always present.
  columns:
  - name: avatar
    description: Address of the registered avatar.
    data_type: String
  - name: display_name
    description: IPFS profile name with on-chain name fallback (empty when neither is set).
    data_type: String
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_metadata_history
  description: |
    Historical timeline of every Circles v2 avatar metadata change. Thin
    passthrough over int_execution_circles_v2_avatar_metadata_history with
    one row per (avatar, metadata_digest) ever announced, in event order,
    carrying valid_from / valid_to / is_current and the parsed IPFS profile
    fields (name, symbol, description, imageUrl, previewImageUrl) so the
    dashboard can render the full sequence of name + image updates per
    avatar.
  columns:
  - name: avatar
    description: Address of the registered avatar.
    data_type: String
  - name: avatar_type
    description: Avatar category (Human, Group, Org).
    data_type: String
  - name: onchain_name
    description: On-chain name set at registration (Group/Org only).
    data_type: Nullable(String)
  - name: metadata_digest
    description: 0x-prefixed hex digest emitted by this UpdateMetadataDigest event.
    data_type: String
  - name: ipfs_cid_v0
    description: CIDv0 derived from `metadata_digest`.
    data_type: String
  - name: gateway_url
    description: Full IPFS gateway URL for this digest version.
    data_type: String
  - name: valid_from
    description: Timestamp of the on-chain UpdateMetadataDigest event that introduced this digest.
    data_type: DateTime64
  - name: valid_to
    description: Timestamp of the next UpdateMetadataDigest event for this avatar. NULL on the most recent row.
    data_type: Nullable(DateTime64)
  - name: is_current
    description: True when this row is the most recent metadata digest for the avatar.
    data_type: Bool
  - name: transaction_hash
    description: Transaction hash of the on-chain event.
    data_type: String
  - name: log_index
    description: Log index of the on-chain event.
    data_type: UInt32
  - name: metadata_name
    description: Display `name` field extracted from this historical version's profile JSON.
    data_type: String
  - name: metadata_symbol
    description: '`symbol` field extracted from this historical version''s profile JSON.'
    data_type: String
  - name: metadata_description
    description: '`description` field extracted from this historical version''s profile JSON.'
    data_type: String
  - name: metadata_image_url
    description: '`imageUrl` field from this historical version''s profile JSON.'
    data_type: String
  - name: metadata_preview_image_url
    description: '`previewImageUrl` field from this historical version''s profile JSON.'
    data_type: String
  - name: metadata_fetched_at
    description: Timestamp the IPFS payload for this digest was fetched from the gateway.
    data_type: Nullable(DateTime)
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_balances_latest
  description: |
    Latest per-(avatar, token) CRC balance snapshot with an is_wrapped flag
    indicating whether the token_address is an ERC-20 wrapper. Thin
    passthrough over fct_execution_circles_v2_avatar_balances_latest, which
    is materialised daily from the per-day balance fact joined to the
    distinct wrapper registry.
  columns:
  - name: avatar
    description: Address of the avatar holding the balance.
    data_type: String
  - name: token_address
    description: Address of the Circles token contract.
    data_type: String
  - name: is_wrapped
    description: True when the token is an ERC-20 wrapper around a personal CRC token (registered in `int_execution_circles_v2_wrappers`); false when it is the underlying ERC-1155 personal CRC token.
    data_type: Bool
  - name: balance
    description: Static balance in token units (raw / 1e18).
    data_type: Float64
  - name: balance_demurraged
    description: Demurrage-adjusted balance in token units.
    data_type: Float64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_balances_daily
  description: Daily CRC balance per avatar broken down by token (one row per avatar/date/token).
  columns:
  - name: avatar
    description: Address of the avatar.
    data_type: String
  - name: date
    description: Calendar date of the balance snapshot.
    data_type: Date
  - name: token_address
    description: Address of the Circles token contract held on that date.
    data_type: String
  - name: balance
    description: Static balance held in the token on that date.
    data_type: Float64
  - name: balance_demurraged
    description: Demurrage-adjusted balance held in the token on that date.
    data_type: Float64
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_trusts_daily
  description: Daily cumulative trusts given and received per avatar.
  columns:
  - name: avatar
    description: Address of the avatar.
    data_type: String
  - name: date
    description: Calendar date.
    data_type: Date
  - name: trusts_given_count
    description: Cumulative count of outgoing trust relationships.
    data_type: Int64
  - name: trusts_received_count
    description: Cumulative count of incoming trust relationships.
    data_type: Int64
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_trusts_summary
  description: Latest snapshot of cumulative trusts given and received per avatar.
  columns:
  - name: avatar
    description: Address of the avatar.
    data_type: String
  - name: trusts_given_count
    description: Cumulative count of outgoing trust relationships at latest day.
    data_type: Int64
  - name: trusts_received_count
    description: Cumulative count of incoming trust relationships at latest day.
    data_type: Int64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_tokens_held_count
  description: |
    Per-avatar count of distinct CRC tokens currently held with a balance
    above the 0.001 CRC dust threshold (1e15 raw wei). Thin passthrough
    over fct_execution_circles_v2_avatar_tokens_held_count, which is
    materialised daily from int_execution_circles_v2_balances_daily on the
    last completed day. Backs the "Tokens Held" KPI card on the Circles
    Avatar tab.
  columns:
  - name: avatar
    description: Address of the avatar holding the tokens.
    data_type: String
  - name: tokens_held_count
    description: Number of distinct token contracts the avatar holds with > 0.001 CRC.
    data_type: UInt64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_trust_network
  description: |
    Trust-network edge list for the Circles v2 Avatar Trust Network panel.

    One row per directed trust edge from the perspective of the focal
    avatar. For mutual relationships TWO rows are emitted (avatar →
    counterparty AND counterparty → avatar) so the chart renders both
    arrows. The dashboard's avatar global filter scopes rows to one focal
    avatar — ClickHouse pushes that filter down into each UNION branch, so
    per-request cost stays small despite the apparent size of the query.
    Materialising this globally would produce ~millions of rows × long IPFS
    strings and blow the memory budget, so this stays a view on purpose.

    Each row carries display name and IPFS preview image for both
    endpoints (joined from api_execution_circles_v2_avatar_metadata). The
    dashboard graph chart consumes these via sourceImageField /
    targetImageField to render avatar thumbnails on the nodes. The
    target_layer / source_layer columns drive the chart's concentric
    layout: "Focal avatar" lives at the centre, "Mutual" forms the inner
    ring, "Trust given" the middle ring, "Trust received" the outer ring.
  columns:
  - name: avatar
    description: The focal avatar this row belongs to (used by the dashboard's avatar global filter).
    data_type: String
  - name: source_id
    description: Address of the truster on this edge.
    data_type: String
  - name: target_id
    description: Address of the trustee on this edge.
    data_type: String
  - name: source_name
    description: Display name of the source endpoint (IPFS profile name → on-chain name → truncated address).
    data_type: String
  - name: target_name
    description: Display name of the target endpoint (IPFS profile name → on-chain name → truncated address).
    data_type: String
  - name: source_image
    description: IPFS preview image URL of the source endpoint, or empty when no profile image is published.
    data_type: String
  - name: target_image
    description: IPFS preview image URL of the target endpoint, or empty when no profile image is published.
    data_type: String
  - name: direction
    description: 'One of "Mutual" / "Trust given" / "Trust received" — drives the edgeStyleField on the dashboard graph panel so each direction renders in its own colour. Mutual relationships emit two rows
      (one per direction) so both arrows render.'
    data_type: String
  - name: source_layer
    description: 'Concentric ring assignment for the source endpoint. "Focal avatar" when the source IS the focal avatar (centre), otherwise the direction label (Mutual / Trust given / Trust received) so
      the counterparty lands on the correct ring.'
    data_type: String
  - name: target_layer
    description: 'Concentric ring assignment for the target endpoint. "Focal avatar" when the target IS the focal avatar (centre), otherwise the direction label.'
    data_type: String
  - name: value
    description: Constant 1 (trust edges are unweighted; the column exists so the chart engine can size nodes by degree).
    data_type: UInt8
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_mint_activity_daily
  description: |
    Daily personal-mint activity per Circles v2 avatar.

    A Circles v2 personal mint is a Hub TransferSingle event where
    from_address is the zero address (0x0000…0000) and the recipient is
    the avatar itself. Each row in int_execution_circles_v2_hub_transfers
    matching that shape represents one personalMint() call (or the
    unscheduled mint that happens during a transfer).

    Output is one row per (avatar, date) with the number of mint events
    and the total amount minted that day (raw / 1e18). Backs the "Mint
    Activity" panel on the Circles Avatar tab.
  columns:
  - name: avatar
    description: Address of the avatar receiving the mint.
    data_type: String
  - name: date
    description: Calendar date of the mint events (UTC).
    data_type: Date
  - name: mint_events
    description: Number of personalMint() calls that landed on this day for the avatar.
    data_type: UInt64
  - name: amount_minted
    description: Total CRC minted to the avatar on this day (raw / 1e18).
    data_type: Float64
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_token_distribution
  description: |
    Per-avatar distribution of holders of a Circles v2 personal CRC token
    (the ERC-1155 token whose token_address equals the avatar address).
    Thin passthrough over fct_execution_circles_v2_avatar_token_distribution,
    which classifies every current holder (above the 0.001 CRC dust
    threshold) as one of: Self (the avatar itself holds its own CRC),
    Wrapped (ERC-20) (held by an ERC20Lift wrapper contract registered for
    this avatar), Other Circles avatars (any other registered avatar), or
    Other contracts (DEX pools, custodians, etc.). One row per (avatar,
    holder_category); the dashboard's avatar global filter selects which
    avatar's token distribution to inspect.
  columns:
  - name: avatar
    description: The avatar whose personal CRC token is being inspected.
    data_type: String
  - name: holder_category
    description: One of Self, Wrapped (ERC-20), Other Circles avatars, Other contracts.
    data_type: String
  - name: holder_count
    description: Number of distinct accounts in this category that hold the avatar's CRC token (above the 0.001 CRC dust threshold).
    data_type: UInt64
  - name: balance
    description: Sum of static CRC balances held by accounts in this category.
    data_type: Float64
  - name: balance_demurraged
    description: Sum of demurrage-adjusted CRC balances held by accounts in this category.
    data_type: Float64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_personal_token_supply_latest
  description: |
    One-row-per-avatar summary of a Circles v2 avatar's own personal CRC
    token: total circulating supply, how much is wrapped as ERC-20, and
    the wrapped share. Thin passthrough over
    fct_execution_circles_v2_avatar_personal_token_supply_latest, which
    rolls up fct_execution_circles_v2_avatar_token_distribution so the
    supply respects the same 0.001 CRC dust threshold used by the
    distribution fact.
  columns:
  - name: avatar
    description: The avatar whose personal CRC token is being summarised.
    data_type: String
  - name: supply
    description: Circulating supply of this avatar's personal CRC (sum of balances across all holder categories).
    data_type: Float64
  - name: wrapped
    description: Portion of the supply currently held by the avatar's ERC-20 wrapper contracts.
    data_type: Float64
  - name: unwrapped
    description: Portion of the supply held as native ERC-1155 (supply − wrapped).
    data_type: Float64
  - name: wrapped_pct
    description: wrapped / supply × 100, rounded to 1 decimal. NULL when supply = 0.
    data_type: Nullable(Float64)
  - name: supply_demurraged
    description: Demurrage-adjusted equivalent of supply.
    data_type: Float64
  - name: wrapped_demurraged
    description: Demurrage-adjusted equivalent of wrapped.
    data_type: Float64
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
  meta: *meta_api
  tests: *elementary_error
- name: api_execution_circles_v2_avatar_trust_relations
