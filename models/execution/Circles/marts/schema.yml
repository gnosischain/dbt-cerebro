  - {name: wrapped_supply, description: "Cumulative ERC-20 wrapped CRC across all wrappers on this day.", data_type: Float64}
  - {name: unwrapped_supply, description: "Native (unwrapped) CRC supply on this day (total_supply - wrapped_supply).", data_type: Float64}
  - {name: total_supply, description: "Network-wide total CRC supply on this day.", data_type: Float64}
  - {name: wrapped_pct, description: "wrapped_supply / total_supply × 100, rounded to 2 decimals. NULL when total_supply = 0.", data_type: Nullable(Float64)}

- name: api_execution_circles_v2_invite_funnel_cohort_monthly
  description: >
    Invitee cohort by month, with the five-stage mint-cadence funnel
    (Invited → ≥2 days → ≥7 days → ≥14 days → Active Minter) and the
    percentile latency to "came back" (second mint on a different day).
    Skips the trivial acceptance mint, which always fires.
  columns:
  - {name: cohort_month, description: "Month the cohort was invited (toStartOfMonth of invited_at); the row grain.", data_type: Date}
  - {name: n_invited, description: "Total invitees in this cohort.", data_type: UInt64}
  - {name: n_minted_2_days, description: "Invitees with >= 2 distinct mint days in the first 30 days.", data_type: UInt64}
  - {name: n_minted_7_days, description: "Invitees with >= 7 distinct mint days in the first 30 days.", data_type: UInt64}
  - {name: n_minted_14_days, description: "Invitees with >= 14 distinct mint days in the first 30 days.", data_type: UInt64}
  - {name: n_active_minter, description: "Invitees that ever reached canonical Active Minter status (mint_days_14dw = 14 AND mint_14dw >= 80% of 336).", data_type: UInt64}
  - {name: pct_minted_2_days, description: "n_minted_2_days / n_invited × 100, rounded to 1 decimal.", data_type: Float64}
  - {name: pct_minted_7_days, description: "n_minted_7_days / n_invited × 100, rounded to 1 decimal.", data_type: Float64}
  - {name: pct_minted_14_days, description: "n_minted_14_days / n_invited × 100, rounded to 1 decimal.", data_type: Float64}
  - {name: pct_active_minter, description: "n_active_minter / n_invited × 100, rounded to 1 decimal.", data_type: Float64}
  - {name: median_days_to_second_mint, description: "Median days from invite to the first mint on a different day.", data_type: Nullable(Int64)}
  - {name: p25_days_to_second_mint, description: "25th-percentile days from invite to the first mint on a different day.", data_type: Nullable(Int64)}
  - {name: p75_days_to_second_mint, description: "75th-percentile days from invite to the first mint on a different day.", data_type: Nullable(Int64)}

# ---------- Cross-sector user-overlap entry (Circles humans) ----------

- name: fct_execution_circles_human_avatars_distinct
  description: |
    One row per `user_pseudonym` for Circles v2 HUMAN avatars
    (Groups and Orgs excluded — those aren't user-grain entities).

    `user_pseudonym` is the canonical cross-sector join key (sipHash64
    of the avatar address with the project PII salt). Same hash space
    as fct_revenue_per_user_*, fct_execution_gpay_users_distinct,
    fct_execution_gnosis_app_users_distinct, and Mixpanel `user_id_hash`.
    Powers user-overlap analysis: "Circles humans who are also revenue-
    active", "Circles humans who hold a Gnosis Pay Safe", etc.

    Carries lightweight engagement / metadata flags so analysts can
    slice by registration path or profile-completion stage without
    re-joining to the metadata table.
  columns:
  - {name: user_pseudonym, description: Cross-sector pseudonym (sipHash64 of avatar address)., data_type: UInt64}
  - {name: first_seen_at, description: Avatar registration timestamp., data_type: "DateTime64(0, 'UTC')"}
  - {name: was_invited, description: 1 if registered via an inviter (`invited_by` not NULL)., data_type: UInt8}
  - {name: has_ipfs_profile, description: 1 if avatar has published an IPFS metadata payload., data_type: UInt8}
  - {name: has_display_name, description: 1 if avatar has a non-empty display name in metadata., data_type: UInt8}
  meta: {owner: analytics_team, authoritative: false}

# ---------- Groups: size & token-supply marts ----------

- name: fct_execution_circles_v2_group_size_current
  description: >
    Current size of every Circles v2 group, where size = distinct trustees
    in the group's outgoing trust list. Includes groups with zero members
    so the size-distribution mart has a real 0-bucket.
  columns:
  - {name: group_avatar, description: "Lowercase group avatar address.", data_type: String}
  - {name: n_members, description: "Distinct trustees on the group's outgoing trust list.", data_type: UInt64}

- name: api_execution_circles_v2_group_size_distribution
  description: Histogram of Circles v2 group sizes (members per group).
  columns:
  - {name: bucket, description: "Group-size bucket label, prefixed with its order (e.g. '1. 0', '2. 1–5', … '6. 500+').", data_type: String}
  - {name: bucket_order, description: "1..6 ordering for stable stacking.", data_type: UInt8}
  - {name: n_groups, description: "Number of groups falling into this size bucket.", data_type: UInt64}
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date

- name: fct_execution_circles_v2_group_token_supply_current
  description: >
    Per-group personal-token supply snapshot. One row per Group avatar with
    supply / wrapped / unwrapped / wrapped_pct and demurraged variants, plus
    display_name + preview_image_url pre-joined from avatar metadata.
  columns:
  - {name: group_avatar, description: "Lowercase group avatar address.", data_type: String}
  - {name: supply, description: "Circulating supply of the group's personal CRC token (sum across all holder categories).", data_type: Float64}
  - {name: wrapped, description: "Portion of the supply currently held by the avatar's ERC-20 wrapper contracts.", data_type: Float64}
  - {name: unwrapped, description: "Portion of the supply held as native ERC-1155 (supply − wrapped).", data_type: Float64}
  - {name: wrapped_pct, description: "wrapped / supply × 100. NULL when supply = 0.", data_type: Nullable(Float64)}
  - {name: supply_demurraged, description: "Demurrage-adjusted equivalent of supply.", data_type: Float64}
  - {name: wrapped_demurraged, description: "Demurrage-adjusted equivalent of wrapped.", data_type: Float64}
  - {name: display_name, description: "Group display name — IPFS metadata name, falling back to the on-chain name. NULL if none.", data_type: Nullable(String)}
  - {name: preview_image_url, description: "Preview image URL from the group's IPFS profile metadata. NULL if none.", data_type: Nullable(String)}

- name: api_execution_circles_v2_group_token_supply_top_latest
  description: Top 100 Circles v2 groups by personal-token supply (leaderboard view).
  columns:
  - {name: rank, description: "Leaderboard rank (1 = largest supply), ordered by supply descending.", data_type: UInt64}
  - {name: group_avatar, description: "Lowercase group avatar address.", data_type: String}
  - {name: display_name, description: "Group display name — IPFS metadata name, falling back to the on-chain name. NULL if none.", data_type: Nullable(String)}
  - {name: preview_image_url, description: "Preview image URL from the group's IPFS profile metadata. NULL if none.", data_type: Nullable(String)}
  - {name: supply, description: "Circulating supply of the group's own personal CRC token (sum across all holder categories).", data_type: Float64}
  - {name: wrapped, description: "Portion of the supply currently held by the avatar's ERC-20 wrapper contracts.", data_type: Float64}
  - {name: unwrapped, description: "Portion of the supply held as native ERC-1155 (supply − wrapped).", data_type: Float64}
  - {name: wrapped_pct, description: "wrapped / supply × 100. NULL when supply = 0.", data_type: Nullable(Float64)}
  - {name: supply_demurraged, description: "Demurrage-adjusted equivalent of supply.", data_type: Float64}
  - {name: n_members, description: "Distinct trustees on the group's outgoing trust list (0 if none).", data_type: UInt64}
  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date

- name: fct_execution_circles_v2_group_token_supply_daily
  description: >
    Daily aggregate of Circles v2 group-token supply, split between native
    ERC-1155 and wrapped ERC-20 forms. Aggregated across all group tokens
    by resolving token_address → issuer through the wrapper registry.
  columns:
  - {name: date, description: "Calendar day (UTC).", data_type: Date}
  - {name: supply_total, description: "Total group-token supply across all groups on this day (native + wrapped), in CRC.", data_type: Float64}
  - {name: supply_native_erc1155, description: "Portion of group-token supply held as native ERC-1155 on this day, in CRC.", data_type: Float64}
  - {name: supply_wrapped_erc20, description: "Portion of group-token supply held as ERC-20 wrappers on this day, in CRC.", data_type: Float64}
  - {name: supply_total_demurraged, description: "Demurrage-adjusted equivalent of supply_total.", data_type: Float64}
  - {name: supply_native_demurraged, description: "Demurrage-adjusted equivalent of supply_native_erc1155.", data_type: Float64}
  - {name: supply_wrapped_demurraged, description: "Demurrage-adjusted equivalent of supply_wrapped_erc20.", data_type: Float64}

- name: api_execution_circles_v2_group_token_supply_daily
  description: >
    Long-format time-series view (one row per (date, label)) over
    fct_execution_circles_v2_group_token_supply_daily, ready for a stacked-area
    chart with seriesField='label'. Latest day excluded.
  columns:
  - {name: date, description: "Calendar day (UTC).", data_type: Date}
  - {name: label, description: "'ERC-1155 (native)' or 'ERC-20 (wrapped)'.", data_type: String}
  - {name: value, description: "Group-token supply for this label's form on this day, in CRC.", data_type: Float64}
  - {name: value_demurraged, description: "Demurrage-adjusted equivalent of value.", data_type: Float64}

# ---------- Backing: trust-defined backers (vs depositors) ----------

- name: fct_execution_circles_v2_backers_cumulative_daily
  description: >
    Daily cumulative count of trust-defined backers (addresses ever trusted
    by the backers group avatar var('circles_target_group_address')).
    Distinct from the depositor population in
    int_execution_circles_v2_backing_depositors_current.
  columns:
  - {name: date, description: "Calendar day (UTC).", data_type: Date}
  - {name: new_backers, description: "Trust-defined backers first trusted by the backers group on this day.", data_type: UInt64}
  - {name: cumulative_backers, description: "Running total of distinct trust-defined backers up to and including this day.", data_type: UInt64}

- name: api_execution_circles_v2_backers_cumulative_daily
  description: Time-series view of trust-defined cumulative backers; latest day excluded.
  columns:
  - {name: date, description: "Calendar day (UTC).", data_type: Date}
  - {name: new_backers, description: "Trust-defined backers first trusted by the backers group on this day.", data_type: UInt64}
  - {name: cumulative_backers, description: "Running total of distinct trust-defined backers up to and including this day.", data_type: UInt64}

