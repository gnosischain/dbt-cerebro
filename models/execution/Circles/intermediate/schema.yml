version: 2
models:

- name: int_execution_circles_backing
  description: The `int_execution_circles_backing` model captures Circles backing lifecycle events with decoded participants and metadata for downstream analytics.
  columns:
  - name: block_timestamp
    description: UTC timestamp of the block containing the backing event.
    data_type: DateTime64
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: event_name
    description: Name of the Circles backing event.
    data_type: String
  - name: lifecycle_stage
    description: Normalized backing lifecycle stage derived from the event name.
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: int_execution_circles_v1_avatars
  description: The model captures Circles v1 signup events and normalizes avatar registration details for downstream analytics.
  columns:
  - name: block_timestamp
    description: The timestamp when the signup event occurred.
    data_type: DateTime64
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: avatar
    description: The avatar address registered by the v1 signup event.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: avatar_type
    description: The normalized Circles avatar category for the signup event.
    data_type: String
  - name: source_event_name
    description: Original source event name used for lineage.
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: int_execution_circles_v2_avatars
  description: This model normalizes Circles v2 avatar registration events into a shared avatar shape for downstream analytics.
  columns:
  - name: block_timestamp
    description: UTC timestamp of the block containing the registration event.
    data_type: DateTime64
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: avatar
    description: The avatar address registered by the v2 event.
    data_type: String
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: avatar_type
    description: The category of avatar registered by the event.
    data_type: String
  - name: source_event_name
    description: Original source event name used for lineage.
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: int_execution_circles_avatars
  meta: {owner: analytics_team, authoritative: false}
  tests: [{elementary.schema_changes: {severity: warn, tags: [elementary]}}]
