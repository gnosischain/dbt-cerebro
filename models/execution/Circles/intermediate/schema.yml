- name: int_execution_circles_v2_inviter_fees
  description: >
    Per-event Circles v2 inviter-fee transfers — wrapped-CRC ERC-20 Transfer
    events in the same tx as a Hub.PersonalMint, from invitee to inviter per
    the avatar→inviter mapping in int_execution_circles_v2_avatars. Used by
    the WEAU weekly-earners definition. The >= 1 CRC threshold is applied
    downstream so this stays event-grain and incremental-safe.
  columns:
  - name: block_number
    data_type: UInt64
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    data_type: String
  - name: log_index
    data_type: UInt32
  - name: token_address
    description: Wrapped CRC ERC-20 token address.
    data_type: String
  - name: invitee
    description: Lowercase address of the invitee paying the fee.
    data_type: String
  - name: inviter
    description: Lowercase address of the inviter receiving the fee.
    data_type: String
  - name: amount
    description: Fee amount in CRC (raw / 1e18).
    data_type: Float64
  - name: is_gnosis_app_tx
    description: >
      1 if the personal-mint tx carrying this fee was routed through an active
      Gnosis App (Cometh 4337) relayer — the canonical "action taken in-app"
      predicate. 0 for fees produced by other apps or direct on-chain flows.
    data_type: UInt8
