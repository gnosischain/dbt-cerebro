- name: int_execution_circles_v2_mint_events
  description: >
    One row per protocol mint, tagged with `mint_kind`. Sourced from the
    DECODED Hub events in contracts_circles_v2_Hub_events — NOT inferred from
    from=0x00…00 TransferSingle legs.

    Classifier:
      personal  - PersonalMint event. to_address / token_address = the minting
                  human; amount_raw = event `amount`. Replaces the old
                  from=0x0 + Human-token heuristic, which over-counted ~4.5k
                  avatars whose CRC was created only by inline auto-issuance
                  legs that emit no PersonalMint event. Now matches Dune
                  query_6317871 / hub_evt_personalmint (~18.4k distinct humans).
      group     - GroupMint event. to_address = receiver, token_address =
                  group, operator = sender, amount_raw = Σ event `amounts[]`.
      migration - V1→V2 migration mints have no Hub mint event, so this branch
                  stays transfer-derived: from=0x0 TransferSingle whose operator
                  is the Circles V2 Migration contract
                  (contracts_circles_registry.contract_type = 'Migration').

    Incremental, monthly partitioned on block_timestamp.
  columns:
  - name: block_number
    data_type: Nullable(UInt32)
    description: Block number containing the mint event.
  - name: block_timestamp
    data_type: DateTime64(0, 'UTC')
    description: UTC timestamp of the mint event.
  - name: transaction_hash
    data_type: Nullable(String)
    description: Hash of the transaction (without 0x prefix).
  - name: transaction_index
    data_type: Nullable(UInt32)
    description: Index of the transaction within the block.
  - name: log_index
    data_type: Nullable(UInt32)
    description: Index of the log within the block.
  - name: batch_index
    data_type: UInt32
    description: Index within a TransferBatch (0 for TransferSingle).
  - name: operator
    data_type: Nullable(String)
    description: Address of the operator that initiated the transfer.
  - name: to_address
    data_type: Nullable(String)
    description: Recipient address of the minted Circles.
  - name: token_id
    data_type: Nullable(String)
    description: ERC-1155 token ID. NULL for personal/group (event-sourced) rows; populated only for migration rows from the transfer leg.
  - name: token_address
    data_type: Nullable(String)
    description: Token/avatar minted — the human's token (personal), the group token (group), or the migration leg's token.
  - name: amount_raw
    data_type: Nullable(UInt256)
    description: Raw mint amount in base units — PersonalMint amount, sum of GroupMint amounts[], or the migration leg amount.
  - name: transfer_type
    data_type: String
    description: Source tag — CrcV2_PersonalMint / CrcV2_GroupMint for event rows, or the migration leg's transfer_type.
  - name: mint_kind
    data_type: String
    description: "Enum: personal | group | migration | other (see model description)."
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2024-10-01"
      batch_months: 6
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      - log_index
      - batch_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
