- name: int_execution_circles_v2_avatar_metadata_targets
  description: |
    Deterministic queue of every (avatar, metadata_digest) pair the Circles v2
    NameRegistry has ever announced. Built as a view over
    contracts_circles_v2_NameRegistry_events filtered to UpdateMetadataDigest
    rows with a non-empty digest, deduplicated to one row per (avatar, digest)
    using the latest event for that pair. Each row carries the derived
    metadata_digest_hex, ipfs_cid_v0, gateway_url, and an
    is_current_avatar_metadata flag marking the most recent digest per avatar.
    Drives both the one-time IPFS backfill script
    (scripts/circles/backfill_avatar_metadata.py) and the nightly
    fetch_and_insert_circles_metadata macro that knows which IPFS payloads
    still need to be fetched.
  columns:
  - name: avatar
    description: Lowercase Circles avatar address.
    data_type: String
    tests:
    - not_null
  - name: metadata_digest
    description: 0x-prefixed hex of the 32-byte sha2-256 metadata digest.
    data_type: String
    tests:
    - not_null
  - name: metadata_digest_hex
    description: Lowercase hex digest with the 0x prefix stripped.
    data_type: String
  - name: ipfs_cid_v0
    description: CIDv0 derived from `metadata_digest` (`base58Encode('1220' + digest)`).
    data_type: String
    tests:
    - not_null
  - name: gateway_url
    description: Full IPFS gateway URL using the configured `circles_ipfs_gateway` var.
    data_type: String
  - name: block_timestamp
    description: Timestamp of the latest UpdateMetadataDigest event for this pair.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction that emitted the event.
    data_type: String
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt32
  - name: is_current_avatar_metadata
    description: True when this row is the most recent metadata digest for the avatar.
    data_type: Bool
  tests: []
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: '2024-10-01'
      batch_months: 6
- name: int_execution_circles_v2_avatar_metadata
  description: |
    Current parsed IPFS metadata for every Circles v2 avatar. Joins each
    avatar's latest (avatar, metadata_digest) pair from
    int_execution_circles_v2_avatar_metadata_targets (filtered to
    is_current_avatar_metadata) against the most recently fetched payload in
    the auxiliary circles_avatar_metadata_raw source (HTTP 200, non-empty
    body, ranked by fetched_at). Exposes a small set of typed fields parsed
    from the JSON body — name, symbol, description, imageUrl,
    previewImageUrl — alongside the raw body and fetch timestamp for
    downstream models.
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      # Circles v2 launched 2024-10. Each month-batch processes only
      # avatars registered in that month (filter on
      # int_execution_circles_v2_avatars.block_timestamp), keeping the
      # JSON-body sort small enough to fit the cluster's 7.2 GiB cap.
      # When start_month/end_month are set the model uses append; RMT
      # dedups on unique_key=avatar so successive month-batches converge
      # to one row per avatar.
      start_date: "2024-10-01"
      batch_months: 1
  columns:
  - name: avatar
    description: Lowercase Circles avatar address.
    data_type: String
    tests:
    - not_null
    - unique
  - name: avatar_type
    description: Avatar category (Human, Group, Org).
    data_type: String
  - name: onchain_name
    description: Name set on-chain at registration (Group/Org only).
    data_type: Nullable(String)
  - name: metadata_digest
    description: 0x-prefixed hex digest of the current metadata payload.
    data_type: Nullable(String)
  - name: ipfs_cid_v0
    description: CIDv0 of the current metadata payload.
    data_type: Nullable(String)
  - name: gateway_url
    description: Gateway URL fetched at materialization time.
    data_type: Nullable(String)
  - name: metadata_name
    description: '`name` field extracted from the metadata JSON. Populated for ~99.9% of fetched payloads.'
    data_type: String
  - name: metadata_symbol
    description: '`symbol` field extracted from the metadata JSON. Rarely populated (group/org tokens only).'
    data_type: String
  - name: metadata_description
    description: '`description` field extracted from the metadata JSON. Populated for ~20% of payloads.'
    data_type: String
  - name: metadata_image_url
    description: '`imageUrl` field from the metadata JSON. Populated for ~1.5% of payloads.'
    data_type: String
  - name: metadata_preview_image_url
    description: '`previewImageUrl` field from the metadata JSON. Populated for ~53% of payloads.'
    data_type: String
  - name: metadata_body
    description: Full raw response body for the current metadata digest.
    data_type: Nullable(String)
  - name: metadata_fetched_at
    description: Timestamp the current payload was fetched.
    data_type: Nullable(DateTime)
  tests: []
- name: int_execution_circles_v2_avatar_metadata_history
  description: |
    SCD-style historical view of every Circles v2 avatar metadata change.
    One row per (avatar, metadata_digest) ever announced by the NameRegistry,
    in event order, with valid_from / valid_to / is_current columns so the
    dashboard can render the full timeline of name + image changes per avatar.
    valid_to is computed via leadInFrame over (avatar) ordered by
    (block_timestamp, log_index) and is NULL on the most recent row per
    avatar. The parsed JSON fields (name, symbol, description, imageUrl,
    previewImageUrl) are joined per (avatar, metadata_digest) from the most
    recent successful fetch in circles_avatar_metadata_raw.

    Incremental strategy: delete+insert keyed on (avatar, metadata_digest).
    The affected_avatars CTE uses the standard apply_monthly_incremental_filter
    macro (same as other Circles intermediates) to find any avatar that
    received an UpdateMetadataDigest event in the incremental window, then
    INNER JOINs the targets view to that set so the full history of every
    affected avatar is recomputed in one shot — guaranteeing the leadInFrame
    window function still sees every event for those avatars and valid_to
    stays correct.
  columns:
  - name: avatar
    description: Lowercase Circles avatar address.
    data_type: String
    tests:
    - not_null
  - name: avatar_type
    description: Avatar category (Human, Group, Org).
    data_type: String
  - name: onchain_name
    description: Name set on-chain at registration (Group/Org only).
    data_type: Nullable(String)
  - name: metadata_digest
    description: 0x-prefixed hex digest emitted by this UpdateMetadataDigest event.
    data_type: String
    tests:
    - not_null
  - name: ipfs_cid_v0
    description: CIDv0 derived from `metadata_digest` (`base58Encode('1220' + digest)`).
    data_type: String
  - name: gateway_url
    description: Full IPFS gateway URL using the configured `circles_ipfs_gateway` var.
    data_type: String
  - name: valid_from
    description: Timestamp of the on-chain UpdateMetadataDigest event that introduced this digest.
    data_type: DateTime64
    tests:
    - not_null
  - name: valid_to
    description: Timestamp of the next UpdateMetadataDigest event for this avatar. NULL on the most recent row.
    data_type: Nullable(DateTime64)
  - name: is_current
    description: True when this row is the most recent metadata digest for the avatar.
    data_type: Bool
  - name: transaction_hash
    description: Transaction hash of the on-chain event.
    data_type: String
  - name: log_index
    description: Log index of the on-chain event.
    data_type: UInt32
  - name: metadata_name
    description: '`name` field extracted from the metadata JSON for this digest version.'
    data_type: String
  - name: metadata_symbol
