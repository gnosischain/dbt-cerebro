version: 2
models:
- name: int_execution_circles_v1_avatars
  description: Circles v1 signup events normalized into avatar registrations.
  columns:
  - name: block_number
    description: Block number containing the signup event.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp when the signup event occurred.
    data_type: DateTime64
    tests:
    - not_null:
        config:
          where: '{% if var(''test_full_refresh'', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var(''test_lookback_days'', 7) }}{% endif %}'
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: avatar_type
    description: Avatar category (Human or Org).
    data_type: String
  - name: avatar
    description: Address of the registered avatar.
    data_type: String
    tests:
    - not_null:
        config:
          where: '{% if var(''test_full_refresh'', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var(''test_lookback_days'', 7) }}{% endif %}'
  - name: token_id
    description: Address of the personal token created at signup (NULL for Orgs).
    data_type: Nullable(String)
  meta: &id003
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: '2020-10-01'
      batch_months: 6
  tests: &id001
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_circles_v2_avatars
  description: Circles v2 avatar registration events (Human, Group, Org) normalized for downstream analytics.
  columns:
  - name: block_number
    description: Block number containing the registration event.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the registration event.
    data_type: DateTime64
    tests:
    - not_null:
        config:
          where: '{% if var(''test_full_refresh'', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var(''test_lookback_days'', 7) }}{% endif %}'
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: avatar_type
    description: Avatar category (Human, Group, or Org).
    data_type: String
  - name: invited_by
    description: Address that invited this human (NULL for Groups/Orgs).
    data_type: Nullable(String)
  - name: avatar
    description: Address of the registered avatar.
    data_type: String
    tests:
    - not_null:
        config:
          where: '{% if var(''test_full_refresh'', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var(''test_lookback_days'', 7) }}{% endif %}'
  - name: token_id
    description: Token ID for the avatar (NULL for Orgs).
    data_type: Nullable(String)
  - name: name
    description: Name registered for Groups and Orgs (NULL for Humans).
    data_type: Nullable(String)
  meta: &id002
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: '2024-10-01'
      batch_months: 6
  tests: *id001
- name: int_execution_circles_v2_backing
  description: Captures Circles backing lifecycle events with decoded participants and metadata for downstream analytics.
  columns:
  - name: block_number
    description: Block number containing the backing event.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block containing the backing event.
    data_type: DateTime64
    tests:
    - not_null:
        config:
          where: '{% if var(''test_full_refresh'', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var(''test_lookback_days'', 7) }}{% endif %}'
  - name: transaction_hash
    description: Hash of the transaction containing the backing event.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: event_name
    description: Name of the Circles backing event.
    data_type: String
  - name: lifecycle_stage
    description: Normalized backing lifecycle stage derived from the event name.
    data_type: String
  - name: backer
    description: Address of the entity initiating the backing.
    data_type: Nullable(String)
  - name: circles_backing_instance
    description: Address of the deployed CirclesBacking contract instance.
    data_type: Nullable(String)
  - name: lbp
    description: Address of the LBP contract deployed for the backing.
    data_type: Nullable(String)
  - name: backing_asset
    description: Address of the asset used as backing collateral.
    data_type: Nullable(String)
  - name: personal_circles_address
    description: Address of the personal Circles token being backed.
    data_type: Nullable(String)
  - name: event_params
    description: Full decoded event parameters map.
    data_type: Map(String, String)
  meta: *id002
  tests: *id001
- name: int_execution_circles_v2_wrapper_transfers
  description: ERC20 Transfer events for Circles v2 wrapper tokens parsed from raw logs.
  columns:
  - name: block_number
    description: Block number containing the transfer.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: token_address
    description: Address of the ERC20 wrapper token contract.
    data_type: String
  - name: from_address
    description: Sender address.
    data_type: String
  - name: to_address
    description: Recipient address.
    data_type: String
  - name: amount_raw
    description: Raw transfer amount in token base units.
    data_type: UInt256
  meta: *id002
  tests: *id001
- name: int_execution_circles_v1_transfers
  description: Circles v1 ERC20 transfers normalized into the common transfer schema.
  columns:
  - name: block_number
    description: Block number containing the transfer.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: batch_index
    description: Index within a TransferBatch (always 0 for v1).
    data_type: UInt64
  - name: operator
    description: Address of the operator (always NULL for v1).
    data_type: Nullable(String)
  - name: from_address
    description: Sender address.
    data_type: String
  - name: to_address
    description: Recipient address.
    data_type: String
  - name: token_id
    description: Token ID (same as token_address for v1).
    data_type: String
  - name: amount_raw
    description: Raw transfer amount in token base units.
    data_type: UInt256
  - name: token_address
    description: Address of the ERC20 token contract.
    data_type: String
  - name: transfer_type
    description: Transfer classification (CrcV1_Transfer).
    data_type: String
  meta: *id003
  tests: *id001
- name: int_execution_circles_v2_hub_transfers
  description: Circles v2 ERC-1155 TransferSingle and TransferBatch events from the Hub, exploded into individual rows.
  columns:
  - name: block_number
    description: Block number containing the transfer.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: batch_index
    description: Index within a TransferBatch (0 for TransferSingle).
    data_type: UInt64
  - name: operator
    description: Address of the operator that initiated the transfer.
    data_type: String
  - name: from_address
    description: Sender address.
    data_type: String
  - name: to_address
    description: Recipient address.
    data_type: String
  - name: token_id
    description: ERC-1155 token ID (avatar address encoded as uint256).
    data_type: String
  - name: amount_raw
    description: Raw transfer amount in token base units.
    data_type: UInt256
  - name: token_address
    description: Avatar address derived from token_id.
    data_type: String
  - name: transfer_type
    description: Transfer classification (CrcV2_TransferSingle or CrcV2_TransferBatch).
    data_type: String
  meta: *id002
  tests: *id001
- name: int_execution_circles_v2_transfers
  description: Unified Circles v2 transfers combining Hub ERC-1155 and ERC-20 wrapper transfers. Static wrapper amounts are converted to demurrage units.
  columns:
  - name: block_number
    description: Block number containing the transfer.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: batch_index
    description: Index within a TransferBatch (0 for single and wrapper transfers).
    data_type: UInt64
  - name: operator
    description: Address of the operator that initiated the transfer (empty for wrapper transfers).
    data_type: String
  - name: from_address
    description: Sender address.
    data_type: String
  - name: to_address
    description: Recipient address.
    data_type: String
  - name: token_address
    description: Avatar address for Hub transfers, wrapper contract address for ERC-20 wrapper transfers.
    data_type: String
  - name: amount_raw
    description: Original on-chain transfer amount in token base units (18 decimals). In demurrage units for Hub transfers and demurrage wrappers, in static units for static wrappers.
    data_type: UInt256
  - name: amount_demurraged_raw
    description: Transfer amount converted to demurrage units. For static wrappers (circlesType=1), this is amount_raw multiplied by the demurrage factor at transfer time. For demurrage transfers, equals amount_raw.
    data_type: UInt256
  - name: unit_type
    description: Original unit type of the transfer amount ('demurrage' or 'static').
    data_type: String
  - name: circles_type
    description: Circles representation enum for the token balance (0 = Demurrage, 1 = Inflation).
    data_type: UInt8
  - name: transfer_type
    description: Transfer classification (CrcV2_TransferSingle, CrcV2_TransferBatch, or CrcV2_ERC20WrapperTransfer).
    data_type: String
  meta: *id002
  tests: *id001
- name: int_execution_circles_v1_balance_diffs
  description: Per-account balance deltas derived from v1 transfers, with positive and negative entries for each side.
  columns: &id005
  - name: block_number
    description: Block number containing the transfer.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: batch_index
    description: Index within a TransferBatch (0 for single events).
    data_type: UInt64
  - name: account
    description: Address of the account whose balance changed.
    data_type: String
  - name: counterparty
    description: Address of the other party in the transfer.
    data_type: String
  - name: token_id
    description: Token ID of the transferred token.
    data_type: String
  - name: token_address
    description: Address of the token contract.
    data_type: String
  - name: delta_raw
    description: Signed balance change in token base units (negative for debits, positive for credits).
    data_type: Int256
  - name: transfer_type
    description: Transfer classification (e.g. CrcV1_Transfer, CrcV2_TransferSingle).
    data_type: String
  meta: *id003
  tests: *id001
- name: int_execution_circles_v2_balance_diffs_daily
  description: Daily aggregated per-account balance deltas derived from unified v2 transfers. One row per (date, account, token_address).
  columns:
  - name: date
    description: Calendar date of the balance change.
    data_type: Date
  - name: account
    description: Address of the account whose balance changed.
    data_type: String
  - name: token_address
    description: Address of the token contract.
    data_type: String
  - name: circles_type
    description: Circles representation enum for the position (0 = Demurrage, 1 = Inflation).
    data_type: UInt8
  - name: delta_raw
    description: Net signed balance change for the day in token base units (sum of debits and credits).
    data_type: Int256
  - name: last_activity_ts
    description: Unix timestamp of the latest transfer activity for this account/token on this day.
    data_type: UInt64
  meta: *id002
  tests: *id001
- name: int_execution_circles_v1_balances_daily
  description: Daily end-of-day token balances per account for Circles v1 tokens.
  columns: &id006
  - name: date
    description: Calendar date of the balance snapshot.
    data_type: Date
  - name: account
    description: Address of the token holder.
    data_type: String
  - name: token_id
    description: Token ID of the held token.
    data_type: String
  - name: token_address
    description: Address of the token contract.
    data_type: String
  - name: balance_raw
    description: Cumulative nominal balance in token base units.
    data_type: Int256
  - name: last_activity_ts
    description: Unix timestamp of the most recent transfer activity for this position.
    data_type: UInt64
  - name: snapshot_ts
    description: Unix timestamp used for the end-of-day snapshot (end of day or chain now for today).
    data_type: UInt64
  - name: demurraged_balance_raw
    description: Balance after applying demurrage decay (identity for v1, time-decayed for v2).
    data_type: UInt256
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: '2020-10-01'
      batch_months: 6
  tests: *id001
- name: int_execution_circles_v2_balances_daily
  description: Daily end-of-day token balances per account for Circles v2 tokens with demurrage adjustment.
  columns:
  - name: date
    description: Calendar date of the balance snapshot.
    data_type: Date
  - name: account
    description: Address of the token holder.
    data_type: String
  - name: token_address
    description: Address of the token contract.
    data_type: String
  - name: balance_raw
    description: Cumulative nominal balance in native token units. Hub balances and demurrage wrappers are in demurrage units; inflationary wrappers are in static units.
    data_type: Int256
  - name: circles_type
    description: Circles representation enum for the position (0 = Demurrage, 1 = Inflation).
    data_type: UInt8
  - name: last_activity_ts
    description: Unix timestamp of the most recent transfer activity for this position.
    data_type: UInt64
  - name: snapshot_ts
    description: Unix timestamp used for the end-of-day snapshot (end of day or chain now for today).
    data_type: UInt64
  - name: demurraged_balance_raw
    description: Balance converted to demurrage units at the snapshot timestamp. Inflationary wrappers use the snapshot day as the conversion time basis; demurrage-native positions use the last activity timestamp.
    data_type: Int256
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: '2024-10-01'
      batch_months: 1
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
  - dbt_utils.expression_is_true:
      name: no_negative_balances_non_zero_address
      expression: "balance_raw >= 0"
      config:
        severity: warn
        where: "account != '0x0000000000000000000000000000000000000000' AND date >= today() - 7"
- name: int_execution_circles_v2_balance_cohorts_daily
  description: Daily distribution of CRC holders across balance buckets, aggregated from daily balances.
  columns:
  - name: date
    description: Calendar date.
    data_type: Date
  - name: balance_bucket
    description: Balance range bucket label (e.g. '0-1', '1-10', '100k+').
    data_type: String
  - name: holder_count
    description: Number of distinct holders in this bucket.
    data_type: UInt64
  - name: total_balance
    description: Sum of nominal balances in this bucket in CRC.
    data_type: Float64
  - name: total_demurraged_balance
    description: Sum of demurrage-adjusted balances in this bucket in CRC.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: '2024-10-01'
      batch_months: 1
  tests: *id001
- name: int_execution_circles_v1_trust_updates
  description: Raw trust update events from Circles v1 Trust events, normalized into a common schema.
  columns:
  - name: block_number
    description: Block number containing the trust event.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: truster
    description: Address of the entity granting trust.
    data_type: String
  - name: trustee
    description: Address of the entity receiving trust.
    data_type: String
  - name: trust_limit
    description: Trust limit value from the v1 Trust event.
    data_type: UInt256
  - name: trust_value
    description: String representation of the trust limit.
    data_type: String
  - name: updated_at
    description: Timestamp when the trust was last updated.
    data_type: DateTime64
  meta: *id003
  tests: *id001
- name: int_execution_circles_v2_trust_updates
  description: Raw trust update events from Circles v2 Trust events, normalized into a common schema.
  columns:
  - name: block_number
    description: Block number containing the trust event.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: truster
    description: Address of the entity granting trust.
    data_type: String
  - name: trustee
    description: Address of the entity receiving trust.
    data_type: String
  - name: expiry_time
    description: Unix timestamp when the trust expires (0 means no expiry).
    data_type: UInt256
  - name: trust_value
    description: String representation of the trust expiry time.
    data_type: String
  - name: updated_at
    description: Timestamp when the trust was last updated.
    data_type: DateTime64
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: '2024-10-01'
      batch_months: 24
  tests: *id001
- name: int_execution_circles_v1_trust_relations
  description: Intervalized trust relations for Circles v1 with valid_from/valid_to windows and active status.
  columns:
  - name: block_number
    description: Block number of the trust event creating this relation.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the trust event.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: truster
    description: Address of the entity granting trust.
    data_type: String
  - name: trustee
    description: Address of the entity receiving trust.
    data_type: String
  - name: trust_value
    description: String representation of the trust limit.
    data_type: String
  - name: trust_limit
    description: Numeric trust limit value from the v1 Trust event.
    data_type: UInt256
  - name: valid_from
    description: Start of the trust validity interval.
    data_type: DateTime64
  - name: valid_to
    description: End of the trust validity interval (NULL if still active).
    data_type: Nullable(DateTime)
  - name: is_active
    description: Whether the trust relation is currently active (1 if trust_limit > 0).
    data_type: UInt8
  - name: updated_at
    description: Timestamp when the trust was last updated.
    data_type: DateTime64
  meta: *id003
  tests: *id001
- name: int_execution_circles_v2_wrappers
  description: ERC20 wrapper deployments from the ERC20Lift contract, mapping avatars to their wrapper token addresses.
  columns:
  - name: block_number
    description: Block number when the wrapper was deployed.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the deployment.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: avatar
    description: Avatar address whose token is being wrapped.
    data_type: String
  - name: wrapper_address
    description: Address of the deployed ERC20 wrapper contract.
    data_type: String
  - name: circles_type
    description: Circles representation enum emitted by ERC20Lift (0 = Demurrage, 1 = Inflation).
    data_type: UInt8
  meta: *id002
  tests: *id001
- name: int_execution_circles_v2_wrapper_tokens
  description: >
    Reference table mapping Circles V2 ERC-20 wrapper addresses to their
    on-chain token symbol. Rebuilt daily. Symbol is parsed from dune_labels
    (92% coverage) with fallback to CRC-{short_addr}.
  columns:
  - name: wrapper_address
    description: ERC-20 wrapper contract address.
    data_type: String
  - name: avatar
    description: Underlying Circles avatar address.
    data_type: String
  - name: circles_type
    description: 0 = demurrage wrapper, 1 = static/inflation wrapper.
    data_type: UInt8
  - name: symbol
    description: On-chain token symbol (e.g., s-gCRC, s-CBG). Fallback CRC-{addr} if not yet in dune_labels.
    data_type: String
  meta: *id002
  tests: *id001
- name: int_execution_circles_v2_group_settings_updates
  description: Group configuration changes from BaseGroupFactory, CMGroupDeployer, and BaseGroup runtime events.
  columns:
  - name: block_number
    description: Block number containing the settings update.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the update.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: group_address
    description: Address of the group being updated.
    data_type: String
  - name: owner
    description: Updated owner address (NULL if not changed).
    data_type: Nullable(String)
  - name: mint_handler
    description: Updated mint handler address (NULL if not changed).
    data_type: Nullable(String)
  - name: redemption_handler
    description: Updated redemption handler address (NULL if not changed).
    data_type: Nullable(String)
  - name: liquidity_provider
    description: Updated liquidity provider address (NULL if not changed).
    data_type: Nullable(String)
  - name: treasury_address
    description: Updated treasury address (NULL if not changed).
    data_type: Nullable(String)
  - name: service
    description: Updated service address (NULL if not changed).
    data_type: Nullable(String)
  - name: fee_collection
    description: Updated fee collection address (NULL if not changed).
    data_type: Nullable(String)
  meta: *id002
  tests: *id001
- name: int_execution_circles_v2_group_collateral_diffs
  description: Per-group collateral deltas from StandardTreasury lock, burn, and return events.
  columns:
  - name: block_number
    description: Block number containing the collateral event.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block.
    data_type: DateTime64
  - name: transaction_hash
    description: Hash of the transaction.
    data_type: String
  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt64
  - name: log_index
    description: Index of the log within the block.
    data_type: UInt64
  - name: batch_index
    description: Index within a batch event (0 for single events).
    data_type: UInt64
  - name: event_name
    description: Name of the collateral event.
    data_type: String
