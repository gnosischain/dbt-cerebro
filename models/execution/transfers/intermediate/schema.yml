version: 2
models:

- name: int_execution_transfers_whitelisted_daily
  description: The `int_execution_transfers_whitelisted_daily` model aggregates daily whitelisted token transfer data, including deposits, withdrawals, and transfers involving specific tokens, to support analysis of token movement activity within a defined time range.
  columns:

  - name: token_address
    description: The lowercase hexadecimal address identifying the token involved in the transfer.
    data_type: String

  - name: decimals
    description: The number of decimal places used by the token, indicating its divisibility.
    data_type: UInt64

  - name: symbol
    description: The ticker symbol representing the token, e.g., 'USDT'.
    data_type: String

  - name: date_start
    description: The start date when the token was added to the whitelist.
    data_type: Date

  - name: date_end
    description: The end date when the token was removed from the whitelist, if applicable.
    data_type: Date

  - name: date
    description: Date of the transfer.
    data_type: DateTime

  - name: from
    description: Sender address.
    data_type: String

  - name: to
    description: Recipient address.
    data_type: String

  - name: amount
    description: Amount of the token transferred.
    data_type: Float64

  - name: amount_usd
    description: Amount in USD.
    data_type: Float64

  - name: transfer_count
    description: Number of transfers.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      batch_months: 3
      start_date: "2020-07-01"
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - date
      - token_address
      - '"from"'
      - '"to"'
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_bridges_address_flows_daily
  description: |
    Address-grain bridge flows. Joins whitelisted transfers against the
    dune labels set filtered on bridge projects to extract one row per
    (date, bridge_contract, user_address, token, direction). Enables the
    Graph Explorer to render (address -> bridge) edges that the aggregate
    chain-level bridge models do not expose.
  meta:
    owner: bridges_team
    authoritative: false
  columns:
  - name: date
    description: Day bucket of the transfer leg.
    data_type: Date
    tests:
    - not_null
  - name: bridge_contract
    description: 0x-prefixed bridge contract address (either the from or to leg of the transfer).
    data_type: String
  - name: bridge_name
    description: "Project label for the bridge (e.g. 'Hop', 'Across', 'xDai Bridge') from dune labels."
    data_type: String
  - name: token_address
    description: ERC20 token address being bridged.
    data_type: String
  - name: symbol
    description: Token symbol.
    data_type: String
  - name: user_address
    description: The non-bridge counterparty of the transfer (the user).
    data_type: String
  - name: direction
    description: "'in' when the bridge is on the from side (user receives), 'out' when on the to side (user sends to bridge)."
    data_type: String
  - name: amount_raw_sum
    description: Sum of raw token amounts for the (user, bridge, token, direction, date) bucket.
    data_type: Float64
  - name: volume_usd
    description: USD volume (currently NULL — placeholder for when whitelisted_daily carries USD).
    data_type: Nullable(Float64)
  - name: transfer_count
    description: Number of transfers aggregated into this bucket.
    data_type: UInt64
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
