version: 2
models:

- name: int_execution_transfers_whitelisted_daily
  description: The `int_execution_transfers_whitelisted_daily` model aggregates daily whitelisted token transfer data, including deposits, withdrawals, and transfers involving specific tokens, to support analysis of token movement activity within a defined time range.
  columns:

  - name: token_address
    description: The lowercase hexadecimal address identifying the token involved in the transfer.
    data_type: String

  - name: decimals
    description: The number of decimal places used by the token, indicating its divisibility.
    data_type: UInt64

  - name: symbol
    description: The ticker symbol representing the token, e.g., 'USDT'.
    data_type: String

  - name: date_start
    description: The start date when the token was added to the whitelist.
    data_type: Date

  - name: date_end
    description: The end date when the token was removed from the whitelist, if applicable.
    data_type: Date

  - name: date
    description: Date of the transfer.
    data_type: DateTime

  - name: from
    description: Sender address.
    data_type: String

  - name: to
    description: Recipient address.
    data_type: String

  - name: amount
    description: Amount of the token transferred.
    data_type: Float64

  - name: amount_usd
    description: Amount in USD.
    data_type: Float64

  - name: transfer_count
    description: Number of transfers.
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      batch_months: 3
      start_date: "2020-07-01"
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_transfers_whitelisted_raw
  description: This dbt model processes and enriches whitelisted ERC20 token transfer logs, integrating token metadata and price data to facilitate detailed transfer analysis within a specified date range.
  columns:

  - name: token_address
    description: Lowercase hexadecimal address of the token contract associated with the transfer.
    data_type: String

  - name: token_address_raw
    description: Hexadecimal token address without the '0x' prefix, used for join operations.
    data_type: String

  - name: decimals
    description: Number of decimal places the token uses, indicating token divisibility.
    data_type: Int64

  - name: symbol
    description: Token symbol in its original case, representing the token's identifier.
    data_type: String

  - name: symbol_upper
    description: Uppercase version of the token symbol for standardized comparisons.
    data_type: String

  - name: date_start
    description: Start date when the token was whitelisted, indicating its valid trading period.
    data_type: Date

  - name: date_end
    description: End date when the token was delisted or no longer whitelisted.
    data_type: Date

  - name: block_number
    description: Height of the block.
    data_type: UInt32

  - name: block_timestamp
    description: UTC timestamp of the enclosing block.
    data_type: DateTime64(0, 'UTC')

  - name: transaction_index
    description: Index of the transaction within the block.
    data_type: UInt32

  - name: log_index
    description: Zero-based index of the log within the receipt.
    data_type: UInt32

  - name: transaction_hash
    description: Transaction hash.
    data_type: String

  - name: from
    description: Sender address.
    data_type: String

  - name: to
    description: Recipient address.
    data_type: String

  - name: amount
    description: Transfer amount as floating-point ether.
    data_type: Float64

  - name: price
    description: Price information.
    data_type: Float64

  - name: amount_usd
    description: Amount in USD.
    data_type: Float64

  - name: value_raw
    description: Raw value.
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: int_execution_bridges_address_flows_daily
  description: |
    Address-grain bridge flows. Joins whitelisted transfers against the
    dune labels set filtered on bridge projects to extract one row per
    (date, bridge_contract, user_address, token, direction). Enables the
    Graph Explorer to render (address -> bridge) edges that the aggregate
    chain-level bridge models do not expose.
  meta:
    owner: bridges_team
    authoritative: false
  columns:
  - name: date
    description: Day bucket of the transfer leg.
    data_type: Date
    tests:
    - not_null
  - name: bridge_contract
    description: 0x-prefixed bridge contract address (either the from or to leg of the transfer).
    data_type: String
  - name: bridge_name
    description: "Project label for the bridge (e.g. 'Hop', 'Across', 'xDai Bridge') from dune labels."
    data_type: String
  - name: token_address
    description: ERC20 token address being bridged.
    data_type: String
  - name: symbol
    description: Token symbol.
    data_type: String
  - name: user_address
    description: The non-bridge counterparty of the transfer (the user).
    data_type: String
  - name: direction
    description: "'in' when the bridge is on the from side (user receives), 'out' when on the to side (user sends to bridge)."
    data_type: String
  - name: amount_raw_sum
    description: Sum of raw token amounts for the (user, bridge, token, direction, date) bucket.
    data_type: Float64
  - name: volume_usd
    description: USD volume (currently NULL — placeholder for when whitelisted_daily carries USD).
    data_type: Nullable(Float64)
  - name: transfer_count
    description: Number of transfers aggregated into this bucket.
    data_type: UInt64
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
