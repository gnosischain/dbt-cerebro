version: 2
models:

- name: int_execution_transactions_info_daily
  description: The `int_execution_transactions_info_daily` model aggregates daily transaction data from the execution layer, providing insights into transaction counts, success rates, gas consumption, and value metrics for analysis and reporting.
  columns:

  - name: block_timestamp
    description: The exact timestamp when the transaction was recorded on the blockchain.
    data_type: DateTime64
    tests:
    - not_null

  - name: date
    description: The date (YYYY-MM-DD) extracted from `block_timestamp`, used for daily aggregation.
    data_type: Date
    tests:
    - not_null

  - name: transaction_type
    description: The category or type of transaction, represented as a string.
    data_type: String

  - name: success
    description: Indicator (0 or 1) denoting whether the transaction was successful.
    data_type: UInt8

  - name: value_native
    description: The transaction value in native token units (xDai), expressed as a float with decimal precision.
    data_type: Float64

  - name: gas_used
    description: The total amount of gas units consumed by the transaction, as a float.
    data_type: UInt64

    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: error
        tags:
        - elementary
  - name: gas_price
    description: The gas price paid per gas unit in wei, represented as a float.
    data_type: UInt64

  - name: n_txs
    description: Total number of transactions of this type on the day.
    data_type: UInt64

    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: error
        tags:
        - elementary
  - name: xdai_value
    description: Sum of transaction values in native units (XDAI).
    data_type: Float64

  - name: xdai_value_avg
    description: Average transaction value in native units.
    data_type: Float64

  - name: xdai_value_median
    description: Median transaction value in native units.
    data_type: Float64

  - name: gas_price_avg
    description: Average gas price in Gwei.
    data_type: Float64

  - name: gas_price_median
    description: Median gas price in Gwei.
    data_type: Float64

  - name: fee_native_sum
    description: Total fee paid in native units (XDAI).
    data_type: Float64

    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: error
        tags:
        - elementary
  - name: fee_usd_sum
    description: Total fee in USD, calculated using price data.
    data_type: Float64
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: error
        tags:
        - elementary
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: error
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: error
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_transactions_by_project_daily
  description: This model aggregates daily execution transaction data by project, providing insights into transaction volume, user engagement, and fees associated with each project over time.
  columns:

  - name: address
    description: The blockchain address associated with the crawler label, used for linking transaction data to project labels.
    data_type: String

  - name: project
    description: The name or identifier of the project associated with the transaction, defaulting to 'Unknown' if not specified.
    data_type: String

  - name: sector
    description: The business sector or category assigned to the project, with 'Unknown' used when sector information is missing.
    data_type: String

  - name: date
    description: The date of the transactions, formatted as DateTime.
    data_type: DateTime

  - name: tx_count
    description: Total number of transactions for the project on the given date.
    data_type: UInt64

  - name: ua_bitmap_state
    description: Bitmap state representing unique addresses involved in transactions.
    data_type: String

  - name: gas_used_sum
    description: Sum of gas used across all transactions, in native units.
    data_type: Float64

  - name: fee_native_sum
    description: Total fees paid in native tokens (wei converted to GNO/XDAI).
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2018-10-01"
      batch_months: 2
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_transactions_by_project_hourly_recent
  description: This model aggregates hourly execution transaction data by project for the recent two-day period, providing insights into transaction volume, active accounts, and associated fees for business analysis.
  columns:

  - name: address
    description: The blockchain address associated with a transaction, used for label mapping.
    data_type: String

  - name: project
    description: The name of the project associated with the transaction, or 'Unknown' if not labeled.
    data_type: String

  - name: sector
    description: The sector classification of the project, or 'Unknown' if not labeled.
    data_type: String

  - name: hour
    description: The start of the hour period for the aggregated data.
    data_type: DateTime

  - name: tx_count
    description: Total number of transactions in the hour for the project.
    data_type: UInt64

  - name: active_accounts
    description: Count of distinct active sender addresses during the hour.
    data_type: UInt64

    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: hour
        time_bucket:
          period: day
          count: 1
        severity: error
        tags:
        - elementary
  - name: ua_bitmap_state
    description: Bitmap state representing unique active addresses for the project.
    data_type: String

  - name: fee_native_sum
    description: Sum of gas used multiplied by gas price, converted to native units (e.g., ETH).
    data_type: Float64
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: hour
        time_bucket:
          period: day
          count: 1
        severity: error
        tags:
        - elementary
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: hour
      time_bucket:
        period: hour
        count: 1
      training_period:
        period: day
        count: 21
      seasonality: hour_of_week
      detection_period:
        period: hour
        count: 6
      detection_delay:
        period: hour
        count: 1
      anomaly_sensitivity: 3.5
      ignore_small_changes:
        spike_failure_percent_threshold: 15
        drop_failure_percent_threshold: 25
      severity: error
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: hour
      time_bucket:
        period: hour
        count: 1
      severity: error
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_transactions_unique_addresses
  description: Incremental table of every unique transaction sender address hash with the date it was first seen. Used to compute exact all-time active account counts without bitmap merges.
  columns:

  - name: address_hash
    description: The cityHash64 of the lowercase sender address, used as a unique identifier.
    data_type: UInt64

  - name: first_seen_date
    description: The earliest date this address appeared in a successful transaction.
    data_type: Date
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2018-10-01"
      batch_months: 2

  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_transactions_cumulative_daily
  description: Daily time series of new and cumulative unique active accounts. Derived from the unique addresses table, provides exact all-time counts without bitmap memory overhead.
  columns:

  - name: date
    description: The date on which new accounts were first seen.
    data_type: Date

  - name: new_accounts
    description: Number of unique addresses that appeared for the first time on this date.
    data_type: UInt64

  - name: cumulative_accounts
    description: Running total of all unique addresses seen up to and including this date.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false

  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: error
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: error
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_transactions_daily_active_addresses
  description: Daily active address hashes — one row per unique sender address per active day. Used for memory-efficient windowed active account counts via countDistinct instead of bitmap merges.
  columns:

  - name: date
    description: The date the address was active (had a successful transaction).
    data_type: Date

  - name: address_hash
    description: The cityHash64 of the lowercase sender address.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2018-10-01"
      batch_months: 1

  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: int_execution_transactions_by_project_alltime_state
  description: This model aggregates execution transaction data by project and month, providing insights into transaction volume, fees, and user activity for comprehensive project-level analysis over time.
  columns:

  - name: month
    description: The start date of the month for which the aggregated data is calculated, formatted as a date.
    data_type: DateTime64

  - name: project
    description: Identifier for the project associated with the transaction data.
    data_type: String

  - name: txs_state
    description: The total number of transactions for the project within the month, represented as a summed state value.
    data_type: UInt64

  - name: fee_state
    description: The total sum of native fees associated with transactions for the project in the month, measured in the native currency units.
    data_type: Float64

  - name: aa_state
    description: A bitmap representing unique active users or accounts involved in transactions for the project during the month.
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false


  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
