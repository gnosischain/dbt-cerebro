version: 2
models:

- name: fct_execution_lending_weekly
  description: |
    Weekly fact aggregating lending activity per (week, protocol, token) across
    Aave V3 and SparkLend on Gnosis. Built from int_execution_lending_aave_daily
    by collapsing days into ISO weeks (toStartOfWeek). APYs use the
    end-of-week value (argMax by date); volumes are summed across the week;
    distinct lender/borrower counts come from the merged daily bitmap states.
    Excludes the current (incomplete) week.
  meta:
    owner: analytics_team
    authoritative: true
  columns:
  - name: week
    description: ISO week start date (Monday, UTC).
    data_type: Date
  - name: token_address
    description: Reserve token contract address.
    data_type: String
  - name: symbol
    description: Reserve token symbol.
    data_type: String
  - name: token_class
    description: Token classification (e.g. stable, native, governance).
    data_type: String
  - name: protocol
    description: Lending protocol identifier ('Aave V3' or 'SparkLend').
    data_type: String
  - name: apy_weekly
    description: Supply APY at end-of-week (last daily value).
    data_type: Nullable(Float64)
  - name: borrow_apy_weekly
    description: Variable borrow APY at end-of-week (last daily value).
    data_type: Nullable(Float64)
  - name: lenders_bitmap_state
    description: AggregateFunction holding the set of unique lender addresses active during the week (groupBitmap-mergeable).
    data_type: AggregateFunction(groupBitmap, UInt64)
  - name: borrowers_bitmap_state
    description: AggregateFunction holding the set of unique borrower addresses active during the week.
    data_type: AggregateFunction(groupBitmap, UInt64)
  - name: lenders_count_weekly
    description: Distinct lender count over the week (cardinality of the lender bitmap).
    data_type: UInt64
  - name: borrowers_count_weekly
    description: Distinct borrower count over the week (cardinality of the borrower bitmap).
    data_type: UInt64
  - name: deposits_volume_weekly
    description: Total deposit volume in the week (sum of daily values, native units).
    data_type: Float64
  - name: borrows_volume_weekly
    description: Total borrow volume in the week (sum of daily values, native units).
    data_type: Float64

- name: api_execution_lending_daily
  description: |
    Long-format daily APY series per (token, protocol) across Aave V3 and
    SparkLend. Each row pivots into one of two apy_type values
    ('Lending APY' or 'Borrow APY'). Drives the lending APY time-series
    chart on the lending dashboard.
  columns:
  - name: date
    data_type: Date
  - name: token
    description: Reserve token symbol.
    data_type: String
  - name: token_class
    data_type: String
  - name: label
    description: Lending protocol identifier ('Aave V3' or 'SparkLend').
    data_type: String
  - name: apy_type
    description: "'Lending APY' or 'Borrow APY'."
    data_type: String
  - name: value
    description: APY for the row's apy_type.
    data_type: Float64

- name: api_execution_lending_activity_counts_weekly
  description: |
    Weekly lender/borrower distinct user counts pivoted into long format for
    stacked-bar activity charts. One row per (week, token, protocol,
    activity_type), filtered to non-zero counts. Sourced from
    fct_execution_lending_weekly.
  columns:
  - name: date
    description: Week start date.
    data_type: Date
  - name: token
    description: Reserve token symbol.
    data_type: String
  - name: token_class
    data_type: String
  - name: label
    description: Lending protocol identifier.
    data_type: String
  - name: activity_type
    description: "'Lenders' or 'Borrowers'."
    data_type: String
  - name: value
    description: Distinct user count for the activity_type in the week.
    data_type: UInt64

- name: api_execution_lending_activity_volumes_weekly
  description: |
    Weekly deposit/borrow volumes pivoted into long format for stacked-bar
    volume charts. One row per (week, token, protocol, volume_type), filtered
    to non-zero volumes. Sourced from fct_execution_lending_weekly.
  columns:
  - name: date
    description: Week start date.
    data_type: Date
  - name: token
    description: Reserve token symbol.
    data_type: String
  - name: token_class
    data_type: String
  - name: label
    description: Lending protocol identifier.
    data_type: String
  - name: volume_type
    description: "'Deposits' or 'Borrows'."
    data_type: String
  - name: value
    description: Total volume in native units for the volume_type in the week.
    data_type: Float64

- name: api_execution_lending_borrowers_count_7d
  description: |
    KPI view of currently-active borrowers on Gnosis (Aave V3, SparkLend).
    Mirror of api_execution_lending_lenders_count_7d but for borrowers.
    "Active borrowers" is a STOCK measure — unique wallets currently holding
    a positive debt position. One row per protocol plus an 'ALL'-protocols
    aggregate. change_pct compares against the count 7 days earlier.
  columns:
  - name: token
    description: Always 'ALL' (no per-token slice exposed).
    data_type: String
  - name: protocol
    description: Lending protocol identifier or 'ALL' for the cross-protocol aggregate.
    data_type: String
  - name: value
    description: Distinct borrower count with positive debt balance on the latest available date.
    data_type: Float64
  - name: change_pct
    description: Percent change vs the count 7 days earlier (NULL when prior is zero or missing).
    data_type: Nullable(Float64)

  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
- name: api_execution_lending_tvl_by_token_latest
  description: Latest lending TVL per reserve token on Gnosis (aggregated across Aave V3 and SparkLend) for pie chart display. Each row is a token with its total USD value locked across all protocols.
  columns:
  - name: token
    data_type: String
  - name: value
    data_type: Float64

  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
- name: api_execution_lending_balance_cohorts_value_daily
  description: Daily lender balance cohort values per (protocol, token) across Aave V3 and SparkLend. Stacked bar chart data showing total USD and native value held by lenders in each balance bucket, 
    filterable by token and protocol.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    description: Lending protocol identifier. One of 'Aave V3' or 'SparkLend'.
    data_type: String
  - name: token
    data_type: String
  - name: cohort_unit
    data_type: String
  - name: label
    description: Balance bucket label (e.g. '10-100', '1k-10k').
    data_type: String
  - name: value_native
    data_type: Float64
  - name: value_usd
    data_type: Float64

- name: api_execution_lending_balance_cohorts_holders_daily
  description: Daily lender count by balance cohort per (protocol, token) across Aave V3 and SparkLend. Stacked bar chart data showing holder count per balance bucket, filterable by token and 
    protocol.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    description: Lending protocol identifier.
    data_type: String
  - name: token
    data_type: String
  - name: cohort_unit
    data_type: String
  - name: label
    description: Balance bucket label.
    data_type: String
  - name: value
    data_type: UInt64

- name: fct_execution_lending_latest
  description: |
    Lender / borrower counts per (window, protocol, token) plus protocol-scoped
    'ALL'-tokens rows and an all-protocols 'ALL' bucket for cross-protocol
    totals. Built off the daily lender/borrower bitmap states from
    int_execution_lending_aave_daily, merged via groupBitmapMerge over the
    last 7 full days for the current window, and the prior 7 days for change_pct.

    Widgets typically use `token = 'ALL'` rows and apply the optional
    `protocol` filter (filterField3). `protocol = 'ALL'` rows are retained for
    dashboards that intentionally aggregate across protocols (e.g. a "total
    lenders on Gnosis" KPI).
  columns:
  - name: label
    description: "'Lenders' or 'Borrowers'."
    data_type: String
  - name: window
    description: "Rolling window label (e.g. '7D')."
    data_type: String
  - name: protocol
    description: Lending protocol identifier or 'ALL' for the cross-protocol aggregate.
    data_type: String
  - name: token
    description: Token symbol or 'ALL' for the all-tokens aggregate within the protocol.
    data_type: String
  - name: value
    description: Distinct lender / borrower count for the current window.
    data_type: Float64
  - name: change_pct
    description: Percent change vs the prior equivalently-sized window (NULL when prior is zero or missing).
    data_type: Nullable(Float64)

- name: api_execution_lending_lenders_count_7d
  description: |
    KPI view of currently-active lenders on Gnosis (Aave V3, SparkLend).
    "Active lenders" is a STOCK measure — unique wallets currently holding a
    positive supply balance in a lending market on Gnosis (point-in-time count),
    not a flow measure (users who supplied within a window).

    One row per protocol plus an 'ALL'-protocols aggregate row (distinct
    wallets across both markets). change_pct compares today's active count vs
    the count from 7 days ago on the same balance snapshot (users whose
    balance was positive then, regardless of whether they're still active now).
  columns:
  - name: token
    description: Always 'ALL' (no per-token slice exposed in this view).
    data_type: String
  - name: protocol
    description: Lending protocol identifier or 'ALL' for the cross-protocol aggregate.
    data_type: String
  - name: value
    description: Distinct lender count with positive supply balance on the latest available date.
    data_type: Float64
  - name: change_pct
    description: Percent change vs the count 7 days earlier (NULL when the prior value is zero or missing).
    data_type: Nullable(Float64)

  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
- name: fct_execution_lending_top_lenders_ranked
  description: >
    Latest-day snapshot of lending suppliers ranked by USD balance within each
    (protocol, symbol) pair. Top 500 per pair. No joins — only window functions
    on int_execution_lending_aave_user_balances_daily. Materialized as a table
    to decouple the heavy scan from the lightweight joins in
    fct_execution_lending_top_lenders_latest.
  meta:
    owner: analytics_team
    authoritative: false
  columns:
  - name: protocol
    description: Lending protocol (Aave V3 or SparkLend).
    data_type: String
  - name: reserve_address
    description: Reserve token contract address.
    data_type: String
  - name: symbol
    description: Reserve token symbol.
    data_type: String
  - name: user_address
    description: Lender wallet address.
    data_type: String
  - name: balance
    description: Supply balance in native units.
    data_type: Float64
  - name: balance_usd
    description: Supply balance in USD.
    data_type: Float64
  - name: pct_of_total
    description: Lender's share of total supply for this (protocol, symbol) as percentage.
    data_type: Float64
  - name: rank
    description: Lender rank within (protocol, symbol), ordered by balance_usd descending.
    data_type: UInt64

- name: fct_execution_lending_top_lenders_latest
  description: >
    Latest-day snapshot of top lending suppliers with concentration metrics,
    7-day balance change, and address labels. One row per (protocol, symbol,
    user_address). Joins the ranked table with prev_balances and crawlers labels.
  meta:
    owner: analytics_team
    authoritative: false
  columns:
  - name: rank
    data_type: UInt64
  - name: protocol
    data_type: String
  - name: reserve_address
    data_type: String
  - name: symbol
    data_type: String
  - name: user_address
    data_type: String
  - name: label
    description: Project label from crawlers_data_labels. NULL if unlabeled.
    data_type: String
  - name: balance
    data_type: Float64
  - name: balance_usd
    data_type: Float64
  - name: pct_of_total
    data_type: Float64
  - name: cumulative_pct
    description: Running cumulative share of supply from rank 1 downward.
    data_type: Float64
  - name: change_usd_7d
    description: USD balance change vs 7 days ago.
    data_type: Float64

- name: api_execution_lending_top_lenders_latest
  description: >
    Thin API view over fct_execution_lending_top_lenders_latest. Dashboard applies
    token and protocol filters as needed.
  meta:
    owner: analytics_team
    authoritative: false
  columns:
  - name: rank
    data_type: UInt64
  - name: protocol
    data_type: String
  - name: symbol
    data_type: String
  - name: user_address
    data_type: String
  - name: label
    data_type: String
  - name: balance
    data_type: Float64
  - name: balance_usd
    data_type: Float64
  - name: pct_of_total
    data_type: Float64
  - name: cumulative_pct
    data_type: Float64
  - name: change_usd_7d
    data_type: Float64
  tests:
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
