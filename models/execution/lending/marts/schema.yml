version: 2
models:

- name: api_execution_lending_tvl_by_token_latest
  description: Latest lending TVL per reserve token on Gnosis (aggregated across Aave V3 and SparkLend) for pie chart display. Each row is a token with its total USD value locked across all protocols.
  columns:
  - name: token
    data_type: String
  - name: value
    data_type: Float64

- name: api_execution_lending_balance_cohorts_value_daily
  description: Daily lender balance cohort values per (protocol, token) across Aave V3 and SparkLend. Stacked bar chart data showing total USD and native value held by lenders in each balance bucket, filterable by token and protocol.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    description: Lending protocol identifier. One of 'Aave V3' or 'SparkLend'.
    data_type: String
  - name: token
    data_type: String
  - name: cohort_unit
    data_type: String
  - name: label
    description: Balance bucket label (e.g. '10-100', '1k-10k').
    data_type: String
  - name: value_native
    data_type: Float64
  - name: value_usd
    data_type: Float64

- name: api_execution_lending_balance_cohorts_holders_daily
  description: Daily lender count by balance cohort per (protocol, token) across Aave V3 and SparkLend. Stacked bar chart data showing holder count per balance bucket, filterable by token and protocol.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    description: Lending protocol identifier.
    data_type: String
  - name: token
    data_type: String
  - name: cohort_unit
    data_type: String
  - name: label
    description: Balance bucket label.
    data_type: String
  - name: value
    data_type: UInt64
