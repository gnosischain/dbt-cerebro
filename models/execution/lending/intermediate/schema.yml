version: 2
models:

- name: int_execution_lending_aave_daily
  description: |
    Daily lending metrics per (protocol, reserve) on Gnosis Chain, covering both Aave V3 and SparkLend. Includes supply/borrow APY (forward-filled from ReserveDataUpdated events), activity metrics (unique lenders/borrowers via bitmaps, deposit/borrow/withdraw/repay volumes), and net supply change for TVL tracking. Liquidation collateral seizures are subtracted from net supply.

    SCOPE — Aave V3 + SparkLend only. Agave (Aave V2 fork) is intentionally
    EXCLUDED from this entire unit: it is effectively wound down on Gnosis Chain
    (0 deposits in the last 90 days, only housekeeping logs), and its decoded
    source events are unusable anyway (event_name is blank — no ABI registered).
    Any "all Gnosis lending" TVL/user figure from this unit therefore excludes
    Agave by design.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    description: Lending protocol identifier. One of 'Aave V3' or 'SparkLend'.
    data_type: String
  - name: token_address
    data_type: String
  - name: symbol
    data_type: String
  - name: token_class
    data_type: String
  - name: apy_daily
    description: Annualized supply APY from liquidityRate (RAY / 1e27 * 100). Forward-filled on days without ReserveDataUpdated events.
    data_type: Float64
  - name: borrow_apy_variable_daily
    description: Annualized variable borrow APY from variableBorrowRate. Forward-filled.
    data_type: Float64
  - name: spread_variable
    description: Borrow-supply APY spread (borrow_apy - apy_daily).
    data_type: Float64
  - name: lenders_bitmap_state
    description: ClickHouse AggregateFunction bitmap state for unique supplier addresses (cityHash64). Use groupBitmapMerge() to combine across dates.
    data_type: AggregateFunction(groupBitmap, UInt64)
  - name: borrowers_bitmap_state
    description: ClickHouse AggregateFunction bitmap state for unique borrower addresses.
    data_type: AggregateFunction(groupBitmap, UInt64)
  - name: lenders_count_daily
    data_type: UInt64
  - name: borrowers_count_daily
    data_type: UInt64
  - name: deposits_volume_daily
    description: Daily Supply event volume in token units.
    data_type: Float64
  - name: borrows_volume_daily
    description: Daily Borrow event volume in token units.
    data_type: Float64
  - name: withdrawals_volume_daily
    description: Daily Withdraw event volume in token units.
    data_type: Float64
  - name: repays_volume_daily
    description: Daily Repay event volume in token units.
    data_type: Float64
  - name: liquidity_index
    description: Protocol liquidityIndex (RAY), forward-filled. Multiply scaled supply by liquidityIndex / 1e27 to get actual token supply.
    data_type: Float64
  - name: variable_borrow_index
    description: Protocol variableBorrowIndex (RAY), forward-filled.
    data_type: Float64
  - name: net_supply_change_daily
    description: Daily net change in deposited supply (deposits - withdrawals - liquidated collateral) in token units. Legacy column kept for backward compatibility.
    data_type: Float64

- name: int_execution_lending_aave_utilization_daily
  description: |
    Daily utilization rate per (protocol, reserve) across Aave V3 and SparkLend.
    Computes cumulative scaled supply/borrow positions from Pool events
    (Supply/Withdraw/Borrow/Repay/LiquidationCall) using exact UInt256
    WadRayMath (rayDivFloor for inflows, rayDivCeil for outflows) and pairs
    each pool action with the ReserveDataUpdated snapshot at the same
    log_index position within its transaction. End-of-day indices are sourced
    directly from raw events so the final utilization ratio is computed in
    exact arithmetic end-to-end.

    cumulative_scaled_supply / cumulative_scaled_borrow are Int256 for exact
    WadRayMath; a --full-refresh is required when migrating from the previous
    Float64 schema so the column types are recreated.

    Per-day deltas are built via UNION ALL + a single GROUP BY rather than a
    FULL OUTER JOIN, which had protocol-dimension correctness issues for Spark
    on ClickHouse (rows where only supply or only borrow existed on a day
    diluted the cumulative).
  columns:
  - name: date
    data_type: Date
  - name: protocol
    description: Lending protocol identifier.
    data_type: String
  - name: token_address
    data_type: String
  - name: cumulative_scaled_supply
    description: Running total of scaled supply in RAY-scaled units (Int256).
    data_type: Int256
  - name: cumulative_scaled_borrow
    description: Running total of scaled borrow in RAY-scaled units (Int256).
    data_type: Int256
  - name: utilization_rate
    description: Reserve utilization rate as percentage. Null when supply is zero or indices unavailable.
    data_type: Nullable(Float64)

  tests: []
- name: int_execution_lending_aave_diffs_daily
  description: |
    Daily per-user scaled balance deltas for Gnosis lending markets (Aave V3
    and SparkLend). Computes scaled deltas from Pool events (Supply, Withdraw,
    Repay with aTokens, LiquidationCall where receiveAToken=false) and aToken
    BalanceTransfer events, aggregated per (date, protocol, user, reserve).

    Scaled math uses exact UInt256 WadRayMath and each pool action is paired
    with the ReserveDataUpdated snapshot at the same log_index position within
    its (protocol, transaction). The pairing uses an ASOF join keyed on
    log_index < the action's log_index — NOT a rank-based pairing. This is
    required for Spark, where FlashLoan-emitted RDUs interleave with user
    action RDUs and rank-based pairing would misalign (e.g. pair the user's
    Supply with the FlashLoan's RDU).

    LiquidationCall rows where receiveAToken=true are intentionally excluded
    because the collateral movement is already captured by the
    BalanceTransfer(borrower -> liquidator) event.

    diff_scaled is Int256 for exact scaled-balance arithmetic (no Float64
    precision loss on amounts above 2^53 wei); a --full-refresh is required
    when migrating from the previous Float64 schema.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    description: Lending protocol identifier.
    data_type: String
  - name: user_address
    description: Address of the aToken holder.
    data_type: String
  - name: reserve_address
    description: Address of the underlying reserve token.
    data_type: String
  - name: diff_scaled
    description: Net scaled balance change for this (protocol, user, reserve) on this day in RAY-scaled units (Int256). Positive = net supply, negative = net withdrawal.
    data_type: Int256
  meta:
    owner: analytics_team
    full_refresh:
      start_date: "2023-10-04"
      batch_months: 6

- name: int_execution_lending_aave_user_balances_daily
  description: |
    Daily per-user aToken balances across Gnosis lending markets (Aave V3 and
    SparkLend). Reads scaled deltas from int_execution_lending_aave_diffs_daily,
    builds a calendar of active (protocol, user, reserve) triples, computes
    running cumulative scaled balances in Int256, then converts to underlying
    amounts using the end-of-day liquidityIndex. Scoped to reserves in
    lending_market_mapping.

    Incremental seeding (additive, not synthetic-delta): on incremental runs the
    model builds a calendar of days after a watermark, left-joins new diffs, and
    computes scaled = sum(diffs) OVER (calendar) + coalesce(prev_scaled, 0).
    The seed day is deduped with GROUP BY any() so unmerged ReplacingMergeTree
    parts cannot double the carry-forward (the failure mode behind the exact 2x
    supply spikes on 2026-06-19 / 2026-06-21). Full-refresh recomputes from the
    entire diffs history.

    Overlapping month repair: pass reprocess_overwrite=true with start_month /
    end_month to delete+insert the window, seeding from the last good day
    BEFORE start_month (same contract as int_execution_tokens_balances_native_daily).

    scaled_balance and balance_raw are UInt256/Int256 for exact aToken math
    (mirrors Aave's on-chain WadRayMath); a --full-refresh is required when
    migrating from the previous Float64 schema so the column types are recreated.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    description: Lending protocol identifier.
    data_type: String
  - name: reserve_address
    description: Address of the underlying reserve token (e.g. GNO, sDAI, USDC).
    data_type: String
  - name: symbol
    description: Reserve token symbol from lending_market_mapping.
    data_type: String
  - name: user_address
    description: Address of the aToken holder.
    data_type: String
  - name: scaled_balance
    description: Running cumulative scaled balance in RAY-scaled units (Int256).
    data_type: Int256
  - name: balance_raw
    description: Underlying token amount in raw wei units.
    data_type: UInt256
  - name: balance
    description: Human-readable balance.
    data_type: Float64
  - name: balance_usd
    description: USD value of the balance.
    data_type: Float64
  meta:
    owner: analytics_team
    agent:
      grain: [date, protocol, reserve_address, user_address]
      semantics: cumulative
      invariants:
      - id: seed-uniqueness
        text: Exactly one row per (date, protocol, reserve_address, user_address).
          Duplicate seed-day rows under ReplacingMergeTree (read without FINAL)
          used to inject the prior scaled_balance twice into the carry-forward
          and permanently double every holder's balance (exact 2x spikes on
          2026-06-19 and 2026-06-21 across all reserves).
      - id: additive-seed-not-synthetic-delta
        text: Incremental carry-forward must add prev_scaled as a constant
          (sum(diffs)+prev), never UNION ALL it into the event stream as a
          synthetic delta — the latter double-counts when the seed day has
          unmerged duplicate parts.
      - id: idle-holder-continuity
        text: A holder with zero diffs on day D must keep the prior day's
          scaled_balance (index accrual only in underlying). A ~2.0 day-over-day
          ratio on idle holders is a seed bug, not real supply.
      hazards: [duplicate-seed-drift, append-over-populated-duplicates,
                backfill-order-cumulative, late-start-mis-staging,
                frontier-day-incomplete-inputs, sparse-zero-row-stale-survival,
                refill-append-aggregator-inflation]
      ground_truth: on-chain aToken scaledBalanceOf(user) at the day's last
        block; reconcile in Int256 via scripts/data_checker/compare_aave_scaled_balances.py
      validation:
      - 'idle-holder DoD ratio: median scaled_balance(D)/scaled_balance(D-1) for
        holders with no diffs on D should be ~1.0 (fail if in [1.9, 2.1])'
      - duplicate-key excess by (date, protocol, reserve_address, user_address)
      - 'compare_aave_scaled_balances.py vs RPC on spot dates'
      reprocess_runbook: 'corrupted/frozen month: dbt run with vars {start_month,
        end_month, reprocess_overwrite: true} — seeds from last good day BEFORE
        the window (delete+insert). Full history: staged scripts/full_refresh/refresh.py
        per reserve_symbol. Always rebuild cohorts AFTER balances, in a separate
        invocation (never same append-mode run as the source).'
    full_refresh:
      start_date: "2023-10-04"
      batch_months: 1
      stages:
      - name: WxDAI
        vars:
          reserve_symbol: "WxDAI"
      - name: EURe
        vars:
          reserve_symbol: "EURe"
      - name: WETH
        vars:
          reserve_symbol: "WETH"
      - name: wstETH
        vars:
          reserve_symbol: "wstETH"
      - name: USDT
        vars:
          reserve_symbol: "USDT"
      - name: others
        vars:
          reserve_symbol: "GNO,sDAI,USDC,USDC.e"

  tests:
  # Price-gap detector: a positive native balance with balance_usd = 0 means the price
  # join (int_execution_token_prices_daily) found no price and coalesced to 0, silently
  # understating TVL/cohorts for that reserve-day. All lending reserves are priced, so
  # this should never hold; warn (not error) so a transient price-feed lag surfaces
  # loudly instead of shipping a zeroed TVL.
  - dbt_utils.expression_is_true:
      expression: "balance_usd > 0 OR balance <= 0"
      config:
        severity: warn
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_lending_aave_balance_cohorts_daily
  description: Daily lender balance cohort distributions per (protocol, reserve) across Aave V3 and SparkLend on Gnosis. Buckets users by deposit size (USD and native units) for concentration analysis.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    description: Lending protocol identifier.
    data_type: String
  - name: reserve_address
    description: Address of the underlying reserve token.
    data_type: String
  - name: symbol
    description: Reserve token symbol.
    data_type: String
  - name: cohort_unit
    description: Unit used for bucketing — 'usd' for balance_usd, 'native' for balance in token units.
    data_type: String
  - name: balance_bucket
    description: Balance range bucket (e.g. '0-0.01', '10-100', '100k-1M', '1M+').
    data_type: String
  - name: holders_in_bucket
    description: Count of unique lender addresses in this bucket.
    data_type: UInt64
  - name: value_native_in_bucket
    description: Total native token balance held by lenders in this bucket.
    data_type: Float64
  - name: value_usd_in_bucket
    description: Total USD value held by lenders in this bucket.
    data_type: Float64
  meta:
    owner: analytics_team
    agent:
      grain: [date, protocol, reserve_address, cohort_unit, balance_bucket]
      semantics: aggregate
      invariants:
      - id: conserves-upstream-balances
        text: For each (date, protocol, reserve, cohort_unit), sum(value_*_in_bucket)
          must equal sum(balance[_usd]) from int_execution_lending_aave_user_balances_daily
          for positive balances (excluding the zero address). A cohort/balance
          ratio near 2/3/4 means leftover inflated cohort rows or an append
          over a populated window.
      hazards: [append-over-populated-duplicates, refill-append-aggregator-inflation]
      validation:
      - 'cohort vs balances reconciliation per (date, protocol, symbol)'
      - duplicate-key excess by grain
      reprocess_runbook: 'Rebuild ONLY after balances are clean, in a separate
        invocation: dbt run -s int_execution_lending_aave_balance_cohorts_daily
        --vars {start_month, end_month, reprocess_overwrite: true}. Never select
        balances+cohorts together under append.'
    full_refresh:
      start_date: "2023-10-04"
      batch_months: 3
  tests: []
