version: 2
models:

- name: int_GBCDeposit_deposists_daily
  description: The `int_GBCDeposit_deposists_daily` view aggregates daily deposit amounts and withdrawal credentials from GBC deposit events to support financial analysis and reporting.
  columns:

  - name: date
    description: The date (at day granularity) of the deposit event, representing the start of the day for aggregation.
    data_type: DateTime64
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: withdrawal_credentials
    description: The withdrawal credentials associated with each deposit, indicating the destination address or account.
    data_type: String

  - name: amount
    description: The total deposit amount in unsigned 64-bit integer units, summed for each date and withdrawal credential.
    data_type: UInt64
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
