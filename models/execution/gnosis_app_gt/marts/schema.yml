version: 2
models:
- name: fct_execution_gnosis_app_gpay_migration_daily
  description: 'Daily Gnosis Pay exploit -> Safe migration recovery time-series (June-2026
    incident). One row per calendar date from the 2026-06-04 cutover through the latest
    observed data, backing the Migration tab KPIs / line charts. The 66,001 OLD->NEW
    safe pairs come 1:1 from int_execution_gpay_safe_canonical; refund USD is priced
    with the same per-token USD/native ratio as int_execution_gpay_balances_daily, so
    refund USD reconciles with the balance USD series.'
  columns:
  - name: date
    description: Calendar date — grain, one row per day since the 2026-06-04 cutover.
  - name: usd_old_safes
    description: Latest-known USD still held in the migrated OLD safes as of the date (forward-filled).
  - name: usd_new_safes
    description: Latest-known USD held in the migrated NEW (canonical) safes as of the date (forward-filled).
  - name: cum_reactivated_any
    description: Cumulative distinct NEW safes with ANY activity on or before the date (since cutover).
  - name: cum_reactivated_spend
    description: Cumulative distinct NEW safes with a card Payment on or before the date (since cutover).
  - name: refunds_landed_usd
    description: Exploit-recovery refund USD credited to NEW safes ON that date (refunds land 2026-06-05..09).
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - date
- name: fct_execution_gnosis_app_gt_swaps_by_pair
  description: 'FILLED swaps by app_scope x token pair. gnosis_app = CURRENT Gnosis App,

    metri = LEGACY Gnosis App (both roll up to Gnosis App); filter ''gnosis_app''

    for the current app only. Token addresses only; no USD (no envio_ga price

    feed) and no daily grain (no fill timestamp) — point-in-time.

    GT-feasible cross-check: the pair SHAPE reconciles with the heuristic by_pair

    mart (populations differ by the bundler gate — do NOT reconcile raw counts 1:1).

    '
  columns:
  - name: app_scope
    description: gnosis_app | metri | third_party | unknown | test.
  - name: sell_token
    description: Sold token contract address (lowercase).
  - name: buy_token
    description: Bought token contract address (lowercase).
  - name: n_filled_swaps
    description: Filled native orders for this pair.
  - name: n_swappers
    description: Distinct native owners who filled this pair.
  - name: sell_volume_atoms
    description: Sum of sell-side amounts in token atoms (NOT USD — no price feed in envio_ga).
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - app_scope
      - sell_token
      - buy_token
- name: fct_execution_gnosis_app_gt_swaps_summary
  description: Swap counts by app_scope x real CoW status enum. app_scope separates the Gnosis App VERSIONS sharing the Circles
    indexer — gnosis_app = current app.gnosis.io, metri = legacy app.metri.xyz. Both roll up to Gnosis App (sum for all-time
    Gnosis App; filter 'gnosis_app' for the current app only).
  columns:
  - name: app_scope
    description: gnosis_app (current Gnosis App) | metri (legacy Gnosis App) | third_party | unknown | test.
    tests:
    - accepted_values:
        values:
        - gnosis_app
        - metri
        - third_party
        - unknown
        - test
        config:
          severity: warn
  - name: status
    description: CoW order status enum (Filled/Expired/NONE/Open/PayTopUp/...).
    tests:
    - accepted_values:
        values:
        - Filled
        - Expired
        - NONE
        - Open
        - PayTopUp
        config:
          severity: warn
  - name: n_swaps
    description: Order count in this (scope, status) cell.
  - name: n_swappers
    description: Distinct owners in this cell.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - app_scope
      - status
- name: fct_execution_gnosis_app_gt_cashback_nft
  description: 'Gnosis Pay cashback NFT-mint program — daily mint series x status. A SEPARATE

    family from gpay_cashback_* (gCRC transfers) on a disjoint time axis: no USD

    value column, no shared axis, no pct_delta vs the heuristic.

    '
  columns:
  - name: mint_date
    description: Calendar date of the mint (from minted_at).
  - name: status
    description: Cashback NFT status (1 = minted, 0 = reverted).
    tests:
    - accepted_values:
        values:
        - 0
        - 1
        config:
          severity: warn
  - name: n_mints
    description: Mints on this date with this status.
  - name: n_owners
    description: Distinct owners.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - mint_date
      - status
- name: fct_execution_gnosis_app_gt_referrals
  description: 'Two DISTINCT referral metrics side by side: `earned` (GA-native paid-reward

    ledger) and `full_invite_graph` (every accepted invite, a ~2.2x superset with

    a heuristic twin int_execution_circles_v2_inviter_canonical). reward_usd is

    permanently NULL (CRC has no price feed). Never reconcile `earned` against

    circles_v2 inviter_fee.

    '
  columns:
  - name: metric_scope
    description: earned | full_invite_graph.
    tests:
    - accepted_values:
        values:
        - earned
        - full_invite_graph
    - not_null
    - unique
  - name: n_inviters
    description: Distinct inviters in this scope.
  - name: n_invitees
    description: Distinct invitees in this scope.
  - name: n_edges
    description: Invite edges in this scope.
  - name: total_reward_crc
    description: Sum of native CRC rewards (earned scope only; NULL for full graph).
  - name: total_reward_usd
    description: Permanently NULL — CRC has no USD price feed in envio_ga (validated:false).
- name: fct_execution_gnosis_app_gt_investments
  description: Metri auto-invest accounts by active flag (GT-only; no Gnosis Pay analogue). Owner-keyed.
  columns:
  - name: is_active
    description: Whether the investment account is active.
    tests:
    - not_null
    - unique
  - name: n_accounts
    description: Accounts with this flag.
  - name: n_owners
    description: Distinct owners.
  - name: n_tokens
    description: Distinct investment tokens.
  - name: product
    description: Constant 'metri' — marks these as Metri (legacy Gnosis App) auto-invest accounts; a version marker, NOT 'not
      Gnosis App'.
- name: fct_execution_gnosis_app_gt_user_identities_public
  description: PUBLIC identity boundary — pseudonym-only registry attributes. Join surface to mixpanel/gpay/circles (shared
    CEREBRO_PII_SALT). No raw address.
  columns:
  - name: user_pseudonym
    description: sipHash64 pseudonym of the registered address.
    tests:
    - not_null
    - unique
  - name: user_segment
    description: Circles avatar segment (or registry_only_no_avatar).
  - name: has_circles_avatar
    description: 1 iff the identity has a live avatar.
  - name: has_profile
    description: 1 iff the identity has a profile.
  - name: has_lifetime_cashback
    description: 1 iff lifetime_cashback_atoms > 0.
  - name: is_engaged
    description: 1 iff the identity is the CANONICAL engaged/active user (is_registered_active from the activity model, ~26.6k).
  - name: is_heuristic_active
    description: 1 iff the identity is in the heuristic active-user set (int_execution_gnosis_app_users_current).
  - name: has_ga_signal
    description: 1 iff a CURRENT-Gnosis-App signal is present (heuristic-active OR swapped app.gnosis.io OR cashback OR lifetime
      cashback).
  - name: has_metri_signal
    description: 1 iff a Metri (legacy) signal is present (swapped app.metri.xyz OR Metri auto-invest).
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - user_pseudonym
- name: api_execution_gnosis_app_gt_user_reconciliation
  description: Public reconciliation snapshot — registered (GT registry) vs active (heuristic) containment.
  columns:
  - name: heuristic_users
    description: Distinct heuristic active-user addresses.
    data_type: UInt64
  - name: gt_registry_users
    description: GT registry (gnosis_app_user) count.
    data_type: UInt64
  - name: gt_avatar_users
    description: GT avatar (active spine) count.
    data_type: UInt64
  - name: heuristic_in_registry
    description: Heuristic users present in the GT registry.
    data_type: UInt64
  - name: heuristic_in_avatar
    description: Heuristic users present in the GT avatar spine.
    data_type: UInt64
  - name: heuristic_only_vs_registry
    description: Heuristic users absent from the GT registry.
    data_type: UInt64
  - name: registry_containment
    description: heuristic_in_registry / heuristic_users (cutover gate >= 0.90).
    data_type: Float64
  - name: avatar_containment
    description: heuristic_in_avatar / heuristic_users (expected ~1.0).
    data_type: Float64
  - name: as_of_date
    description: Snapshot date (query/build date).
    data_type: Date
  - name: gt_registered_active
    description: Canonical GT active users (registry + any app-tagged action).
    data_type: UInt64
  - name: gt_registered_active_incl_circles
    description: Broad variant incl. generic Circles actions + referrals (sizing only).
    data_type: UInt64
  - name: gt_active_in_heuristic
    description: Registered-active identities also in the heuristic active set.
    data_type: UInt64
  - name: gt_active_missed_by_heuristic
    description: Registered-active identities the current-app heuristic misses (legacy/Metri/non-current).
    data_type: UInt64
  - name: gt_active_legacy_only
    description: Registered-active identities with only legacy (Metri) signals, no current-app signal.
    data_type: UInt64
  - name: active_vs_heuristic_ratio
    description: gt_registered_active / heuristic_users.
    data_type: Float64
- name: api_execution_gnosis_app_gt_swaps
  description: Public swap counts by scope x CoW status enum.
  columns:
  - name: app_scope
    description: native | all_cow.
    data_type: String
  - name: status
    description: CoW order status enum.
    data_type: String
  - name: n_swaps
    description: Order count.
    data_type: UInt64
  - name: n_swappers
    description: Distinct owners.
    data_type: UInt64
  - name: as_of_date
    description: Snapshot date (query/build date).
    data_type: Date
- name: api_execution_gnosis_app_gt_referrals
  description: Public referral metrics — earned ledger vs full invite graph.
  columns:
  - name: metric_scope
    description: earned | full_invite_graph.
    data_type: String
  - name: n_inviters
    description: Distinct inviters.
    data_type: UInt64
  - name: n_invitees
    description: Distinct invitees.
    data_type: UInt64
  - name: n_edges
    description: Invite edges.
    data_type: UInt64
  - name: total_reward_crc
    description: Native CRC rewards (earned scope only).
    data_type: Nullable(Float64)
  - name: total_reward_usd
    description: Permanently NULL (no CRC price feed).
    data_type: Nullable(Float64)
  - name: as_of_date
    description: Snapshot date (query/build date).
    data_type: Date
- name: fct_execution_gnosis_app_gt_wallet_metrics_public
  description: PUBLIC per-wallet rollup — pseudonym-only mirror of int_execution_gnosis_app_gt_wallet_metrics (raw address
    dropped; same CEREBRO_PII_SALT). Full lifecycle/engagement/trust/segment surface.
  columns:
  - name: user_pseudonym
    description: sipHash64 pseudonym of the wallet address.
    tests:
    - not_null
    - unique
  - name: engagement_tier
    description: inactive | casual | core | power.
  - name: app_generation
    description: current | legacy | both | none.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - user_pseudonym
- name: fct_execution_gnosis_app_gt_active_wallets
  description: Active-wallet time-series (DAU/WAU/MAU) from real transaction_action.timestamp, scoped to app-engaged wallets.
    One table, three grains via period_type; new_wallets = wallets whose first activity falls in the period.
  columns:
  - name: period_type
    description: day | week | month.
    tests:
    - accepted_values:
        values:
        - day
        - week
        - month
  - name: period_start
    description: Start date of the period (day=date, week=Monday, month=1st).
  - name: active_wallets
    description: Distinct app-active wallets in the period (DAU/WAU/MAU).
  - name: new_wallets
    description: Wallets whose first-ever activity falls in this period.
  - name: active_wallets_app_tagged
    description: Distinct wallets with a deliberate app-feature action in the period (comparable to heuristic DAU).
  - name: new_wallets_app_tagged
    description: Wallets whose FIRST app-tagged activity falls in this period.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - period_type
      - period_start
- name: fct_execution_gnosis_app_gt_wallet_cohort_retention_monthly
  description: 'Acquisition-cohort retention: retained wallets / cohort size at month_index N after first activity. Denominator
    = cohort size (active wallets), never the raw registry. month_index 0 = acquisition month.'
  columns:
  - name: basis
    description: any_action (broad) | app_tagged (deliberate app-feature action; comparable to heuristic).
    tests:
    - accepted_values:
        values:
        - any_action
        - app_tagged
  - name: cohort_month
    description: Month of the wallet's first on-chain app activity.
  - name: month_index
    description: Months since acquisition (0 = acquisition month).
  - name: retained_wallets
    description: Distinct cohort wallets active in this month_index.
  - name: cohort_size
    description: Total wallets in the cohort (denominator).
  - name: retention_pct
    description: retained_wallets / cohort_size (0-1).
    tests:
    - dbt_utils.expression_is_true:
        expression: <= 1
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - basis
      - cohort_month
      - month_index
- name: api_execution_gnosis_app_gt_active_wallets
  description: Public DAU series (active app-engaged wallets per day). WAU/MAU in the underlying fct.
  columns:
  - name: date
    description: Calendar day.
    data_type: Date
  - name: active_wallets
    description: Distinct active wallets that day.
    data_type: UInt64
  - name: new_wallets
    description: First-ever-active wallets that day.
    data_type: UInt64
  - name: active_wallets_app_tagged
    description: App-feature-active wallets that day (heuristic-comparable).
    data_type: UInt64
  - name: new_wallets_app_tagged
    description: First-app-tagged-active wallets that day.
    data_type: UInt64
- name: api_execution_gnosis_app_gt_wallet_cohort_retention
  description: Public acquisition-cohort retention matrix (point-in-time; as_of_date).
  columns:
  - name: basis
    description: any_action | app_tagged.
    data_type: String
  - name: cohort_month
    description: Acquisition cohort month.
    data_type: Date
  - name: month_index
    description: Months since acquisition.
    data_type: Int32
  - name: retained_wallets
    description: Retained wallets at this index.
    data_type: UInt64
  - name: cohort_size
    description: Cohort denominator.
    data_type: UInt64
  - name: retention_pct
    description: retained / cohort_size.
    data_type: Float64
  - name: as_of_date
    description: Snapshot (build) date.
    data_type: Date
- name: api_execution_gnosis_app_gt_wallet_metrics
  description: Public per-wallet metric endpoint (pseudonym-only; curated lifecycle/engagement/trust/segment surface). Point-in-time
    (as_of_date).
  columns:
  - name: user_pseudonym
    description: sipHash64 pseudonym (joinable to mixpanel/gpay/circles).
    data_type: UInt64
  - name: app_generation
    description: current | legacy | both | none.
    data_type: String
  - name: engagement_tier
    description: inactive | casual | core | power.
    data_type: String
  - name: is_registered_active
    description: Canonical active flag.
    data_type: Bool
  - name: is_active_30d
    description: Active within 30 days.
    data_type: Bool
  - name: is_active_90d
    description: Active within 90 days.
    data_type: Bool
  - name: tenure_days
    description: Days between first and last action.
    data_type: Nullable(Int64)
  - name: days_since_last_action
    description: Days since last action.
    data_type: Nullable(Int64)
  - name: n_actions
    description: Total on-chain actions.
    data_type: UInt64
  - name: app_action_breadth
    description: Distinct app-tagged action types (0-8).
    data_type: UInt16
  - name: n_swaps_gnosis_app
    description: Swaps under app.gnosis.io.
    data_type: UInt64
  - name: n_swaps_metri
    description: Swaps under app.metri.xyz.
    data_type: UInt64
  - name: n_metri_transfer
    description: MetriTransfer events.
    data_type: UInt64
  - name: n_personal_mint
    description: PersonalMint (CRC claim) events.
    data_type: UInt64
  - name: n_cashback
    description: Cashback NFT mints.
    data_type: UInt64
  - name: n_investment
    description: Metri auto-invest accounts.
    data_type: UInt64
  - name: n_invitees
    description: Distinct invitees referred.
    data_type: UInt64
  - name: trusts_given
    description: Trust out-degree.
    data_type: Int64
  - name: trusts_received
    description: Trust in-degree.
    data_type: Int64
  - name: trusts_mutual
    description: Mutual trust count.
    data_type: Int64
  - name: referral_crc_earned
    description: CRC earned as inviter.
    data_type: Float64
  - name: earned_from_invites_crc
    description: Lifetime CRC from invites.
    data_type: Float64
  - name: is_gp_card_user
    description: Linked to a GP card.
    data_type: Bool
  - name: is_investor
    description: Owns an auto-invest account.
    data_type: Bool
  - name: is_power_user
    description: High-breadth + recently active.
    data_type: Bool
  - name: circles_version
    description: Avatar Circles version (1/2).
    data_type: Nullable(Int32)
  - name: as_of_date
    description: Snapshot (build) date.
    data_type: Date
- name: fct_execution_gnosis_app_gt_registrations_monthly
  description: New identity/profile REGISTRATIONS per month (avatar.created_at = account/profile creation; 100% of avatars
    have a profile). Spans Circles v1+v2 back to 2020 — broader/real onboarding vs the heuristic new_users. Split by version.
  columns:
  - name: month
    description: Registration month (toStartOfMonth of avatar.created_at).
  - name: new_registrations
    description: New avatar/profile registrations that month.
  - name: v2_registrations
    description: Of which Circles v2.
  - name: v1_registrations
    description: Of which Circles v1.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - month
