version: 2
models:

- name: api_execution_rwa_backedfi_prices_daily
  description: The api_execution_rwa_backedfi_prices_daily model provides daily pricing data for RWA-backed financial instruments to support analytics and reporting.
  columns:

  - name: bticker
    description: Unique identifier for the financial instrument, typically a ticker symbol.
    data_type: String

  - name: date
    description: The date of the recorded price, formatted as YYYY-MM-DD.
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: price
    description: The daily price of the instrument, expressed in its respective currency units.
    data_type: UInt64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
- name: fct_execution_rwa_backedfi_prices_daily
  description: The fct_execution_rwa_backedfi_prices_daily view consolidates daily price data for various backed finance instruments, providing a continuous and filled time series for analysis and reporting
    purposes.
  columns:

  - name: bticker
    description: Unique identifier for each backed finance instrument or token.
    data_type: String

  - name: date
    description: The specific calendar date for the recorded price, in YYYY-MM-DD format.
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: price
    description: The daily price of the instrument, represented as a numeric value; may be null if data is unavailable.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
