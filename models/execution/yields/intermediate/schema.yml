version: 2
models:

- name: int_execution_yields_user_lp_positions
  description: >
    Per-user LP position summary across all DEX protocols. One row per
    (provider, pool_address, tick_lower, tick_upper). Aggregates capital
    in/out from Mint/Burn events, fees from Collect events, computes net
    V3 liquidity for activity status, and checks in-range against latest
    pool tick from Swap events.
  columns:
  - name: provider
    description: LP wallet address.
    data_type: String
  - name: pool_address
    description: Pool contract address (lowercase, with 0x prefix).
    data_type: String
  - name: protocol
    description: DEX protocol name (Uniswap V3, Swapr V3, Balancer V2, Balancer V3).
    data_type: String
  - name: tick_lower
    description: Lower tick bound (NULL for Balancer full-range positions).
    data_type: Nullable(Int32)
  - name: tick_upper
    description: Upper tick bound (NULL for Balancer full-range positions).
    data_type: Nullable(Int32)
  - name: tick_lower_key
    description: Coalesced tick_lower for order key (0 when NULL).
    data_type: Int32
  - name: tick_upper_key
    description: Coalesced tick_upper for order key (0 when NULL).
    data_type: Int32
  - name: capital_in_usd
    description: Total USD value deposited via Mint events.
    data_type: Float64
  - name: capital_out_usd
    description: Total USD value withdrawn via Burn events.
    data_type: Float64
  - name: fees_collected_usd
    description: Total USD value of fees claimed via Collect events (V3 only, 0 for Balancer).
    data_type: Float64
  - name: net_liquidity
    description: Sum of signed V3 liquidity deltas (positive = open). NULL-safe, defaults to 0.
    data_type: Int256
  - name: is_active
    description: "True if position still has open liquidity. V3: net_liquidity > 0. Balancer: capital_in_usd > capital_out_usd (heuristic)."
    data_type: Bool
  - name: is_in_range
    description: "V3 only: true if tick_lower <= current_tick < tick_upper. NULL for Balancer or if no recent Swap data."
    data_type: Nullable(Bool)
  - name: pool_current_tick
    description: Latest tick from Swap events on this pool. NULL if no swaps recorded.
    data_type: Nullable(Int32)
  - name: entry_date
    description: Timestamp of the first event for this position.
    data_type: DateTime
  - name: last_action_date
    description: Timestamp of the most recent event for this position.
    data_type: DateTime

- name: int_execution_yields_balancer_lp_fees
  description: >
    True Balancer (V2/V3) LP swap fees per (provider, pool), used by
    int_execution_yields_user_lp_positions to replace the capital_out - capital_in
    PnL proxy (model review EXECUTIONYIELDS-C12). Monthly contribution-based,
    value-weighted attribution of int_execution_pools_fees_daily pool fees: each
    month's pool fees are split across LPs by cumulative net contributed USD
    (mint - burn) as of month-end. Conserves to pool totals.
  columns:
  - name: pool_address
    description: Balancer pool address (lowercase, 0x-prefixed).
    data_type: String
  - name: provider
    description: LP wallet that provided the liquidity (Join/Exit caller).
    data_type: String
  - name: fees_usd
    description: Lifetime attributed swap fees in USD for this wallet in this pool, net of the Balancer protocol-fee cut (50% post ~2023-03).
    data_type: Float64

- name: int_execution_yields_user_activity
  description: >
    Unified yield activity feed combining LP events (Add/Remove Liquidity,
    Collect Fees) from the pools pipeline and lending events (Supply, Withdraw,
    Borrow, Repay) from Aave V3. Common schema for the dashboard activity table.
  columns:
  - name: block_timestamp
    description: UTC timestamp of the on-chain LP or lending event.
    data_type: DateTime
  - name: transaction_hash
    description: Transaction hash of the event.
    data_type: String
  - name: log_index
    description: Log index of the event within the block.
    data_type: UInt32
  - name: protocol
    description: Protocol name — a DEX (Uniswap V3, Swapr V3, Balancer) for LP events or a lending market (Aave V3, SparkLend) for lending events.
    data_type: String
  - name: position_address
    description: Pool address (LP) or reserve address (lending).
    data_type: String
  - name: wallet_address
    description: Wallet address that performed the action (LP provider, or the lending user/onBehalfOf depending on event type).
    data_type: String
  - name: action
    description: "Human-readable action: Add Liquidity, Remove Liquidity, Collect Fees, Supply, Withdraw, Borrow, Repay."
    data_type: String
  - name: token_symbol
    description: Token symbol of the amount moved. Nullable for unknown tokens.
    data_type: Nullable(String)
  - name: token_address
    description: Token address of the amount moved (for lending, the reserve address).
    data_type: String
  - name: amount
    description: Amount moved in token units (decimal-adjusted), rounded to 6 decimals.
    data_type: Float64
  - name: amount_usd
    description: Amount moved in USD (ASOF daily price), rounded to 2 decimals.
    data_type: Float64
  - name: source
    description: "Event source: lp or lending."
    data_type: String

  tests:
  - dbt_utils.unique_combination_of_columns:
      # token_address is part of the grain: a single LP event emits one row per
      # token leg (V3 = 2, Balancer = 2-8) sharing (tx, log_index). It must match
      # the model's ReplacingMergeTree order_by, otherwise multi-token legs collapse.
      combination_of_columns:
      - block_timestamp
      - source
      - transaction_hash
      - log_index
      - token_address
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  meta:
    # Batched full-refresh: the model is monthly-partitioned (insert_overwrite)
    # and honours start_month/end_month, but a single --full-refresh over all
    # history OOMs (LP leg union + lending ASOF price join). scripts/full_refresh
    # reads this block and walks one month per batch instead.
    full_refresh:
      start_date: "2022-12-01"
      batch_months: 3
- name: int_yields_ocsdai_share_price_daily
  description: |
    Daily share price (sDAI per OC-sDAI share) for the OpenCover OC-sDAI vault
    ("Covered Savings xDAI", 0x0ac34fe133bde3a2ef589a18a4e10b6a7d253829), an
    ERC-4626 covered vault whose asset() is sDAI. Reconstructs end-of-day share
    price = assets / shares from the vault's ERC-4626 Deposit/Withdraw events
    (contracts_ocsdai_events), forward-filled across event-less days from the
    2026-03-16 launch. Used by int_revenue_ocsdai_user_balances_daily to value
    OC-sDAI holders' underlying sDAI for the revenue sDAI stream. Emits only the
    share-price level (no APY/rate windows), unlike int_yields_savings_xdai_rate_daily.
  columns:
  - name: date
    description: Calendar date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: share_price
    description: sDAI per OC-sDAI share (assets/shares), forward-filled.
    data_type: Float64
    tests:
    - not_null
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2026-03-16"
      batch_months: 12
- name: int_yields_savings_xdai_rate_daily
  description: |
    Canonical daily Savings xDAI vault rate for the Gnosis Savings xDAI vault
    (0xaf204776c7245bF4147c2612BF6e5972Ee483701). Reconstructs end-of-day
    share price from ERC4626 Deposit + Withdraw events on the vault, forward-
    fills across event-less days, and derives a daily rate that is robust to
    the vault's lump-sum yield distribution.

    Why not a simple day-over-day ratio: on Gnosis, vault yield is NOT paid
    continuously per block. The xDAI bridge on Mainnet accrues DSR interest
    in the sDAI vault there, then periodically (every 1-2 days) calls
    `relayInterest()` which pushes the accumulated xDAI/WXDAI through the
    InterestReceiver, which in turn calls `payInterest()` to deposit the
    batch into the Gnosis Savings xDAI vault, stepping up its `totalAssets()`
    (and thus share_price) in a single tx. Between relays the share_price
    observed at Deposit/Withdraw events is effectively flat; on a relay day
    it jumps. A naive same-day ratio turns the ~7-day launch warmup
    (single 1.3% jump on 2023-10-05) into a headline "11,000% APY" spike
    even though the real yield over that period was ~60% annualized.

    Fix: compute daily_rate as the GEOMETRIC SLOPE of share_price over a
    7-day window:

        daily_rate = (share_price_today / share_price_7d_ago) ** (1/7) - 1

    This naturally spreads a single lump-sum jump across the preceding week,
    matching the protocol's accrual window. At steady state (no lumpiness)
    it equals the true per-day rate. fct_yields_savings_xdai_apy_daily
    annualizes this and layers 7DMA / 30DMA / 7DMM / 30DMM smoothing.

    Regime columns (canonical_label, legacy_symbol, backing_asset,
    yield_source) are joined from the savings_xdai_regimes seed so each date
    carries the correct pre/post-2025-11-07 metadata (DAI/sDAI before the
    bridge upgrade, USDS/sUSDS after, at the same vault address).
  columns:
  - name: date
    description: Calendar day of the Savings xDAI vault rate observation.
    data_type: Date
  - name: share_price
    description: End-of-day share price (assets / shares) from the ERC4626 vault.
    data_type: Float64
  - name: daily_rate
    description: Daily rate as the 7-day GEOMETRIC SLOPE of share_price ((share_price_today / share_price_7d_ago) ** (1/7) - 1), which spreads the vault's lump-sum yield distributions across the week; NOT a day-over-day ratio. Never null in the output (null-rate rows are filtered).
    data_type: Float64
  - name: canonical_label
    description: Canonical asset label ("Savings xDAI").
    data_type: String
  - name: legacy_symbol
    description: Legacy symbol alias ("sDAI") retained for compatibility.
    data_type: String
  - name: backing_asset
    description: Backing asset for this date's regime (DAI pre-2025-11-07, USDS after).
    data_type: String
  - name: yield_source
    description: Yield source for this date's regime (sDAI pre-2025-11-07, sUSDS after).
    data_type: String

- name: int_yields_sdai_rate_daily
  description: |
    Legacy compatibility wrapper over int_yields_savings_xdai_rate_daily.
    Preserves the historical (date, sdai_conversion, rate) shape so downstream
    consumers (fct_yields_sdai_apy_daily, overview snapshot, semantic layer)
    keep working without a ref() churn. New work should read the canonical
    model directly to also get regime columns (canonical_label, backing_asset,
    yield_source).
  columns:
  - name: date
    description: Calendar day of the rate observation.
    data_type: Date
  - name: sdai_conversion
    description: End-of-day share price (alias for share_price).
    data_type: Float64
  - name: rate
    description: Daily rate (alias for daily_rate — the 7-day geometric slope of share_price, not a day-over-day ratio).
    data_type: Float64
