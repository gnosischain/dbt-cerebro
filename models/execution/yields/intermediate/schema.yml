version: 2
models:

- name: int_yields_sdai_rate_daily
  description: The model calculates daily SDai exchange rates based on deposit events, providing a time series for yield analysis and rate tracking.
  columns:

  - name: date
    description: The specific day for which the SDai rate data is recorded, aligned to the start of the day.
    data_type: DateTime64

  - name: sdai_conversion
    description: The minimum SDai conversion value observed on the given day, representing the exchange rate at that time.
    data_type: Float64

  - name: rate
    description: The computed SDAI rate (scaled by 12) for the date; null if not available.
    data_type: UInt64
    quote: true
  meta:
    owner: analytics_team
    authoritative: false
    generated_by: dbt-schema-gen
    _generated_at: '2025-12-12T23:06:59.145100'
    _generated_fields:
    - description
    - columns.date.description
    - config.tags
    - config.materialized
    - columns.sdai_conversion.description
    - columns.sdai_conversion.data_type
    - columns.date.data_type
- name: int_execution_yields_aave_daily
  description: Daily Aave V3 lending metrics per reserve token on Gnosis Chain. Includes supply/borrow APY (forward-filled from ReserveDataUpdated events), activity metrics (unique lenders/borrowers via bitmaps, deposit/borrow/withdraw/repay volumes), and net supply change for TVL tracking. Liquidation collateral seizures are subtracted from net supply.
  columns:
  - name: date
    data_type: Date
  - name: token_address
    data_type: String
  - name: symbol
    data_type: String
  - name: token_class
    data_type: String
  - name: protocol
    data_type: String
  - name: apy_daily
    description: Annualized supply APY from Aave V3 liquidityRate (RAY / 1e27 * 100). Forward-filled on days without ReserveDataUpdated events.
    data_type: Float64
  - name: borrow_apy_variable_daily
    description: Annualized variable borrow APY from Aave V3 variableBorrowRate. Forward-filled.
    data_type: Float64
  - name: spread_variable
    description: Borrow-supply APY spread (borrow_apy - apy_daily).
    data_type: Float64
  - name: lenders_bitmap_state
    description: ClickHouse AggregateFunction bitmap state for unique supplier addresses (cityHash64). Use groupBitmapMerge() to combine across dates.
    data_type: AggregateFunction(groupBitmap, UInt64)
  - name: borrowers_bitmap_state
    description: ClickHouse AggregateFunction bitmap state for unique borrower addresses.
    data_type: AggregateFunction(groupBitmap, UInt64)
  - name: lenders_count_daily
    data_type: UInt64
  - name: borrowers_count_daily
    data_type: UInt64
  - name: deposits_volume_daily
    description: Daily Supply event volume in token units.
    data_type: Float64
  - name: borrows_volume_daily
    description: Daily Borrow event volume in token units.
    data_type: Float64
  - name: withdrawals_volume_daily
    description: Daily Withdraw event volume in token units.
    data_type: Float64
  - name: repays_volume_daily
    description: Daily Repay event volume in token units.
    data_type: Float64
  - name: liquidity_index
    description: Aave V3 liquidityIndex (RAY) for the reserve, forward-filled. Used to convert scaled supply to actual token supply (scaledSupply * liquidityIndex / 1e27).
    data_type: Float64
  - name: variable_borrow_index
    description: Aave V3 variableBorrowIndex (RAY) for the reserve, forward-filled. Used to convert scaled borrows to actual borrow amounts (scaledBorrow * variableBorrowIndex / 1e27).
    data_type: Float64
  - name: net_supply_change_daily
    description: Daily net change in deposited supply (deposits - withdrawals - liquidated collateral) in token units. Legacy column kept for backward compatibility.
    data_type: Float64
- name: int_execution_yields_aave_scaled_balances_daily
  description: Daily net change in Aave V3 scaled supply and borrows per reserve token. Supply events (Supply/Withdraw/LiquidationCall collateral) are divided by liquidityIndex; borrow events (Borrow/Repay/LiquidationCall debt) are divided by variableBorrowIndex — both from the same transaction's ReserveDataUpdated event. Sum all dates per token and multiply by the latest index / 1e27 to recover true balances.
  columns:
  - name: date
    data_type: Date
  - name: token_address
    data_type: String
  - name: net_scaled_supply_change_daily
    description: Daily net change in Aave scaled supply (amount * 1e27 / liquidityIndex at time of event).
    data_type: Float64
  - name: net_scaled_borrow_change_daily
    description: Daily net change in Aave scaled borrows (amount * 1e27 / variableBorrowIndex at time of event).
    data_type: Float64

- name: int_execution_yields_pools_lps_daily
  description: Daily LP provider activity from Mint and Burn events on Uniswap V3 and Swapr V3 pools. Tracks event counts, daily unique LP addresses, and a bitmap state for rolling-window deduplication via groupBitmapMerge(). The `owner` field from Mint/Burn events is the actual LP position owner, not a router.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: mint_count
    description: Number of Mint (add liquidity) events on this pool on this day.
    data_type: UInt64
  - name: burn_count
    description: Number of Burn (remove liquidity) events on this pool on this day.
    data_type: UInt64
  - name: lps_minting_daily
    description: Unique LP addresses that minted (added liquidity) on this day.
    data_type: UInt64
  - name: lps_burning_daily
    description: Unique LP addresses that burned (removed liquidity) on this day.
    data_type: UInt64
  - name: lps_bitmap_state
    description: ClickHouse AggregateFunction bitmap state for unique LP addresses (cityHash64). Use groupBitmapMerge() to combine across dates/pools.
    data_type: AggregateFunction(groupBitmap, UInt64)

- name: int_execution_yields_v3_pool_meta
  description: Shared pool metadata for Uniswap V3 and Swapr V3 pools on Gnosis Chain. Maps each pool address to its protocol and token0/token1 constituent addresses via factory events. Referenced by multiple yields models.
  columns:
  - name: protocol
    data_type: String
  - name: pool_address
    description: Pool contract address (lowercase, with 0x prefix).
    data_type: String
  - name: pool_address_no0x
    description: Pool contract address without 0x prefix (for join compatibility).
    data_type: String
  - name: token0_address
    data_type: String
  - name: token1_address
    data_type: String

- name: int_execution_yields_pools_enriched_daily
  description: Central token-level balance enrichment for all LP pools. Joins raw balances with token metadata and prices (ASOF join for gap safety) to produce TVL components. Single source of truth for TVL across all downstream pool models.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    description: Pool contract address (lowercase, with 0x prefix).
    data_type: String
  - name: pool_address_no0x
    description: Pool contract address without 0x prefix.
    data_type: String
  - name: token_address
    data_type: String
  - name: token
    description: Uppercase token symbol from tokens_whitelist (e.g. WETH, USDC.E). Nullable for unknown tokens.
    data_type: Nullable(String)
  - name: token_amount
    description: Raw token balance in token units.
    data_type: Float64
  - name: price_usd
    description: Token price in USD from ASOF join (latest known price <= date).
    data_type: Float64
  - name: tvl_component_usd
    description: TVL component in USD (token_amount * price_usd).
    data_type: Float64

- name: int_execution_yields_pools_metrics_daily
  description: Pool-level daily metrics for LP pools. Aggregates TVL from the enriched model, joins fees and swap counts, applies 7D rolling window functions, and computes fee APR. Materialized as a table to avoid ClickHouse 25.10 query analyzer issues with window-function CTEs.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: tvl_usd
    description: Total value locked in the pool in USD.
    data_type: Float64
  - name: fees_usd_daily
    description: Daily accrued fees in USD.
    data_type: Float64
  - name: volume_usd_daily
    description: Daily trading volume in USD.
    data_type: Float64
  - name: swap_count
    description: Number of Swap events on this pool on this day.
    data_type: UInt64
  - name: fee_apr_7d
    description: 7-day trailing fee APR annualized ((fees_7d / tvl_7d_avg) * 365/7 * 100). Null when data is insufficient (< 3 days) or TVL is zero.
    data_type: Nullable(Float64)

- name: int_execution_yields_pools_fees_daily
  description: Daily accrued pool fees and trading volume at pool×token grain for Uniswap V3 and Swapr V3 pools, computed from Swap + Flash events (gross fees; independent of Collect/claims). Swap amounts are treated as signed int256 (two's complement) and pool fee tiers are applied in ppm (1e6 denominator). Volume represents the gross incoming token amount per swap; flash loans contribute 0 volume.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: token_address
    data_type: String
  - name: token
    data_type: String
  - name: fee_amount
    data_type: Float64
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  - name: fees_usd
    data_type: Float64
  - name: volume_amount
    description: Daily trading volume in token units (gross incoming amount from Swap events).
    data_type: Float64
  - name: volume_usd
    description: Daily trading volume in USD.
    data_type: Float64

- name: int_execution_yields_pools_il_swap_flows_daily
  description: Daily pool-level base data for IL computation. Combines swap flows (signed int256 token amounts), fees, TVL, and per-token prices/decimals for Uniswap V3 and Swapr V3 pools. Materialized to avoid deep CTE chains.
  columns:
  - name: day
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: tvl_usd
    data_type: Float64
  - name: swap_amount0_raw
    description: Daily sum of signed token0 swap amounts (raw, not decimal-adjusted).
    data_type: Float64
  - name: swap_amount1_raw
    description: Daily sum of signed token1 swap amounts (raw, not decimal-adjusted).
    data_type: Float64
  - name: fees_usd_daily
    data_type: Float64
  - name: decimals0
    data_type: UInt8
  - name: price0_usd
    data_type: Float64
  - name: decimals1
    data_type: UInt8
  - name: price1_usd
    data_type: Float64
