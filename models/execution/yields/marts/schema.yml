version: 2
models:

- name: fct_yields_sdai_apy_daily
  description: This view aggregates daily SDAI yield data to compute annual percentage yields (APY) and their moving averages and medians over specified windows, facilitating trend analysis of yield performance.
  columns:

  - name: date
    description: The date of the yield observation, formatted as a date string.
    data_type: Date

  - name: apy
    description: The calculated annual percentage yield (APY) for the given date, expressed as a percentage (0-100%).
    data_type: Float64

  - name: apy_7DMA
    description: The 7-day moving average of the APY, providing a smoothed yield trend over the past week, expressed as a percentage.
    data_type: Float64

  - name: apy_30DMA
    description: The 30-day moving average of the APY, indicating longer-term yield trends, expressed as a percentage.
    data_type: Float64

  - name: apy_7DMM
    description: The 7-day moving median of the APY, offering a robust central tendency measure over the past week, expressed as a percentage.
    data_type: Float64

  - name: apy_30DMM
    description: The 30-day moving median of the APY, reflecting longer-term median yield performance, expressed as a percentage.
    data_type: Float64

  - name: label
    description: Label indicating the type of APY value ('Daily', '7DMA', '30DMA', '7DMM', '30DMM').
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: fct_execution_yields_pools_daily
  description: Daily pool yields fact at pool×token grain, providing pool TVL (USD) and accrued fee APR (30D trailing) for Uniswap V3/Swapr V3 pools. Fees are computed from Swap + Flash events (gross fees; independent of Collect/claims). Output is intentionally filtered to the top pools per token based on 30D-average token-specific TVL, with a minimum token TVL threshold (Balancer hidden for now).
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: pool
    data_type: String
  - name: token_address
    data_type: String
  - name: token
    data_type: String
  - name: tvl_usd
    data_type: Float64
  - name: fee_apr_30d
    data_type: Float64

    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
