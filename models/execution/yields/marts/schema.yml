- name: fct_execution_yields_pools_daily
  description: Daily pool-level metrics for top Uniswap V3 and Swapr V3 pools on Gnosis Chain, including TVL (USD), accrued fees, and 7D trailing fee APR. Filtered to top 5 pools per token by 30-day average TVL.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: pool
    data_type: String
  - name: token_address
    data_type: String
  - name: token
    data_type: String
  - name: tvl_usd
    data_type: Float64
  - name: fees_usd_daily
    data_type: Float64
  - name: volume_usd_daily
    description: Daily trading volume in USD (gross incoming amounts from Swap events).
    data_type: Float64
  - name: fee_apr_7d
    data_type: Float64
  - name: il_apr_7d
    description: Estimated 7-day impermanent loss annualized using the constant-product AMM model (2*sqrt(r)/(1+r)-1). Always <= 0. Lower bound for concentrated-liquidity pools.
    data_type: Float64
  - name: net_apr_7d
    description: Net APR (fee_apr_7d + il_apr_7d). Represents the estimated real return after impermanent loss.
    data_type: Float64

- name: fct_execution_yields_pools_il_daily
  description: Daily impermanent loss (IL) estimate per LP pool, using the constant-product formula applied to 7-day trailing token0/token1 price ratios. IL is annualised as a percentage and represents a lower-bound estimate for concentrated-liquidity pools.
  columns:
  - name: date
    data_type: Date
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: il_apr_7d
    description: Annualised 7-day trailing impermanent loss estimate (%). Negative values indicate IL drag.
    data_type: Nullable(Float64)

- name: api_execution_yields_pools_net_apr_daily
  description: API view for net APR (fee APR minus estimated IL) time series by token and pool label, with fee APR and IL components.
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: fee_apr_7d
    data_type: Float64
  - name: il_apr_7d
    data_type: Float64
  - name: net_apr_7d
    data_type: Float64

    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: api_execution_yields_pools_tvl_daily
  description: API view for pool TVL (USD) time series by token and pool label.
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: tvl_type
    data_type: String
  - name: value
    data_type: Float64

- name: api_execution_yields_pools_fee_apr_7d_daily
  description: API view for fee APR (7D trailing) time series by token and pool label (Uniswap V3/Swapr V3 only). Uses accrued fees from Swap + Flash (gross; independent of Collect/claims).
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: apy_type
    data_type: String
  - name: value
    data_type: Float64

- name: api_execution_yields_pools_volume_7d
  description: API view for 7-day total trading volume per token (snapshot from fct_execution_yields_pools_snapshots).
  columns:
  - name: token
    data_type: String
  - name: value
    description: Total trading volume (USD) over the last 7 days.
    data_type: Float64
  - name: change_pct
    description: Percentage change vs prior 7-day window.
    data_type: Float64

- name: api_execution_yields_pools_volume_daily
  description: API view for daily trading volume (USD) by token and pool, sourced from fct_execution_yields_pools_daily.
  columns:
  - name: date
    data_type: Date
  - name: token
    data_type: String
  - name: label
    data_type: String
  - name: volume_type
    data_type: String
  - name: value
    description: Daily gross trading volume in USD.
    data_type: Float64

- name: fct_execution_yields_opportunities_latest
  description: Combined yield opportunities table for LP pools and lending markets. Ranked by yield for quick comparison.
  columns:
  - name: type
    description: "Opportunity type: LP or Lending."
    data_type: String
  - name: token
    description: Base token symbol (e.g. WETH, USDC.e).
    data_type: String
  - name: name
    description: Display name. For LPs the pair and address suffix; for lending the token symbol.
    data_type: String
  - name: yield_pct
    description: Current yield percentage (fee APR for LPs, supply APY for lending).
    data_type: Float64
  - name: yield_label
    description: "Yield type label: APR (LP) or APY (Lending)."
    data_type: String
  - name: borrow_apy
    description: Variable borrow APY (lending only, NULL for LPs).
    data_type: Float64
  - name: tvl
    description: Total value locked in USD.
    data_type: Float64
  - name: fees_7d
    description: Fees accrued over the last 7 days in USD (LP only, NULL for lending).
    data_type: Float64
  - name: il_apr_7d
    description: Estimated 7-day impermanent loss annualized (LP only, NULL for lending). Always <= 0.
    data_type: Float64
  - name: net_apr_7d
    description: Net APR after impermanent loss (fee_apr_7d + il_apr_7d). LP only, NULL for lending.
    data_type: Float64
  - name: utilization_rate
    description: Lending utilization rate as a percentage (total_borrows / total_supply * 100). Lending only, NULL for LPs. High values (>80%) indicate withdrawal risk.
    data_type: Float64
  - name: protocol
    description: Protocol name (e.g. Uniswap V3, Swapr V3, Aave V3).
    data_type: String

- name: fct_execution_yields_pools_snapshots
  description: Snapshot KPI table for pool yields. Each row is a (token, metric) pair with the latest value and 7-day percentage change. Metrics include TVL_Latest, Fees_7D, and Volume_7D.
  columns:
  - name: token
    data_type: String
  - name: metric
    description: "Metric name: TVL_Latest, Fees_7D, or Volume_7D."
    data_type: String
  - name: value
    data_type: Float64
  - name: change_pct
    description: Percentage change vs prior 7-day window (or vs 7 days ago for TVL).
    data_type: Float64

