version: 2
models:

- name: fct_yields_savings_xdai_apy_daily
  description: |
    Canonical Savings xDAI APY mart. Long-format output with one row per
    (date, label) where label ∈ {'Daily','7DMA','30DMA','7DMM','30DMM'}. APY
    is compounded from the proper daily_rate in
    int_yields_savings_xdai_rate_daily (a true ratio, not a diff). 7-day and
    30-day moving averages and moving medians are computed via window
    aggregates on the compounded annual rate.

    Regime columns (canonical_label, legacy_symbol, backing_asset,
    yield_source) propagate so consumers can distinguish pre/post-2025-11-07
    rows (DAI/sDAI vs USDS/sUSDS backing) without joining again.
  columns:
  - name: date
    data_type: Date
  - name: apy
    description: APY value for the given (date, label), as a percentage.
    data_type: Float64
  - name: label
    description: APY window type — 'Daily', '7DMA', '30DMA', '7DMM', '30DMM'.
    data_type: String
  - name: canonical_label
    description: "Canonical asset label: Savings xDAI."
    data_type: String
  - name: legacy_symbol
    description: "Legacy alias: sDAI."
    data_type: String
  - name: backing_asset
    description: Backing asset for this date's regime.
    data_type: String
  - name: yield_source
    description: Yield source for this date's regime.
    data_type: String

- name: fct_yields_sdai_apy_daily
  description: |
    Legacy compatibility wrapper over fct_yields_savings_xdai_apy_daily.
    Preserves the historical (date, apy, label) shape so existing dashboard
    queries and the metrics-dashboard `historical_yield_sdai` metric keep
    working unchanged.
  columns:

  - name: date
    description: The date of the yield observation, formatted as a date string.
    data_type: Date

  - name: apy
    description: The calculated annual percentage yield (APY) for the given date, expressed as a percentage (0-100%).
    data_type: Float64

  - name: apy_7DMA
    description: The 7-day moving average of the APY, providing a smoothed yield trend over the past week, expressed as a percentage.
    data_type: Float64

  - name: apy_30DMA
    description: The 30-day moving average of the APY, indicating longer-term yield trends, expressed as a percentage.
    data_type: Float64

  - name: apy_7DMM
    description: The 7-day moving median of the APY, offering a robust central tendency measure over the past week, expressed as a percentage.
    data_type: Float64

  - name: apy_30DMM
    description: The 30-day moving median of the APY, reflecting longer-term median yield performance, expressed as a percentage.
    data_type: Float64

  - name: label
    description: Label indicating the type of APY value ('Daily', '7DMA', '30DMA', '7DMM', '30DMM').
    data_type: String
  meta:
    owner: analytics_team
    authoritative: false
    generated_by: dbt-schema-gen
    _generated_at: '2025-12-12T23:06:59.153348'
    _generated_fields:
    - description
    - columns.apy_30DMM.data_type
    - columns.apy_7DMM.data_type
    - columns.apy.description
    - columns.date.description
    - columns.apy_30DMA.data_type
    - config.tags
    - config.materialized
    - columns.apy_7DMM.description
    - columns.apy_7DMA.data_type
    - columns.apy.data_type
    - columns.apy_30DMA.description
    - columns.apy_30DMM.description
    - columns.apy_7DMA.description
    - columns.date.data_type
  tests:
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary

- name: fct_execution_yields_opportunities_latest
  description: Combined yield opportunities table for LP pools and lending markets. Ranked by yield for quick comparison.
  columns:
  - name: type
    description: "Opportunity type: LP or Lending."
    data_type: String
  - name: token
    description: Base token symbol (e.g. WETH, USDC.e).
    data_type: String
  - name: name
    description: Display name. For LPs the pair and address suffix; for lending the token symbol.
    data_type: String
  - name: address
    description: Contract address. For LPs the pool contract; for lending the reserve token contract. Used for Blockscout links.
    data_type: String
  - name: yield_pct
    description: Current yield percentage (fee APR for LPs, supply APY for lending).
    data_type: Float64
  - name: yield_label
    description: "Yield type label: APR (LP) or APY (Lending)."
    data_type: String
  - name: borrow_apy
    description: Variable borrow APY (lending only, NULL for LPs).
    data_type: Float64
  - name: tvl
    description: Total value locked in USD (LP pools only, NULL for lending).
    data_type: Float64
  - name: total_supplied
    description: Total supplied in USD (lending only, NULL for LPs). Sum of all deposit positions.
    data_type: Float64
  - name: total_borrowed
    description: Total borrowed in USD (lending only, NULL for LPs). Derived from total_supplied * utilization_rate / 100.
    data_type: Float64
  - name: fees_7d
    description: Fees accrued over the last 7 days in USD (LP only, NULL for lending).
    data_type: Float64
  - name: volume_usd_7d
    description: Total trading volume in USD over the last 7 days (LP only, NULL for lending).
    data_type: Float64
  - name: net_apr_7d
    description: Net APR after LVR (fee_apr_7d + lvr_apr_7d). LP only, NULL for lending.
    data_type: Float64
  - name: utilization_rate
    description: Lending utilization rate as a percentage (total_borrows / total_supply * 100). Lending only, NULL for LPs. High values (>80%) indicate withdrawal risk.
    data_type: Float64
  - name: protocol
    description: Protocol name (e.g. Uniswap V3, Swapr V3, Aave V3).
    data_type: String
  - name: fee_pct
    description: Pool swap fee as a percentage (e.g. 0.3 = 0.3%). Static for Uniswap V3, latest dynamic fee for Swapr V3 and Balancer V3. NULL for lending markets.
    data_type: Nullable(Float64)
  - name: pool_key
    description: Exact full pool label for LP opportunities, matching the labels used by pool-filtered metrics. NULL for lending markets.
    data_type: Nullable(String)
  - name: rate_trend_14d
    description: Last 14 daily yield points ordered oldest to newest. LP rows use fee_apr_7d; lending rows use supply APY.
    data_type: Array(Float64)

- name: fct_execution_yields_user_lifetime_metrics
  description: >
    Per-wallet lifetime KPI metrics for the yields user portfolio. Aggregates
    across LP positions (fees, active/in-range counts) and Aave V3 lending
    balances. One row per wallet that has interacted with any yield source.
  columns:
  - name: wallet_address
    data_type: String
  - name: total_lp_fees_usd
    description: Lifetime LP fees collected in USD across all pools.
    data_type: Float64
  - name: total_lending_balance_usd
    description: Current total lending supply balance in USD.
    data_type: Float64
  - name: active_lp_positions
    description: Count of currently active LP positions.
    data_type: UInt64
  - name: in_range_positions
    description: Count of active V3 LP positions where current tick is within range.
    data_type: UInt64
  - name: out_of_range_positions
    description: Count of active V3 LP positions where current tick is outside range.
    data_type: UInt64
  - name: active_lending_positions
    description: Count of Aave V3 reserves with positive balance.
    data_type: UInt64
  - name: first_yield_date
    description: Earliest interaction with any yield source.
    data_type: DateTime
  - name: tenure_days
    description: Days since first yield interaction.
    data_type: Int64

- name: fct_execution_yields_user_lending_positions_latest
  description: >
    Current Aave V3 lending positions per user with supply APY from the
    yields opportunities table. One row per (user, reserve) with positive balance.
  columns:
  - name: user_address
    data_type: String
  - name: reserve_address
    data_type: String
  - name: symbol
    data_type: String
  - name: balance
    data_type: Float64
  - name: balance_usd
    data_type: Float64
  - name: supply_apy
    description: Current supply APY from fct_execution_yields_opportunities_latest.
    data_type: Nullable(Float64)
  - name: protocol
    data_type: String

- name: fct_execution_yields_user_fee_collections_daily
  description: >
    Daily fee collection amounts per user per pool from V3 Collect events.
    Feeds the fee income chart in the user portfolio dashboard.
  columns:
  - name: date
    data_type: Date
  - name: provider
    data_type: String
  - name: pool_address
    data_type: String
  - name: protocol
    data_type: String
  - name: fees_usd
    description: Total fees collected in USD on this day for this position.
    data_type: Float64

  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - date
      - provider
      - pool_address
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: fct_execution_yields_overview_snapshot
  description: |
    Long-format KPI snapshot table for the yields overview dashboard. One row
    per metric, with the latest value, 7-day change percent, and a display
    label (e.g. the best-APR pool name or best-APY token). Sourced from
    fct_execution_pools_daily (LP TVL/best APR), int_execution_lending_aave_daily
    (lending best APY/lender count), and the Savings xDAI rate model
    (sDAI APY/supply). Materialized as a small ReplacingMergeTree keyed by
    metric so the overview API views can do constant-time WHERE filters.
  meta:
    owner: analytics_team
    authoritative: true
  columns:
  - name: metric
    description: Metric identifier — one of 'lp_tvl_total', 'lp_best_apr', 'lending_best_apy', 'lending_lenders_total', 'sdai_apy', 'sdai_supply_total'.
    data_type: String
  - name: value
    description: Current value for the metric (units vary by metric — USD for TVL/supply, percent for APR/APY, count for lenders).
    data_type: Float64
  - name: change_pct
    description: Percent change vs the value 7 days earlier (NULL when no prior data).
    data_type: Nullable(Float64)
  - name: label
    description: Optional display label — pool name (LP best APR) or token symbol (lending best APY); NULL otherwise.
    data_type: Nullable(String)

- name: api_execution_yields_overview_lending_tvl
