- name: api_execution_yields_user_lp_positions
  description: |
    Current LP positions per wallet across Uniswap V3, Swapr V3, and Balancer
    V2/V3. One row per (provider, pool_address[, tick_range]) with capital
    flows, fees collected, and in-range status. Sourced from
    int_execution_yields_user_lp_positions.
  columns:
  - name: provider
    description: LP provider wallet address.
    data_type: String
  - name: pool_address
    data_type: String
  - name: protocol
    data_type: String
  - name: tick_lower
    description: V3 lower tick (NULL for non-V3 pools).
    data_type: Nullable(Int64)
  - name: tick_upper
    description: V3 upper tick (NULL for non-V3 pools).
    data_type: Nullable(Int64)
  - name: capital_in_usd
    description: Cumulative USD value of deposits into the position.
    data_type: Float64
  - name: capital_out_usd
    description: Cumulative USD value of withdrawals from the position.
    data_type: Float64
  - name: fees_collected_usd
    description: Cumulative LP fees collected in USD.
    data_type: Float64
  - name: is_active
    description: 1 if the position currently holds liquidity.
    data_type: UInt8
  - name: is_in_range
    description: 1 if pool current tick is within [tick_lower, tick_upper] (V3 only).
    data_type: Nullable(UInt8)
  - name: pool_current_tick
    data_type: Nullable(Int64)
  - name: has_unpriced_tokens
    description: 1 if at least one token in the pool lacks USD pricing.
    data_type: UInt8
  - name: entry_date
    data_type: Date
  - name: last_action_date
    data_type: Date

  - name: as_of_date
    description: Date the snapshot is computed as of (max date in the underlying data).
    data_type: Date
