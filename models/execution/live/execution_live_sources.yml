version: 2

sources:
  - name: execution_live
    description: "Near-real-time execution-layer tables from Gnosis Chain. Populated by a dedicated cryo-live indexer with ~30s latency (6 confirmation blocks). Data is ephemeral and may contain reorged blocks."
    schema: execution_live
    tags: ["gnosis", "execution", "live"]

    tables:
      - name: logs
        description: "Event logs from execution_live — same schema as execution.logs but near-real-time."
        loaded_at_field: block_timestamp

      - name: transactions
        description: "Transactions from execution_live — same schema as execution.transactions but near-real-time."
        loaded_at_field: block_timestamp
