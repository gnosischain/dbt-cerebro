version: 2

models:
- name: int_execution_cow_trades
  description: >
    Pure on-chain CoW Protocol trades enriched with token metadata (symbol, decimals),
    USD prices (ASOF daily), and the solver that executed the batch. Contains the
    raw fee_amount from the Trade event (0 for 2024+). USD fee computation happens
    in fct_execution_cow_trades, which joins in the off-chain API fees.
  meta:
    owner: analytics_team
    full_refresh:
      start_date: "2021-04-01"
      batch_months: 3
  columns:
  - name: block_number
    description: Block height containing the GPv2 Trade event.
    data_type: UInt64
  - name: block_timestamp
    description: UTC timestamp of the block containing the trade fill.
    data_type: DateTime
  - name: transaction_hash
    description: Settlement transaction hash, 0x-prefixed lowercase (matches the repo-wide address / tx-hash convention).
    data_type: String
  - name: log_index
    description: Log index of the Trade event within the block.
    data_type: UInt64
  - name: protocol
    description: Protocol identifier for the event source.
    data_type: String
  - name: pool_address
    description: GPv2Settlement contract address (same for all rows; CoW has no per-pool contracts).
    data_type: String
  - name: token_bought_address
    description: Address of the token the trader received (buyToken).
    data_type: String
  - name: token_bought_symbol
    description: Symbol of the bought token from pools token metadata. NULL when unknown.
    data_type: Nullable(String)
  - name: amount_bought_raw
    description: Raw buyAmount in token atoms (before decimal scaling).
    data_type: Nullable(UInt256)
  - name: amount_bought
    description: Bought amount scaled to human units (token decimals, default 18).
    data_type: Nullable(Float64)
  - name: token_sold_address
    description: Address of the token the trader sold (sellToken).
    data_type: String
  - name: token_sold_symbol
    description: Symbol of the sold token from pools token metadata. NULL when unknown.
    data_type: Nullable(String)
  - name: amount_sold_raw
    description: Raw sellAmount in token atoms (before decimal scaling).
    data_type: Nullable(UInt256)
  - name: amount_sold
    description: Sold amount scaled to human units (token decimals, default 18).
    data_type: Nullable(Float64)
  - name: fee_amount_raw
    description: >
      Raw on-chain feeAmount from the Trade event, in sell-token atoms.
      Non-zero until 2024; zero afterwards (CoW switched to surplus-based fees).
    data_type: Nullable(UInt256)
  - name: fee_amount
    description: fee_amount_raw scaled to sell-token human units.
    data_type: Nullable(Float64)
  - name: amount_usd
    description: Trade value in USD (prefers buy-side price, falls back to sell-side).
    data_type: Nullable(Float64)
  - name: taker
    description: Order owner address.
    data_type: String
  - name: order_uid
    description: CoW order identifier. Not unique per row — partially-fillable orders settle across multiple fills sharing an order_uid.
    data_type: String
  - name: solver
    description: Solver that settled this trade's batch.
    data_type: Nullable(String)

  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      - log_index
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
- name: int_execution_cow_batches
  description: >
    Batch-level aggregates for CoW Protocol settlements. One row per settlement
    transaction with trade counts, interaction counts, CoW detection, gas costs.
  meta:
    owner: analytics_team
    full_refresh:
      start_date: "2021-04-01"
      batch_months: 6
  columns:
  - name: block_timestamp
    description: UTC timestamp of the batch settlement (earliest trade timestamp in the batch).
    data_type: DateTime
  - name: transaction_hash
    description: Settlement transaction hash, 0x-prefixed lowercase. One row per settlement transaction.
    data_type: String
  - name: solver
    description: Solver that settled this batch.
    data_type: Nullable(String)
  - name: num_trades
    description: Number of individual trade fills in this batch.
    data_type: UInt64
  - name: num_interactions
    description: Number of external contract calls (AMM swaps) in this batch.
    data_type: UInt64
  - name: is_cow
    description: >
      True if the batch has multiple trades but zero interactions, indicating
      pure Coincidence of Wants (peer-to-peer matching without AMM routing).
    data_type: Bool
  - name: batch_value_usd
    description: Total USD trade value across all fills in this batch (sum of amount_usd).
    data_type: Nullable(Float64)
  - name: gas_used
    description: Gas used by the settlement transaction (from execution.transactions).
    data_type: Nullable(UInt64)
  - name: gas_price
    description: Gas price of the settlement transaction (from execution.transactions).
    data_type: Nullable(UInt64)
  - name: tx_cost_native
    description: Transaction cost in xDAI (gas_used * gas_price / 1e18).
    data_type: Nullable(Float64)
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - block_timestamp
      - transaction_hash
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(block_timestamp) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
