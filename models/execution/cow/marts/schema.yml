version: 2

models:
- name: fct_execution_cow_trades
  description: >
    Canonical CoW Protocol trades table. Joins on-chain trade data from
    int_execution_cow_trades with off-chain protocol fee data from
    stg_crawlers_data__cow_api_trade_fees (ingested from the CoW API).
    fee_usd logic: pre-2024 CoW used an explicit fee model (fee_amount_raw > 0
    in the Trade event); 2024+ CoW switched to surplus-based fees (not visible
    in events) sourced from executedProtocolFees via /api/v2/trades; the
    transition period (mid-2023 through early 2024) is mixed — COALESCE picks
    whichever source is available per trade. fee_source identifies where the fee
    came from ('onchain', 'api', or NULL). NOTE — ClickHouse LEFT JOIN with
    join_use_nulls=0 (default) fills unmatched String columns with '' instead
    of NULL, so we check fee_token != '' rather than IS NOT NULL to correctly
    detect a real API match.
  meta:
    owner: analytics_team
    full_refresh:
      start_date: "2021-04-01"
      batch_months: 3
  columns:
  - name: block_number
    data_type: UInt64
  - name: block_timestamp
    data_type: DateTime
  - name: transaction_hash
    data_type: String
  - name: log_index
    data_type: UInt64
  - name: protocol
    data_type: String
  - name: pool_address
    data_type: String
  - name: token_bought_address
    data_type: String
  - name: token_bought_symbol
    data_type: Nullable(String)
  - name: amount_bought_raw
    data_type: Nullable(UInt256)
  - name: amount_bought
    data_type: Nullable(Float64)
  - name: token_sold_address
    data_type: String
  - name: token_sold_symbol
    data_type: Nullable(String)
  - name: amount_sold_raw
    data_type: Nullable(UInt256)
  - name: amount_sold
    data_type: Nullable(Float64)
  - name: amount_usd
    data_type: Nullable(Float64)
  - name: fee_amount_raw
    description: >
      On-chain fee atoms from the GPv2 Trade event. Non-zero pre-Sep 2024,
      zero afterwards. WARNING — under CoW v1's fee-subsidy model this field
      represented the user's *signed-maximum* fee (the ceiling they agreed
      to pay), NOT the executed-after-subsidy fee that actually accrued to
      the protocol. CoW DAO reimbursed solvers off-chain via CIP-12 / solver
      rewards for gas + a small protocol margin, so summing fee_amount_raw
      does not measure protocol revenue. For revenue analysis use fee_usd
      filtered to fee_source = 'api' (the surplus-based fee model from
      Sep 2024 onwards).
    data_type: Nullable(UInt256)
  - name: fee_amount
    description: >
      fee_amount_raw scaled to sell-token human units. Same caveat as
      fee_amount_raw — represents signed-maximum under v1, not actual
      protocol revenue.
    data_type: Nullable(Float64)
  - name: api_fee_token
    description: Token address the API fee is denominated in.
    data_type: Nullable(String)
  - name: api_fee_amount_raw
    description: API fee in token atoms (sum across fee policies).
    data_type: Nullable(String)
  - name: fee_usd
    description: >
      Fee in USD. Derived from on-chain feeAmount when > 0 (pre-Sep 2024
      trades), otherwise from the CoW API surplus fee scaled to USD via the
      trade's USD value. WARNING — only the api-sourced rows reflect actual
      protocol revenue. The on-chain rows reflect signed-maximum under CoW
      v1's fee-subsidy model (see fee_amount_raw note). For revenue
      analytics, filter fee_source = 'api'.
    data_type: Nullable(Float64)
  - name: fee_source
    description: >
      'onchain' | 'api' | NULL — which source produced fee_usd. 'onchain'
      values are signed-maximum, NOT actual revenue. 'api' values are
      surplus-based protocol revenue (Sep 2024 onwards).
    data_type: Nullable(String)
  - name: taker
    data_type: String
  - name: order_uid
    data_type: String
  - name: solver
    data_type: Nullable(String)

- name: fct_execution_cow_daily
  description: >
    Daily CoW Protocol metrics: volume, trades, unique traders, fees,
    batch counts, CoW ratio (peer-to-peer matching share), and solver activity.
  meta:
    owner: analytics_team
  columns:
  - name: date
    data_type: Date
  - name: num_trades
    data_type: UInt64
  - name: unique_traders
    data_type: UInt64
  - name: volume_usd
    data_type: Nullable(Float64)
  - name: fees_usd
    data_type: Nullable(Float64)
  - name: num_batches
    data_type: Nullable(UInt64)
  - name: num_cow_batches
    description: Batches settled via pure Coincidence of Wants (no AMM interactions).
    data_type: Nullable(UInt64)
  - name: cow_ratio
    description: Share of batches that were pure CoW (peer-to-peer).
    data_type: Float64
  - name: total_interactions
    data_type: Nullable(UInt64)
  - name: total_tx_cost_native
    description: Total gas cost in xDAI across all batches.
    data_type: Nullable(Float64)
  - name: active_solvers
    description: Number of distinct solvers that settled batches on this day.
    data_type: Nullable(UInt64)

- name: fct_execution_cow_solvers
  description: >
    Solver registry built from SolverAdded/SolverRemoved events.
    Shows the latest status (active/inactive) of each solver.
  meta:
    owner: analytics_team
  columns:
  - name: solver
    data_type: String
  - name: is_active
    data_type: Bool
  - name: last_changed_at
    data_type: DateTime

- name: fct_execution_cow_solvers_daily
  description: >
    Daily per-solver performance metrics: trades, volume, fees, batches,
    CoW batches, and gas costs.
  meta:
    owner: analytics_team
  columns:
  - name: date
    data_type: Date
  - name: solver
    data_type: String
  - name: solver_is_active
    description: Whether this solver is currently active in the AllowList.
    data_type: Nullable(Bool)
  - name: num_trades
    data_type: UInt64
  - name: unique_traders
    data_type: UInt64
  - name: volume_usd
    data_type: Nullable(Float64)
  - name: fees_usd
    data_type: Nullable(Float64)
  - name: num_batches
    data_type: Nullable(UInt64)
  - name: num_cow_batches
    data_type: Nullable(UInt64)
  - name: total_tx_cost_native
    data_type: Nullable(Float64)

- name: api_execution_cow_kpi_volume_7d
  description: >
    7-day CoW Protocol trading volume with week-over-week change.
  columns:
  - name: value
    description: Total USD volume over the last 7 complete days.
    data_type: Float64
  - name: change_pct
    description: Percentage change vs the prior 7-day window.
    data_type: Nullable(Float64)

- name: api_execution_cow_kpi_trades_7d
  description: >
    7-day CoW Protocol trade count with week-over-week change.
  columns:
  - name: value
    description: Total trades over the last 7 complete days.
    data_type: UInt64
  - name: change_pct
    description: Percentage change vs the prior 7-day window.
    data_type: Nullable(Float64)

- name: api_execution_cow_kpi_traders_7d
  description: >
    7-day unique trader count (exact) with week-over-week change.
    Uses fct_execution_cow_trades directly for exact uniqExact across
    the window (daily uniques are not additive).
  columns:
  - name: value
    description: Distinct taker addresses over the last 7 complete days.
    data_type: UInt64
  - name: change_pct
    description: Percentage change vs the prior 7-day window.
    data_type: Nullable(Float64)

- name: api_execution_cow_kpi_active_solvers
  description: >
    Number of distinct solvers that settled at least one batch in the last
    7 complete days, with week-over-week change. Reflects who is actually
    competing for batches, not just who is allow-listed.
  columns:
  - name: value
    description: Distinct solvers with >=1 batch in the last 7 complete days.
    data_type: UInt64
  - name: change_pct
    description: Percentage change vs the prior 7-day window.
    data_type: Nullable(Float64)

- name: api_execution_cow_kpi_fees_7d
  description: >
    7-day CoW Protocol revenue (USD) with week-over-week change. Reflects
    surplus-based fees (fee_source = 'api', Sep 2024+). Pre-Sep 2024
    on-chain feeAmount is excluded because those values represent
    signed-maximum under CoW v1's fee-subsidy model, not actual revenue.
  columns:
  - name: value
    description: Total api-sourced fees USD over the last 7 complete days.
    data_type: Nullable(Float64)
  - name: change_pct
    description: Percentage change vs the prior 7-day window.
    data_type: Nullable(Float64)

- name: api_execution_cow_fees_ts
  description: >
    Daily CoW Protocol revenue (USD) on Gnosis Chain. Filtered to
    fee_source = 'api' — surplus-based fees introduced Sep 2024.
    Pre-Sep 2024 on-chain feeAmount values are excluded: under CoW v1's
    fee-subsidy model that field represented the user's signed-maximum fee
    ceiling, not actual protocol revenue (the DAO reimbursed solvers for
    gas + a small margin off-chain via CIP-12 / solver rewards). Including
    those values would overstate revenue for 2021–mid-2024 by orders of
    magnitude relative to what the protocol actually kept.
  columns:
  - name: date
    data_type: Date
  - name: value
    description: Daily USD fees collected via the surplus-based fee model.
    data_type: Nullable(Float64)

- name: api_execution_cow_volume_ts
  description: >
    Daily CoW Protocol trading volume. Client-side time-range
    filtering applies via the dashboard's global selector.
  columns:
  - name: date
    data_type: Date
  - name: value
    description: Daily USD volume.
    data_type: Nullable(Float64)

- name: api_execution_cow_trades_ts
  description: >
    Daily CoW Protocol trade count.
  columns:
  - name: date
    data_type: Date
  - name: value
    description: Number of trades on this day.
    data_type: UInt64

- name: api_execution_cow_solvers_volume_ts
  description: >
    Daily volume by solver, top 6 by recent (180d) volume plus an
    "Other" bucket. Solver labels come from the cow_solvers seed when
    available; otherwise fall back to a truncated address. Uses a
    180-day ranking window to surface currently active solvers rather
    than historically dominant but now-inactive ones.
  columns:
  - name: date
    data_type: Date
  - name: label
    description: Solver name (from seed) or truncated address, or "Other".
    data_type: String
  - name: value
    description: Daily USD volume for this solver group.
    data_type: Nullable(Float64)

- name: api_execution_cow_batch_metrics_ts
  description: >
    Daily share of CoW Protocol settlement batches by routing type.
    Three labels: "Pure CoW" (multi-trade batch with zero AMM
    interactions — true Coincidence of Wants), "Partial CoW" (multi-trade
    batch where num_trades > num_interactions, indicating at least some
    peer matching happened), "Pure DEX" (single-trade batches plus
    multi-trade batches fully routed through AMMs). Pure CoW peaked at
    ~34% in Oct 2021 and is near zero on Gnosis Chain since 2022.
  columns:
  - name: date
    data_type: Date
  - name: label
    description: "'Pure CoW' | 'Partial CoW' | 'Pure DEX'."
    data_type: String
  - name: value
    description: Daily share for this category as a percentage (0–100).
    data_type: Float64

- name: api_execution_cow_top_pairs_weekly
  description: >
    Weekly volume by top 8 directional token pairs (sold → bought),
    with remaining pairs grouped as "Other". Pair ranking uses
    lifetime volume.
  columns:
  - name: date
    description: Week start (Monday).
    data_type: Date
  - name: label
    description: "Directional pair label, e.g. 'USDC.e → EURe', or 'Other'."
    data_type: String
  - name: value
    description: Weekly USD volume for this pair group.
    data_type: Nullable(Float64)
