      tests: [not_null]
    - name: entity_id
      tests: [not_null]

- name: fct_execution_account_profile_latest
  description: Complete latest account profile for the Account Portfolio hero and routing layer.
  columns:
    - name: address
      tests:
        - not_null
        - unique
    - name: display_name
    - name: total_balance_usd
    - name: tokens_held

- name: api_execution_account_profile_latest
  description: Simple API view over the latest Account Portfolio profile fact.
  columns:
    - name: address
      tests: [not_null]

- name: fct_execution_account_search_index
  description: Search index for address, Circles, Safe, GPay, Gnosis App, validator, and withdrawal credential lookup.
  columns:
    - name: search_key
      tests: [not_null]
    - name: result_type
      tests:
        - accepted_values:
            values: ['address', 'safe', 'gpay_wallet', 'gnosis_app_user', 'circles', 'validator', 'validator_credential']
