version: 2

models:
- name: fct_execution_address_resolver
  description: |
    Per-(address × source) domain resolver rows. The cross-source merge
    happens at query time inside `api_execution_address_resolver` (point
    lookup with `WHERE address = '0x…'` + `GROUP BY address`) instead of
    at build time, because a 5–10M-address outer GROUP BY OOMs the cluster
    cap. AggregatingMergeTree on `address` lets background merges collapse
    duplicate rows when address is in only one source; the api view handles
    the rest.

    Materialised as a table (not a view) so the Account Portfolio custom
    view's per-request lookup is an O(log N) primary-index seek rather
    than a 5-way UNION scan. Expected cardinality ~500k-1M on Gnosis Chain.

    display_name precedence: Circles avatar name → role tag ("Validator
    operator · N validators" / "Safe owner · N safes" / "Safe contract" /
    "Gnosis Pay wallet" / "Circles avatar") → empty. LabelSelector filters
    on substring match so both hex paste and name search resolve from the
    same field.
  columns:
    - name: address
      description: Lowercased 0x… address. Primary index. Multiple rows per address are expected (one per contributing source); the api view collapses them.
      tests:
        - not_null
    - name: is_safe
      description: True if the address is a deployed Gnosis Safe contract.
    - name: is_safe_owner
      description: True if the address is an owner of at least one Safe.
    - name: is_circles_avatar
      description: True if the address has a Circles v2 avatar registration.
    - name: is_gpay_wallet
      description: True if the address appears in Gnosis Pay user lifetime metrics.
    - name: is_validator_withdrawal_address
      description: True if the address is a withdrawal_address for at least one validator.
    - name: connected_safe_count
      description: Number of Safes this address currently owns (0 if not an owner).
    - name: connected_validator_count
      description: Number of validators whose withdrawal_address is this address (0 if none).
    - name: circles_name
      description: Circles avatar handle if any; NULL otherwise.
    - name: circles_avatar_type
      description: Circles avatar type (human / organization / group) if any.
    - name: display_name
      description: Composed label used by the Account Portfolio search dropdown.

- name: api_execution_address_resolver
  description: |
    Per-address merge view over `fct_execution_address_resolver`. Collapses
    the per-source rows into a single row per address using max() on every
    flag/count column. Hit by the Account Portfolio custom view on every
    address change. `require_any_of: [address]`.
  columns:
    - name: address
      tests:
        - not_null
        - unique

- name: api_execution_address_search
  description: |
    Lightweight dropdown source for the Account Portfolio tab's global
    filter. Two columns (address + display_name), `allow_unfiltered: true`
    so LabelSelector loads the full list in one request and substring-matches
    client-side.
  columns:
    - name: address
      tests:
        - not_null
    - name: display_name

- name: fct_execution_account_balance_history_daily
  description: Daily address-grain portfolio balance history from production token balances.
  meta:
    full_refresh:
      start_date: "2020-07-01"
      batch_months: 1
  columns:
    - name: address
      tests: [not_null]
    - name: date
      tests: [not_null]
    - name: total_balance_usd
    - name: tokens_held
  tests:
    - dbt_utils.unique_combination_of_columns:
        combination_of_columns: [address, date]

- name: api_execution_account_balance_history_daily
  description: Simple API view for Account Portfolio balance history.
  columns:
    - name: address
      tests: [not_null]
    - name: date
      tests: [not_null]

- name: fct_execution_account_token_balances_latest
  description: Latest non-zero token balances by address, optimized for account lookup.
  columns:
    - name: address
      tests: [not_null]
    - name: token_address
      tests: [not_null]
    - name: balance
    - name: balance_usd
  tests:
    - dbt_utils.unique_combination_of_columns:
        combination_of_columns: [address, token_address]

- name: api_execution_account_token_balances_latest
  description: Simple API view for latest Account Portfolio token balances.
  columns:
    - name: address
      tests: [not_null]
    - name: token_address
      tests: [not_null]

- name: fct_execution_account_token_movements_daily
  description: Daily token movement legs by address, counterparty, token, and direction from production whitelisted daily transfers.
  meta:
    full_refresh:
      start_date: "2020-07-01"
      batch_months: 1
  columns:
    - name: date
      tests: [not_null]
    - name: address
      tests: [not_null]
    - name: counterparty
      tests: [not_null]
    - name: direction
      tests:
        - accepted_values:
            values: ['in', 'out']
  tests:
    - dbt_utils.unique_combination_of_columns:
        combination_of_columns: [date, address, counterparty, token_address, direction]

- name: api_execution_account_token_movements_daily
  description: Simple API view for Account Portfolio token movements.
  columns:
    - name: address
      tests: [not_null]
    - name: direction

- name: fct_execution_account_counterparty_edges_daily
  description: Daily directed account-counterparty graph edges from production movement and GPay activity facts.
  meta:
    full_refresh:
