- name: fct_execution_blocks_clients_daily
  description: The fct_execution_blocks_clients_daily model aggregates daily execution block counts per client, providing insights into client activity levels over time for operational analysis.
  columns:

  - name: date
    description: The date of the recorded execution blocks, formatted as a date.
    data_type: Date
    tests:
    - not_null

  - name: client
    description: Identifier for the client associated with the execution blocks.
    data_type: String

  - name: cnt
    description: Total number of execution blocks for the client on the given date.
    data_type: UInt64

    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: error
        tags:
        - elementary
  - name: fraq
    description: Fraction of total blocks on that date attributed to the client.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: error
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: error
      tags:
      - elementary
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: api_execution_blocks_gas_usage_pct_daily
  description: The api_execution_blocks_gas_usage_pct_daily model provides daily insights into the percentage of gas used by API execution blocks, assisting in monitoring resource consumption trends over time.
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: error
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: error
      tags:
      - elementary
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
  columns:

  - name: date
    description: The specific day for which the gas usage percentage is recorded.
    data_type: Date
    tests:
    - not_null

  - name: value
    description: The percentage of gas used by execution blocks on the given date, rounded to two decimal places.
    data_type: Float64
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
  meta:
    owner: analytics_team
    authoritative: false
- name: api_execution_blocks_gas_usage_pct_monthly
  description: This model provides a monthly percentage of gas usage for execution blocks, enabling analysis of gas consumption trends over time.
  columns:

  - name: date
    description: The month for which the gas usage percentage is reported, formatted as a date.
    data_type: Date
    tests:
    - not_null

  - name: value
    description: The gas usage percentage for the month, rounded to two decimal places.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
- name: fct_execution_blocks_gas_usage_monthly
  description: The fct_execution_blocks_gas_usage_monthly model aggregates monthly gas usage and limits for execution blocks to support performance and resource utilization analysis.
  columns:

  - name: month
    description: The first day of the month representing the aggregation period.
    data_type: Date

  - name: gas_used_sum_monthly
    description: Total gas used in execution blocks during the month, measured in units consistent with gas consumption metrics.
    data_type: UInt64

  - name: gas_limit_sum_monthly
    description: Total gas limit allocated for execution blocks during the month, measured in units consistent with gas allocation metrics.
    data_type: UInt64

  - name: used
    description: Ratio of gas used to gas limit for the month.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
