version: 2
models:

- name: api_execution_blocks_clients_cnt_daily
  description: The api_execution_blocks_clients_cnt_daily model provides daily aggregated counts of API execution blocks per client, supporting operational monitoring and capacity planning.
  columns:

  - name: date
    description: The specific calendar date for the recorded data, formatted as YYYY-MM-DD.
    data_type: Date
    tests:
    - not_null

  - name: client
    description: The identifier for the client associated with the API execution blocks.
    data_type: String

  - name: value
    description: The count of API execution blocks for the given client on the specified date.
    data_type: UInt64
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: error
        tags:
        - elementary
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: error
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: error
      tags:
      - elementary
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
