version: 2

models:
  - name: api_governance_kpis_latest
    description: >
      Single-row headline governance KPIs for number tiles: proposal/GIP/vote
      counts, unique voters, followers, proposals passed, pass rate, and average
      voters per closed proposal.
    columns:
      - name: total_proposals
        data_type: UInt64
      - name: unique_voters
        data_type: UInt64
      - name: gip_pass_rate
        description: GIP-only passed / (passed + rejected + no_consensus + below_quorum). Excludes 'decided' selections.
        data_type: Nullable(Float64)
    meta:
      owner: analytics_team
      authoritative: false

  - name: api_governance_activity_monthly
    description: >
      Monthly governance activity, long format (date, metric, value) for
      proposals_created, votes_cast, unique_voters.
    columns:
      - name: date
        data_type: Date
      - name: metric
        data_type: String
      - name: value
        data_type: UInt64
    meta:
      owner: analytics_team
      authoritative: false

  - name: api_governance_proposals_latest
    description: >
      Proposal browse table (one row per Snapshot proposal) with outcome,
      category, quorum, and vote aggregates. Filter is_gip = 1 for GIPs only.
    columns:
      - name: id
        data_type: String
        tests: [not_null, unique]
      - name: outcome
        data_type: String
      - name: is_gip
        data_type: Bool
    meta:
      owner: analytics_team
      authoritative: false

  - name: api_governance_gip_funnel
    description: >
      Nested GIP conversion funnel: discussed on forum -> discussed AND reached
      Snapshot vote -> discussed AND reached vote AND (has_passed OR has_decided).
    columns:
      - name: stage
        data_type: String
      - name: gip_count
        data_type: UInt64
    meta:
      owner: analytics_team
      authoritative: false

  - name: api_governance_forum_activity_weekly
    description: Weekly forum activity long format (date, metric, value).
    columns:
      - name: date
        data_type: Date
      - name: metric
        description: topics_created | posts_created | active_users.
        data_type: String
    meta:
      owner: analytics_team
      authoritative: false

  - name: api_governance_top_voters
    description: >
      Top 200 voters by proposals voted, with cumulative and average voting
      power. total_vp_cast is participation-weighted, not a balance.
    columns:
      - name: voter
        data_type: String
        tests: [not_null]
      - name: proposals_voted
        data_type: UInt64
    meta:
      owner: analytics_team
      authoritative: false

  - name: api_governance_power_source_monthly
    description: >
      Monthly voting power by source (Staked GNO / GNO holdings / Delegated),
      long format (date, label, value). Empty until proposals carry `strategies`.
    columns:
      - name: date
        data_type: Date
      - name: label
        description: Power source bucket.
        data_type: String
      - name: value
        description: Summed voting power for the source that month.
        data_type: Float64
    meta:
      owner: analytics_team
      authoritative: false

  - name: api_governance_proposal_choices
    description: >
      Per-choice vote breakdown, long format (one row per proposal x choice),
      for the per-proposal For/Against/Abstain (or ranked-choice) bar with a
      quorum reference line. Works for any ballot shape, not just binary.
    columns:
      - name: proposal_id
        data_type: String
        tests: [not_null]
      - name: choice
        description: Ballot option label.
        data_type: String
      - name: score
        description: Voting power this choice received.
        data_type: Float64
      - name: pct
        description: Share of scores_total this choice received. Null if scores_total is 0.
        data_type: Nullable(Float64)
      - name: is_winner
        description: True for the row matching the proposal's winning_choice.
        data_type: Bool
    meta:
      owner: analytics_team
      authoritative: false

  - name: api_governance_top_proposers
    description: >
      Top 50 proposal authors by count, with outcome record. success_rate
      excludes 'open' proposals from the denominator; 'decided' (selection
      ballots) counts as enacted in the numerator without forcing a pass/fail
      label onto proposals that were never binary.
    columns:
      - name: author
        data_type: String
        tests: [not_null]
      - name: proposals_authored
        data_type: UInt64
      - name: success_rate
        data_type: Nullable(Float64)
    meta:
      owner: analytics_team
      authoritative: false
