version: 2

models:
  - name: int_governance_proposals
    description: >
      One enriched row per Snapshot proposal: derived outcome
      (passed/rejected/below_quorum/open), quorum_met, keyword category, winning
      choice, and vote aggregates (unique_voters, total_vp). Vote aggregates are
      pre-grouped then LEFT JOINed so no-vote proposals get 0, not an epoch.
    columns:
      - name: id
        description: Snapshot proposal id.
        data_type: String
        tests: [not_null, unique]
      - name: outcome
        description: >
          passed | rejected | no_consensus (abstain won) | decided (a selection
          ballot resolved -- the real result is winning_choice, e.g. GIP-148 ->
          "Noctua (Noca)") | below_quorum | open. Derived from the winning choice
          + quorum + finality; winning_choice always carries the actual winner.
        data_type: String
        tests:
          - accepted_values:
              values: ['passed','rejected','no_consensus','decided','below_quorum','open']
      - name: winning_choice
        description: The choice label with the most voting power (any ballot type). Empty if no scores.
        data_type: String
      - name: category
        description: Keyword-derived category (Treasury & Funding, Technical & Protocol, ...).
        data_type: String
      - name: unique_voters
        description: Distinct voters (deduped one-per-voter upstream).
        data_type: UInt64
    meta:
      owner: analytics_team
      authoritative: false

  - name: int_governance_gip
    description: >
      The GIP spine — one row per GIP number, unifying forum discussion
      (topics/posts/views/phase flags) with Snapshot proposal(s). Canonical
      `outcome` is set only when unambiguous (single decisive result across
      ballots); conflicting decisive outcomes set outcome NULL and
      outcome_ambiguous. Full ballot history stays on int_governance_proposals.
    columns:
      - name: gip_number
        description: GIP number (the spine key).
        data_type: UInt32
        tests: [not_null, unique]
      - name: discussed_on_forum
        description: True if at least one forum topic carries this GIP number.
        data_type: Bool
      - name: reached_vote
        description: True if at least one Snapshot proposal with this GIP number exists.
        data_type: Bool
      - name: proposal_count
        description: Number of Snapshot proposals tagged with this GIP number.
        data_type: UInt64
      - name: outcome
        description: >
          Canonical outcome when unambiguous; NULL if decisive ballots disagree
          (outcome_ambiguous) or there is no Snapshot proposal.
        data_type: Nullable(String)
      - name: outcome_ambiguous
        description: True when multiple decisive outcomes exist for this GIP number.
        data_type: UInt8
      - name: has_passed
        description: True if any proposal for this GIP has outcome=passed.
        data_type: UInt8
      - name: latest_outcome
        description: Outcome of the latest proposal by created_at (not canonical).
        data_type: Nullable(String)
    meta:
      owner: analytics_team
      authoritative: false

  - name: int_governance_forum_proposal_links
    description: >
      Cross-link from a forum post to a Snapshot proposal via a pasted
      proposal/0x… URL. Not GIP identity — unmatched links keep
      proposal_matched=false. Grain: one row per linking post.
    columns:
      - name: post_id
        description: Forum post id.
        data_type: UInt64
        tests: [not_null]
      - name: snapshot_proposal_id
        description: Lowercased 0x proposal id extracted from the post body.
        data_type: String
        tests: [not_null]
      - name: proposal_matched
        description: True when snapshot_proposal_id exists in int_governance_proposals.
        data_type: Bool
    meta:
      owner: analytics_team
      authoritative: false

  - name: int_governance_forum_topic_proposal_links
    description: >
      Topic-level rollup of Snapshot proposal links found in any post of the
      thread. One row per (topic_id, snapshot_proposal_id).
    columns:
      - name: topic_id
        description: Forum topic id.
        data_type: UInt32
        tests: [not_null]
      - name: snapshot_proposal_id
        description: Lowercased 0x proposal id linked from the topic.
        data_type: String
        tests: [not_null]
      - name: linking_posts
        description: Number of posts in the topic that pasted this proposal URL.
        data_type: UInt64
    meta:
      owner: analytics_team
      authoritative: false

  - name: int_governance_forum_activity_weekly
    description: >
      Weekly forum activity in long format (date, metric, value) for
      topics_created, posts_created, active_users.
    columns:
      - name: date
        description: Week start (Monday, UTC).
        data_type: Date
      - name: metric
        description: topics_created | posts_created | active_users.
        data_type: String
      - name: value
        description: Metric value for the week.
        data_type: UInt64
    meta:
      owner: analytics_team
      authoritative: false

  - name: int_governance_vote_power_source
    description: >
      One row per (vote, strategy component): the voter's voting power split
      across the proposal's own strategies, classified into a power source
      (Staked GNO / GNO holdings / Delegated). Populated once proposals are
      ingested with the `strategies` field.
    columns:
      - name: proposal_id
        description: Snapshot proposal id.
        data_type: String
      - name: voter
        description: Voter address (lowercased).
        data_type: String
      - name: power_source
        description: >
          Classified strategy bucket. The classifier falls back to the raw
          Snapshot strategy name for anything unrecognized, so this test is a
          real guardrail -- it will legitimately fail the day a new/different
          voting strategy appears that isn't bucketed here yet.
        data_type: String
        tests:
          - accepted_values:
              values: ['Staked GNO (GBC)', 'GNO holdings', 'Delegated']
      - name: strategy_vp
        description: Voting power attributed to this strategy component.
        data_type: Float64
    meta:
      owner: analytics_team
      authoritative: false
