version: 2
models:

- name: api_quarterly_data_circles_humans
  description: End-of-quarter total registered human avatars in Circles v2.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: registered_humans
    description: Cumulative count of registered human avatars at end of quarter.
    data_type: UInt64

- name: api_quarterly_data_circles_active_trusts
  description: End-of-quarter active trust links in Circles v2.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: active_trusts
    description: Total active trust links at end of quarter.
    data_type: UInt64

- name: api_quarterly_data_circles_total_supply
  description: End-of-quarter Circles v2 token supply (raw and demurraged).
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: total_supply
    description: Total CRC token supply at end of quarter.
    data_type: Float64
  - name: total_supply_demurraged
    description: Total CRC token supply after demurrage at end of quarter.
    data_type: Float64
