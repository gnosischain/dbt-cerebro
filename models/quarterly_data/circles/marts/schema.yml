version: 2
models:

- name: api_quarterly_data_circles_humans
  description: End-of-quarter total registered human avatars in Circles v2.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: registered_humans
    description: Cumulative count of registered human avatars at end of quarter.
    data_type: UInt64

- name: api_quarterly_data_circles_active_trusts
  description: End-of-quarter active trust links in Circles v2.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: active_trusts
    description: Total active trust links at end of quarter.
    data_type: UInt64

- name: api_quarterly_data_circles_total_supply
  description: End-of-quarter Circles v2 token supply (raw and demurraged).
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: total_supply
    description: Total CRC token supply at end of quarter.
    data_type: Float64
  - name: total_supply_demurraged
    description: Total CRC token supply after demurrage at end of quarter.
    data_type: Float64

- name: api_quarterly_data_circles_active_minters
  description: Quarterly peak of blacklist-excluded Circles v2 Active Minters (the +80% mint-coverage cohort). Matches the Dune circles-v2-kpis active-minters peak.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: active_minters_peak
    description: Highest daily blacklist-excluded active-minter count within the quarter.
    data_type: UInt64

- name: api_quarterly_data_circles_backers
  description: >
    Quarterly currently-trusted Circles backers, as of quarter end
    (revocation-aware). A backer is an address currently trusted by the backers
    group avatar var('circles_target_group_address'); trust is revocable, so this
    count can fall. Distinct from the ever-backed cumulative series
    (api:circles_v2_backers_cumulative).
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: total_backers
    description: Distinct backers currently trusted by the backers group as of the quarter's last day.
    data_type: UInt64
