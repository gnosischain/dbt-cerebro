version: 2
models:

- name: api_quarterly_data_carbon_emissions
  description: Quarterly annualised CO2 emissions (tonnes/yr) from end-of-quarter snapshot, with estimation flag for periods using forward-filled carbon intensity.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: co2_tonnes_yr
    description: Annualised CO2 emissions in tonnes per year at end of quarter.
    data_type: Float64
  - name: is_estimated
    description: True if the quarter's value uses forward-filled carbon intensity data.
    data_type: Bool

- name: api_quarterly_data_energy_consumption
  description: Quarterly annualised energy consumption (MWh/yr) from end-of-quarter snapshot, with estimation flag for periods using forward-filled carbon intensity.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: energy_mwh_yr
    description: Annualised energy consumption in MWh per year at end of quarter.
    data_type: Float64
  - name: is_estimated
    description: True if the quarter's value uses forward-filled carbon intensity data.
    data_type: Bool

- name: api_quarterly_data_nodes_estimated
  description: Quarterly end-of-quarter estimated total node count (observed + unobserved) with 95% confidence interval, sourced from the node classification model.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: nodes_estimated
    description: Total estimated nodes at end of quarter (sum across all categories).
    data_type: UInt64
  - name: nodes_lower_95
    description: Lower bound of 95% confidence interval for total nodes.
    data_type: UInt64
  - name: nodes_upper_95
    description: Upper bound of 95% confidence interval for total nodes.
    data_type: UInt64

- name: api_quarterly_data_nodes_observed
  description: Quarterly end-of-quarter observed (directly reachable) node count from the node classification model.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: nodes_observed
    description: Total observed nodes at end of quarter.
    data_type: UInt64
