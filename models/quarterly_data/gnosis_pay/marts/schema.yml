version: 2
models:

- name: api_quarterly_data_gpay_cashback
  description: Total Gnosis Pay cashback in USD per quarter.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: cashback_usd
    description: Sum of cashback paid in USD during the quarter.
    data_type: Float64

- name: api_quarterly_data_gpay_payments
  description: Total Gnosis Pay payment transactions per quarter.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: payments
    description: Total number of payment transactions in the quarter.
    data_type: UInt64

- name: api_quarterly_data_gpay_volume
  description: Total Gnosis Pay payment volume in USD per quarter.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: volume_usd
    description: Sum of payment volume in USD during the quarter.
    data_type: Float64

- name: api_quarterly_data_gpay_active_users
  description: Peak monthly active users for Gnosis Pay within the quarter.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: peak_monthly_active_users
    description: Highest monthly active user count across the three months of the quarter.
    data_type: UInt64
