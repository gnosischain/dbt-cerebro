version: 2
models:

- name: api_quarterly_data_transactions_count
  description: Total successful transactions per quarter on Gnosis Chain.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: transactions
    description: Total number of successful transactions in the quarter.
    data_type: UInt64

- name: api_quarterly_data_staked_gno
  description: End-of-quarter GNO staked on Gnosis Chain (effective balance in real GNO; mGNO->GNO conversion happens upstream in int_consensus_validators_balances_daily).
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: staked_gno
    description: Total GNO staked at end of quarter.
    data_type: Float64

- name: api_quarterly_data_validators_active
  description: End-of-quarter count of active validators on Gnosis Chain (the full active set = active_ongoing + active_exiting), matching public beacon explorers.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
    tests:
    - not_null
    - unique
  - name: validators_active
    description: Number of active validators at end of quarter — active_ongoing plus active_exiting (both attest and remain staked until exit completes).
    data_type: UInt64
