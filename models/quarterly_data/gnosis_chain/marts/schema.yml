version: 2
models:

- name: api_quarterly_data_transactions_count
  description: Total successful transactions per quarter on Gnosis Chain.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: transactions
    description: Total number of successful transactions in the quarter.
    data_type: UInt64

- name: api_quarterly_data_staked_gno
  description: End-of-quarter GNO staked on Gnosis Chain (effective balance / 32).
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: staked_gno
    description: Total GNO staked at end of quarter.
    data_type: Float64

- name: api_quarterly_data_validators_active
  description: End-of-quarter count of active validators on Gnosis Chain.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: validators_active
    description: Number of active_ongoing validators at end of quarter.
    data_type: UInt64
