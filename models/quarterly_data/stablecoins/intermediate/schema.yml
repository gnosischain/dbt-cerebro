version: 2
models:

- name: int_quarterly_stablecoin_cohorts_stats
  description: >
    Pre-computed quarterly statistics (min, max, avg, median) for stablecoin
    holder cohorts by balance bucket and peg class. Aggregates daily cohort
    data across all days in each quarter. Excludes BRZ. Materialized as a
    table for fast API reads.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: peg_class
    description: "Stablecoin peg classification: 'USD-pegged' or 'non-USD'."
    data_type: String
  - name: balance_bucket
    description: "USD balance range bucket (e.g. '0-0.01', '1-10', '100-1k', '1M+')."
    data_type: String
  - name: bucket_order
    description: Numeric sort order for balance buckets (1-10).
    data_type: UInt8
  - name: holders_min
    description: Minimum daily holder count in this bucket across the quarter.
    data_type: UInt64
  - name: holders_max
    description: Maximum daily holder count in this bucket across the quarter.
    data_type: UInt64
  - name: holders_avg
    description: Average daily holder count in this bucket across the quarter.
    data_type: Float64
  - name: holders_median
    description: Median daily holder count in this bucket across the quarter.
    data_type: Float64
  - name: value_min
    description: Minimum daily total USD value in this bucket across the quarter.
    data_type: Float64
  - name: value_max
    description: Maximum daily total USD value in this bucket across the quarter.
    data_type: Float64
  - name: value_avg
    description: Average daily total USD value in this bucket across the quarter.
    data_type: Float64
  - name: value_median
    description: Median daily total USD value in this bucket across the quarter.
    data_type: Float64
