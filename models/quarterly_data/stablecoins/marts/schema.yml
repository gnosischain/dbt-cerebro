version: 2
models:

- name: api_quarterly_data_stablecoin_supply
  description: >
    End-of-quarter total stablecoin supply (USD) and holder count on Gnosis Chain.
    Includes all stablecoins classified in tokens_whitelist.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: supply_usd
    description: Total stablecoin supply in USD at end of quarter.
    data_type: Float64
  - name: holders_total
    description: Total number of stablecoin holders at end of quarter.
    data_type: UInt64

- name: api_quarterly_data_stablecoin_holders
  description: >
    End-of-quarter stablecoin holder count on Gnosis Chain.
    Includes all stablecoins classified in tokens_whitelist.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: holders
    description: Total number of unique stablecoin holders at end of quarter.
    data_type: UInt64

- name: api_quarterly_data_stablecoin_transfers
  description: >
    Quarterly stablecoin transfer count and volume on Gnosis Chain.
    Includes all stablecoins classified in tokens_whitelist.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: transfers
    description: Total number of stablecoin transfers in the quarter.
    data_type: UInt64
  - name: volume_usd
    description: Total stablecoin transfer volume in USD for the quarter.
    data_type: Float64

- name: api_quarterly_data_stablecoin_holder_cohorts
  description: >
    End-of-quarter stablecoin holder distribution by USD balance bucket,
    split into USD-pegged (WxDAI, sDAI, USDC, USDC.e, USDT) and non-USD
    (EURe, GBPe, BRZ, BRLA, ZCHF, etc.).
    Shows holders count, total value, and average balance per cohort.
  columns:
  - name: quarter
    description: Quarter start date.
    data_type: Date
  - name: peg_class
    description: "Stablecoin peg classification: 'USD-pegged' or 'non-USD'."
    data_type: String
  - name: balance_bucket
    description: "USD balance range bucket (e.g. '0-0.01', '1-10', '100-1k', '1M+')."
    data_type: String
  - name: holders
    description: Number of holders in this bucket at end of quarter.
    data_type: UInt64
  - name: value_usd
    description: Total USD value held by addresses in this bucket.
    data_type: Float64
  - name: avg_balance_usd
    description: Average USD balance per holder in this bucket.
    data_type: Float64
