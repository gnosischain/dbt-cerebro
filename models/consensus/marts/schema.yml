version: 2
models:

- name: api_consensus_attestations_daily
  description: The api_consensus_attestations_daily model provides a daily summary of consensus attestations, capturing key metrics for monitoring and analysis of attestation activity over time.
  columns:

  - name: date
    description: The specific calendar date for the recorded attestation data.
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: inclusion_delay
    description: The number of blocks or time units between the attestation event and its inclusion in the blockchain.
    data_type: UInt64

  - name: cnt
    description: The total count of attestations recorded on the given date with the specified inclusion delay.
    data_type: UInt64
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
