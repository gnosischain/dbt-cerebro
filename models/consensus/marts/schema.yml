- name: api_consensus_entry_queue_daily
  description: The api_consensus_entry_queue_daily model provides daily aggregated statistics on the validator entry queue, enabling analysis of queue size and distribution over time for consensus monitoring.
  columns:

  - name: date
    description: The specific calendar date for the recorded metrics.
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: validator_count
    description: Number of validators active on the given date.
    data_type: UInt64

  - name: q05
    description: 5th percentile of the entry queue size, indicating the lower bound of queue length distribution.
    data_type: Float64

  - name: q10
    description: 10th percentile of the entry queue size, representing the lower tail of the distribution.
    data_type: Float64

  - name: q25
    description: 25th percentile (first quartile) of the queue size distribution.
    data_type: Float64

  - name: q50
    description: Median queue size, representing the middle value of the distribution.
    data_type: Float64

  - name: q75
    description: 75th percentile (third quartile) of the queue size, indicating the upper quartile.
    data_type: Float64

  - name: q90
    description: 90th percentile of the queue size, showing the upper tail of the distribution.
    data_type: Float64

  - name: q95
    description: 95th percentile of the queue size, highlighting the extreme upper values.
    data_type: Float64

  - name: mean
    description: Average queue size across all validators for the given date.
    data_type: Float64
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
