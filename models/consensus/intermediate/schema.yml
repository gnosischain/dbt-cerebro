    EVM address from each validator's withdrawal_credentials (concatenation of '0x'
    with the trailing 20 bytes via substring(withdrawal_credentials, 27, 40)). Saves
    downstream queries the substring extraction. Only rows with a 0x01-type credential
    expose a withdrawal_address — older 0x00-type BLS credentials return NULL.
  meta:
    owner: consensus_team
    authoritative: false
  columns:
  - name: validator_index
    description: Unique numerical identifier assigned to each validator.
    data_type: UInt32
    tests:
    - unique
    - not_null
  - name: pubkey
    description: BLS public key for the validator.
    data_type: String
  - name: withdrawal_credentials
    description: Raw 32-byte withdrawal credentials from the deposit contract.
    data_type: String
  - name: withdrawal_address
    description: |
      0x-prefixed EVM address derived from the trailing 20 bytes of
      withdrawal_credentials (only populated for 0x01-type credentials;
      NULL for legacy 0x00 BLS credentials).
    data_type: Nullable(String)
