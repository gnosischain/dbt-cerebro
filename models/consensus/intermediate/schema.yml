- name: int_consensus_validators_explorer_apy_dist_daily
  description: |
    Per-(date, withdrawal_credentials) cross-sectional APY distribution plus rolling 7d/30d
    medians of the credential's balance-weighted daily APY. Built on
    int_consensus_validators_income_daily INNER JOIN fct_consensus_validators_status_latest
    with the exit-date guard from fct_consensus_validators_explorer_daily.

    Two smoothings coexist:
      * Cross-sectional quantiles (q05_apy..q95_apy) across the validators in the credential's
        set — meaningful for multi-validator credentials, collapsed for solo credentials.
      * Time-series rolling median (apy_rolling_7d_median, apy_rolling_30d_median) on the
        credential's own daily weighted-mean APY — the primary line the dashboard plots for
        solo credentials where the raw daily APY is jittery.

    Incremental monthly with a 30-day lookback so the rolling median at partition boundaries
    is seeded correctly. Order (withdrawal_credentials, date) so the API filter prunes via
    the primary index.
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2021-12-01"
      batch_months: 1
  columns:
  - name: date
    data_type: DateTime
  - name: withdrawal_credentials
    data_type: String
  - name: q05_apy
    data_type: Float64
  - name: q10_apy
    data_type: Float64
  - name: q25_apy
    data_type: Float64
  - name: q50_apy
    description: Cross-sectional median APY across validators under this credential.
    data_type: Float64
  - name: q75_apy
    data_type: Float64
  - name: q90_apy
    data_type: Float64
  - name: q95_apy
    data_type: Float64
  - name: apy_weighted
    description: Balance-weighted mean APY for the credential on the date.
    data_type: Float64
  - name: validator_count_active
    description: Distinct validators under this credential contributing to the day's stats.
    data_type: UInt64
  - name: apy_rolling_7d_median
    description: 7-day trailing median of apy_weighted per credential. Primary smoothing line for solo credentials.
    data_type: Float64
    tests:
    - elementary.column_anomalies:
        column_anomalies: [min, max, average]
