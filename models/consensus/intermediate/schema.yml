        time_bucket: {period: day, count: 1}
        training_period: {period: day, count: 56}
        anomaly_sensitivity: 3
        severity: warn
        tags: [elementary]
  - name: apy_rolling_30d_median
    description: 30-day trailing median of apy_weighted per credential.
    data_type: Float64
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns: [date, withdrawal_credentials]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"

- name: int_consensus_validators_income_daily
  description: |
    Daily per-(date, validator_index) consensus income fact, including exited and
    zero-balance validators. Amount columns in GNO. Identifier columns (pubkey,
    withdrawal_credentials, withdrawal_address, status) are joined at the API layer from
    int_consensus_validators_snapshots_daily to keep this table memory-efficient.

    Two deposit numbers are emitted because of the post-Pectra accounting problem:
    pre-Pectra, beacon-chain deposits credited the same day they were requested. Post
    EIP-7002 / EIP-7251 (MaxEB) a single execution-request can ask for up to 2048 GNO
    for one validator, but the beacon chain credits it gradually through the
    pending_deposits queue (churn-bounded), so a 1767-GNO request can land as ~0.01 GNO
    on the request day and ~1 GNO/day for weeks afterward. The naive
    income = balance_delta - reported_deposit + withdrawals - cons_net then produces
    catastrophic per-day errors (~-1767 GNO on request day, large false positives on
    drain days).

    Fix: spec-bounded effective-credit. The consensus spec gives a closed-form maximum
    reward per epoch per validator,
        base_reward_per_epoch = effective_balance_gwei * BASE_REWARD_FACTOR
                              / sqrt(total_active_effective_balance_gwei)
    With Gnosis constants BASE_REWARD_FACTOR=25, SLOTS_PER_EPOCH=16, SECONDS_PER_SLOT=5
    (so EPOCHS_PER_DAY = 86400 / (5*16) = 1080) and a 3x safety multiplier for
    attestation + proposer + sync duties, we get
        expected_reward_cap = 3 * effective_balance_gwei * 25 * 1080
                            / sqrt(network_active_effective_balance_gwei)        (in gwei)
        effective_deposits_credited = GREATEST(
            0,
            balance_delta + withdrawals - cons_net - expected_reward_cap
        )
        consensus_income_amount_gno = balance_delta
                                    - effective_deposits_credited
                                    + withdrawals - cons_net
    This caps daily income at the spec maximum, keeps cumulative balance-flow exact,
    leaves queued-but-not-yet-credited deposits in reported_deposit until the balance
    actually moves, and scales with both validator size and total network stake.
    Same base_reward * sqrt(total_stake)^-1 relation used by beaconcha.in's calculator,
    applied here as a validity bound on observed income rather than a forward projection.

    NOT additionally capped at reported_deposit: post-Pectra, on a queue-drain day the
    reported amount is 0 but the balance jumps by hundreds of GNO; capping at reported
    would falsely attribute the jump to income. The spec cap alone is sufficient.
    Edge cases handled: pure reward day, reported-but-not-credited, queue-drain, slashing,
    and consolidation source/target all reconcile correctly.

    Cumulatives use effective credits (cumulative_deposits_gno) for total_income_estimated_gno;
    cumulative_reported_deposits_gno is kept alongside for audit. Incremental strategy
    follows int_execution_tokens_balances_native_daily — daily deltas + balance reads
    are pulled only from the incremental window, with prior-state (last balance and
    cumulatives at the previous partition boundary) loaded from {{ this }} so lifetime
    cumulatives stay correct without scanning history. balance_prev_gno uses lagInFrame
    within the window, falling back to prev_state at the partition boundary.

    Known upstream limitation: consensus.validators crawler outages (observed
    2025-12-10 .. 2025-12-28, 20 fully-empty days) cause withdrawals/deposits/
    consolidations during the gap to have no matching snapshot, producing a large
    one-day negative income on the resume day for affected validators. Documented
    here so consumers know those single-day outliers are upstream-data, not formula.
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2021-12-01"
      batch_months: 1
      stages:
      - name: validators_0_100k
        start_date: "2021-12-01"
        vars:
          validator_index_start: 0
          validator_index_end: 100000
      - name: validators_100k_200k
        start_date: "2022-06-01"
        vars:
          validator_index_start: 100000
          validator_index_end: 200000
      - name: validators_200k_300k
        start_date: "2024-01-01"
        vars:
          validator_index_start: 200000
          validator_index_end: 300000
      - name: validators_300k_400k
        start_date: "2024-08-01"
        vars:
          validator_index_start: 300000
          validator_index_end: 400000
      - name: validators_400k_500k
        start_date: "2024-11-01"
        vars:
          validator_index_start: 400000
          validator_index_end: 500000
      - name: validators_500k_600k
        start_date: "2025-02-01"
        vars:
          validator_index_start: 500000
          validator_index_end: 600000
  columns:
  - name: date
    data_type: DateTime64
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: validator_index
    data_type: UInt64
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: balance_gno
    description: End-of-day validator balance in GNO.
    data_type: Float64
  - name: balance_prev_gno
    description: Previous-day balance in GNO (lagInFrame by 1 within validator_index).
    data_type: Float64
  - name: effective_balance_gno
    data_type: Float64
  - name: deposits_amount_gno
    description: |
      RAW reported deposit amount for the date (execution_request and beacon deposit
      amounts summed per validator). Post-Pectra this is a REQUEST amount — the beacon
      chain credits it gradually via the churn-limited queue, so this column may be
      far larger than what actually hit the validator's balance that day. Use
      effective_deposits_credited_gno for income-accounting purposes; use this column
      for "when was a deposit requested" audit/display.
    data_type: Float64
  - name: effective_deposits_credited_gno
    description: |
      Spec-bounded actual deposit credit for the date (in GNO). Computed as
      GREATEST(0, balance_delta + withdrawals - cons_net - expected_reward_cap) so
      that it captures queue-drain days (balance jumps without a same-day request)
      while ignoring request-but-not-yet-credited days. Sum over time equals the
      true cumulative deposit principal for the validator.
    data_type: Float64
  - name: expected_reward_cap_gno
    description: |
      Consensus-spec upper bound on this validator's possible daily reward, in GNO.
      3 × effective_balance_gwei × BASE_REWARD_FACTOR (25) × EPOCHS_PER_DAY (1080)
      ÷ √(network_effective_balance_gwei) ÷ 1e9. Anything above this in daily balance
      growth is attributed to effective_deposits_credited_gno, not income. Useful for
      debugging and for constructing validator-balance-weighted APY.
    data_type: Float64
  - name: deposits_count
    data_type: UInt64
  - name: withdrawals_amount_gno
    data_type: Float64
  - name: withdrawals_count
    data_type: UInt64
  - name: consolidation_inflow_gno
    description: Consolidation amount received (target role) on the date, in GNO.
    data_type: Float64
  - name: consolidation_outflow_gno
    description: Consolidation amount transferred out (source role) on the date, in GNO.
    data_type: Float64
  - name: consensus_income_amount_gno
    description: |
      Consensus income on the date, in GNO. Computed as
      balance_delta − effective_deposits_credited_gno + withdrawals_amount_gno
      − consolidation_inflow_gno + consolidation_outflow_gno.
      Capped above by the consensus-spec expected_reward_cap_gno (plus 3× safety for
      attestation + proposer + sync duties); can be negative on slashing events.
    data_type: Float64
  - name: daily_rate
    description: consensus_income_amount_gno / NULLIF(balance_prev_gno + effective_deposits_credited_gno + consolidation_inflow_gno, 0).
    data_type: Nullable(Float64)
  - name: apy
    description: Annualized percent yield computed from daily_rate.
    data_type: Float64
  - name: cumulative_deposits_gno
    description: |
      Running sum of effective_deposits_credited_gno for this validator. Used by
      total_income_estimated_gno and by the Validator Explorer's cumulative-flow charts.
    data_type: Float64
  - name: cumulative_reported_deposits_gno
    description: |
      Running sum of raw deposits_amount_gno (REPORTED requests) for this validator —
      may exceed cumulative_deposits_gno while queued requests are still draining.
      Kept for audit / display; NOT used in total_income_estimated_gno.
    data_type: Float64
  - name: cumulative_withdrawals_gno
    data_type: Float64
  - name: cumulative_consolidation_inflow_gno
    data_type: Float64
  - name: cumulative_consolidation_outflow_gno
    data_type: Float64
  - name: total_income_estimated_gno
    description: balance_gno + cumulative_withdrawals_gno − cumulative_deposits_gno (effective) − cumulative_consolidation_inflow_gno + cumulative_consolidation_outflow_gno. In GNO.
    data_type: Float64
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns: [date, validator_index]
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
