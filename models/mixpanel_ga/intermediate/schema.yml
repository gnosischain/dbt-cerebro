                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: referrer_domain
        description: Referring domain ("direct" if none).
        data_type: String
      - name: initial_referrer_domain
        description: The first-ever referring domain for events in this daily grain.
        data_type: String
      - name: event_count
        description: Number of events.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count.
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: int_mixpanel_ga_pages_daily
    description: >
      Daily event counts by page path and domain.
    meta:
      owner: analytics_team
      authoritative: false
      full_refresh:
