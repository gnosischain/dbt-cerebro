- name: int_mixpanel_ga_modals_daily
  description: >
    Daily open counts for each modal/bottom-sheet component in Gnosis App.
    Sourced from events where event_category = 'modal' (Open Modal or
    Open Bottom Sheet) with a non-empty bottom_sheet property.

    Known bottom_sheet values: PasskeyStepsModal (passkey onboarding steps),
    ModalJoin (join Circles), SelectSwapAsset (swap token picker),
    ModalReceive (receive funds QR), ModalSend (send funds flow),
    CardActivationStepsModal (Gnosis Pay card activation).

    Production-only (app.gnosis.io).
  meta:
    owner: analytics_team
    authoritative: false
    full_refresh:
      start_date: "2025-10-01"
      batch_months: 1
  columns:
  - name: date
    description: Calendar date (UTC).
    data_type: Date
    tests:
    - not_null:
        config:
          where: >
            {% if var('test_full_refresh', false) %}1=1
            {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
  - name: bottom_sheet
    description: Modal or bottom-sheet component name from the Gnosis App front-end.
    data_type: String
  - name: open_count
    description: Number of times this modal was opened on this date.
    data_type: UInt64
  - name: unique_users
    description: Distinct user_id_hash count that opened this modal.
    data_type: UInt64
  - name: unique_devices
    description: Distinct device_id_hash count that opened this modal.
    data_type: UInt64
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - date
      - bottom_sheet
      config:
        where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"

- name: int_mixpanel_ga_user_lifecycle
  description: |
    All-time per-user lifecycle metrics for Gnosis App (app.gnosis.io)
    production traffic. One row per user_id_hash. Full rebuild on every
    run (materialized=table); lifetime aggregates cannot be computed
    incrementally without reading all history anyway.

    Captures: identification status (wallet vs anonymous), active
    lifespan, feature engagement (passkey logins, Circles mints,
    marketplace purchases, swap actions), and event category breakdowns.

    is_identified=1 means the user connected a wallet at least once
    (Mixpanel distinct_id is a wallet address, not a $device:uuid).
  meta:
    owner: analytics_team
    authoritative: false
  columns:
  - name: user_id_hash
    description: Privacy-safe sipHash64 of Mixpanel distinct_id.
    data_type: UInt64
  - name: is_identified
    description: 1 if user ever connected a wallet (distinct_id not starting with '$device:').
    data_type: UInt8
  - name: first_seen_date
    description: Date of the user's first recorded event.
    data_type: Date
  - name: last_seen_date
    description: Date of the user's most recent recorded event.
    data_type: Date
  - name: lifespan_days
    description: Days between first_seen_date and last_seen_date.
    data_type: UInt32
  - name: days_active
    description: Distinct days with at least one event.
    data_type: UInt64
  - name: total_events
    description: Total event count across all time.
    data_type: UInt64
  - name: distinct_event_types
    description: Number of distinct event names ever triggered.
    data_type: UInt64
  - name: distinct_pages_visited
    description: Number of distinct page paths ever visited.
    data_type: UInt64
  - name: passkey_login_count
    description: Number of Login with Passkey events.
    data_type: UInt64
  - name: circles_mint_count
    description: Number of Success - Circles mint events.
    data_type: UInt64
  - name: marketplace_purchase_count
    description: Number of Marketplace Purchase events.
    data_type: UInt64
  - name: modal_open_count
    description: Number of modal open events (Open Modal or Open Bottom Sheet).
    data_type: UInt64
  - name: swap_action_count
    description: Number of autocaptured Swap button clicks.
    data_type: UInt64
  - name: pageview_count
    description: Number of $mp_web_page_view events.
    data_type: UInt64
  - name: action_count
    description: Number of autocaptured action events.
    data_type: UInt64
  - name: feature_count
    description: Number of explicit feature events (Circles, Marketplace, QR).
    data_type: UInt64
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]

- name: int_execution_gnosis_app_events_mixpanel_unified
  description: |
    Long-form Mixpanel event log filtered to identified, production
    traffic and inner-joined to int_execution_gnosis_app_user_identity_bridge.
    Only events from users in the GA cohort flow through; anonymous
    Mixpanel visitors and non-GA identified users are excluded.
    user_id_hash from Mixpanel is renamed to user_pseudonym; the join on
    equality works because both sides use the same pseudonymize_address
    macro and salt.
  config:
    contract:
      enforced: false
  columns:
  - name: event_ts
    data_type: DateTime
    tests: [not_null]
  - name: event_date
    data_type: Date
    tests: [not_null]
  - name: user_pseudonym
    data_type: UInt64
    tests: [not_null]
  - name: event_source
    data_type: LowCardinality(String)
  - name: event_kind
    data_type: LowCardinality(String)
  - name: event_subkind
    data_type: LowCardinality(String)
  - name: page_path
    data_type: Nullable(String)
  - name: bottom_sheet
    data_type: Nullable(String)
  meta:
    owner: analytics_team
  tests:
  - elementary.schema_changes:
      severity: warn
      tags: [elementary]
- name: int_mixpanel_ga_user_acquisition
  description: |
    INTERNAL ONLY. Per-user (user_id_hash) marketing attribution. Collapses
    each identified production user's sparse UTM hits into one stable
    first-touch and last-touch campaign/source/medium, derived by ordering on
    event_time (no initial_utm_* super-properties exist in the raw data).
    Missing values default to 'unknown'. Carries user_id_hash — never exposed
    to cerebro-api (inherited exclusion) or MCP (expose_to_mcp: false).
  meta:
    owner: analytics_team
    privacy_tier: internal
    expose_to_mcp: false
    api:
      exclude_from_api: true
  columns:
  - name: user_id_hash
    description: Mixpanel user pseudonym (UInt64). Same hash space as int_execution_gpay_safe_identities.user_pseudonym.
    data_type: UInt64
  - name: first_touch_campaign
    description: Earliest non-empty utm_campaign for the user (query string stripped), 'unknown' if none.
    data_type: String
  - name: last_touch_campaign
    description: Latest non-empty utm_campaign for the user (query string stripped), 'unknown' if none.
    data_type: String
  - name: first_touch_source
    description: Earliest non-empty utm_source for the user, 'unknown' if none.
    data_type: String
  - name: last_touch_source
    description: Latest non-empty utm_source for the user, 'unknown' if none.
    data_type: String
  - name: first_touch_medium
    description: Earliest non-empty utm_medium for the user, 'unknown' if none.
    data_type: String
  - name: last_touch_medium
    description: Latest non-empty utm_medium for the user, 'unknown' if none.
    data_type: String
  - name: first_seen_at
    description: Earliest event_time observed for the user.
    data_type: DateTime

- name: int_mixpanel_ga_gpay_first_events
  description: |
    INTERNAL ONLY. One row per Gnosis Pay account (identity_role=initial_owner)
    per first-event type. event_type is 'funded' (first gpay_funded inflow) or
    'first_payment' (first gpay_payment).

    UTM is resolved via two paths, GA-controller wins: for app-onboarded Safes
    the initial_owner that signed Safe setup is the Cometh relayer (never matches
    Mixpanel), so we prefer the campaign of the Gnosis App user enabled on the
    Safe's Delay module (int_execution_gnosis_app_gpay_wallets.first_ga_owner_address,
    pseudonymized), falling back to the direct initial_owner pseudonym match,
    then 'unknown'. Only the campaign assignment changes; the account count per
    event_type is unchanged. Accounts with no signal get 'unknown' so totals
    reconcile to the full GP funnel. Carries user_pseudonym — never exposed to
    cerebro-api or MCP.
  meta:
    owner: analytics_team
    privacy_tier: internal
    expose_to_mcp: false
    api:
      exclude_from_api: true
  columns:
  - name: event_type
    description: "'funded' (first Safe inflow) or 'first_payment' (first card Payment)."
    data_type: String
  - name: first_date
    description: Date of the account's first event of this type.
    data_type: Date
  - name: user_pseudonym
    description: Gnosis Pay initial_owner pseudonym (UInt64), same hash space as Mixpanel user_id_hash.
    data_type: UInt64
  - name: first_touch_campaign
    description: Account's first-touch utm_campaign (GA controller preferred, else initial_owner), 'unknown' if no signal.
    data_type: String
  - name: last_touch_campaign
    description: Account's last-touch utm_campaign (GA controller preferred, else initial_owner), 'unknown' if no signal.
    data_type: String
  - name: first_touch_attribution_path
    description: "INTERNAL audit: which identity supplied first_touch_campaign — 'ga_controller' (via App<>GP link), 'initial_owner' (direct match), or 'unknown'. Not propagated to the weekly mart or any api_ view."
    data_type: String
  - name: last_touch_attribution_path
    description: "INTERNAL audit: which identity supplied last_touch_campaign — 'ga_controller', 'initial_owner', or 'unknown'. Resolves independently of first_touch. Not propagated to the weekly mart or any api_ view."
    data_type: String

- name: int_mixpanel_ga_gnosis_app_first_events
  description: |
    INTERNAL ONLY. One row per Gnosis App account (user_pseudonym) per
    first-conversion type, with the account's Mixpanel UTM attribution
    attached via user_pseudonym == user_id_hash. conversion_kind is one of
    topup / swap_filled / token_offer_claim / marketplace_buy. Unlike the GP
    side, App conversions match the Mixpanel identified-user set 70-83%.
    Accounts with no Mixpanel match get 'unknown' campaigns. Carries
    user_pseudonym — never exposed to cerebro-api or MCP.
  meta:
    owner: analytics_team
    privacy_tier: internal
    expose_to_mcp: false
    api:
      exclude_from_api: true
  columns:
  - name: conversion_kind
    description: "First-conversion type: topup, swap_filled, token_offer_claim, or marketplace_buy."
    data_type: String
  - name: first_date
    description: Date of the account's first conversion of this kind.
    data_type: Date
  - name: user_pseudonym
    description: Gnosis App account pseudonym (UInt64), same hash space as Mixpanel user_id_hash.
    data_type: UInt64
  - name: first_touch_campaign
    description: Account's first-touch utm_campaign from Mixpanel, 'unknown' if unmatched.
    data_type: String
  - name: last_touch_campaign
    description: Account's last-touch utm_campaign from Mixpanel, 'unknown' if unmatched.
    data_type: String
