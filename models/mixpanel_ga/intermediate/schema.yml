  - name: int_mixpanel_ga_tech_daily
    description: >
      Daily event counts by browser, OS, and device type.
    meta:
      owner: analytics_team
      authoritative: false
      full_refresh:
        start_date: "2025-10-01"
        batch_months: 1
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
        tests:
          - not_null:
              config:
                where: >
                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: browser
        description: Browser name.
        data_type: String
      - name: os
        description: Operating system.
        data_type: String
      - name: device_type
        description: Device type.
        data_type: String
      - name: event_count
        description: Number of events.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count.
        data_type: UInt64
      - name: unique_devices
        description: Distinct device_id_hash count.
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
