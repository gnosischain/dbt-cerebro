version: 2

models:
  - name: int_mixpanel_ga_events_daily
    description: >
      Daily event counts by event_name and event_category for Gnosis App
      (app.gnosis.io) production traffic only.  Tracks total events, unique
      users, unique devices, and autocapture ratio per event type per day.

      event_category groups events into: pageview (automatic $mp_web_page_view),
      modal (Open Modal / Open Bottom Sheet), login (Login with Passkey),
      feature (Success - Circles mint, Marketplace Purchase, QR Scanner events),
      navigation (back/Back/Close ariaLabel clicks), system ($ prefix events),
      action (other autocaptured interactions), other.

      Deploy previews, localhost, and kitchen.app.gnosis.io are excluded.
    meta:
      owner: analytics_team
      authoritative: false
      full_refresh:
        start_date: "2025-10-01"
        batch_months: 1
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
        tests:
          - not_null:
              config:
                where: >
                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: event_name
        description: Mixpanel event name (e.g. $mp_web_page_view, Login with Passkey, Swap).
        data_type: String
      - name: event_category
        description: >
          Derived category for the event name. One of: pageview, modal, login,
          feature, navigation, system, action, other.
          Defined in macros/mixpanel_ga_event_category.sql.
        data_type: String
      - name: event_count
        description: Number of events.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count.
        data_type: UInt64
      - name: unique_devices
        description: Distinct device_id_hash count.
        data_type: UInt64
      - name: autocapture_ratio
        description: Fraction of events that are autocaptured (0.0-1.0).
        data_type: Float64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]
      - elementary.volume_anomalies:
          timestamp_column: date
          sensitivity: 3
          tags: [elementary]

  - name: int_mixpanel_ga_users_daily
    description: >
      Per-user daily activity summary for Gnosis App (app.gnosis.io) production
      traffic.  One row per (date, user_id_hash).  Enables exact DAU computation,
      new-user detection, and wallet identification rate tracking.

      is_identified=1 means the user connected a wallet address in that session
      (distinct_id does NOT start with '$device:').  Anonymous users browse via
      injected device IDs.
    meta:
      owner: analytics_team
      authoritative: false
      full_refresh:
        start_date: "2025-10-01"
        batch_months: 1
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
        tests:
          - not_null:
              config:
                where: >
                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: user_id_hash
        description: Privacy-safe sipHash64 of Mixpanel distinct_id.
        data_type: UInt64
      - name: event_count
        description: Events fired by this user on this date.
        data_type: UInt64
      - name: distinct_event_types
        description: Distinct event names for this user on this date.
        data_type: UInt64
      - name: distinct_pages
        description: Distinct page paths visited by this user on this date.
        data_type: UInt64
      - name: first_event_time
        description: Earliest event timestamp on this date for this user.
        data_type: DateTime
      - name: last_event_time
        description: Latest event timestamp on this date for this user.
        data_type: DateTime
      - name: is_identified
        description: >
          1 if the user had at least one event with a wallet-identified session
          (distinct_id does not start with '$device:'); 0 if fully anonymous.
        data_type: UInt8
      - name: unique_devices
        description: Distinct device_id_hash count for this user on this date.
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: int_mixpanel_ga_traffic_daily
    description: >
      Daily event counts by referring domain.
    meta:
      owner: analytics_team
      authoritative: false
      full_refresh:
        start_date: "2025-10-01"
