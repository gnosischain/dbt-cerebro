  - name: int_mixpanel_ga_usage_patterns_daily
    description: >
      Daily event counts by hour of day and day of week (UTC).
      Enables temporal usage-pattern analysis.
    meta:
      owner: analytics_team
      authoritative: false
      full_refresh:
        start_date: "2025-10-01"
        batch_months: 1
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
        tests:
          - not_null:
              config:
                where: >
                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: hour_of_day
        description: Hour of day (0-23 UTC).
        data_type: UInt8
      - name: day_of_week
        description: ISO day of week (1=Mon, 7=Sun).
        data_type: UInt8
      - name: event_count
        description: Number of events.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count.
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: int_mixpanel_ga_modals_daily
    description: >
      Daily open counts for each modal/bottom-sheet component in Gnosis App.
      Sourced from events where event_category = 'modal' (Open Modal or
      Open Bottom Sheet) with a non-empty bottom_sheet property.

      Known bottom_sheet values: PasskeyStepsModal (passkey onboarding steps),
      ModalJoin (join Circles), SelectSwapAsset (swap token picker),
      ModalReceive (receive funds QR), ModalSend (send funds flow),
      CardActivationStepsModal (Gnosis Pay card activation).

      Production-only (app.gnosis.io).
    meta:
      owner: analytics_team
      authoritative: false
      full_refresh:
        start_date: "2025-10-01"
        batch_months: 1
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
        tests:
          - not_null:
              config:
                where: >
                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: bottom_sheet
        description: Modal or bottom-sheet component name from the Gnosis App front-end.
        data_type: String
      - name: open_count
        description: Number of times this modal was opened on this date.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count that opened this modal.
        data_type: UInt64
      - name: unique_devices
        description: Distinct device_id_hash count that opened this modal.
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: int_mixpanel_ga_user_lifecycle
    description: |
      All-time per-user lifecycle metrics for Gnosis App (app.gnosis.io)
      production traffic. One row per user_id_hash. Full rebuild on every
      run (materialized=table); lifetime aggregates cannot be computed
      incrementally without reading all history anyway.

      Captures: identification status (wallet vs anonymous), active
      lifespan, feature engagement (passkey logins, Circles mints,
      marketplace purchases, swap actions), and event category breakdowns.

      is_identified=1 means the user connected a wallet at least once
      (Mixpanel distinct_id is a wallet address, not a $device:uuid).
    meta:
      owner: analytics_team
      authoritative: false
    columns:
      - name: user_id_hash
        description: Privacy-safe sipHash64 of Mixpanel distinct_id.
        data_type: UInt64
      - name: is_identified
        description: 1 if user ever connected a wallet (distinct_id not starting with '$device:').
        data_type: UInt8
      - name: first_seen_date
        description: Date of the user's first recorded event.
        data_type: Date
      - name: last_seen_date
        description: Date of the user's most recent recorded event.
        data_type: Date
      - name: lifespan_days
        description: Days between first_seen_date and last_seen_date.
        data_type: UInt32
      - name: days_active
        description: Distinct days with at least one event.
        data_type: UInt64
      - name: total_events
        description: Total event count across all time.
        data_type: UInt64
      - name: distinct_event_types
        description: Number of distinct event names ever triggered.
        data_type: UInt64
      - name: distinct_pages_visited
        description: Number of distinct page paths ever visited.
        data_type: UInt64
      - name: passkey_login_count
        description: Number of Login with Passkey events.
        data_type: UInt64
      - name: circles_mint_count
        description: Number of Success - Circles mint events.
        data_type: UInt64
      - name: marketplace_purchase_count
        description: Number of Marketplace Purchase events.
        data_type: UInt64
      - name: modal_open_count
        description: Number of modal open events (Open Modal or Open Bottom Sheet).
        data_type: UInt64
      - name: swap_action_count
        description: Number of autocaptured Swap button clicks.
        data_type: UInt64
      - name: pageview_count
        description: Number of $mp_web_page_view events.
        data_type: UInt64
      - name: action_count
        description: Number of autocaptured action events.
        data_type: UInt64
      - name: feature_count
        description: Number of explicit feature events (Circles, Marketplace, QR).
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]
