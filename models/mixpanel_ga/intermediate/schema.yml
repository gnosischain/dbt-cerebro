                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: current_domain
        description: Domain serving the page.
        data_type: String
      - name: page_path
        description: URL path (no query params).
        data_type: String
      - name: event_count
        description: Number of events.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count.
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: int_mixpanel_ga_geo_daily
