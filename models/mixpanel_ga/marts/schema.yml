  - name: fct_mixpanel_ga_campaign_referrals
    description: >
      Campaign REFERRAL composition (state-based snapshot) — of each
      first-touch campaign's identified users, how many became Circles inviters
      and how many people they brought in. Two scopes mirroring
      fct_execution_gnosis_app_gt_referrals (REF-D01): earned (GA-native
      paid-reward ledger) and full_graph (every accepted invite,
      avatar.invited_by — a ~2.2x superset). invites_* count DISTINCT invitees,
      not ledger edges. Inviter addresses join user_id_hash via the shared
      salted pseudonym (identified Mixpanel distinct_id == on-chain address) —
      no raw address materializes. Outcome-based: an inviter only counts once
      an invite is ACCEPTED on-chain, so counts run LOWER than Mixpanel-side
      "inviters" tiles that count invite-link sharing (Growth dashboard
      'referral': 152 sharers vs 114 full-graph accepted inviters, 2026-07).
      K-anonymity: campaigns with < 5 all-time signups bucketed into
      '_small_campaigns'. Aggregate-only output.
    meta:
      owner: analytics_team
      privacy_tier: mixpanel
      api:
        exclude_from_api: true
    columns:
      - name: utm_campaign
        description: First-touch marketing campaign ('_small_campaigns' if < 5 signups; 'unknown' if unattributed).
        data_type: String
      - name: utm_source
        description: First-touch UTM source.
        data_type: String
      - name: utm_medium
        description: First-touch UTM medium.
        data_type: String
      - name: signups
        description: Distinct identified users with this first-touch campaign.
        data_type: UInt64
      - name: inviters_earned
        description: Signups appearing as inviter in the earned-reward ledger.
        data_type: UInt64
      - name: inviter_pct_earned
        description: inviters_earned / signups * 100. Ratio — do NOT sum.
        data_type: Float64
      - name: invites_earned
        description: Distinct invitees credited to this campaign's inviters (earned scope).
        data_type: UInt64
      - name: invites_per_inviter_earned
        description: invites_earned / inviters_earned. Ratio — do NOT sum.
        data_type: Float64
      - name: inviters_full_graph
        description: Signups appearing as inviter in the full invite graph (avatar.invited_by).
        data_type: UInt64
      - name: inviter_pct_full_graph
        description: inviters_full_graph / signups * 100. Ratio — do NOT sum.
        data_type: Float64
      - name: invites_full_graph
        description: Distinct invitees in the full invite graph for this campaign's inviters.
        data_type: UInt64
      - name: invites_per_inviter_full_graph
        description: invites_full_graph / inviters_full_graph. Ratio — do NOT sum.
        data_type: Float64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

