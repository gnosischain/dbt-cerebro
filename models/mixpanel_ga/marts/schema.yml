  - name: api_mixpanel_ga_growth_campaign_weekly
    description: |
      GROWTH — campaign-attributable Gnosis App conversion funnel by UTM campaign x week.
      Aggregate-only projection of api_mixpanel_ga_gnosis_app_acquisition_weekly with the
      causal-validity treatment applied: first_touch only, clipped to week >= 2025-10-01
      (Mixpanel era), and the touch-precedence gate (a campaign is credited only when its
      touch preceded the conversion). conversion_kind in (topup, starts_referring,
      swap_filled, token_offer_claim); topup is the attributable "funded" proxy. Only ~4-7%
      of in-era app conversions carry a causally-valid campaign; the rest are
      utm_campaign='unknown'. Served via the metrics-dashboard x-api-key layer
      (blanket-excluded from cerebro-api).
