  - name: fct_mixpanel_ga_funnel_daily
    description: |
      Day-scoped funnel conversion metrics for Gnosis App (app.gnosis.io).
      Three funnels are computed per day using uniqExact(user_id_hash) as
      the unit of measurement, giving DAU-based conversion rates.

      Onboarding funnel:
        welcome_visitors      users on /welcome (entry point for new users)
        join_modal_opens      users who opened ModalJoin (next step)
        passkey_logins        users who completed Login with Passkey
        identified_users      users with a wallet-identified session (is_identified)

      Swap funnel:
        swap_page_visitors    users on any /swap/* page
        swap_asset_selectors  users who opened SelectSwapAsset modal
        swap_completions      users who clicked the Swap button (ariaLabel = 'Swap')

      Circles funnel:
        circles_visitors      users on /circles
        circles_mint_visitors users on /circles/mint
        circles_mints         users who triggered 'Success - Circles mint'

      All metrics are production-only (app.gnosis.io). Deploy previews and
      localhost traffic are excluded.
    meta:
      owner: analytics_team
      authoritative: false
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
        tests:
          - not_null:
              config:
                where: >
                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: welcome_visitors
        description: Distinct users who visited /welcome on this date.
        data_type: UInt64
      - name: join_modal_opens
        description: Distinct users who opened the ModalJoin bottom sheet.
        data_type: UInt64
      - name: passkey_logins
        description: Distinct users who completed Login with Passkey.
        data_type: UInt64
      - name: identified_users
        description: Distinct users with a wallet-identified session (is_identified=1).
        data_type: UInt64
      - name: onboarding_conversion_rate
        description: passkey_logins / greatest(welcome_visitors, 1).
        data_type: Float64
      - name: swap_page_visitors
        description: Distinct users on any /swap/* page.
        data_type: UInt64
      - name: swap_asset_selectors
        description: Distinct users who opened the SelectSwapAsset modal.
        data_type: UInt64
      - name: swap_completions
        description: Distinct users who clicked the Swap button (autocaptured ariaLabel).
        data_type: UInt64
      - name: swap_conversion_rate
        description: swap_completions / greatest(swap_page_visitors, 1).
        data_type: Float64
      - name: circles_visitors
        description: Distinct users on /circles.
        data_type: UInt64
      - name: circles_mint_visitors
        description: Distinct users on /circles/mint.
        data_type: UInt64
      - name: circles_mints
        description: Distinct users who triggered the Success - Circles mint event.
        data_type: UInt64
      - name: circles_conversion_rate
        description: circles_mints / greatest(circles_visitors, 1).
        data_type: Float64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]
      - elementary.volume_anomalies:
          timestamp_column: date
          sensitivity: 3
          tags: [elementary]

