  - name: fct_mixpanel_ga_client_conversions_weekly
    description: >
      Weekly progression of client-side (Mixpanel) conversions by UTM —
      card_order_started / card_ordered / crc_minted / circles_created etc.,
      seed-driven via seeds/mixpanel_conversion_events.csv (event-name steps)
      and seeds/mixpanel_conversion_pages.csv (page-reach proxies:
      card_ordered = /gnosis-pay/kyc; the order flow emits no completion
      event). Complements the on-chain steps so Growth's full funnel by UTM
      lives in one place. Tidy/long shape: attribution_model = first_touch |
      last_touch (stacked long — filter to one value before summing new_users,
      or counts double). Aggregate-only.
    meta:
      owner: analytics_team
      privacy_tier: mixpanel
      api:
        exclude_from_api: true
    columns:
      - name: week
        description: ISO week start (Monday, UTC).
        data_type: Date
      - name: metric
        description: >
          Client-side conversion (card_order_started, card_ordered, crc_minted,
          circles_created, ...). card_ordered is a page-reach proxy
          (/gnosis-pay/kyc), the others are Mixpanel events.
        data_type: String
      - name: attribution_model
        description: >
          UTM attribution window: 'first_touch' | 'last_touch'. Both windows are
          stacked long — ALWAYS filter to a single value before summing new_users.
        data_type: String
      - name: utm_campaign
        description: Marketing campaign, 'unknown' if unmatched.
        data_type: String
      - name: utm_source
        description: UTM source.
        data_type: String
      - name: utm_medium
