version: 2

models:
  - name: fct_mixpanel_ga_overview_daily
    description: >
      Daily KPI summary for Gnosis App (app.gnosis.io) web analytics from
      Mixpanel: total events, DAU, unique devices, new/cumulative users,
      event type counts, geographic and referrer diversity, autocapture
      vs custom split.
    meta:
      owner: analytics_team
      authoritative: false
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
        tests:
          - not_null:
              config:
                where: >
                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: total_events
        description: Total Mixpanel events on this date.
        data_type: UInt64
      - name: dau
        description: Daily active users (exact distinct user_id_hash count).
        data_type: UInt64
      - name: unique_devices
        description: Distinct device_id_hash count.
        data_type: UInt64
      - name: new_users
        description: Users whose first-ever event was on this date.
        data_type: UInt64
      - name: cumulative_users
        description: Running total of new_users.
        data_type: UInt64
      - name: distinct_event_types
        description: Number of distinct event names seen on this date.
        data_type: UInt64
      - name: distinct_countries
        description: Number of distinct countries with events on this date.
        data_type: UInt64
      - name: distinct_referrers
        description: Number of distinct non-direct referrer domains.
        data_type: UInt64
      - name: autocapture_events
        description: Estimated count of autocaptured events.
        data_type: Float64
      - name: custom_events
        description: Estimated count of custom (non-autocapture) events.
        data_type: Float64
      - name: avg_events_per_user
        description: Average events per active user.
        data_type: Float64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]
      - elementary.volume_anomalies:
          timestamp_column: date
          sensitivity: 3
          tags: [elementary]

  - name: fct_mixpanel_ga_gpay_crossdomain_daily
    description: |
      Daily rollup of Gnosis Pay ↔ Mixpanel matching with role-bucket and
      activity dimensions.

      Privacy boundary: every cross-domain join uses the keyed pseudonym
      from the pseudonymize_address macro, applied identically on both
      sides. Raw EOAs and Safe addresses never appear in this output.

      Methodology: a per-user identity bridge (matched_pairs) reads the
      precomputed (user_id_hash, gp_safe, matched_roles) tuples directly
      from fct_mixpanel_ga_gpay_users so the JOIN is not recomputed here.
      Same gp_safe → activity flags (delay_active_safes_7d,
      allowance_changed_safes_30d) are computed once and joined into both
      rollups. mp_user_flags rolls up role flags and activity flags to one
      row per Mixpanel user; mp_daily then computes per-day matched-user
      counts sliced by role bucket and activity flag, and gpay_daily
      contributes the on-chain DAU comparison.

      Implementation note: explicit AS aliases on the mp.* columns in the
      final SELECT are required. Both mp_daily and gpay_daily expose a
      `date` column, so ClickHouse keeps the qualified name `mp.date` in
      the output projection and the config's order_by=(date) would
      otherwise fail to resolve. The non-ambiguous columns get explicit
      aliases too as a defensive consistency pass.

      Headline metrics:
        mp_dau                — Mixpanel daily active users (production,
                                all identification states; anonymous
                                device users are counted but never match
                                the GP side).
        onchain_active_users  — distinct GP wallets with on-chain
                                activity that day, from
                                fct_execution_gpay_activity_daily.
        matched_users_any     — DAU users matched on ANY identity role
                                (initial_owner ∪ delegate ∪ safe_self).
        matched_by_*          — same DAU users sliced by which role
                                matched.
        users_with_delay_activity_7d
                              — matched users whose gp_safe queued at
                                least one TransactionAdded event in the
                                last 7 days.
        users_with_allowance_changes_30d
                              — matched users whose gp_safe had a
                                SetAllowance event in the last 30 days.

      Backwards-compat: the original `matched_users` and `match_rate_pct`
      columns are preserved (now equal to matched_users_any and the
      corresponding rate) so existing dashboards keep working.
    meta:
      owner: analytics_team
      authoritative: false
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
        tests:
          - not_null:
              config:
                where: >
                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: mp_dau
        description: Mixpanel daily active users.
        data_type: UInt64
      - name: onchain_active_users
        description: On-chain GPay active users (from fct_execution_gpay_activity_daily).
        data_type: UInt64
      - name: matched_users
        description: Backwards-compat alias for matched_users_any. Mixpanel users matched to a GP Safe via any of the three identity roles.
        data_type: UInt64
      - name: matched_users_any
        description: Mixpanel users matched to at least one GP Safe via any role (initial_owner ∪ delegate ∪ safe_self).
        data_type: UInt64
      - name: matched_by_initial_owner_users
        description: Mixpanel users matched via the SafeSetup initial owner identity (the EOA that owned the Safe before ownership was transferred to 0x...0002).
        data_type: UInt64
      - name: matched_by_delegate_users
        description: Mixpanel users matched via a Roles v2 spender delegate identity.
        data_type: UInt64
      - name: matched_by_safe_self_users
        description: Mixpanel users matched via the Safe address itself (smart-account identifier).
        data_type: UInt64
      - name: users_with_delay_activity_7d
        description: Matched users whose gp_safe queued at least one TransactionAdded event in the last 7 days.
        data_type: UInt64
      - name: users_with_allowance_changes_30d
        description: Matched users whose gp_safe had a SetAllowance event in the last 30 days.
        data_type: UInt64
      - name: match_rate_pct
        description: Percentage of Mixpanel DAU that are matched to GPay Safes via any role.
        data_type: Float64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: fct_mixpanel_ga_gnosis_app_users
    description: |
      Per-user fact for the Gnosis App sector with Mixpanel as a CHECK,
      not as a source of truth.

      Every row from int_execution_gnosis_app_user_identities appears
      here. matched_mp is a column that flags whether Mixpanel has at
      least one identified production event from the same pseudonym — it
      is NOT a join filter. The heuristic set is authoritative; Mixpanel
      coverage is diagnostic.

      This is the opposite of fct_mixpanel_ga_gpay_users (which uses
      INNER JOIN against the GP identity model because GP has a clean
      upstream membership label list). Both bridge patterns coexist by
      design.
    meta:
      owner: analytics_team
      authoritative: false
    columns:
      - name: user_pseudonym
        description: Gnosis App user pseudonym (UInt64). Same hash space as user_id_hash.
        data_type: UInt64
      - name: matched_mp
        description: 1 if Mixpanel has at least one identified production event from this pseudonym, 0 otherwise.
        data_type: UInt8
      - name: mp_user_id_hash
        description: Equal to user_pseudonym when matched_mp=1, NULL otherwise.
        data_type: Nullable(UInt64)
      - name: first_seen_at
        description: Earliest heuristic hit for this user.
        data_type: DateTime64(0, 'UTC')
      - name: last_seen_at
        description: Most recent heuristic hit for this user.
        data_type: DateTime64(0, 'UTC')
      - name: heuristic_kinds
        description: Distinct heuristic rule names this user has triggered.
        data_type: Array(String)
      - name: heuristic_hits
        description: Total heuristic events for this user.
        data_type: UInt64
      - name: n_distinct_heuristics
        description: Confidence proxy — number of distinct rules fired.
        data_type: UInt8
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: fct_mixpanel_ga_gnosis_app_daily
    description: |
      Daily-cumulative view of the Gnosis App sector.

      cumulative_users counts distinct addresses first-seen on or before
      each date. cumulative_mp_matched counts the subset of those that
      are also visible in Mixpanel. The coverage gap is
      (cumulative_users - cumulative_mp_matched) / cumulative_users.

      Per-heuristic daily address counts give visibility into which flow
      is driving sector growth on any given day.

      Implementation note: explicit AS aliases are required on the d.*
      columns in the final SELECT. Both daily_new and daily_kinds_pivot
      expose a `date` column, so ClickHouse keeps the qualified name
      `d.date` in the output projection and the config's order_by=(date)
      would otherwise fail to resolve. Same class of aliasing quirk as
      fct_mixpanel_ga_gpay_crossdomain_daily.
    meta:
      owner: analytics_team
      authoritative: false
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
        tests:
          - not_null:
              config:
                where: >
                  {% if var('test_full_refresh', false) %}1=1
                  {% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}
      - name: new_users
        description: Distinct addresses first-seen on this date.
        data_type: UInt64
      - name: cumulative_users
        description: Running total of distinct addresses since 2025-11-12.
        data_type: UInt64
      - name: cumulative_mp_matched
        description: Cumulative number of sector members visible in Mixpanel as of this date.
        data_type: UInt64
      - name: h_safe_invitation
        description: Daily count of addresses triggering the safe_invitation_module rule.
        data_type: UInt64
      - name: h_fee
        description: Daily count of addresses triggering the circles_fee rule (Gnosis App fee receiver, formerly Metri).
        data_type: UInt64
      - name: h_register_human
        description: Daily count of addresses triggering the circles_register_human rule.
        data_type: UInt64
      - name: h_invite_human
        description: Daily count of addresses triggering the circles_invite_human rule.
        data_type: UInt64
      - name: h_trust
        description: Daily count of addresses triggering the circles_trust rule.
        data_type: UInt64
      - name: h_profile_update
        description: Daily count of addresses triggering the circles_profile_update rule.
        data_type: UInt64
      - name: h_personal_mint
        description: Daily count of addresses triggering the circles_personal_mint rule (Cometh-relayed personal CRC mint).
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: fct_mixpanel_ga_gpay_users
    description: |
      Per-user fact joining Mixpanel identified users to Gnosis Pay Safes
      through the keyed-pseudonym identity bridge.

      One row per (user_id_hash, gp_safe) pair where the user matched on
      at least one of the three identity roles (initial_owner, delegate,
      safe_self). Denormalizes the per-Safe module topology, current daily
      limit, and recent delay activity onto each row so downstream segment
      queries don't need extra joins.

      Privacy invariant: every column representing a person is either
      user_id_hash (already pseudonymized in stg_mixpanel_ga__events) or a
      Safe address (smart account, treated as non-PII). No raw EOA appears.

      Implementation note: explicit AS aliases on the m.* columns in the
      final SELECT are required. ClickHouse keeps the qualified name
      `m.gp_safe` in the output projection whenever the bare name `gp_safe`
      is ambiguous across joined relations (modules_per_safe,
      allowance_per_safe, delay_30d, spends_30d all expose a `gp_safe`
      column), and the config's order_by=(user_id_hash, gp_safe) would
      then fail to resolve.
    meta:
      owner: analytics_team
      authoritative: false
    columns:
      - name: user_id_hash
        description: Mixpanel user pseudonym (UInt64). Same hash space as int_execution_gpay_safe_identities.user_pseudonym.
        data_type: UInt64
      - name: gp_safe
        description: The Gnosis Pay Safe this user matched against.
        data_type: String
      - name: matched_roles
        description: Array of identity roles that matched (subset of [initial_owner, delegate, safe_self]).
        data_type: Array(String)
      - name: enabled_modules
        description: Array of module types currently enabled on this Safe (typically [DelayModule, RolesModule, SpenderModule]).
        data_type: Array(String)
      - name: daily_limit
        description: Current Roles v2 allowance refill amount (the canonical daily limit). String to preserve uint128 precision.
        data_type: Nullable(String)
      - name: allowance_period_seconds
        description: Roles v2 allowance refill period in seconds (typically 86400).
        data_type: Nullable(String)
      - name: delay_txs_last_30d
        description: Number of TransactionAdded events queued by this Safe's Delay module in the trailing 30 days.
        data_type: UInt64
      - name: spends_last_30d
        description: Number of card-spend events (Spender module Spend events) for this Safe in the trailing 30 days.
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  # Mixpanel privacy policy (two tiers):
  #   cerebro-api : NONE of these api_mixpanel_ga_* views are exposed.
  #                 The `api_` prefix is a legacy naming convention.
  #                 Enforced via meta.api.exclude_from_api: true here
  #                 AND at dbt_project.yml level. Both must stay true.
  #   MCP / semantic layer : aggregate views are accessible. The only
  #                 model that exposes per-user identifiers is
  #                 api_mixpanel_ga_users_daily — it carries
  #                 user_id_hash per row and is marked
  #                 `expose_to_mcp: false` below. The cross-domain view
  #                 api_mixpanel_ga_gpay_crossdomain_daily looks
  #                 sensitive but exposes only aggregate counts (no
  #                 user_id_hash, no Safe address) and is MCP-safe.
  - name: api_mixpanel_ga_overview_daily
    description: |
      Not exposed via cerebro-api; accessible to the internal MCP / semantic layer. Pass-through view over
      fct_mixpanel_ga_overview_daily. One row per UTC calendar date with a
      headline KPI summary of Gnosis App (app.gnosis.io) web analytics
      sourced from Mixpanel: total events, DAU, unique devices, new/cumulative
      users, distinct event types, geographic and referrer diversity, the
      autocapture vs. custom event split, and average events per active user.
      Deploy previews, localhost, and kitchen.app.gnosis.io are filtered out
      upstream so this only reflects production traffic.

      Use case: drives the Gnosis App "overview" tab on the internal
      analytics dashboard. Date range filters apply.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
      - name: total_events
        description: Total Mixpanel events on this date (production traffic only).
        data_type: UInt64
      - name: dau
        description: Daily active users (exact distinct user_id_hash count).
        data_type: UInt64
      - name: unique_devices
        description: Distinct device_id_hash count.
        data_type: UInt64
      - name: new_users
        description: Users whose first-ever event was on this date.
        data_type: UInt64
      - name: cumulative_users
        description: Running total of new_users since the cohort start.
        data_type: UInt64
      - name: distinct_event_types
        description: Number of distinct event names seen on this date.
        data_type: UInt64
      - name: distinct_countries
        description: Number of distinct countries with events on this date.
        data_type: UInt64
      - name: distinct_referrers
        description: Number of distinct non-direct referrer domains.
        data_type: UInt64
      - name: autocapture_events
        description: Estimated count of autocaptured events (clicks/page views).
        data_type: Float64
      - name: custom_events
        description: Estimated count of explicit custom events (non-autocapture).
        data_type: Float64
      - name: avg_events_per_user
        description: Average events per active user (total_events / dau).
        data_type: Float64

  - name: api_mixpanel_ga_events_daily
    description: |
      Not exposed via cerebro-api; accessible to the internal MCP / semantic layer. Daily event counts by
      Mixpanel event_name and derived event_category for Gnosis App
      production traffic. Sourced from int_mixpanel_ga_events_daily.

      event_category is derived in macros/mixpanel_ga_event_category.sql
      and is one of: pageview (automatic $mp_web_page_view), modal (Open
      Modal / Open Bottom Sheet), login (Login with Passkey), feature
      (Success - Circles mint, Marketplace Purchase, QR Scanner), navigation
      (back/Close ariaLabel clicks), system ($ prefix events), action (other
      autocaptured interactions), other.

      Use case: per-event-type trend charts in the internal dashboard.
      Supports filters on event_name, event_category, and a date range.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
      - name: event_name
        description: Mixpanel event name (e.g. $mp_web_page_view, Login with Passkey, Swap).
        data_type: String
      - name: event_category
        description: Derived category — one of pageview, modal, login, feature, navigation, system, action, other.
        data_type: String
      - name: event_count
        description: Number of events of this name on this date.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count for this event on this date.
        data_type: UInt64
      - name: unique_devices
        description: Distinct device_id_hash count for this event on this date.
        data_type: UInt64
      - name: autocapture_ratio
        description: Fraction of events that are autocaptured (0.0-1.0).
        data_type: Float64

  - name: api_mixpanel_ga_users_daily
    description: |
      INTERNAL ONLY — blocked from BOTH cerebro-api AND MCP. Per-user daily
      activity summary for Gnosis App production traffic, keyed on
      (date, user_id_hash). Sourced from int_mixpanel_ga_users_daily.

      Privacy boundary: user_id_hash is a sipHash64 pseudonym of the
      Mixpanel distinct_id, so no raw wallet addresses appear. But the
      grain is per-user, which makes the view useful for re-identification
      attacks given even modest auxiliary information. Excluded from MCP
      via `meta.expose_to_mcp: false` and intentionally not registered in
      semantic/authoring/mixpanel_ga/semantic_models.yml.

      Sibling aggregate views (overview, events, traffic, geo, tech,
      usage_patterns, pages, modals, funnel) expose only counts per
      categorical dimension and are MCP-accessible.
    meta:
      owner: analytics_team
      privacy_tier: internal
      expose_to_mcp: false
      api:
        exclude_from_api: true
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
      - name: user_id_hash
        description: Privacy-safe sipHash64 of Mixpanel distinct_id (UInt64).
        data_type: UInt64
      - name: event_count
        description: Events fired by this user on this date.
        data_type: UInt64
      - name: distinct_event_types
        description: Distinct event names for this user on this date.
        data_type: UInt64
      - name: distinct_pages
        description: Distinct page paths visited by this user on this date.
        data_type: UInt64

  - name: api_mixpanel_ga_traffic_daily
    description: |
      Not exposed via cerebro-api; accessible to the internal MCP / semantic layer. Daily Gnosis App traffic
      breakdown by HTTP referring domain. Sourced from
      int_mixpanel_ga_traffic_daily. referrer_domain is 'direct' when the
      Referer header is absent; initial_referrer_domain captures the
      first-ever referrer a user came from (Mixpanel super-property).

      Use case: marketing channel attribution and growth funnel inputs.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
      - name: referrer_domain
        description: Referring domain ('direct' if none).
        data_type: String
      - name: initial_referrer_domain
        description: The first-ever referring domain for events at this grain.
        data_type: String
      - name: event_count
        description: Number of events from this referrer on this date.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count.
        data_type: UInt64

  - name: api_mixpanel_ga_pages_daily
    description: |
      Not exposed via cerebro-api; accessible to the internal MCP / semantic layer. Daily Gnosis App page-path
      analytics. One row per (date, current_domain, page_path) with event
      and unique-user counts. Sourced from int_mixpanel_ga_pages_daily.

      Use case: per-page traffic analysis and top-pages widgets. Page paths
      are stripped of query parameters upstream so they are stable across
      campaigns.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
      - name: current_domain
        description: Domain serving the page (e.g. app.gnosis.io).
        data_type: String
      - name: page_path
        description: URL path (no query string).
        data_type: String
      - name: event_count
        description: Number of events for this page on this date.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count for this page.
        data_type: UInt64

  - name: api_mixpanel_ga_geo_daily
    description: |
      Not exposed via cerebro-api; accessible to the internal MCP / semantic layer. Daily Gnosis App
      geographic breakdown, rolled up to country level only (no region)
      for privacy reasons — Mixpanel's region field is dropped during the
      view aggregation even though it exists upstream. Sourced from
      int_mixpanel_ga_geo_daily.

      Use case: country-level traffic distribution map / table on the
      internal dashboard.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
      - name: country_code
        description: ISO 2-letter country code (e.g. US, DE, GB).
        data_type: String
      - name: event_count
        description: Total events from this country on this date.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count from this country.
        data_type: UInt64
      - name: unique_devices
        description: Distinct device_id_hash count from this country.
        data_type: UInt64

  - name: api_mixpanel_ga_tech_daily
    description: |
      Not exposed via cerebro-api; accessible to the internal MCP / semantic layer. Daily Gnosis App
      browser / OS / device-type breakdown. Sourced from
      int_mixpanel_ga_tech_daily. Mixpanel auto-extracts these from the
      user agent.

      Use case: technology-distribution widgets on the internal dashboard
      and front-end compatibility prioritization.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
      - name: browser
        description: Browser name (e.g. Chrome, Safari, Firefox).
        data_type: String
      - name: os
        description: Operating system (e.g. Mac OS X, iOS, Windows).
        data_type: String
      - name: device_type
        description: Device type (e.g. Desktop, Mobile, Tablet).
        data_type: String
      - name: event_count
        description: Number of events from this tech combo on this date.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count for this tech combo.
        data_type: UInt64

  - name: api_mixpanel_ga_usage_patterns_daily
    description: |
      Not exposed via cerebro-api; accessible to the internal MCP / semantic layer. Daily Gnosis App event
      counts by hour-of-day and ISO day-of-week (both UTC). One row per
      (date, hour_of_day, day_of_week) bucket. Sourced from
      int_mixpanel_ga_usage_patterns_daily.

      Use case: heat-map of when users are active during the week.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
      - name: hour_of_day
        description: Hour of day in UTC (0-23).
        data_type: UInt8
      - name: day_of_week
        description: ISO day of week (1=Monday, 7=Sunday).
        data_type: UInt8
      - name: event_count
        description: Number of events in this hour/day-of-week bucket.
        data_type: UInt64
      - name: unique_users
        description: Distinct user_id_hash count in this bucket.
        data_type: UInt64

  - name: api_mixpanel_ga_gpay_crossdomain_daily
    description: |
      Not exposed via cerebro-api; accessible to the internal MCP / semantic
      layer. Pass-through view over fct_mixpanel_ga_gpay_crossdomain_daily.

      Privacy posture: the underlying fact table joins Mixpanel user_id_hash
      to GP Safe addresses via the keyed-pseudonym identity bridge, BUT
      this API view exposes only daily aggregate counts — no user_id_hash,
      no Safe address, no raw EOA. The join is computed upstream; this view
      surfaces just the aggregated outcome (DAU, matched-user counts by
      role, match-rate percent), which is safe for analyst access.

      Headline metrics: Mixpanel DAU, on-chain GPay active users, count of
      matched users overall and broken down by identity role
      (initial_owner / delegate / safe_self), plus 7- and 30-day activity
      flags (Delay module queueing, allowance changes).
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
      - name: date
        description: Calendar date (UTC).
        data_type: Date
      - name: mp_dau
        description: Mixpanel daily active users.
        data_type: UInt64
      - name: onchain_active_users
        description: On-chain GPay active users from fct_execution_gpay_activity_daily.
