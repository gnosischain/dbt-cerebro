  - name: fct_mixpanel_ga_campaign_funnel_weekly
    description: >
      Weekly growth funnel by UTM, first-touch attribution. Every funnel step in
      one tidy long model so "which campaign attracts users" reads end-to-end:
      signup -> card_order_started -> card_ordered -> circles_created ->
      crc_minted -> funded -> first_payment -> starts_referring.
      card_order_started is the 'Order the card' CTA click; card_ordered is the
      /gnosis-pay/kyc page-reach proxy (the order flow emits no completion
      event) per seeds/mixpanel_conversion_pages.csv. step_order makes
      funnel-monotonicity checks easy; not every user passes every step, so
      cross-step comparisons are per-campaign trends, not a strict sequential
      funnel. K-anonymity: campaigns with < 5 all-time signups are bucketed
      into '_small_campaigns'. Aggregate-only output (no user_id_hash).
    meta:
      owner: analytics_team
      privacy_tier: mixpanel
      api:
        exclude_from_api: true
    columns:
      - name: week
        description: ISO week start (Monday, UTC).
        data_type: Date
      - name: step
        description: >
          Funnel step name: signup, card_order_started, card_ordered,
          circles_created, crc_minted, funded, first_payment, starts_referring.
        data_type: String
      - name: step_order
        description: >
          Stable ordinal (0=signup .. 7=starts_referring; 9=unmapped) for
          funnel-monotonicity checks and ordered display. A dimension, not a measure.
        data_type: UInt8
      - name: utm_campaign
        description: First-touch marketing campaign ('_small_campaigns' if < 5 all-time signups).
        data_type: String
      - name: utm_source
        description: First-touch UTM source ('_small_campaigns' if k-anonymized).
        data_type: String
      - name: utm_medium
        description: First-touch UTM medium ('_small_campaigns' if k-anonymized).
        data_type: String
      - name: new_users
        description: Distinct users reaching this step in the week (flow; safe to sum across weeks within a step).
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: api_mixpanel_ga_campaign_funnel_weekly
    description: >
      Not exposed via cerebro-api; accessible to the internal MCP / semantic
      layer. Aggregate-only pass-through view over
      fct_mixpanel_ga_campaign_funnel_weekly (campaign-level counts only, no
      user_id_hash). Weekly growth funnel by UTM, first-touch attribution.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
