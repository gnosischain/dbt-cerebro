  - name: fct_mixpanel_ga_card_funnel_weekly
    description: >
      Weekly card-order funnel over the signup cohort (first 'Create my
      profile' event that ISO week — the Growth dashboard's "Signups").
      card_eligible = cohort users whose Mixpanel profile country is in
      seeds/card_eligible_countries.csv (EU-27 + NO/CH/GB); users with no
      profile or blank country count as NOT eligible. Numerators are
      eligible-scoped conversions landing in the SAME week: card_order_started
      ('Order the card' CTA) and card_ordered (/gnosis-pay/kyc page proxy).
      Rates use the eligible denominator, matching the Growth dashboard.
      Clipped to weeks >= 2026-03-02; current week excluded. Aggregate-only.
    meta:
      owner: analytics_team
      privacy_tier: mixpanel
      api:
        exclude_from_api: true
    columns:
      - name: week
        description: ISO week start (Monday, UTC) of the signup cohort.
        data_type: Date
      - name: signups
        description: Users whose first 'Create my profile' event fell in this week (flow).
        data_type: UInt64
      - name: card_eligible
        description: Cohort users with profile country in the card-eligible set (EU-27 + NO/CH/GB).
        data_type: UInt64
      - name: eligible_order_started
        description: Eligible cohort users whose first 'Order the card' click landed the same week.
        data_type: UInt64
      - name: eligible_card_ordered
        description: Eligible cohort users whose first /gnosis-pay/kyc reach landed the same week.
        data_type: UInt64
      - name: order_started_rate
        description: eligible_order_started / card_eligible. Ratio — do NOT sum.
        data_type: Float64
      - name: card_ordered_rate
        description: eligible_card_ordered / card_eligible. Ratio — do NOT sum.
        data_type: Float64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

