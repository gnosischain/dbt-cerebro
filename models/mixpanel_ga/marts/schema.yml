        data_type: UInt8
      - name: utm_campaign
        description: First-touch marketing campaign ('_small_campaigns' if k-anonymized).
        data_type: String
      - name: utm_source
        description: First-touch UTM source.
        data_type: String
      - name: utm_medium
        description: First-touch UTM medium.
        data_type: String
      - name: new_users
