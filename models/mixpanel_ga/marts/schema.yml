  - name: fct_mixpanel_ga_users_weekly
    description: >
      Week-scoped unique-user rollup for Gnosis App Mixpanel traffic. Weekly
      uniques cannot be derived from the daily marts (summing daily uniqExact
      counts a user once per active day), so distincts are recomputed at week
      grain from the event stream. Complete ISO weeks only (current week
      excluded). Anonymous devices and identified users carry different
      pseudonyms (Mixpanel swaps distinct_id on login), so weekly_visitors
      slightly overcounts people. Aggregate-only output (no user_id_hash).
    meta:
      owner: analytics_team
      privacy_tier: mixpanel
      api:
        exclude_from_api: true
    columns:
      - name: week
        description: ISO week start (Monday, UTC).
        data_type: Date
      - name: weekly_visitors
        description: >
          Distinct pseudonyms active in the week, INCLUDING anonymous $device:
          ids. Weekly distinct — do NOT sum across weeks.
        data_type: UInt64
      - name: wau
        description: >
          Weekly active users — distinct identified (wallet-linked) users with
          any event in the week. Weekly distinct — do NOT sum across weeks.
        data_type: UInt64
      - name: welcome_visitors
        description: Distinct users on /welcome (same definition as fct_mixpanel_ga_funnel_daily).
        data_type: UInt64
      - name: new_users
        description: Pseudonyms whose first-ever event fell in this week (flow; safe to sum).
        data_type: UInt64
      - name: new_identified_users
        description: Users whose first identified event fell in this week (flow; safe to sum).
        data_type: UInt64
      - name: total_events
        description: Total production events in the week.
        data_type: UInt64
    tests:
      - elementary.schema_changes:
          severity: warn
          tags: [elementary]

  - name: api_mixpanel_ga_users_weekly
    description: >
      Not exposed via cerebro-api; accessible to the internal MCP / semantic
