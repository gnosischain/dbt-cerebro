  - name: fct_mixpanel_ga_gpay_acquisition_weekly
    description: |
      Weekly progression of Gnosis Pay first-funded accounts and first card
      transactions, broken down by Mixpanel UTM campaign. Tidy/long shape:
      one row per (week, event_type, attribution_model, utm_campaign).
      event_type is 'funded' or 'first_payment'; attribution_model is
      'first_touch' or 'last_touch'.

      Attribution logic: an account's UTM comes from joining its on-chain
      pseudonym to Mixpanel (user_pseudonym == user_id_hash) and reading the
      per-user first/last-touch campaign from int_mixpanel_ga_user_acquisition.
      First-touch = campaign on the account's earliest utm-tagged event,
      last-touch = latest, derived by ordering each user's events on event_time
      (UTM is sparse — only ~3% of events carry it, on entry/landing hits).
      Accounts with no Mixpanel UTM fall to 'unknown' so totals reconcile to the
      full funnel.

      Aggregate-only (campaign-level counts, no user identifiers). Not exposed
      via cerebro-api (inherited exclusion); accessible to the MCP / semantic
      layer via the api_ view.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
      - name: week
        description: ISO week start (Monday, UTC) of the account's first event.
        data_type: Date
      - name: event_type
        description: "'funded' (first Safe inflow) or 'first_payment' (first card Payment)."
        data_type: String
      - name: attribution_model
        description: >
          UTM attribution window. 'first_touch' credits the campaign on the
          account's EARLIEST utm-tagged Mixpanel event; 'last_touch' credits the
          LATEST. UTM tags ride only on entry/landing hits (~3% of events), so
          each account's scattered tagged hits are collapsed to one first/last
          campaign by ordering on event_time (argMin/argMax over non-null
          utm_campaign, in int_mixpanel_ga_user_acquisition). The table stacks
          BOTH windows long — ALWAYS filter attribution_model to a single value
          before summing new_accounts, or counts double across the two windows.
        data_type: String
      - name: utm_campaign
        description: Marketing campaign, 'unknown' for accounts with no Mixpanel UTM match.
        data_type: String
      - name: new_accounts
        description: Count of accounts with their first event of this type in this week.
        data_type: UInt64
      - name: cumulative_accounts
        description: Running total of new_accounts over weeks within (event_type, attribution_model, utm_campaign).
        data_type: UInt64

