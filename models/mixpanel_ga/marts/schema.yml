      GP-side conversions are keyed to the Safe owner (relayer / exchange / cardholder) that
      Mixpanel never sees, so campaign attribution is structurally ~0.2% and 26-82%
      back-leaked; the honest signal is the uncut total. The attributable funding proxy is
      the app-side 'topup' in api_mixpanel_ga_growth_campaign_weekly. Summed over campaign
      within one attribution window. Aggregate-only; served via x-api-key.
    meta:
      owner: analytics_team
      privacy_tier: internal
      api:
        exclude_from_api: true
    columns:
