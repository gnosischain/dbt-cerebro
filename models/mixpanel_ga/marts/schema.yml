        description: ISO week start (Monday, UTC), clipped to >= 2025-10-01.
        data_type: Date
      - name: conversion_kind
        description: "topup (funded proxy), starts_referring, swap_filled, token_offer_claim."
        data_type: String
      - name: utm_campaign
