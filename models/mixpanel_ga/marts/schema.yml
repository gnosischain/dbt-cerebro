      - name: payments
        description: Total card payments in the week.
        data_type: UInt64
      - name: payment_volume_usd
        description: Total card payment USD volume in the week.
        data_type: Nullable(Float64)
      - name: cashback_usd
        description: Total cashback USD claimed in the week.
        data_type: Nullable(Float64)
      - name: avg_payments_per_account
