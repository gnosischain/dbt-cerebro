version: 2

sources:
  - name: mixpanel_ga
    schema: mixpanel_ga
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    meta:
      owner: analytics_team
      authoritative: true
    tables:
      - name: mixpanel_raw_events
        loaded_at_field: event_time
        description: >
          Raw Mixpanel events for the Gnosis App, ingested into ClickHouse.
          Each row is one event with a JSON properties blob containing browser,
          geo, referrer, page, and device metadata.  The distinct_id column
          contains wallet addresses or device-scoped anonymous IDs and must
          never be exposed raw in downstream models.
        columns:
          - name: event_name
            description: Mixpanel event name (e.g. "$mp_web_page_view", "Login with Passkey", "Open Modal").
          - name: distinct_id
            description: >
              User identifier assigned by Mixpanel. May be a wallet address
              (0x...) or a device-scoped anonymous ID ($device:...).
              SENSITIVE - must be hashed before exposure.
          - name: event_time
            description: UTC timestamp when the event occurred.
          - name: insert_id
            description: Mixpanel deduplication key for the event.
          - name: project_id
            description: Mixpanel project identifier.
          - name: properties
            description: >
              JSON string containing all event properties (browser, OS, geo,
              referrer, page, etc.). Also carries marketing-attribution UTM
              parameters on entry/landing hits: utm_campaign, utm_source,
              utm_medium, utm_content, utm_term, utm_id (no initial_utm_*
              first-touch super-properties are tracked).
      - name: mixpanel_raw_profiles
        loaded_at_field: synced_at
        description: >
          Daily full snapshot of Mixpanel People/profile properties for the
          Gnosis App project, ingested via the Engage API by click-runner
          (ingestors/mixpanel_profiles_ingestor.py). One row per profile per
          snapshot; ReplacingMergeTree(synced_at) keyed by (project_id,
          distinct_id) keeps the latest. Profiles are current-state (no
          history): `pay` is the user's current Gnosis Pay Safe address and
          initial_utm_* are Mixpanel's set-once first-touch campaign values.
        columns:
          - name: distinct_id
            description: >
              Mixpanel profile key (the Gnosis App wallet the user identified
              with). SENSITIVE - must be hashed before exposure.
          - name: project_id
            description: Mixpanel project identifier.
          - name: properties
            description: >
              JSON string of the profile's $properties. Carries `pay` (the
              user's Gnosis Pay Safe address - SENSITIVE) and Mixpanel's
              first-touch super-properties initial_utm_campaign / initial_utm_source /
              initial_utm_medium (plus initial_utm_content / term / id).
          - name: synced_at
            description: Snapshot timestamp when the profile was ingested (ReplacingMergeTree version).
