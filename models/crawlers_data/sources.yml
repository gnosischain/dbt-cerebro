version: 2

sources:
  - name: crawlers_data
    schema: crawlers_data
    freshness:
      warn_after: {count: 18, period: hour}
      error_after: {count: 30, period: hour}
    meta:
      owner: analytics_team
      authoritative: false
    tables:
      - name: dune_labels
        description: >
          Address→project labels crawled from Dune. One row per (address, label)
          observation with `introduced_at`; labels carry free-form suffixes that
          staging (stg_crawlers_data__dune_labels) normalizes into clean project
          names. Feeds int_crawlers_data_labels, the project_label entity spine.
        loaded_at_field: introduced_at
      # ClickHouse source freshness expects a timestamp, so cast the business
      # date to DateTime. Around the daily ~06:00 freshness run, a healthy
      # source should still top out at yesterday's date, so 36h/48h catches
      # a missing D-1 without false-alerting on normal daily cadence.
      - name: dune_prices
        description: >
          Daily token prices crawled from Dune. One row per (block_date, symbol)
          with a USD price; staging (stg_crawlers_data__dune_prices) dedupes to
          one price per date x upper(symbol) via anyLast. The platform-wide
          price feed until the native Chainlink oracle feed replaces it.
        loaded_at_field: "toDateTime(block_date)"
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
      - name: dune_bridge_flows
        description: >
          Cross-chain bridge transfers crawled from Dune with bridge,
          source/dest chain, token and token/USD/net amounts. Two staging
          readers over this same table: stg_crawlers_data__dune_bridge_flows
          (transaction-level rows with timestamp) and the v2 reader
          (pre-aggregated daily grain with date + txs). Staging derives
          direction (in/out/xchain) relative to Gnosis.
        loaded_at_field: timestamp
      - name: dune_gno_supply
        description: >
          Daily GNO supply breakdown crawled from Dune. One row per
          (block_date, label) with the token supply attributed to that label
          bucket; passed through by stg_crawlers_data__dune_gno_supply.
        loaded_at_field: "toDateTime(block_date)"
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
      - name: circles_blacklisted
        description: >
          Current Circles v2 bot/sybil blacklist. Ingested daily by click-runner
          (queries/circles/blacklist) from the aboutcircles bot-analytics API.
          The table is fully replaced on every run — there is no snapshot
          history; consumers that need point-in-time correctness should keep
          their blacklist join in a non-incremental downstream model so the
          latest state always re-applies.
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: address
            description: Lowercase blacklisted avatar address.
          - name: reason
            description: Free-text reason from the upstream API (e.g. `repeated_username`, `duplicate_avatar`).
          - name: ingested_at
            description: Wall-clock timestamp of the row insert.

  # Separate source so the schema can be redirected (e.g. to playground_max)
  # during dev/backfill validation without also redirecting dune_* and the
  # other crawlers_data tables. Defaults to crawlers_data in prod.
  - name: crawlers_data_cow
    schema: "{{ env_var('DBT_COW_FEES_SCHEMA', 'crawlers_data') }}"
    meta:
      owner: analytics_team
      authoritative: false
    tables:
      - name: cow_api_trade_fees
        description: >
          Per-fill protocol fee data from the CoW Protocol API.
          Ingested by click-runner (cow ingestor). Keyed by
          (order_uid, tx_hash, log_index) — partially-fillable orders produce
          multiple trades per order_uid, each with its own executedProtocolFees.
          Covers 2023+ where CoW switched to surplus-based fees not visible in events.
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
