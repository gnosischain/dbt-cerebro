version: 2

sources:
  - name: crawlers_data
    schema: crawlers_data
    freshness:
      warn_after: {count: 18, period: hour}
      error_after: {count: 30, period: hour}
    meta:
      owner: analytics_team
      authoritative: false
    tables:
      - name: dune_labels
        description: >
          Address→project labels crawled from Dune. One row per (address, label)
          observation with `introduced_at`; labels carry free-form suffixes that
          staging (stg_crawlers_data__dune_labels) normalizes into clean project
          names. Feeds int_crawlers_data_labels, the project_label entity spine.
        loaded_at_field: introduced_at
      # ClickHouse source freshness expects a timestamp, so cast the business
      # date to DateTime. Around the daily ~06:00 freshness run, a healthy
      # source should still top out at yesterday's date, so 36h/48h catches
      # a missing D-1 without false-alerting on normal daily cadence.
      - name: dune_prices
        description: >
          Daily token prices crawled from Dune. One row per (block_date, symbol)
          with a USD price; staging (stg_crawlers_data__dune_prices) dedupes to
          one price per date x upper(symbol) via anyLast. The platform-wide
          price feed until the native Chainlink oracle feed replaces it.
        loaded_at_field: "toDateTime(block_date)"
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
      - name: dune_bridge_flows
        description: >
          Cross-chain bridge transfers crawled from Dune with bridge,
          source/dest chain, token and token/USD/net amounts. Two staging
          readers over this same table: stg_crawlers_data__dune_bridge_flows
          (transaction-level rows with timestamp) and the v2 reader
          (pre-aggregated daily grain with date + txs). Staging derives
          direction (in/out/xchain) relative to Gnosis.
        loaded_at_field: timestamp
      - name: dune_gno_supply
        description: >
          Daily GNO supply breakdown crawled from Dune. One row per
          (block_date, label) with the token supply attributed to that label
          bucket; passed through by stg_crawlers_data__dune_gno_supply.
        loaded_at_field: "toDateTime(block_date)"
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
      - name: circles_blacklisted
        description: >
          Current Circles v2 bot/sybil blacklist. Ingested daily by click-runner
          (queries/circles/blacklist) from the aboutcircles bot-analytics API.
          The table is fully replaced on every run — there is no snapshot
          history; consumers that need point-in-time correctness should keep
          their blacklist join in a non-incremental downstream model so the
          latest state always re-applies.
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: address
            description: Lowercase blacklisted avatar address.
          - name: reason
            description: Free-text reason from the upstream API (e.g. `repeated_username`, `duplicate_avatar`).
          - name: ingested_at
            description: Wall-clock timestamp of the row insert.

      - name: celo_gpay_transfers
        description: >
          Raw, UNCLASSIFIED whitelisted-token (USDT/USDC) ERC-20 transfers
          touching a Celo GP card Safe on either side. Deliberately not
          pre-classified here — Dune only does the extraction + wallet-
          membership + token-whitelist filtering that requires querying
          Celo chain data ClickHouse doesn't otherwise have; the actual
          Payment/Top-up/Withdrawal/Reversal classification happens in
          int_celo_gpay_activity.sql, mirroring how Gnosis Chain classifies
          from raw execution.logs rather than a pre-classified source. This
          keeps classification logic versioned/testable in dbt-cerebro
          instead of living in an external Dune query. Ingested by
          click-runner: a one-time full backfill since launch plus a daily
          3-day-lookback incremental job (tolerates the job not running for
          up to 2 days straight), both writing into the same
          ReplacingMergeTree table. Deduped via `OPTIMIZE ... FINAL` after
          every insert (see queries/celo_gpay/optimize_celo_gpay_transfers.sql)
          so the overlap window never double-counts on same-day reads.
        loaded_at_field: block_time
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: sender
            description: Transfer sender address (may or may not be a GP Safe — see int_celo_gpay_activity for which side is the Safe).
          - name: receiver
            description: Transfer receiver address (may or may not be a GP Safe).
          - name: token_symbol
            description: >
              USDT or USDC — the only tokens observed hitting the Celo
              settlement contract as of the 2026-06-29 dashboard audit.
              Anything else is filtered out upstream in Dune (spam/spoofed
              tokens sent directly to Safe addresses as noise).
          - name: amount_usd
            description: >
              USD value via Dune tokens.transfers.amount_usd. Nullable — a
              brief Dune price-feed gap should not fail ingestion; downstream
              SUM() skips nulls rather than treating them as zero.

      - name: celo_gpay_wallet_events
        description: >
          Unified, append-only wallet-lifecycle event log for Celo GP card
          Safes: issued_at (initial owner(s) at SafeSetup, one row per
          owner) + add_owner + remove_owner. Replaces the earlier separate
          celo_gpay_wallets (a per-safe snapshot table whose
          is_activated/first_spend_at/owner_address MUTATED in place on
          every daily refresh) and celo_gpay_owner_events tables — feedback
          from review was that any source where rows change value over
          time (not append-only) will break incremental models built on
          top of it, and this is not a hypothetical: an incremental model
          that already processed a row before a late-arriving fact caught
          up has no mechanism to revisit it. An append-only log has no
          row that can ever change, so it's immune to that failure class
          by construction rather than by careful, easy-to-forget
          engineering discipline (full-rebuild wallets + wide-enough
          incremental windows) elsewhere in the pipeline.
          first_spend_at/is_activated are deliberately NOT events here —
          derived in dbt directly from crawlers_data.celo_gpay_transfers
          instead (the fact is already fully present there — anything sent
          to the settlement address, the same definition the Dune spine
          itself uses for its own activation signal — so ingesting it
          separately would just store the same fact twice).
          Discovered while building this: GP's Celo provisioning flow
          commonly swaps a Safe's owner within seconds of SafeSetup —in the
          simplest observed case, the real EOA owner is removed and
          replaced with a hardcoded dead/sentinel address (0x...002),
          permanently disabling owner-based signing so only the
          Roles/Delay module can move funds; more complex multi-owner
          reconfigurations (1 remove + multiple adds) have also been
          observed, so this is real variation worth tracking as data, not
          a single deterministic rule to hardcode.
          int_celo_gpay_wallets.owner_address (identity) reads only the
          issued_at events and intentionally never reflects this later
          churn — mirrors Gnosis Chain's initial_owner vs current-owner
          split exactly (int_execution_gpay_user_identity_bridge vs
          int_execution_gpay_wallet_owners).
          Deliberately minimal columns — no tx_hash/log_index, since
          nothing downstream reads them; the current-owners fold's
          same-timestamp tie-break is resolved entirely in dbt (see
          int_celo_gpay_safe_current_owners.sql) without needing raw chain
          log metadata. Ingested by click-runner: a one-time full backfill
          since launch plus a daily 3-day-lookback incremental job (tolerates
          the job not running for up to 2 days straight), same shape as
          celo_gpay_transfers.
        loaded_at_field: event_time
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        columns:
          - name: safe_address
            description: The GP card Safe this event is about.
          - name: action
            description: "issued_at | add_owner | remove_owner."
          - name: action_value
            description: >
              The owner address involved — for issued_at, an initial
              SafeSetup owner (one row per owner if multi-owner); for
              add_owner/remove_owner, the owner being added or removed.
              Nullable: null for an issued_at row when SafeSetup hasn't
              been decoded yet (the Safe was recognized via the
              bridge-module or activation signal alone) — a genuinely
              unknown owner, not defaulted to an empty-string sentinel.
          - name: event_time
            description: On-chain timestamp of the event.

  # Separate source so the schema can be redirected (e.g. to playground_max)
  # during dev/backfill validation without also redirecting dune_* and the
  # other crawlers_data tables. Defaults to crawlers_data in prod.
  - name: crawlers_data_cow
    schema: "{{ env_var('DBT_COW_FEES_SCHEMA', 'crawlers_data') }}"
    meta:
      owner: analytics_team
      authoritative: false
    tables:
      - name: cow_api_trade_fees
        description: >
          Per-fill protocol fee data from the CoW Protocol API.
          Ingested by click-runner (cow ingestor). Keyed by
          (order_uid, tx_hash, log_index) — partially-fillable orders produce
          multiple trades per order_uid, each with its own executedProtocolFees.
          Covers 2023+ where CoW switched to surplus-based fees not visible in events.
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
