version: 2
models:

- name: fct_crawlers_data_distinct_projects_sectors
  description: This model identifies unique combinations of projects and sectors from crawler data, supporting analysis of project-sector relationships.
  columns:

  - name: project
    description: Identifier for the specific project, representing a distinct initiative or effort.
    data_type: String
    tests:
    - not_null

  - name: sector
    description: Identifier for the sector associated with the project, indicating the industry or domain.
    data_type: String
    tests:
    - not_null
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: warn
      tags:
      - elementary
- name: api_crawlers_data_distinct_projects_sectors_totals
  description: This view aggregates the total number of distinct projects and sectors crawled, providing a high-level overview of data coverage for the API.
  columns:

  - name: value1
    description: The total count of unique projects identified in the dataset.
    data_type: Float64
    tests:
    - not_null

  - name: value2
    description: The total count of unique sectors associated with the projects.
    data_type: Float64
    tests:
    - not_null
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
- name: api_crawlers_data_gno_supply_daily
  description: The api_crawlers_data_gno_supply_daily model aggregates daily GNO supply data from crawler sources to support trend analysis and reporting.
  columns:

  - name: label
    description: Identifier for the specific GNO supply data source or category.
    data_type: String

  - name: date
    description: The date corresponding to the supply data, formatted as YYYY-MM-DD.
    data_type: Date
    tests:
    - not_null:
        config:
          where: "{% if var('test_full_refresh', false) %}1=1{% else %}toDate(date) >= today() - {{ var('test_lookback_days', 7) }}{% endif %}"
  - name: supply
    description: The amount of GNO supply recorded on the given date, measured in units consistent with blockchain token quantities.
    data_type: Float64
    tests:
    - elementary.column_anomalies:
        column_anomalies:
        - null_count
        - min
        - max
        timestamp_column: date
        time_bucket:
          period: day
          count: 1
        severity: warn
        tags:
        - elementary
  meta:
    owner: analytics_team
    authoritative: false
  tests:
  - elementary.volume_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      training_period:
        period: day
        count: 56
      seasonality: day_of_week
      detection_period:
        period: day
        count: 2
      detection_delay:
        period: day
        count: 1
      anomaly_sensitivity: 3
      ignore_small_changes:
        spike_failure_percent_threshold: 10
        drop_failure_percent_threshold: 20
      severity: warn
      tags:
      - elementary
  - elementary.freshness_anomalies:
      timestamp_column: date
      time_bucket:
        period: day
        count: 1
      severity: warn
      tags:
      - elementary
  - elementary.schema_changes:
      severity: error
      tags:
      - elementary
