name: 'gnosis_dbt'
version: '1.0.0'
config-version: 2

flags:
  source_freshness_run_project_hooks: true

profile: 'gnosis_dbt'

vars:
  symbol_exclude: "aGnoGNO,aGnoWXDAI,aGnosDAI,aGnoUSDC,aGnoEURe,aGnoUSDCe,spGNO,spUSDT,spUSDC,spUSDC.e"
  circles_base_group_abi_source_address: "0x6fa6b486b2206ec91f9bf36ef139ebd8e4477fac"
  circles_cm_group_abi_source_address: "0x6fa6b486b2206ec91f9bf36ef139ebd8e4477fac"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_modules"
  - "logs"

models:
  gnosis_dbt: {}
  elementary:
    +schema: "elementary"

seeds:
  gnosis_dbt:
    # optional: apply to all seeds in this package
    +quote_columns: false

    contracts_abi:
      +engine: ReplacingMergeTree()
      +order_by: [contract_address, implementation_address]
      +column_types:
        contract_address: "String"
        implementation_address: "String"
        abi_json: "String"
        contract_name: "String"
        source: "String"
        updated_at: "String"  

    event_signatures:
      +engine: MergeTree()
      +order_by: [contract_address, signature, event_name]
      +column_types:
        contract_address: "String"
        implementation_address: "String"
        contract_name: "String"
        event_name: "String"
        signature: "String"
        anonymous: "Int32"
        params: "String"
        indexed_params: "String"
        non_indexed_params: "String"

    function_signatures:
      +engine: MergeTree()
      +order_by: [contract_address, signature, function_name]
      +column_types:
        contract_address: "String"
        implementation_address: "String"
        contract_name: "String"
        function_name: "String"
        signature: "String"
        state_mutability: "String"
        input_params: "String"
        output_params: "String"

    tokens_whitelist:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        decimals: "UInt8"
        symbol: "String"
        date_start: "Date"
        date_end: "Nullable(Date)"
        token_class: "String"

    atoken_reserve_mapping:
      +engine: MergeTree()
      +order_by: [atoken_address]
      +column_types:
        atoken_address: "String"
        reserve_address: "String"
        atoken_symbol: "String"
        reserve_symbol: "String"
        decimals: "UInt8"
        token_class: "String"

    contracts_whitelist:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        contract_type: "String"

    contracts_circles_registry_static:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        contract_type: "String"
        abi_source_address: "String"
        is_dynamic: "UInt8"
        start_blocktime: "String"
        discovery_source: "String"

    contracts_factory_registry:
      +engine: MergeTree()
      +order_by: [factory_address, creation_event_name]
      +column_types:
        factory_address: "String"
        factory_events_model: "String"
        creation_event_name: "String"
        child_address_param: "String"
        child_contract_type: "String"
        child_abi_source_address: "String"
        protocol: "String"
        start_blocktime: "String"
