name: 'gnosis_dbt'
version: '1.0.0'
config-version: 2

flags:
  source_freshness_run_project_hooks: true

profile: 'gnosis_dbt'

vars:
  symbol_exclude: "aGnoGNO,aGnoWXDAI,aGnosDAI,aGnoUSDC,aGnoEURe,aGnoUSDCe,spGNO,spUSDT,spUSDC,spUSDC.e,spWETH,spwstETH,spWXDAI,spsDAI,spEURe"
  circles_base_group_abi_source_address: "0x6fa6b486b2206ec91f9bf36ef139ebd8e4477fac"
  circles_cm_group_abi_source_address: "0x6fa6b486b2206ec91f9bf36ef139ebd8e4477fac"
  circles_ipfs_gateway: "https://ipfs.io/ipfs/"
  circles_target_group_address: "0x1aca75e38263c79d9d4f10df0635cc6fcfe6f026"
  circles_target_group_start_date: "2025-04-25"
  # Floor date for the Gnosis App WAU/WEAU composite metric. Aligns with
  # the Cometh v4 bundler launch (when AA swap routing went live). Centralised
  # here so SQL doesn't hard-code the literal.
  gnosis_app_wau_floor_date: "2025-11-12"
  # On-chain address of the Circles v2 group "Circles cashback" wallet that
  # distributes gCRC rewards. Used by the weekly economically-active-users
  # definition (cashback recipients ≥ 1 gCRC / week).
  circles_v2_cashback_wallet: "0x7abe74b71f2958b624cb2be0596678784c0caf6a"
  # gCRC group-token contract addresses (lowercased). The cashback program cut
  # over from the original token (0x548c…4bc1) to a new token (0x78ba…7d02) at
  # ~2026-06-15 (ISO week 20619). The cashback wallet pays exactly one token per
  # week, so the weekly cashback model unions both with no double-counting.
  circles_v2_gcrc_tokens:
    - "0x548c20e6c24e4876e20dadbeab75362e2f5a4bc1"
    - "0x78bab8d5ea6b72f8375cc21436857815210f7d02"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_modules"
  - "logs"

models:
  gnosis_dbt:
    # Incremental write policy (enforced by scripts/checks/no_delete_insert.py):
    #   - Default strategy is insert_overwrite: partition replace is mutation-free
    #     (no ALTER DELETE) and duplicate-free (a partition holds one computed
    #     version). Requires partition_by on every incremental model.
    #   - Append-only event/decode streams override to 'append' + 'microbatch'
    #     tag, which routes them through the strict no-overlap watermark.
    # delete+insert is banned project-wide.
    +incremental_strategy: insert_overwrite
    contracts:
      +incremental_strategy: append
      +engine: "ReplacingMergeTree()"
      # The decode macros generate very deep expression DAGs; the new CH
      # analyzer spends ~8.5s planning each one (EXPLAIN alone), the legacy
      # analyzer plans them in ms (measured 21x: 8.6s -> 0.4s). Revisit when
      # the macros are refactored to emit smaller SQL or CH drops the
      # legacy analyzer.
      +pre_hook: ["SET enable_analyzer = 0"]
      +post_hook: ["SET enable_analyzer = 1"]
    # Mixpanel privacy policy (two tiers):
    #   API : ALL mixpanel models are excluded from cerebro-api uniformly
    #         (enforced here via api.exclude_from_api: true).
    #   MCP : aggregate-only views are accessible; per-user grain and
    #         cross-domain joins are blocked at the semantic registry
    #         (`quality_tier: blocked` in semantic/authoring/mixpanel_ga/).
    # `expose_to_mcp` is therefore NOT set at the project level — leave
    # it to per-model overrides in schema.yml where the sensitive views
    # explicitly opt out.
    mixpanel_ga:
      +tags: ["privacy:mixpanel_ga", "mixpanel_ga"]
      +meta:
        privacy_tier: mixpanel
        api:
          exclude_from_api: true
    execution:
      gnosis_app:
        intermediate:
          # Bridge model — maps user_pseudonym (sipHash64) to plaintext wallet
          # addresses. Internal only; never exposed via cerebro-api.
          int_execution_gnosis_app_user_identity_bridge:
            +tags: ["internal_only", "privacy:tier_internal"]
            +meta:
              expose_to_mcp: false
              privacy_tier: internal
              api:
                exclude_from_api: true
          # Identity table — contains plaintext addresses alongside
          # user_pseudonym. Same privacy class as the bridge above.
          int_execution_gnosis_app_user_identities:
            +tags: ["internal_only", "privacy:tier_internal"]
            +meta:
              expose_to_mcp: false
              privacy_tier: internal
              api:
                exclude_from_api: true
      gnosis_app_gt:
        # Ground-truth (envio_ga) rebuild. Set the model owner for the whole
        # tree so the semantic-registry model-owner check is satisfied. The raw
        # envio_ga / identity layer additionally opts out of MCP + API in its
        # own SQL config() meta (expose_to_mcp=false); those keys merge with
        # this owner default rather than being clobbered.
        +meta:
          owner: analytics_team
      gpay:
        intermediate:
          # Bridge model — maps user_pseudonym to plaintext Safe / EOA
          # addresses. Internal only; never exposed via cerebro-api.
          int_execution_gpay_user_identity_bridge:
            +tags: ["internal_only", "privacy:tier_internal"]
            +meta:
              expose_to_mcp: false
              privacy_tier: internal
              api:
                exclude_from_api: true
          # Safe-identity table — joins gp_safe (plaintext Safe address) to
          # user_pseudonym across initial-owner, delegate, and safe-self roles.
          int_execution_gpay_safe_identities:
            +tags: ["internal_only", "privacy:tier_internal"]
            +meta:
              expose_to_mcp: false
              privacy_tier: internal
              api:
                exclude_from_api: true
      mmm:
        +tags: ["mmm", "execution"]
        intermediate:
          +materialized: incremental
        marts:
          +materialized: table
  elementary:
    +schema: "elementary"
    +enabled: true

seeds:
  gnosis_dbt:
    # optional: apply to all seeds in this package
    +quote_columns: false

    contracts_abi:
      +engine: ReplacingMergeTree()
      +order_by: [contract_address, implementation_address]
      +column_types:
        contract_address: "String"
        implementation_address: "String"
        abi_json: "String"
        contract_name: "String"
        source: "String"
        updated_at: "String"  

    event_signatures:
      +engine: MergeTree()
      +order_by: [contract_address, signature, event_name]
      +column_types:
        contract_address: "String"
        implementation_address: "String"
        contract_name: "String"
        event_name: "String"
        signature: "String"
        anonymous: "Int32"
        params: "String"
        indexed_params: "String"
        non_indexed_params: "String"

    function_signatures:
      +engine: MergeTree()
      +order_by: [contract_address, signature, function_name]
      +column_types:
        contract_address: "String"
        implementation_address: "String"
        contract_name: "String"
        function_name: "String"
        signature: "String"
        state_mutability: "String"
        input_params: "String"
        output_params: "String"

    tokens_whitelist:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        decimals: "UInt8"
        symbol: "String"
        date_start: "Date"
        date_end: "Nullable(Date)"
        token_class: "String"

    atoken_reserve_mapping:
      +engine: MergeTree()
      +order_by: [atoken_address]
      +column_types:
        atoken_address: "String"
        reserve_address: "String"
        atoken_symbol: "String"
        reserve_symbol: "String"
        decimals: "UInt8"
        token_class: "String"

    lending_market_mapping:
      +engine: MergeTree()
      +order_by: [protocol, reserve_address]
      +column_types:
        protocol: "String"
        pool_address: "String"
        pool_configurator_address: "String"
        reserve_address: "String"
        reserve_symbol: "String"
        supply_token_address: "String"
        supply_token_symbol: "String"
        stable_debt_token_address: "String"
        variable_debt_token_address: "String"
        decimals: "UInt8"
        token_class: "String"
        start_date: "Date"

    savings_xdai_regimes:
      +engine: MergeTree()
      +order_by: [start_ts_utc]
      +column_types:
        canonical_label: "String"
        legacy_symbol: "String"
        vault_address: "String"
        backing_asset: "String"
        yield_source: "String"
        start_ts_utc: "String"
        end_ts_utc: "String"
        source_safe_tx_hash: "String"
        source_block_number: "UInt64"
        notes: "String"

    contracts_whitelist:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        contract_type: "String"

    gpay_operational_wallets:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"

    gp_migrated_safes:
      +engine: ReplacingMergeTree()
      +order_by: [old_safe_address, new_safe_address]
      +column_types:
        userId: "String"
        old_safe_address: "String"
        new_safe_address: "String"
        startedAt: "String"
        completedAt: "String"

    gpay_refund_distributors:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        label: "String"

    safe_singletons:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        version: "String"
        is_l2: "UInt8"
        setup_selector: "String"

    gnosis_app_relayers:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        label: "String"
        is_active: "UInt8"
        since_date: "Date"

    cow_solvers:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        name: "String"

    gnosis_app_marketplace_offers_excluded:
      +engine: MergeTree()
      +order_by: [offer_name]
      +column_types:
        offer_name: "String"
        gateway_address: "String"
        reason: "String"

    contracts_circles_registry_static:
      +engine: MergeTree()
      +order_by: [address]
      +column_types:
        address: "String"
        contract_type: "String"
        abi_source_address: "String"
        is_dynamic: "UInt8"
        start_blocktime: "String"
        discovery_source: "String"

    contracts_factory_registry:
      +engine: MergeTree()
      +order_by: [factory_address, creation_event_name]
      +column_types:
        factory_address: "String"
        factory_events_model: "String"
        creation_event_name: "String"
        child_address_param: "String"
        child_contract_type: "String"
        child_abi_source_address: "String"
        protocol: "String"
        start_blocktime: "String"

    # ── MTA / MMM registries ──────────────────────────────────────────────
    mta_event_kinds:
      +engine: MergeTree()
      +order_by: [event_kind]
      +column_types:
        event_kind: "LowCardinality(String)"
        domain: "LowCardinality(String)"
        description: "String"

    mta_conversion_kinds:
      +engine: MergeTree()
      +order_by: [conversion_kind]
      +column_types:
        conversion_kind: "LowCardinality(String)"
        description: "String"

    mta_conversion_to_event_kind:
      +engine: MergeTree()
      +order_by: [conversion_kind]
      +column_types:
        conversion_kind: "LowCardinality(String)"
        event_kind: "LowCardinality(String)"

    mta_funnels:
      +engine: MergeTree()
      +order_by: [funnel_name]
      +column_types:
        funnel_name: "LowCardinality(String)"
        step_1_event_kind: "LowCardinality(String)"
        step_2_event_kind: "LowCardinality(String)"
        step_3_event_kind: "Nullable(String)"
        window_seconds: "UInt32"

    mta_gp_event_kinds:
      +engine: MergeTree()
      +order_by: [event_kind]
      +column_types:
        event_kind: "LowCardinality(String)"
        description: "String"

    mta_gp_conversion_kinds:
      +engine: MergeTree()
      +order_by: [conversion_kind]
      +column_types:
        conversion_kind: "LowCardinality(String)"
        description: "String"

    mta_gp_conversion_to_event_kind:
      +engine: MergeTree()
      +order_by: [conversion_kind]
      +column_types:
        conversion_kind: "LowCardinality(String)"
        event_kind: "LowCardinality(String)"

    mta_gp_identity_roles:
      +engine: MergeTree()
      +order_by: [identity_role]
      +column_types:
        identity_role: "LowCardinality(String)"
        description: "String"

    mmm_kpi_registry:
      +engine: MergeTree()
      +order_by: [kpi_name]
      +column_types:
        kpi_name: "LowCardinality(String)"
        kpi_value_method: "LowCardinality(String)"
        units: "LowCardinality(String)"
        source_model: "String"
        is_dedup_safe: "UInt8"

    mmm_media_registry:
      +engine: MergeTree()
      +order_by: [media_name]
      +column_types:
        media_name: "LowCardinality(String)"
        media_value_method: "LowCardinality(String)"
        media_units: "LowCardinality(String)"
        is_outlay: "UInt8"
        source_model: "String"

    mmm_control_registry:
      +engine: MergeTree()
      +order_by: [control_name]
      +column_types:
        control_name: "LowCardinality(String)"
        control_value_method: "LowCardinality(String)"
        source_model: "String"

    mmm_holiday_weeks:
      +engine: MergeTree()
      +order_by: [week]
      +column_types:
        week: "Date"
        is_holiday_week: "UInt8"
        region: "LowCardinality(String)"

    mmm_hardfork_steps:
      +engine: MergeTree()
      +order_by: [fork_date]
      +column_types:
        fork_date: "Date"
        fork_name: "String"
        sectors_affected: "String"
